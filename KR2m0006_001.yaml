body:
  text: 西漢㑹要卷一宋徐天麟撰帝系一帝號豐公太上皇父也春秋晉史蔡墨有言陶唐氏既衰其後有劉累學擾龍事孔甲范氏其後也而大夫范宣子亦曰祖自虞以上為陶唐氏在夏為御龍氏在商為豕韋氏在周為唐杜氏晉主夏盟為范氏范氏為晉士師魯文公世奔秦後歸於晉其處者為劉氏劉向云戰國時劉氏自秦獲於魏秦滅魏遷大梁都于豐故周市說雍齒曰豐故梁徙也是以頌高祖云漢帝本系出自唐帝降及于周在秦作劉涉魏而東遂為豐公豐公蓋太上皇父其遷日淺墳墓在豐鮮焉及高祖即位置祠祝官則有秦晉梁荆之巫世祠天地綴之以祀豈不信哉由是推之漢承堯運德祚已盛斷蛇著符旗幟上赤協于火德自然之應得天統矣出本紀贊太上皇高帝父太公也漢六年夏五月詔曰人之至親莫親於父子故父有天下傳歸於子子有天下尊歸於父此人道之極也前日天下大亂兵革並起萬民苦殃朕親被堅執鋭自帥士卒犯危難平暴亂立諸矦偃兵息民天下大安此皆太公之教訓也諸王通矦將軍羣卿大夫已尊朕為皇帝而太公未有號今上尊太公曰太上皇十年秋七月太上皇崩葬萬年出本紀太祖高皇帝字季諱邦之字曰國沛豐邑中陽里人姓劉氏母媪後追尊曰昭靈后高祖為人隆凖而龍顔美鬚髯左股有七十二黒子寛仁愛人意豁如也及壯試吏為泗上亭長秦二世元年立為沛公漢元年立為漢王五年二月甲午即皇帝位于汜水之陽十二年夏四月甲辰帝崩于長樂宫五月丙寅葬長陵羣臣曰帝起細微撥亂世反之正平定天下為漢太祖功最高上尊號曰高皇帝著紀十二年夀五十三諡諡法無高以功高特起名丞相相國蕭何太尉盧綰周勃御史大夫周苛周昌趙堯孝惠皇帝諱盈字曰滿高祖太子也母曰吕皇后帝年五歳高祖初為漢王二年立為太子五年為皇太子十二年四月高祖崩五月丙寅即皇帝位明年改元七年秋八月戊寅帝崩于未央宫九月辛丑葬安陵著紀七年夀二十四諡柔質慈民曰惠相國蕭何曹參右丞相王陵左丞相陳平太尉周勃御史大夫趙堯高皇后吕氏諱雉字曰野雞父單父人吕公好相人見高祖状貌因重敬之吕公曰臣少好相人相人多矣無如季相願季自愛臣有息女願為箕帚妾吕媪怒吕公曰公始常欲竒此女與貴人沛令善公求之不與何自妄許與劉季吕公曰此非兒女子所知卒與高祖生孝惠帝魯元公主高帝五年尊王后曰皇后惠帝即位尊為皇太后太后立帝姊魯元公主女為皇后無子取後宫美人子名之以為太子惠帝崩太子立為皇帝年幼太后臨朝稱制四年少帝自知非皇后子出怨言皇太后幽之永巷五月丙辰立常山王𢎞為皇帝八年七月辛巳皇太后崩于未央宫既誅諸呂大臣相與隂謀以為少帝及三弟為王者皆非孝惠子復共誅之著紀八年太傅王陵審食其右丞相陳平左丞相審食其御史大夫任敖曹窋張蒼太宗孝文皇帝諱恆字曰常高祖中子也母曰薄姬高祖十一年立為代王十七年秋高后崩張晏曰代王之十七年也大臣迎代王入代邸羣臣從至上議曰丞相陳平等再拜言大王足下子𢎞等皆非孝惠皇帝子不當奉宗廟大王高皇帝子宜為嗣願大王即天子位代王西鄉遜者三南鄉遜者再丞相平等奉天子璽符再拜上代王遂即天子位後七年夏六月己亥帝崩于未央宫乙巳葬霸陵著紀二十三年夀四十六孝景元年申屠嘉等奏德莫盛於孝文皇帝宜為帝者太宗之廟制曰可諡慈惠愛民曰文改元前十六年後七年丞相陳平周勃灌嬰張蒼申屠嘉太尉灌嬰御史大夫張蒼圍馮敬申屠嘉陶青孝景皇帝諱啟字曰開文帝太子也母曰竇皇后文帝元年正月立為皇太子後七年六月文帝崩丁未即皇帝位後三年正月甲子帝崩于未央宫二月癸酉葬陽陵著紀十六年夀四十六諡布議行剛曰景改元前七年中六年後三年丞相申屠嘉陶青周亞夫劉舍衛綰太尉周亞夫御史大夫陶青疑晁錯直不介劉舍衛綰世宗孝武皇帝諱徹字曰通景帝中子也母曰王美人年四歳立為膠東王七歳為皇太子十六歳後三年正月景帝崩甲子太子即皇帝位後元二年二月丁卯帝崩于五柞宫三月甲申葬茂陵著紀五十四年夀七十一孝宣本始二年詔尊孝武廟為世廟諡威彊叡徳曰武年號建元六年元鼎六年元光六年元封六年元朔六年太初四年元狩六年天漢四年太始二年七征和四年十四年夀十一後元二年共著紀五丞相竇慶翟許昌周田蚡慶薛澤孫公孫𢎞屈李蔡嚴青趙石公賀劉氂田千秋太尉田蚡大司馬衛青霍去病霍光御史大夫牛抵𢎞趙綰播嚴青翟蔡韓安國公孫江孫李張蒼張歐石慶卜式之兒寛丘成延廣𢎞王卿暴勝商桑羊杜周孝昭皇帝諱弗陵後止諱弗字曰不武帝少子也母曰趙倢伃武帝後元二年二月立為皇太子年八歳以侍中奉車都尉霍光為大司馬大將軍受遺詔輔少主明日武帝崩戊辰太子即皇帝位元鳯四年帝加元服元平元年夏四月癸未帝崩于未央宫六月壬申葬平陵著紀十三年夀二十一諡聖聞周逹曰昭年號始元六年元鳯六年元平一年丞相田千秋王訴楊敞蔡義大司馬霍光御史大夫桑𢎞羊王訴楊敞蔡義田廣明中宗孝宣皇帝諱詢字曰謀武帝曽孫戾太子孫也太子納史良娣生史皇孫皇孫納王夫人生宣帝號曰皇曾孫生數月遭巫蠱事太子良娣皇孫王夫人皆遇害曾孫雖在襁褓猶坐収繫郡邸獄邴吉為廷尉監曾孫賴吉得全因遭大赦有詔掖庭養視上屬籍宗正元平元年四月昭帝崩無嗣大將軍霍光請皇后召昌邑王六月王受皇帝璽綬癸巳光奏王賀淫亂請廢太后詔曰可光奏議曰孝武帝曾孫病已潛邸名也操行節儉慈仁愛人可以嗣孝昭皇帝後奏可宗正徳至曾孫尚冠里舍洗沐賜御府衣太僕以軨獵車奉迎曾孫庚申入未央宫見皇太后封為陽武矦已而羣臣奏上璽綬即皇帝位元康元年詔更諱詢黄龍元年冬十二月甲戌帝崩于未央宫著紀二十五年夀四十二初元元年正月辛丑葬杜陵平帝元始四年尊孝宣廟為中宗諡聖善周聞曰宣年號本始四年五鳯四年地節四年甘露四年元康四年黄龍一年神爵四年丞相蔡義韋賢魏相丙吉黄霸于定國大司馬霍光史高張安世霍禹韓増許延夀御史大夫周廣明于定國丙吉年蕭望之陳萬黄霸杜延年高宗孝元皇帝諱奭字曰盛宣帝太子也母曰共哀許皇后宣帝微時生民間年二歳宣帝即位八歳立為太子黄龍元年十二月宣帝崩癸巳太子即皇帝位竟寧元年夏五月壬辰帝崩于未央宫秋七月丙戌葬渭陵著紀十六年夀四十三平帝元始四年尊為高宗廟諡行義恱民曰元年號初元五年永光五年建昭五年竟寧一年丞相于定國韋𤣥成匡衡大司馬史高王接許嘉王鳯御史大夫陳萬年衡夏禹薛廣徳韋成鄭𢎞孝成皇帝諱驁之字曰俊元帝太子也母曰王皇后元帝在太子宫生甲觀畫堂為世嫡皇孫宣帝愛之字曰太孫年三歳而宣帝崩元帝即位帝為太子竟寧元年五月元帝崩六月己未太子即皇帝位綏和二年三月丙戌帝崩于未央宫四月己卯葬延陵著紀二十六年夀四十五諡安民立政曰成年號建始四年永始四年河平四年元延四年陽朔四年綏和二年鴻嘉四年丞相匡衡王商張禹薛宣翟方進孔光大司馬許嘉師舟王鳯王音王商王根王莽御史大夫張謳王駿尹忠進張忠光王音武于永翟方孔何薛宣大司空何武師丹孝哀皇帝諱欣之字曰喜元帝庶孫定陶恭王子也母曰丁姬年三歳嗣立為王元延五年立為皇太子綏和二年三月成帝崩四月丙午太子即皇帝位元夀二年六月戊午帝崩于未央宫秋九月壬寅葬義陵著紀六年夀二十六諡恭仁短折曰哀年號建平四年元夀二年大傅孔光丞相孔光朱博平當大司徒馬宫大司馬傅喜王莽丁明王嘉傅晏韋賞董賢大司空朱博彭宣王崇御史大夫朱博孔光趙元何武平當彭宣王嘉王崇賈延孝平皇帝諱衎字曰樂元帝庶孫中山孝王子也母曰衛姬年三歳嗣立為王元夀二年六月哀帝崩太皇太后遣車騎將軍王舜大鴻臚左咸使持節迎中山王九月辛酉中山王即皇帝位帝年九歳太皇太后臨朝大司馬莽秉政百官總已以聽於莽元始二年更名平帝本名箕子今更名衎告祠高廟五年十二月丙午帝崩于未央宫漢注云帝春秋益壮以母衛太后故怨不悅莽自知益疎篡弑之謀由是生圖到臘日置酒藥中弑帝有司議曰禮臣不殤君皇帝年十有四歳宜以禮斂加元服奏可葬康陵著紀五年夀十有四諡布綱治紀曰平年號元始五年太師孔光太傅王莽太保王舜大司徒馬宫平晏大司空王崇甄豐西漢㑹要卷一
