body:
  text: 西漢㑹要卷六十五宋徐天麟撰方域二論形勢沛公初入關或説曰秦富十倍天下地形疆今聞章邯降項羽號曰雍王王關中即來恐沛公不得有此可急使守函谷關毋内諸侯軍髙紀髙帝六年田肯賀上曰甚善陛下得韓信又治秦中秦形勝之國也帶河阻山遥隔千里持㦸百萬秦得百二焉地埶便利其以下兵於諸侯譬猶居髙屋之上建瓴水也夫齊東有琅邪即墨之饒南有㤗山之固西有濁河之限北有勃海之利地方二千里持㦸百萬遥隔千里之外齊得十二焉此東西秦也髙紀韓生説項羽曰關中阻山帶河四塞之地肥饒可都以伯項羽傳井陘之道車不得方軌騎不得成列韓信傳主父偃言齊臨菑十萬户市租千金人衆殷富鉅於長安髙五王傳陳留天下之衝四通五達之郊也酈食其傳梁為大國天下膏腴地北界㤗山西至髙陽曰十餘城多大縣文三王傳濟北之地東接强齊南牽吳越北脅燕趙此四分五裂之國鄒陽傳淮陽天下郊勁兵處灌夫傳齊東都鉅海南有琅邪觀乎成山射乎之罘浮勃澥游孟諸邪與蕭真為鄰右以湯谷為界秋田乎青丘彷徨乎海内吞若雲夢者八凢其於胷中曾不蔕芥司馬相如傳越非有城郭邑里也處谿谷之間篁竹之中習於水鬬便於用舟地深昧而多水險中國之人不知其埶阻而入其地雖百不當嚴助傳㑹稽東接於海南近諸越北枕大江上南山天下之阻也南有江淮北有河渭其地從汧隴以東商雒以西厥壌肥饒漢興去三河之止霸產以西都涇渭之南此所謂天下陸海之地秦之所以虜西戎兼山東者也東方朔傳宮正史無者不載後倣此長樂宫高祖五年治長樂宫三輔黄圖長樂宫本秦之興樂宫也三輔舊事宫殿疏皆曰興樂宫秦始皇造漢修飾周回二十里前殿東西二十九丈兩棟中二十五丈深十二丈時帝遷都長安未有宫室先修秦舊宫以居之也未央宫髙祖七年蕭何治未央宫立東闕北闕前殿武庫大倉云云雒陽南宫髙祖置酒雒陽南宫沛宫髙祖十二年過沛置酒沛宫北宫在未央宫之北見霍光及張后傳建章宫太初元年二月起甘泉宫吾丘壽王傳薦寳鼎於甘泉宫林光宫孟康曰甘泉一名林光秦離宫名見郊祀志離宫叔孫通傳惠帝常出游離宫明光宫太初四年秋起明光宫在城西長楊宫成帝元延二年幸長楊宫師古曰在盩厔五柞宫武帝行幸盩厔五柞宫燕王傳作五莋萯陽宫宣帝甘露二年行幸萯陽宫本紀注云左獻秦文王所起萯音倍按東方朔傳作倍陽宫池陽宫甘露三年上自甘泉宿池陽宫章臺宫江都易王傳宣曲宫司馬相如子虗賦注云宣曲宫名在昆明池西棠梨宫同上宜春宫相如奏宜春宫賦鼎胡宫揚雄傳黄圗以為在藍田蘭池宫楊僕傳注云在渭城儲元宫馮昭傳儀黄圖云在上林苑雲陽宫同上昭臺宫霍后傳長壽宫元后傳長門宫東方朔傳又傅皇后傳鈎弋宫趙偼伃傳長信宫東方朔傳㑹朝長信宫永信宫哀帝祖母定陶恭皇太后稱永信宫中安宫哀帝母恭皇后稱中安宫東宫劉向傳依東宫之尊師古曰東宫太后所居也中宫哀紀食邑中宫師古曰中宫皇后之宫長定宫淳于長傳又許后傳桂宫成帝紀太子祁居桂宫三雍宫河間獻王獻雅樂對三雍宫棫陽宫郊祀志幸雍棫陽宫竹宫禮樂志自竹宫而望拜步夀宫宣帝起步壽宫見郊祀志平陽宫成帝時雍大雨壞平陽宫垣見郊祀志德陽宫景帝廟號德陽諱不言廟交門宫太始四年上幸交門宫萬載宫燕剌王傳黄山宫東方朔𫝊西至黄山注云宫名首山宫元封六年作首山宫思子宫戾太子傳犬臺宫江充召見犬臺宫回中宫匈奴傳回中地名在安定其中有宫蒲陶宫匈奴傳單于来朝舍之上林苑蒲陶宫龍淵宫武帝元光三年河水决濮陽汜郡十六發卒十萬救决河起龍淵宫服䖍曰宫在長安西作銅飛龍故以冠名孟康曰在西平渭水可用淬刀劍師古曰孟説是宣防宫溝洫志塞瓠子築宫其上曰宣防壽宫郊祀志武帝置壽宫比宫以禮神君萬嵗宫宣紀神爵元年幸萬嵗宫殿承明殿在未央宫中成帝鴻嘉二年有雉飛集於承明殿長樂臨華殿永始四年灾紫殿成帝永始四年幸甘泉郊㤗畤降集紫殿甘泉前殿郊祀志鳯凰殿宣帝作鳯凰殿以表嘉瑞見郊祀志武臺殿李陵召見未央宫武臺殿白虎殿杜欽對䇿白虎殿顯陽殿廣陵王傳椒房殿上官桀傳在未央宫皇后所居溫室殿京房傳公卿朝臣㑹議溫室注殿名髙門殿上麒麟殿上玉堂殿上金華殿同上又見翼奉傳曲臺殿翼奉傳溫明殿上馺娑殿揚雄傳殿名也丙殿元后傳飛羽殿元后傳便殿武帝髙便殿災宴闕殿鴻寧殿傅太后所居也見五行志殿前霍光傳師古曰古者宫室髙大通呼為殿非止天子宫中室宣室賈誼傳受釐坐宣室王嘉何武召見宣室東方朔曰宣室者先帝之正處也非法度之政不得入溫室京房傳凌室惠帝四年未央宫凌室灾凌室藏氷之所織室惠帝四年織室灾注織室織造繒帛處作室成紀太子入作室門非常室五行志成帝時男子室中王褒衣絳衣入非常長樂鍾室韓信傳暴室畫室霍光傳止畫室不入請室爰盎傳飾室元后傳玉堂揚雄傳上玉堂又郊祀志建章宫南有玉堂瑶堂禮樂志眺瑶堂承明之廬嚴助傳注在右渠閣殿廬金日碑傳少疾卧廬師古曰殿中所止曰廬館長安飛亷館孝武紀元封二年上林磃氏館郊祀志長楊射熊館元帝永光五年幸長楊射熊館布車騎大獵又見揚雄傳師古曰在盩厔縣其中有長楊射熊館長安飛亷桂館郊祀志甘泉益壽延壽館上上林平樂館武帝紀雲林館霍后傳陽禄杯館班倢伃賦二館名也爾館元后傳東館同上上林涿沐館同上長平館元后傳師古曰在長平坂甲館畫堂元后傳白鶴館孝武園白鶴館見翼奉傳鴻臚客館張湯傳闕東闕北闕蕭何治未央宫立東闕北闕鳯闕髙二十餘丈見郊祀志建章闕戾太子傳長樂宫東闕宣紀五鳯三年鸞鳯集於長樂宫東闕臺觀叢臺髙后元年趙王宫叢臺灾本紀云本六國時趙王故臺連聚非一故名叢臺露臺文帝卻作露臺本賛柏梁臺元鼎二年春起柏梁臺以香柏為之見本紀下同甘泉通天臺元封二年作屬玉觀宣紀甘露三年注云屬玉水鳥似鳷鵲漸臺同上又揚雄傳注云漸臺在泰液池中神明臺同上昆明東觀大皇太后避時昆明東觀武臺李陵召見武臺石闕封巒鳷鵲露寒司馬相如子虚賦四觀在甘泉中龍臺司馬相如子虚賦注云龍臺觀名細柳同上觀顥天臺上歸來望思臺上曲臺翼奉傳平樂觀西域傳河南成臯靈臺高祖薄姬傳上蘭觀元后傳師古曰在上林中又見揚雄傳晋灼注同甲觀畫堂成帝紀生於甲觀畫堂陽雲臺子虚賦蘭臺掌圖籍之所郎臺東方朔傳陛下累郎臺恐其不髙也師古曰郎堂下周屋樓閣宣室閣甘露三年未央宫宣室閣火宣紀石渠閣在未央宫北以藏秘書見施讎傳天禄閣揚雄傳麒麟閣蘇武傳圖功臣於麒麟閣井幹樓郊祀志立井幹樓髙五十丈師古曰井幹樓積木而髙為樓若井幹之形也井幹者井上木欄也其形或四角或八角張衡西京賦云幹接疊而百層即謂此樓也龍樓門元帝嘗急召太子出龍樓門不敢絶馳道注雲門樓上有銅龍若白鶴蜚亷之為名也苑囿上林苑武帝作上林苑見東方朔傳中牟苑宣帝元鳯三年罷中牟苑賦貧民本紀注云在滎陽樂游苑宣帝神爵二年起樂游苑本紀云在枉陵西北曲池之北水衡禁囿元帝初元二年與貧民博望苑武帝為太子作博望苑令受賔客成帝建始二年罷黄山苑霍雲張圍獵黄山苑中霍光傳梁東苑梁孝王築東苑三百里本傳宜春下苑元紀邊羣六牧師苑百官表師古曰漢官儀牧師諸苑三十六所分布西邊北邊養馬三十萬頭漢二年故秦苑囿園池令民得田之平帝元始二年罷安定呼池苑為安民縣師古曰中山之安定也池籞武帝元狩三年将討昆明昆明有滇池方三百里乃作昆明池以習水戰臣瓚曰西南夷傳有越嶲昆明國有滇池方三百里漢使求身毒國而為昆明所閉今欲伐之故作昆明池象之以習水戰在長安西南周回四十里食貨志又曰時越欲與漢用船戰乃大修昆明池也少府佽飛外池元紀假與貧民嚴籞池田同上太液池郊祀志揚雄傳作泰液上林十池百官表少府屬官有上林十池監牛首池司馬相如傳濯蠲牛首張楫曰牛首池名也在上林苑西安池霍光傳安池監賞道路復道上居南宫從復道上見諸将耦語高紀如淳曰復音複上下有道故謂之復輦道霍光傳召内樂人輦道牟首如淳曰輦道閣道也馳道成紀曰大子不敢絶馳道應劭曰馳道天子所行也諸門城門附未央宫司馬門成紀永和四年灾東司馬門東方朔傳北司馬門五行志殿東門上未央宫掖門髙后紀注云門在兩旁若人之臂掖北掖門楊敞傳壁門建章宫南有壁門見郊祀志髙門未央宫中有髙門汲黯傳端門燕剌王傳又周勃傳師古曰殿正門也龍樓門成紀注云門樓上有銅龍若白鶴蜚亷之為名也黄門元紀作室門成紀尚方掖門成紀注云掖門者正門之旁小門也金馬門公孫𢎞王褒待詔金馬門長秋門未央宫殿長秋門見戾太子傳東交門東方朔傳堯母門鈎弋趙偼伃傳小苑東門蕭望之補小苑東門侯上林延壽門孝平王后傳上東門賈誼傳雒陽上東門師古曰東面最北門十二城門百官表有十二城門侯臣天麟按三輔黄圗云都城十二門東出第一門曰霸城門第二曰清明門北頭第一門曰宣平門南出東頭第一門曰安門第二曰西安門又曰便門西出南頭第一門曰章城門第二曰直城門西出北頭第一門曰雍門東頭第一門曰髙門西頭第一門曰横門春王城門長安城東出北頭第一門也舊名宣平門翟方進傳横城門北靣西頭第一門見成紀建始三年覆盆城門劉屈氂傳一名杜門便門長安城南頭第一門薛廣德傳雍門趙倢伃傳注云在長安西北孝里西南章城門五行志成帝元延元年章城門門牡日亡直城門成紀注云西出南頭第二門譙門陳勝傳師古曰謂門上為髙樓以望者耳樓一名譙故謂美麗之譙為麗譙鋪首哀紀孝元廟殿門銅龜蛇鋪首鳴如淳曰門鋪首作龜蛇之形師古曰門之鋪首所以銜環者也官寺官寺元紀敗壊官寺師古曰凢府庭所在皆呼為寺又何並傳注云諸官曹之所通呼為寺風俗通曰寺嗣也理事之吏嗣續於其中西漢㑹要卷六十五
