body:
  text: 西漢㑹要卷五十一宋徐天麟撰食貨二水利魏文侯時史起為鄴令引漳水溉鄴以富魏之河內民歌之曰鄴有賢令兮為史公决漳水兮灌鄴旁終古舄鹵兮生稻梁溝洫志下同韓使水工鄭國間說秦令鑿涇水自中山西邸瓠口為渠並北山東注洛三百餘里注填閼之水溉舄鹵之地四萬餘頃收皆畝一鍾於是關中為沃野無凶年名曰鄭國渠右二渠雖非漢所開而漢實賴之故溝洫志敘述為詳武帝時鄭當時為大司農言異時關東漕粟從渭上度六月罷而渭水道九百餘里時有難處引渭穿渠起長安旁南山下至河三百餘里徑易漕度可令三月罷而渠下民田萬餘頃又可得以溉此損漕省卒而益肥關中之地上以為然令水工徐伯表發卒數萬人穿漕渠三歲而通以漕大便利其後漕稍多而渠下之民頗得以溉矣元鼎六年兒寬為左內史請鑿六輔渠益溉鄭國旁髙卭之田乃減御史稻田租令平繇行水毋使失時太始二年趙中大夫白公復奏穿渠引渠水首起谷口尾入櫟陽注渭中袤二百里溉田四千五百餘頃名曰白渠民得其饒歌之云云雜録水衡都尉張晏曰掌都水屬官有水司空都水長丞百官表武帝時河東守番係言穿渠引汾溉皮氏汾隂下引河溉汾隂蒲坂下上以為然發卒數萬人作渠田不利廢溝洫志下同其後有人上書欲通褒斜道及漕上令拜湯子卭發數萬人作褒斜道道果便近而水多湍石不可漕其後嚴熊言臨晉民願穿洛以溉重泉以東萬餘頃故惡地於是發卒萬人穿渠引洛水至商顔下鑿井深者四十餘丈井下相通行水穿得龍首故名龍首渠作之十餘嵗渠頗通猶未得其饒劉向以故九卿召拜為中郎領護三輔都水本傳息夫躬言秦開鄭國渠以富國彊兵今為京師土地肥饒可度地藝水泉廣溉灌之利哀帝使躬持節領護三輔都水躬立表欲穿長安城引漕注太倉下以省轉輸議不可成乃止本傳召信臣守南陽時行視郡中水泉開通溝瀆起水門提閼凡數十處以廣灌溉嵗增加多至三萬頃信臣為民作均水約束刻石立於田畔以防分爭田租秦田租口賦鹽鐵之利二十倍於古或耕豪民之田見稅十五言貧人無田而耕墾豪富家田十分之中以五輸田主也漢興循而未改食貨志董仲舒疏漢興天下既定髙帝約法省禁輕田租什五而稅一量吏祿度官用以賦於民食貨志惠帝即位減田稅復什五稅一紀鄧展曰漢初什五稅一中閒廢今復之文帝十三年詔除田之租稅本紀孝景二年令民半出田租三十而稅一也食貨志按本紀書於元年武帝元鼎六年上曰左右內史地名山川原甚衆細民未知其利今內史稻田租挈重挈苦計反收田租之約令也不與郡同郡謂四方諸郡其議減令史民勉盡地利平繇行水勿使失時溝洫志昭帝始元六年令民得以律占租本紀注云武帝時賦斂繁多律外而取今始復書舊占章瞻反王莽下令曰漢氏減輕田租三十而稅一常有更賦疲癃咸出厥名三十實什稅五食貨志荀恱論曰古者什一而稅以為天下之中正也令漢氏或百一而稅可謂鮮矣然豪彊富人占田逾侈輸其賦大半官收百之一稅民輸大半之賦官家之惠優於三代豪彊之暴酷於亡秦氏上惠不通威福分於豪彊也文帝不正其本而務除租稅適足以資豪彊耳賜民租賦文帝二年賜天下民今年田租之半十二年詔賜農民今年租稅之半武帝元封四年祠后土賜三縣及楊氏無出今年租賦五年修封禪所幸縣無出今年租賦天漢三年修封泰山行所過無出田租昭帝始元二年詔毋令民出今年田租宣帝本始元年鳳凰集膠東千乘租稅勿收三年郡國傷旱甚者毋出租稅四年詔被地震壞敗甚者勿收租稅元康二年令郡國被灾甚者毋收今年租稅神爵元年幸甘泉所過毋出田租甘露三年鳳凰集新祭毋出今年田租元帝初元元年令郡國被灾害甚者毋出租賦二年郡國被地動災甚者毋出租賦永光元年幸甘泉行所過毋出租賦成帝建始元年郡國被灾害什四以上毋收田租鴻嘉四年郡國被灾害什四以上民資不滿三萬勿出租賦永始四年幸甘泉河東所過無出田租哀帝即位令水所傷縣邑及他郡國災害什四以上民資不滿十萬皆無出今年租賦平帝元始二年天下民資不滿二萬及被災之郡不滿十萬勿租稅並本紀算賦漢四年初為算賦髙紀如淳曰漢儀注民年十五以上至五十六出賦錢人百二十為一等為治庫兵車馬孝惠六年女子年十五以上至三十不嫁五算惠紀注云漢律人出一算賈人與奴婢倍算文帝民賦四十賈捐之傳常賦百二十時天下民多故出賦四十武帝下詔曰前有司奏欲益民賦三十助邊用是重困老弱孤獨也本紀又蕭望之傳張敞曰先帝征行三十餘年百姓猶不加賦武帝建元元年詔民年八十復二算本紀復二口之算也元封元年行所巡至縣無出今年算本紀宣帝地節三年流民還歸者且勿算事本紀宣帝甘露元年減民算三十本紀一算減錢三十也元帝時貢禹請民年二十乃算本紀成帝建始二年減天下賦錢算四十本紀注云本算百二十今減四十為八十口賦昭帝元鳳四年詔毋收四年五年口賦昭紀如淳曰漢儀注民年七嵗至十四出口賦錢人二十三二十錢以食天子其三錢者武帝加口錢以補車騎馬元平元年詔減口賦錢有司奏請減什三上許之同上宣帝五鳳三年減天下口錢本紀元帝時貢禹以為古民亡賦算口錢起武帝征伐四夷重賦於民産子三歲則口出錢故民重困至於生子輒殺宜令兒七歲去齒乃出口錢年二十乃算天子下其議令民産子七歲乃出口錢自此始貢禹傳更賦漢氏常有更賦疲癃咸出食貨志昭帝始元四年詔三年以前逋更賦未入皆勿收本紀如淳曰更有三品有卒更有踐更有過更古者正卒無常皆當人迭為之一月一更是為卒更也貧者欲得顧更錢次直者出錢顧之月二千是為踐更也天下人皆直戍邊三日不可人人自行三日戍謂不行者出錢三百入官官以給戍者是為遇更也户賦秦漢之制列侯封君食租稅嵗率户二百千户之君則二十萬朝覲聘享出其中貨殖傳軍賦惠帝即位令吏六百石以上父母妻子與同居及故吏嘗佩將軍都尉印將兵及佩二千石官印者家難給軍賦他無有所與本紀西漢㑹要卷五十一
