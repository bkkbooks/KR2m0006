body:
  text: 西漢會要卷四十七宋徐天麟撰民政二傅籍景帝二年令天下男子年二十始傅本紀師古曰傅著也言著名籍給公家徭役臣天麟按髙紀發關中老弱未傅者悉詣軍如淳曰律年二十三傳之疇官高不滿六尺二寸以下為疲癃漢儀注民年二十三為正一歲為衛士一歲為材官騎士習射御馳戰陳年五十六乃免為庶民就田里則知漢初民在官三十有三年也今景帝更為異制令男子年二十始傳則在官三十有六年矣更役秦用商鞅之法月為更卒已復為正一歲屯戍一歲力役三十倍於古師古曰更卒謂給郡縣一月而更者正卒謂給中都官者也率計今人一歲之中屯戌及力役之事三十倍多於古也更音工衡反漢興循而未改食貨志董仲舒疏更賦昭紀如淳曰更有三品有卒更有踐更有過更古者正卒無常人皆當迭為之一月一更是為卒更也貧者欲得雇更錢者次直者出錢雇之月二千是謂踐更也天下人皆直戌邊三日亦名為更律所謂繇戌也雖丞相子亦在戌邊之調不可人人自行三日戍又行者當自戍三日不可往便還因便住一歲一更諸不行者出錢三百入官官以給戌者是為過更律就卒踐更者居也居更縣中五月乃更也後從尉律卒踐更一月休十一月也食貨志曰月為更卒已復為正一歲屯戌一歲力役三十倍於古此漢初因秦法而行之也後遂改易有謫乃戌邊一歲耳文帝偃武行文丁男三年而一事賈捐之傳如淳曰常賦歲一事時天下民多故三歲而一事吳以銅鹽故百姓無賦卒踐更輒豫平賈吳王濞傳漢氏常有更賦罷癃咸出食貨志王莽下令云云晉灼曰雖老病皆復出口算昭帝元鳳四年詔三年以前通更賦未入者皆勿收紀鄉役十里一亭亭有長十亭一鄉鄉有三老有秩嗇夫遊徼三老掌教化嗇夫職聽訟收賦稅遊徼禁循盜賊縣大率方百里其民稠則減稀則曠鄉亭亦如之皆秦制也百官表漢官儀曰遊徼亭長皆習設備五兵弓弩戟循刀劒甲鎧鼓吏赤幘行縢帶劒佩刀持楯被甲設矛戟習射十里一亭亭長亭候五里一郵郵間相去二里半司姦盜亭長持二尺板以劾賊索繩以收執賊泛役著外繇附惠帝三年發長安六百里內男女十四萬六千人城長安三十日罷五年復發長安六百里內男女十四萬五千人城長安三十日罷並紀武帝元狩三年發謫吏穿昆明池師古曰吏有罪者罰而役之成帝河平元年卒治河者為著外繇六月溝洫志師古曰以卒治河有勞雖役日近皆得比繇戍六月也著謂著于簿籍後二歲河復決作治六月乃成治河卒非受平賈者為著外繇六月溝洫志平賈謂顧也其受平賈者不在著外繇之數哀帝建平二年葬帝太后定陶發陳留濟隂近郡國五萬人穿復土紀按漢世力役非一姑舉此數條以見役法之例雜録文帝時朝錯説上曰今農夫五口之家其服役者不下二人其能耕者不過百畝百畝之收不過百石春耕夏耘秋穫冬藏伐薪樵治官府給繇役春不得避風塵夏不得避暑熱秋不得避隂雨冬不得避寒凍四時之間亡日休息又私自送往迎來弔死問疾養孤長幼在其中勤苦如此食貨志上西邊北邊之郡雖有長爵不輕得復五尺以上不得休息賈誼傳信武侯靳歙坐事國人過律免功臣表師古曰事謂役使之也復除從軍漢二年蜀漢民給軍事勞苦復勿稅租二歲關中卒從軍者復家一歲髙紀下同五年詔諸侯子在關中者復之十二歲其歸者半之軍吏卒賜爵非七大夫已下皆復其身及户勿事八年令吏卒從軍至平城及守城邑者皆復終身勿事十一年諸縣堅守不降反寇者復租三歲六月令士卒從入蜀漢關中皆復終身十二年詔吏二千石入蜀漢定三秦者皆世世復豐沛髙祖十一年四月令豐人徙關中者皆復終身十二年以沛為湯沐邑復其民世世無有所與沛父兒請復豐乃比并復豐比沛並本紀民産子髙祖七年民産子復勿事二歲本紀三老漢二年置鄉三老擇鄉三老為縣三老復勿繇戍本紀孝弟力田惠帝四年舉民孝弟力田者復其身武帝元朔元年詔曰朕旅耆老復孝敬本紀髙年文帝禮髙年九十者一子不事八十者二算不事賈誼傳武帝建元元年民年八十復二算九十復甲卒本紀四月詔民年九十以上已有受鬻法為復子若孫令得身率妻妾遂其供養之事本紀邊郡朝錯説文帝募民守塞皆賜髙爵復其家食貨志西邊北邊之郡雖有長爵不輕得復賈誼傳舊都文帝三年幸太原復晉陽中都民三歲租本紀守冢髙祖十二年詔興秦始皇帝守冢二十家楚魏齊各十家趙及魏公子亡忘各五家令視其冢復無與他事本紀給祠武帝登禮中嶽以山下户凡三百封崈髙為之奉邑獨給祠復無有所與郊祀志宗室文帝四年復諸劉有屬籍者家無所與紀功臣後宣帝地節二年詔曰傅陸侯功德茂盛復其後世疇其爵邑世世無有所與紀元康元年復髙皇帝功臣絳侯周勃等百三十六人家子孫令奉祭祀世世勿絶其母嗣者復其次同上博士弟子武帝為博士官置弟子五十人復其身儒林傳序通經元帝好儒能通一經者復數年以用度不足更為設員千人同上車騎馬朝錯疏曰令民有車騎馬一匹者復卒三人食貨志入奴婢武帝府庫並虛乃募民能入奴婢者得以終身復食貨志買復朝錯疏曰令民入粟至五大夫乃復一人耳食貨志桑𢎞羊請令民入粟甘泉各有差以復終身食貨志武帝兵革數動民多買復及五大夫千夫調發之士益鮮同上元帝永光三年用度不足民多復除無以給中外徭役紀流民宣帝地節三年詔流民還歸者且勿算事紀本始三年大旱三輔民就賤者且毋收事紀執喪宣帝地節四年詔諸有大父母父母喪者勿繇事使得收斂送終盡其子道紀宮人景帝遺詔出宮人歸其家復終身紀節婦平帝復節婦鄉一人西漢會要卷四十七
