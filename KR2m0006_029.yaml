body:
  text: 西漢㑹要卷二十九宋徐天麟撰祥異上符瑞髙祖被酒夜徑澤中令一人行前行前者還報曰前有大蛇當徑願還髙祖醉曰壯士行何畏乃前拔劍斬蛇蛇分為兩道開行數里醉困卧後人來至蛇所有一老嫗夜哭人問嫗何哭嫗曰人殺吾子人曰嫗子何為見殺嫗曰吾子白帝子也化為蛇當道今者赤帝子斬之故哭人乃以嫗為不誠欲苦之嫗因忽不見紀秦始皇帝嘗曰東南有天子氣於是東游以厭當之髙祖𨼆於芒碭山澤間吕后與人俱求常得之髙祖怪問之吕后曰季所居上常有雲氣故往從常得季紀漢元年冬十月五星聚東井紀應劭曰東井秦之分野五星所在當有聖人以義取天下文帝十五年黃龍見於成紀紀武帝元狩元年行幸雍祠五畤獲白麟作白麟之歌二年夏馬生余吾水中南越獻馴象能言鳥元鼎元年得鼎汾水上四年得寶鼎后上祠旁秋馬生渥窪水中作寶鼎天馬之歌元封二年甘泉宫內中産芝九莖連葉作芝房之歌太始二年詔曰往者朕郊見上帝西登隴首獲白麟以饋宗廟渥窪出天馬泰山見黃金更改故名今更黃金為麟趾裊蹄以協瑞焉因以頒封諸侯王三年行幸東海獲赤雁作朱雁之歌昭帝始元元年二月黃鵠下建章宫太液池中公卿上夀三年鳯凰集東海遣使者祠其處宣帝本始元年鳯凰集膠東千乘四年鳯凰集北海安丘淳于地節二年四月鳯凰集魯郡羣鳥從之元康元年詔曰乃者鳯凰集泰山陳留甘露降未央宫朕未能章先帝休烈協寧百姓承天順地調序四時獲蒙嘉瑞賜兹祉福夙夜兢兢靡有驕色內省匪解永惟罔極書不云乎鳯凰來儀庶尹克諧其赦天下賜勤事吏中二千石以下至六百石爵自中郎吏至五大夫佐史以上二級民一級女子百户牛酒加賜鰥寡孤獨三老孝弟力田帛所振貸勿收三年春以神爵數集泰山賜諸侯王丞相將軍列侯二千石金郎從官帛各有差賜天下吏爵二級民一級女子百户牛酒鰥寡孤獨髙年帛六月詔曰前年夏神爵集雍今春五色鳥以萬數飛過屬縣翺翔而舞欲集未下其令三輔毋得以春夏擲巢探卵彈射飛鳥具為令四年三月詔曰乃者神爵五采以萬數集長樂未央北宫髙寢甘泉泰畤殿中及上林苑朕之不逮寡于德厚屢獲嘉祥非朕之任其賜天下吏爵二級民一級女子百户牛酒加賜三老孝弟力田帛人二匹鰥寡孤獨各一匹神爵元年詔曰朕承宗廟戰戰栗栗惟萬事統未燭厥理乃元康四年嘉榖元稷降于郡國神爵仍集金芝九莖産于涵德殿銅池中九真獻竒獸南郡獲白鹿威鳯為寶朕之不明震于珍物飭躬齊精析為百姓東濟大河天氣清靜神魚舞河幸萬嵗宫神爵翔集朕之不德懼不能任其以五年為神爵元年賜天下勤事吏爵二級民一級女子百户牛酒鰥寡孤獨髙年帛所振貸物勿收行所過毋出田租二年二月詔曰乃者正月乙丑鳯凰甘露降集京師羣鳥從以萬數朕之不德屢獲天福祗事不怠其赦天下四年二月詔曰乃者鳯凰甘露降集京師嘉瑞並見修興太乙五帝后土之祠祈為百姓蒙祉福鸞鳯萬舉蜚覽翺翔集止于旁齊戒之暮神光顯著薦鬯之夕神光交錯或降于天或登于地或從四方來集于壇上帝嘉嚮海內承福其赦天下賜民爵一級女子百户牛酒鰥寡孤獨髙年帛冬十月鳯凰十一集杜陵十二月鳯凰集上林五鳯三年詔曰朕飭躬齊戒郊上帝祠后土神光並見或興於谷燭耀齊宫十有餘刻甘露降神爵集已詔有司告祠上帝宗廟三月辛丑鸞鳯又集長樂宫東關中木上飛下止地文章五色留十餘刻吏民並觀朕之不敏懼不能任屢蒙嘉瑞獲兹祉福書不云乎雖休勿休祗事不怠公卿大夫其勉焉減天下口錢赦殊死以下賜民爵一級女子百户牛酒大酺五日加賜鰥寡孤獨髙年帛甘露元年黃龍見新豐三年詔曰乃者鳯凰甘露降集黃龍登興醴泉滂流枯槁榮茂神光並見咸受祺祥其赦天下減民算三十賜諸侯王丞相將軍列侯中二千石金錢各有差賜民爵一級女子百户牛酒鰥寡孤獨髙年帛三年詔曰乃者鳯凰集新蔡羣鳥四面行列皆鄉鳯凰立以萬數其賜汝南太守帛百匹新蔡長吏三老孝弟力田鰥寡孤獨各有差賜民爵二級毋出今年租成帝鴻嘉元年冬黃龍見真定元延四年甘露降京師賜長安民牛酒平帝元始元年越裳氏重譯獻白雉一黑雉二二年春黃支國獻犀牛並紀日食髙帝三年十月甲戌晦日有食之在斗二十度十一月癸卯晦日有食之在虛三度九年六月乙未晦日有食之既在張十三度惠帝七年正月辛丑朔日有食之在危十二度五月丁卯先晦一日日有食之幾盡在七星髙后二年六月丙戌晦日有食之七年正月己丑晦日有食之既在營室九度文帝二年十一月癸卯晦日有食之在婺女一度三年十月丁酉晦日有食之在斗二十二度十一月丁卯晦日有食之在虛八度後四年四月丙辰晦日有食之在東井十三度七年正月辛未朔日有食之景帝三年二月壬午晦日有食之在胃二度七年十一月庚寅晦日有食之在虛九度中元年十二月甲寅晦日有食之二年九月甲戌晦日有食之三年九月戊戌晦日有食之幾盡在尾九度元年七月辛亥晦日有食之在軫七度後元年七月乙巳先晦一日日有食之在翼十七度武帝建元二年二月丙戌朔日有食之在奎十四度二年九月丙子晦日有食之在尾二度五年正月己巳朔日有食之元光元年二月丙辰晦日有食之七月癸未先晦一日日有食之在翼八度元朔二年二月乙巳晦日有食之在胃二度六年十一月癸丑晦日有食之元狩元年五月乙巳晦日有食之在栁六度元鼎五年四月丁丑晦日有食之在東井三十三度元封四年六月己酉朔日有食之大始元年正月乙巳晦日有食之四年十月甲寅晦日有食之在斗十九度征和四年八月辛酉晦日有食之不盡如鈎在亢二度昭帝始元三年十一月壬辰朔日有食之在斗九度元鳯元年七月己亥晦日有食之幾盡在張十二度宣帝地節元年十二月癸亥晦日有食之在營室十五度元鳯元年十二月乙酉朔日有食之在婺女十度四年四月辛丑朔日有食之在畢十九度元帝永光二年三月壬戌朔日有食之在婁八度四年六月戊寅晦日有食之在張七度建昭五年六月壬申晦日有食之不盡如鈎成帝建始三年十二月戊申朔日有食之在婺女九度河平元年四月己亥晦日有食之不盡如鈎在東井六度三年八月乙卯晦日有食之在房四年三月癸丑朔日有食之在昴陽朔元年二月丁未晦日有食之在胃永始元年九月丁巳晦日有食之二年二月乙酉晦日有食之三年正月己卯晦日有食之四年七月辛未晦日有食之元廷元年正月己亥朔日有食之哀帝元夀元年正月辛丑朔日有食之不盡如鈎在營室十度二年三月壬辰晦日有食之平帝元始元年五月丁巳朔日有食之在東井二年九月戊申晦日有食之既凡漢著紀十二世二百一十二年日食五十三朔十四晦三十六先晦一日三並五行志日月變異武帝建元二年四月戊申有如日夜出紀元帝永光元年四月日色青白亡景正中時有景亡光是夏寒至九月乃有光成帝建始元年八月戊午晨漏未盡三刻有兩月重見河平元年正月壬寅朔日月俱在營室時日出赤二月癸未日朝赤且入又赤夜月赤甲申日出赤如血亡光漏上四刻半乃頗有光燭地赤黃食後乃復三月乙未日出黃有黑氣大如錢居日中央並五行志星孛天文志所載已見天文類五行志所載别見于此髙帝三年七月有星孛于大角旬餘乃入文帝後七年九月有星孛于西方其本直尾箕末指虛危長丈餘及天漢十六日不見武帝建元六年六月有星孛于北方八月長星出于東方長終天三十日去是為蚩尤旗見則王者征伐四方元狩四年四月長星又出西北元封元年五月有星孛于東井又孛于三台宣帝地節元年正月有星孛于西方去太白二丈所成帝建始元年正月有星孛于營室青白色長六七丈廣尺餘元延元年七月辛未有星孛于東井踐五諸侯出河戎北率行車袁大微後日六度有餘晨出東方十三日夕見西方犯次妃長秋斗填螽炎再貫紫宫中大火當後逹天河除於妃后之域南逝度犯大角攝提至天市而按節徐行炎入市中旬而後西去五十六日與蒼龍俱伏並五行志星隕成帝永始二年二月癸未夜過中星隕如雨長一二丈繹繹未至地滅至雞鳴止五行志亡冰武帝元狩六年冬亡冰昭帝始元二年冬亡冰並五行志紀作六年雪文帝四年六月天雨雪景帝中六年三月雨雪武帝元狩元年十二月大雨雪民多凍死元鼎二年三月雪平地厚五尺三年三月水冰四月雨雪元帝建昭二年十一月齊楚地大雪深五尺四年三月雨雪燕多死並五行志成帝建始四年夏四月雨雪本紀陽朔四年四月雨雪燕雀死五行志霜雹武帝元光四年四月隕霜殺草木元封三年十二月雷雨雹大如馬頭宣帝地節四年五月山陽濟隂雨雹如雞子深二尺五寸殺二十人蜚鳥皆死元帝永光元年三月隕霜殺桑九月二日隕霜殺稼成帝河平二年四月楚國雨雹大如斧蜚鳥死並五行志總天變惠帝二年天雨血於宜陽一頃所赤眚武帝建元四年有風赤如血紀元光五年七月大風拔木紀天漢元年三月天雨白毛三月八月天雨白氂毛之彊屈曲者成帝建始元年四月辛丑夜西北有如火光壬寅晨大風從西北起雲氣赤黃四塞天下終日夜著地者黃土塵也志十二月大風拔甘泉畤中大木十韋以上本紀韋與圍同哀帝建平四年山陽湖陵雨血廣三尺長五尺大者如錢小者如麻子平帝元始四年冬大風吹長安城門東屋瓦且盡並五行志西漢㑹要卷二十九
