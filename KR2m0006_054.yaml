body:
  text: 西漢㑹要卷五十四宋徐天麟撰食貨五大司農錢都內錢附武帝之初七十年間國家亡事都內之錢貫朽而不可校太倉之粟紅腐而不可食按百官表大司農屬官有都內令丞山海天地之藏宜屬少府陛下勿私以屬大農佐賦食貨志帝比嵗擊胡大司農陳臧錢經用既竭不足以奉戰士乃令民得買爵贖罪置武功爵同上孝武之世開玉門通西域師旅之費不可勝計至於用度不足乃榷酒酤管鹽鐵鑄白金造皮幣算至車船租及六畜西域傳贊元帝溫恭少欲都內錢四十萬萬王嘉傳漢武庫兵器繕治造作皆度大司農錢大司農錢自乘輿不以給共養共養勞賜一出少府毋將隆傳少府禁錢漢興山川園池市肆租稅之入自天子以至封君湯沐邑皆各為私奉養不領於天子之經費食貨志山海天地之藏宜屬少府食貨志按百官表少府掌山海池澤之稅以給共養共養勞賜一出少府毋將隆傳武帝出禁錢以振元元食貨志西羌之役大農錢盡乃以少府禁錢續之賈捐之傳元帝溫恭少欲少府錢十八萬萬王嘉傳水衡錢初大農斡鹽鐵官布多故置水衡欲以主鹽鐵及楊可告緡上林財物衆乃令水衡主上林食貨志宣帝本始二年以水衡錢為平陵民起第宅紀應劭曰水衡與少府皆天子私藏耳縣官工作當仰給司農今出水衡錢言宣帝更為異政也元帝溫恭少欲水衡錢二十五萬萬王嘉傳均輸平凖大農屬司官有均輸平凖令丞百官表孟康曰均輸謂諸當有所輸於官者皆令輸其地土所繞平其所在時價官更於它處賣之輸者既便而官有利也元狩中桑𢎞羊為大司農中丞管諸㑹計事稍稍置均輸以通貨物漢連出兵三歲費皆仰大農大農以均輸調鹽鐵助賦故能淡之食貨志元封元年𢎞羊以諸官各自市相爭物以故騰躍而天下賦輸或不價其僦費乃請置大農部丞數十人分部主郡國各往往置均輸鹽鐵官初𢎞羊為大農丞固已稍稍置均輸矣今既領大農故遍行其法於郡國也令逺方各以其物如異時商賈所轉販者為賦而相灌輸置平凖于京師都受天下委輸均輸在郡國各轉於京師者也平凖在京師總受天下之轉輸者也召工官治車諸侯皆仰給大農大農請官盡籠天下之貨物貴則賣之賤則買之如此富商大賈亡所牟大利則反本而萬物不得騰躍故抑天下之物名曰平凖天子以為然而許之一歲之中諸均輸帛五百萬匹民不益賦而天下用饒上昭帝即位六年詔郡國舉賢良文學之士問以民所疾苦皆對願罷鹽鐵酒榷均輸官毋與天下爭利𢎞羊難以為此國家大業安邊足用之本不可廢也食貨志按桓寬鹽鐵論大夫曰往者郡國諸侯各以其物貢輸往來煩雜物多苦惡或不償其費故郡置輸官以相給運而便逺之貢故曰均輸開委府于京師方以籠貨物賤則賈貴則賣是以縣官不失實商賈無所利故曰平凖凖則民不失職均輸則民不劬勞故平凖均輸所以平萬物而便百姓也文學曰古之賦稅於民也因其所工不求所拙農人納其穫女人效其織今釋其所有責其所無百姓賤賣貨物以便上求間者郡國或令民作絮史留難與之為市吏之所入非獨齊陶之縑蜀漢之布也皆民間之所為耳行姦賣平農民重苦必苦女工繭稅未見輸之均也縣官猥發闔門擅市即萬物並收並取則物騰躍躍騰則商賈利自市則吏容姦豪吏富商積貨儲物以待其急輕賈姦吏收以取貴未見凖之平也蓋古之均輸所以齊勞逸而便貢輸非以為利而賈萬物也云云漕運漢二年築甬道屬河取敖倉粟蕭何留收巴蜀使給軍食何轉漕關中給食不乏本傳漢初轉漕關東粟以給中都官歲不過數十萬石食貨志劉敬說髙帝都關中張良曰關中阻三面而固守獨以一面東制諸侯諸侯安定河渭漕挽天下西給京師諸侯有變順流而下足以委輸劉敬說是也良傳武帝元光六年鄭當時為大司農言異時漕關東粟從渭上度六月罷而渭水道九百餘里時有難處引渭穿渠起長安旁南山下至河三百餘里徑易漕度可令三月罷得以損漕省卒上以為然令齊人水工徐伯表發卒數萬人穿漕渠三歲而通以漕大便利其後漕稍多而渠下之民頗得以溉矣溝洫志按武紀元光六年穿漕渠通渭後河東守畨係言漕從山東西歲百餘萬石更底柱之難敗亡其多而煩費穿渠引汾溉皮氏汾隂下引河溉汾隂蒲坂下度可得五千頃故盡河堧棄地民茭收其中耳今溉田之度可得穀二百萬石以上穀從渭上與關中無異而底柱之東可毋復漕上以為然發卒數萬人作渠田數歲河移徙渠不利田者不能償種其後人有上書欲通褒斜道及漕事下御史大夫張湯湯問之言抵蜀從故道多阪回逺令穿褒斜道少阪近四百里而褒水通沔斜水通渭皆可以行船漕漕從南陽上沔入褒褒絶水至斜間百餘里以車轉從斜下渭如此漢中穀可致而山東從沔無限便於底柱之漕且褒斜村木竹箭之饒擬於巴蜀上以為然拜湯子卬為漢中守發數萬人作褒斜道五百餘里道便近而水多湍石不可漕溝洫志衛青數以數萬騎出擊胸奴遂取河南地築朔方時又通西南夷道作者數萬人千里負擔餽餉率十餘鍾致一石又興十餘萬人築衛朔方轉漕甚逺自山東咸被其勞食貨志武帝作柏梁臺宮室之修繇此日麗徒奴婢衆而下河漕度四百萬石及官自糴乃足上元封元年桑𢎞羊又請令民入粟補吏贖罪他郡各輸急處而諸農各致粟山東漕益歲六百萬石一歲之中太倉甘泉倉滿邊餘穀上昭帝元鳳二年詔曰前年減漕三百萬石紀三年詔曰民被水灾頗匱於食其止四年毋漕上宣帝即位歲數豐穰耿夀昌言故事歲漕關東粟四百萬斛以給京師用卒六萬人宜糴三輔𢎞農河東上黨太原郡穀足供京師可省關東漕卒過半漕事果便食貨志倉庾太倉百官表司農屬官有大倉令丞三輔黃圖云大倉蕭何造在長安城外東南武帝之初國家亡事太倉之粟紅腐而不可食食貨志長安倉宣帝紀本始四年丞相以下上書入穀輸長安倉三輔黃圖云細栁倉嘉倉在長安西渭水北古徼西有細栁倉城東有嘉倉甘泉倉張敞為甘泉倉長河南郡滎陽有敖倉地理志音義云敖本地名臨河有大倉河東郡根倉溼倉地理志河內倉汲黯矯制發河內倉粟以賑貧民郡國諸倉百官表司農屬官有郡國諸倉長丞常平倉宣帝即位穀石至五錢農民少利時大司農中丞耿夀昌奏言故事歲漕關東粟四百萬斛以給京師用卒六萬人宜糴三輔𢎞農河東上黨太原郡穀足供京師可以省關東漕卒過半蕭望之奏夀昌未足供上不聽事果便夀昌遂白令邊郡皆築倉以穀賤時增其價而糴以利農貴時減其價而糶名曰常平倉民便之食貨志按宣紀五鳳四年穀常平倉趙充國曰金城湟中穀斛入錢吾謂耿中丞糴三百萬斛羌人不敢動矣中丞請糴百萬斛乃得四十萬斛耳失此二䇿羌人故敢為逆充國傳元帝即位天下大水在位諸儒多言鹽鐵及常平倉可罷毋與民爭利上從其議罷之食貨志按紀初元五年罷常平倉西漢㑹要卷五十四
