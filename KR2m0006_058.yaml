body:
  text: 西漢會要卷五十八宋徐天麟撰兵三兵占漢中四星曰天駟旁一星曰王梁王梁䇿馬車騎滿野天文志歲星所在國不可伐可以伐人天文志見欃雲如牛槍雲如馬槍欃棓彗異狀其殃一也必有破國天文志日方南太白居其南日方北太白居其北為羸用兵進吉退凶天文志武帝建元六年八月長星出于東方長終天三十日去占曰是為蚩尤旗見則王者征伐四方其後兵誅絶域連數十年元狩四年長星又出西北是時征伐尤甚五行上既悔遠伐征乃下詔曰曩者朕之不明以軍侯𢎞上書言胸奴縳馬前後足置城下馳言秦人我丐若馬又漢使者久留不還故興師遣二師將軍欲以為使者威重也古者卿大夫與謀參以蓍龜不吉不行乃者以縳馬書遍視丞相御史二千石諸大夫郎為文學者乃至郡屬國都尉成忠趙破奴等皆以虜自縳其馬不祥甚哉或以為欲以見強夫不足者視人有餘易之卦得大過爻在九五胸奴困敗公車方士太史治星望氣及太卜龜蓍皆以為吉胸奴必破時不可再得也又曰北伐行將於釜山必克卦諸將二師最吉故朕親發二師下釜山詔之必毋深入今計謀卦兆皆反繆重合侯得虜侯者言聞漢軍當來胸奴使巫埋羊牛所出諸道及水上以詛軍單于遺天子馬裘裳使巫祝之縳馬者詛軍事也又卜漢軍一將不吉西域傳兵陰陽者順時而發隨斗擊因五勝假鬼神而為助者也藝文志宣帝以書敕趙充國曰今五星出東方中國大利蠻夷大敗太白出髙用兵深入敢戰者吉弗敢戰者凶將軍急裝因天時誅不義萬下必全勿復有疑趙充國傳成帝鴻嘉三年天水冀南山石鳴聲隆隆如雷有頃止聞平襄二百四十里壄雞皆鳴石長丈三尺廣厚略等旁著岸脅去地二百餘丈民俗名曰石鼓石鼓鳴有兵五行志軍功髙祖五年克項羽五月兵皆罷歸軍吏卒會赦其亡罪而亡爵及不滿大夫者皆賜爵為大夫故大夫以上賜爵各一級其士大夫以上皆令食邑非七大夫以上皆復其身及户勿事六年始剖符封功臣封功臣見職官門武帝元朔六年六月詔曰日者大將軍巡朔方征胸奴斬首虜萬八千級諸禁錮及有過者咸蒙厚賞得免減罪今大將軍仍復克獲斬首萬虜九千級受爵賞而欲移賣者無所流貤其議為令有司奏請置武功賞官以寵戰士本紀武功爵臣瓚曰茂陵中書有武功爵一級曰造士二級曰間與衛三級曰良士四級曰元戎士五級曰官首六級曰秉鐸七級曰千夫八級曰樂卿九級曰執戎十級曰政戾庶長十一級曰軍衛此武帝所制以寵軍功師古曰此下云級十七萬凡直三十餘萬金今瓉所引茂陵中書止於十一級則數不足與本文乖矣或者茂陵書説之不盡也級十七萬凡直三十餘萬金諸買武功爵官首者試補吏先除千夫如五大夫其有罪又減二等爵得至樂卿以顯軍功軍功多用超等大者封侯卿大夫小者郎食貨志李蔡擊右賢王有功中率為樂安侯諸將多中首虜率為侯者李廣傳李廣出右北平為胸奴所圍軍幾沒罷歸廣軍自當已賞霍去病斬捕首虜過當封侯師古曰軍失亡者少而胸奴殺獲數多故曰過當也馮奉世使大宛以便宜發兵誅莎車王蕭望之以奉世奉使有指春秋之義亡遂事漢家之法有矯制雖有功效不可為後世法故不得侯師古曰漢家之法擅矯命雖有功勞不如賞也二師既伐大宛軍官吏為九卿三人諸侯相郡守二千石百餘人千石以下千餘人奮行者官過其望以適過行者皆黜其勞士率賜直四萬錢李廣利傳左將軍荀彘擊朝鮮坐爭功棄市武紀魏尚為雲中守上功莫府首虜差六級下吏削其爵罰作之馮唐傳軍法韓信申軍法髙紀漢興張良韓信序次兵法凡百八十二家刪取要周定著三十五家諸呂用事而盜取之武帝時軍正楊僕捃托遺逸紀奏兵録猶未能備至于孝武命任宏論次兵書為四種兵權謀十三家兵形藝十一家陰陽十六家兵技巧十三家凡兵書五十三家七百九十篇圖四十三卷藝文志髙后七年朱虛侯章入侍燕飲太后令章為酒吏章自請以軍法行酒諸呂有一人醉亡酒章追斬之太后業已許其軍法無以罪也齊悼惠王傳繡衣御史暴勝之持斧逐捕盜賊以軍興從事誅二千石以下雋不疑傳臣天麟按漢法吏六百石以上有罪皆先請見於宣帝末年之詔至於軍興從事則雖二千石以下亦得誅決於外暴勝之是也至其後劉屈氂斬欲司直亦以軍興法行之而勝之乃爭以為不可故被譴而自殺唐蒙通夜郎用軍興法誅其渠率司馬相如傳廣漢郡盜賊羣起成帝拜趙護為廣漢太守以軍法從事薛宣傳胡建守軍正丞時監軍御史為姦穿北軍壘垣以為賈區建欲誅之乃約其走卒曰我欲與公有所誅吾言取之則取斬之則斬於是當選士馬日監御史與護軍諸校列坐堂皇上建從走卒趨至堂皇下拜謁因上堂皇走卒皆上建指監御史曰取彼走卒前曳下堂皇建曰斬之遂斬御史護軍諸校皆愕驚不知所以建亦已有成奏在其懷中遂上奏曰臣聞軍法立武以威衆誅惡以禁邪今監御史公穿軍垣以求賈利私買賣以與士市不立剛毅之心勇猛之節亡以師先士大夫尤失理不公用文吏議不至重法黃帝李法曰壁壘已定穿窬不繇路是謂姦人姦人者殺臣謹按軍法曰正亡屬將軍將軍有罪已聞二千石以下行法焉丞於用法疑執事不諉上臣謹以斬昧死以聞制曰司馬法曰國容不入軍軍容不入國何文吏也三王或誓於軍中欲民先成其慮也或誓於軍門之外欲民先意以待事也或將交刃而誓致民志也建又何疑焉胡建傳金布令甲曰邊郡數被兵離飢寒夭絶天年父子相失令天下共給其費蕭望之傳棄軍逃亡多卯將兵追反虜擅棄兵還贖罪免功臣表景帝三年詔今濞等已滅吏民當坐濞等及逋逃亡軍者皆赦之本紀蘇賢為騎士屯霸上不詣屯所乏軍興趙廣漢傳畏懦後期博望侯張騫坐以將軍擊胸奴畏懦當斬贖罪免表按本傳云坐後期天漢三年胸奴入鴈門太守坐畏懦棄市武紀如淳曰軍法行逗留畏懦者要斬將梁侯楊僕坐為將軍擊朝鮮畏懦入竹二萬箇贖完為城旦功臣表武帝責僕書曰失期內顧以道惡為解公孫敖以將軍出北地後驃騎失期當斬贖為庶人按霍去病傳云坐行留不與驃騎將軍會王恢主擊胸奴輜重單于還去廷尉當恢逗撓當斬韓安國傳失亡過多公孫敖為騎將軍出代亡卒七千人當斬贖為庶人後失亡士卒多下吏當斬本傳李廣擊胸奴坐亡失多當斬楊僕擊朝鮮坐亡失多免為庶民蘇建為前將軍與翕侯趙信俱敗獨身來歸當斬虜獲不實魏尚為雲中守上功幕府差首虜六級下吏削其爵罰作之馮唐傳髙不識坐擊胸奴增首不以實當斬表車順坐擊胸奴盜虜獲自殺車千秋傳臨蔡侯孫襄坐擊畨禺奪人虜獲免表武帝責楊僕書曰前破畨禺捕降者以為虜掘死人以為獲是一過傳澅清侯參坐匿朝鮮已虜下獄表爭功左將軍荀彘擊朝鮮坐爭功棄市表亂屯兵中郎將卭入至趙充國幕府司馬中亂屯兵下吏自殺趙充國傳迷失道衛青擊胸奴徙李廣與右將軍趙食其合軍出東道惑失道後大將軍廣自殺右將軍下吏當死贖為庶人本傳乏軍興趙廣漢坐擅斥除騎士乏軍興本傳蘇賢為騎士屯霸上不詣屯所乏軍興趙廣漢傳黃霸守京兆尹發騎士詣北軍調馬不適士劾乏軍興連貶秩本傳段會宗擅發戊己校尉兵乏興有詔贖論本傳韓延年行大行令事擅留外國書一月乏興入穀全為城旦功臣表擅興𨝍侯李夀為衛尉居守擅出長安界誅表公孫賀子敬聲擅用北軍錢千九百萬下獄公孫賀傳燕王旦上書言霍光擅益幕府校尉疑有非常王尊坐擅離部曲免本傳西漢會要卷五十八
