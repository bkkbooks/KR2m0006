body:
  text: 西漢會要卷十七宋徐天麟撰禮十一嘉禮詔令章奏制詔御史師古曰天子之言一曰制書二曰詔書制書者謂為制度之命也制詔丞相宣帝制詔丞相封丙吉為博陽矦制詔丞相御史成帝封丙吉孫昌哀帝改元見李尋傳制詔丞相御史大夫左遷毋將隆見本傳制詔丞相太尉御史大夫文帝即位赦天下制詔丞相大司空免孫寶為庶人髙帝十一年求賢詔御史大夫昌下相國相國下諸矦王御史中執法下郡守本紀詔書無京兆文不當發王尊傳髙帝下詔擊吳王有敢議詔及不如詔皆要斬吳王濞傳宣帝二千石有治理效輒以璽書勉厲循吏傳夏候勝言武帝不宜立廟樂公卿共難勝曰此詔書也勝曰詔書不可用也於是田廣明劾奏勝非議詔書不道下獄夏矦勝傳哀帝建平二年詔曰六月甲子制書非赦令也皆蠲除之本紀文帝遺單于書牘以尺一寸胸奴傳武帝元狩六年四月乙巳廟立皇子閎為齊王旦為燕王胥為廣陵王初作誥本紀元狩六年四月立三王初大司馬臣去病昧死再拜上疏皇帝陛下願因盛夏吉時定皇子位臣去病昧死再拜臣聞皇帝陛下三月乙亥御史臣光守尚書令奏未央宫制曰下御史六年三月戊申朔乙亥御史臣光守尚書令丞非下御史書到言丞相臣青翟御史大夫臣湯太常臣充大行令臣息太子少傅臣安行宗正事昧死上言大司馬去病上疏願定皇子位制曰下御史臣謹與中二千石二千石臣賀等議方今盛夏吉時臣青翟臣湯等昧死請立皇子臣閎臣旦臣胥為諸矦王昧死請所位國名制曰其更議以列矦家之三月丙子奏未央宫丞相臣青翟御史大夫臣湯昧死言臣謹與列矦臣嬰齊中二千石二千石臣賀諌大夫博士臣安等議曰家皇子列矦不可以垂統於萬世臣請立臣閎臣旦臣胥為諸矦王三月丙子奏未央宫制曰家以列矦可四月戊寅奏未央宫丞相臣青翟御史大夫臣湯昧死言臣青翟等與列矦吏二千石諌大夫博士臣慶等議昧死奏請立皇子為諸矦王制曰家以列矦可臣青翟臣湯博士臣將行等伏聞云云今諸矦支子封至諸矦王而家皇子為列矦臣青翟臣湯等竊熟計之不可臣請立臣閎臣旦臣胥為諸矦王四月癸未奏未央宫留中不下丞相臣青翟太僕臣賀行御史大夫事太常臣充太子少傅臣安行宗正事昧死言臣青翟等前奏大司馬臣去病上疏言皇子未有號位臣謹與御史大夫臣湯中二千石二千石諌大夫博士臣慶等昧死請立皇子臣閎等為諸矦王陛下固辭弗許臣青翟等竊與列矦臣夀成等二十七人議臣請令史官擇吉日具禮儀上御史奏輿地圖他皆如前故事制曰可四月丙申奏未央宫太僕臣賀行御史大夫事昧死言太常臣充言卜入四月二十八日乙巳可立諸矦王臣昧死奏輿地圖請所立國名禮儀别奏臣昧死請制曰立某為某王四月丁酉奏未央宫六年四月戊寅朔癸卯御史大夫湯下丞相丞相下中二千石二千石下郡太守諸矦相丞書從事下當用者如律令三王世家御史中丞受公卿奏事舉劾案章百官表大臣奏事不宜漏泄師丹傳王嘉曰故事尚書希下章為煩擾百姓章文必有敢告之字乃下本傳昌邑王淫亂霍光與羣臣連名奏王尚書令讀奏曰丞相臣敞大司馬大將軍臣光車騎將軍臣安世度遼將軍臣明友前將軍臣增後將軍臣充國御史大夫臣誼宜春矦臣談當塗矦臣聖隨桃矦臣昌樂杜矦臣屠耆堂太僕臣延年太常臣昌大司農臣延年宗正臣德少府臣樂成廷尉臣光執金吾臣延夀大鴻臚臣賢左馮翊臣廣明右扶風臣德長信少府臣嘉典屬國臣武京輔都尉臣廣漢司𨽻校尉臣辟兵諸吏文學光祿大夫臣遷臣畸臣吉臣賜臣管臣勝臣梁臣長幸臣夏矦勝大中大夫臣德臣卬昧死言皇太后陛下臣敞等頓首死罪云云臣敞等謹與博士臣霸臣雋舍臣德臣虞舍臣射臣倉議皆曰當廢臣請有司御史大夫臣誼宗正臣德太常臣昌與太祝以一太牢告祠髙廟臣敞等昧死以聞皇太后詔曰可霍光傳故事諸上書者皆為二封題其一曰副領尚書者先發副封所言不善屏去不奏魏相因許伯白去副封以防壅蔽宣帝善之魏相傳吏民上書字或不正輒舉劾藝文志雜録衍簡矦不疑坐挾詔書論耐為司寇功臣表武帝時公孫𢎞奏謹按詔書下者明天人分際通古今之誼文章爾雅訓辭深厚儒林傳序武帝每為淮南王報書常召司馬相如視草乃遣淮南王安傳劉向曰今出令未能踰時而反是反汗也本傳傅太后遺詔益封髙安矦賢二千户丞相王嘉封還詔書王嘉傳文帝時山東吏布詔令民雖老羸癃疾莫不扶杖而往聽之願少須臾無死思見德化之成賈山傳宣帝詔書每下民欣然若更生王吉傳元帝罷朱崖詔匡衡云諸見罷朱崖詔書者人人自以為將見太平也匡衡傳溫水矦安國坐上書為妖言會赦免王子矦表新利矦偃坐上書謾免王子矦表冠禮孝惠五年皇帝冠本紀孝昭元鳯四年加元服本紀臣天麟按後漢禮儀志注云孝昭帝冠辭曰陛下摛顯先帝之光耀以承皇天之嘉祿欽奉仲春之吉辰普尊大道之郊域秉率百福之休靈始加昭明之元服推逺沖孺之幼志藴積文武之成德肅勒髙祖之清廟六合之內靡不蒙德永永與天無極孝宣五鳯元年正月皇太子冠皇太后賜丞相將軍列矦中二千石帛人百匹太夫人八十匹夫人六十匹又賜列矦嗣子爵五大夫男子為父後者爵一級本紀婚禮宣帝時王吉上疏曰竊見當世趨務不合於道者謹條奏吉意以為夫婦人倫大綱夭夀之萌也世俗嫁娶太早未知為人父母之道而有子是以教化不明而民多夭聘妻送女亡節則貧人不及故不舉子又漢家列矦尚公主諸矦則國人承翁主使男事女夫詘於婦逆隂陽之位故多女亂王吉傳五鳯二年八月詔曰夫婚姻之禮人倫之大者也酒食之會所以行禮樂也今郡國二千石或擅為苛禁禁民嫁娶不得酒食相賀召由是廢鄉黨之禮令民亡所樂非所以導民也詩不云乎民之失德乾餱以愆勿行苛政本紀平帝元始三年詔劉歆等雜定婚禮四輔公卿大夫博士郎吏家屬以禮娶親迎立軺併馬本紀服虔曰軺立乘小車也併馬儷駕也四年立皇后王氏遣長樂少府夏矦瀋宗正劉宏少府宗伯鳯尚書令平晏納采太師光大司徒馬宫大司空甄豐左將軍孫建執金吾尹賞行太常事太中大夫劉歆及太卜太史令以下四十九人賜皮辨素積以禮雜卜筮大牢祠宗廟待吉月日明年春遣大司徒宫大司空豐左將軍建右將軍甄邯光祿大夫歆奉乘輿法駕迎皇后於安漢公第宫豐歆授皇后璽紱登車稱警蹕便時上林延夀門入未央宫前殿羣臣就位行禮大赦天下益封父安漢公地滿百里賜迎皇后及行禮者自三公以下至騶宰執事長樂未央宫安漢公第者皆增秩賜金帛各有差皇后立三月以禮見髙廟王后傳故事聘皇后黃金二萬斤為錢二萬萬王莾傳鄉射髙帝引兵圍魯魯中諸儒尚講習禮弦歌之音不絶於是諸儒始得修其經學講明大射鄉飲之禮儒林傳序河間獻王修興雅樂董仲舒等皆以為音中正雅立之大樂春秋鄉射作於學官希濶不講禮樂志韓延夀為東郡太守修治學官春秋鄉射陳鐘鼓管弦盛升降揖遜本傳成帝鴻嘉二年行幸雲陽博士行飲酒禮本紀鴻嘉二年三月博士行大射禮五行志武帝時丞相公孫𢎞奏言民不得挾弓弩十賊張弩百吏不敢前盜賊不輒伏辜免脫者衆害寡而利多此盜賊所以蕃也禁民不得挾弓弩則盜賊執短兵短兵接則衆者勝以衆吏捕寡賊其藝必得盜賊有害無利則莫犯法刑錯之道也臣愚以為禁民毋得挾弓弩便上下其議吾邱夀王對曰臣聞古者作五兵非以相害以禁暴討邪也安居則以制猛獸而備非常有事則以設守衛而施行陳及至周室衰微上無明王諸矦力政強侵弱衆暴寡海內抏敝巧詐並生是以知者陷愚勇者威怯茍以得勝為務不顧義理故機變械飾所以相賊害之具不可勝數於是秦兼天下廢王道立私議滅詩書而首法令去仁恩而任刑戮墮名城殺豪傑銷甲兵折鋒刃其後民以耰鋤箠挺相撻擊犯法滋衆盜賊不勝至於赭衣塞路羣盜滿山卒以亂亡故聖王務教化而省禁防知其不足恃也今陛下昭明德建太平舉俊材興學官三公有司或由窮巷起白屋裂地而封宇內日化方外嚮風然而盜賊猶有者郡國二千石之罪非挾弓弩之過也禮曰男子生桑弧蓬矢以舉之明示有事也孔子曰吾何執執射乎大射之禮自天子降及庶人三代之道也詩云大矦既抗弓矢斯張射夫既同獻爾發功言貴中也愚聞聖王合射以明教矣未聞弓矢之為禁也且所為禁者為盜賊之以攻奪也攻奪之罪死然而不止者大姦之於重誅固不避也臣恐邪人挾之而吏不能止良民以自備而抵法禁是擅賊威而奪民救也竊以為無益於禁姦而廢先王之典使學者不得習行其禮大不便書奏上以難丞相𢎞𢎞詘服焉吾邱夀王傳賜酺文帝初即位賜民酺五日本紀服虔曰酺音蒲文穎曰漢律三人以上無故羣飲酒罰金四兩今詔橫賜令會聚飲食五日也十六年得玉杯令天下大酺景帝後元年夏大酺五日武帝元光二年令民大酺五日元朔三年城朔方大酺五日太初二年祠后土令大酺五日太始三年令天下大酺五日昭帝元鳯四年令天下酺五日宣帝五鳯三年大酺五日並本紀賜姓氏更姓氏附髙祖封項伯等四人為列矦賜姓劉氏項伯傳婁敬勸髙祖都關中上曰婁者劉也賜姓劉氏本傳孝文時吏居官者或長子孫以官為氏倉氏庫氏則倉庫吏之後也王嘉傳武帝之初七十年間國家亡事為吏者長子孫居官者以為姓號食貨志金日磾本胸奴休屠王太子也以休屠作金人祭天故因賜姓金氏云本贊更姓氏漢興濟北王田安失國齊人謂之王家因以為氏元后傳夏矦嬰曽孫頗尚主主隨外家姓號孫公主故滕公子孫更為孫氏夏矦嬰傳周陽由其父趙兼以淮南王舅矦周陽故因氏焉周陽由傳馬宫公姓馬矢宫仕學稱馬氏本傳京房本姓李推律自以為京氏本傳車千秋本姓田氏為相年老上優之得乘小車入宫殿中故因號車丞相本傳明德馬皇后惡其先人有反易姓莾武紀灌夫父張孟為灌嬰舍人得幸薦之至二千石故蒙灌氏姓為灌孟灌夫傳衛青父鄭季與衛媪通生青青有同母兄衛長君及姊子夫故青冒姓衛氏衛青傳周公後褒魯節矦公子寬薨矦相如嗣更姓公孫氏後更為姬氏恩澤矦表禁踰侈漢初定與民無禁敘傳師古曰國家不設車旗衣服之禁髙祖八年爵非公乘以上毋得冠劉氏冠賈人毋得衣錦繡綺縠絺紵罽操兵乘騎馬本紀髙祖令賈人不得衣絲乘車重稅租以困辱之孝惠髙后時復弛商賈之律然市井子孫亦不得為吏食貨志文帝時賈誼上疏曰今民賣僮者為之繡衣絲履偏諸緣內之間中是古天子后服所以廟而不宴者也而庶人得以衣婢妾白縠之表薄綺之裏緁以偏諸美者黼繡是古天子之服今富人大賈嘉會召客者以被牆庶人屋壁得為帝服倡優下賤得為后飾且帝之身自衣皂綈而富民牆屋被文繡天子之后以緣其領庶人妾緣其履此臣所謂舛也豈如今定經制使君君臣臣上下有差而後有所持循矣本傳武帝天漢元年秋閉城門大搜本紀臣瓉曰漢帝年紀六月禁踰侈七月閉城門大搜索踰侈者也師古曰踰法度而奢侈者也二年秋大搜本紀元帝時貢禹奏言髙祖孝文孝景皇帝循古節儉後世爭為奢侈轉轉益甚臣下亦相放效衣服履褲刀劍亂於主上主上時臨朝入廟衆人不能别異今大夫僣諸矦諸矦僣天子天子過天道其日久矣矯復古化在於陛下天子納善其忠乃下召令太僕減食榖馬水衡減食肉獸省宜春下苑以與貧民又罷角抵諸戲及齊三服官本傳成帝永始四年詔曰聖王明禮制以敘尊卑異車服以章有德方今世俗奢僣罔極靡有厭足公卿列矦親屬近臣四方所則或乃奢侈逸豫務廣第宅治園池多蓄奴婢被服綺縠設鐘鼓備女樂車服嫁娶葬埋過制吏民慕效寖以成俗其申敕有司以漸禁之青緑民所常服且勿止列矦近臣各自省改司𨽻校尉察不變者紀哀帝即位下詔曰制節謹度以防奢淫為政所先百王不易之道也諸矦王列矦公主吏二千石及豪富民多蓄奴婢田宅亡限與民爭利百姓失職重困不足其議限列有司條奏諸王列矦得名田國中列矦在長安及公主名田縣道關內矦吏民名田皆無得過三十頃諸矦王奴婢二百人列矦公主百人關內矦吏民三十人六十以上十嵗以下不在數中賈人皆不得名田為吏犯者以律論諸名田蓄奴婢過品皆沒入縣官本紀平帝元始三年王莾奏車服制度吏民飬生送終嫁娶奴婢田宅器械之品本紀西漢會要卷十七
