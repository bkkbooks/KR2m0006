body:
  text: 西漢㑹要卷四宋徐天麟撰帝系四皇太子下雜錄下孝景前三年梁孝王入朝是時上未置太子與梁王言曰千秋萬嵗後傳於王王辭謝雖知非至言然心内喜明年漢立太子前七年上廢栗太子太后心欲以梁王為嗣大臣及爰盎等有所闗説於帝太后議格孝王不敢復言太后以嗣事文三王傳景帝弟梁孝王母竇太后愛之孝王朝因燕昆弟飲是時上未立太子酒酣上從容曰千秋萬嵗後傳王太后驩竇嬰引巵酒進上曰天下者髙祖天下父子相傳漢之約也上何得以傳梁王太后由此憎嬰嬰亦薄其官竇嬰傳武帝春秋二十九迺得皇子枚臯與東方朔作皇太子生賦及立皇子禖祝受詔所為皆不從故事重皇子也枚乗傳孝武皇帝六男衛皇后生戾太子據元狩元年立為皇太子年七嵗矣初上年二十九乃得太子甚喜為立禖使東方朔枚臯作禖祝少壯詔受公羊春秋又從瑕丘江公受穀梁及冠就宮上為立博望苑使通賓客從其所好故多以異端進者武帝末衛后寵衰江充用事充與太子及衛氏有隙恐上晏駕後為太子所誅㑹巫蠱事起充因此為姦是時上春秋髙意多所惡以為左右皆為蠱道祝詛窮治其事丞相公孫賀父子陽石諸邑公主及皇后弟子長平侯衛伉皆坐誅充典治巫蠱既知上意白言宮中有蠱氣入宮至省中壊御座掘地上使按道侯韓説御史章贛黄門蘇文等助充充遂至太子宮掘蠱得桐木人時上疾辟暑甘泉宮獨皇后太子在太子召問少傅石徳徳懼為師傅并誅因謂太子曰前丞相父子兩公主及衛氏皆坐此今巫與使者掘地得徵騐不知巫置之邪將實有也無以自明可矯以節收捕充等繫獄窮治其姦詐且上疾在甘泉皇后及家吏請問皆不報上存亡未可知而姦臣如此太子將不念秦扶蘇事邪太子急然徳言征和二年七月壬午乃使客為使者收捕充等按道侯説疑使者有詐不肯受詔客格殺説御史章贛被創突亡自歸甘泉太子使舍人無且持節夜入未央宮殿長秋門因長御倚華具白皇后發中廏車載射士出武庫兵發長樂宮衛告令百官曰江充反迺斬充以徇炙胡巫上林中遂部賓客為將率與丞相劉屈氂等戰長安中擾亂言太子反以故衆不附太子兵敗亡不得上怒甚羣下憂懼不知所出壺闗三老茂上書曰臣聞父者猶天母者猶地子猶萬物也故天平地安隂陽和調物迺茂成父慈母愛家室之中子迺孝順隂陽不和則萬物夭傷父子不和則室家喪亡故父不父則子不子君不君則臣不臣雖有粟吾豈得而食諸昔者虞舜孝之至也而不中於瞽叟孝已被謗伯竒放流骨肉至親父子相疑何者積毁之所生也由是觀之子無不孝而父有不察今皇太子為漢適嗣承萬世之業體祖宗之重親則皇帝之宗子也江充布衣之人閭閻之隸臣耳陛下顯而用之衘至尊之命以迫蹵皇太子造飾姦詐羣邪錯謬是以親戚之路鬲塞而不通太子進則不得上見退則困於亂臣獨寃結而亡告不忍忿忿之心起而殺充恐懼逋逃子盜父兵以救難自免耳臣竊以為無邪心詩曰營營青蠅止于藩豈弟君子無信讒言讒人罔極交亂四國往者江充讒殺趙太子天下莫不聞其罪固宜陛下不省察深過太子發盛怒舉大兵而求之三公自將智者不敢言辯士不敢説臣竊痛之臣聞子胥盡忠而忘其號比干盡仁而遺其身忠臣竭誠不顧鈇鉞之誅以陳其愚志在正君安社稷也詩云取彼讒人投畀豺虎唯陛下寛心慰意少察所親毋患太子之非亟罷甲兵無令太子久亡臣不勝惓惓出一旦之命待罪建章闕下書奏天子感寤太子之亡也東至湖蔵匿泉鳩里主人家貧常賣屨以給太子太子有故人在湖聞其富贍使人呼之而發覺吏圍捕太子太子自度不能脱即入室距户自經山陽男子張富昌為卒足蹋開户新安令史李夀趨抱解太子主人公遂格鬭死皇孫二人皆并遇害上既傷太子乃下詔曰蓋行疑賞所以申信也其封李夀為䢴侯張富昌為題侯久之巫蠱事多不信上知太子惶恐無他意而田千秋復訟太子寃上遂擢千秋為丞相而族滅江充家焚蘇文於横橋上及泉鳩里加兵刃於太子者初為北地太守後族上憐太子無辜乃作思子宮為歸來望思之臺於湖天下聞而悲之戾太子傳宣帝地節三年立皇太子選丙吉為太傅疏廣為少傅數月吉遷御史大夫廣徒為太傅廣兄子受字公子亦以賢良舉為太子家令受好禮恭謹敏而有辭宣帝幸太子宮受迎謁應對及置酒宴奉觴上夀辭理閑雅上甚驩説頃之拜受為少傅太子外祖父特進平恩侯許伯以為太子少白使其弟中郎將舜監護太子家上以問廣廣對曰太子國儲副君師友必於天下英俊不宜獨親外家許氏且太子自有太傅少傅官屬已備今復使舜護太子家親陋非所以廣太子徳於天下也上善其言以語丞相魏相相免冠謝曰此非臣等所能及廣繇是見器重數受賞賜太子每朝因進見太傅在前少傅在後父子並為師傅朝廷以為榮疏廣傳太子既壯大柔仁好儒見宣帝所用多文法吏以刑名繩下大臣楊惲蓋寛饒等坐刺譏辭語為罪而誅嘗侍侍燕從容言陛下持刑大深宜用儒生宣帝作色曰漢家自有制度本以霸王道雜之奈何純任徳教用周政乎且俗儒不達時宜好是古非今使人眩於名實不知所守何足委任迺歎曰亂我家者太子也繇是疏太子而愛淮陽王曰淮陽王明察好法宜為吾子而王母張倢伃尤幸上有意欲用淮陽王代太子然以少依許氏俱從微起故終不背焉元紀張倢伃有寵於宣帝霍皇后廢後上欲立張倢伃為后久之懲艾霍氏欲害皇太子迺更選後宮無子而謹重者迺立長陵王倢伃為后令母養太子后無寵希御見唯倢伃最幸子淮陽憲王壯大好經書法律聰達有材帝甚愛之太子寛仁喜儒術上嗟歎憲王曰真我子也嘗有意欲立張倢伃與憲王然因太子起於微細上少依倚許氏及即位而許后以弑死太子蚤失母故弗忍也久之上以韋𤣥成遜侯兄經明行髙稱於朝廷迺召拜𤣥成為淮陽中尉欲感諭憲王輔以推遜之臣由是太子遂安淮陽憲王傳元帝即位史丹為駙馬都尉侍中出常驂乗甚有寵上以丹舊臣皇考外屬親信之詔丹護太子家是時傅昭儀子定陶共王有材藝子母俱愛幸而太子頗有酒色之失母王皇后無寵建昭之間元帝被疾不親政事留好音樂或置鼙鼓殿下天子自臨軒檻上隤銅丸以擿鼓聲中嚴鼓之節後宮及左右習知音者莫能為而定陶王亦能之上數稱其材丹進曰凡所謂材者敏而好學溫故知新皇太子是也若乃器人於絲竹鼓鼙之間則是陳恵李微髙於匡衡可相國也於是上嘿然而笑其後中山哀王薨太子前弔哀王者帝之少弟與太子游學相長大上望見太子感念哀王悲不能自止太子既至前不哀上大恨曰安有人不慈仁而可奉宗廟為民父母者乎上以責謂丹丹免冠謝上曰臣誠見陛下哀痛中山王至以感損向者大子當進見臣竊戒屬毋涕泣感傷陛下罪迺在臣當死上以為然意迺解丹之輔相皆此類也竟寧元年上寢疾傅昭儀及定陶王常在左右而皇太子希得進見上疾稍侵意忽忽不平數問尚書以景帝時立膠東王故事是時太子長舅陽平侯王鳳為衛尉侍中與皇太子皆憂不知所出丹以親密臣得侍視疾候上間獨寢時丹直入卧内頓首伏青蒲上涕泣言曰皇太子以適長立積十餘年名號繫於百姓天下莫不歸心臣子見定陶王雅素愛幸今者道路流言為國生意以為太子有動揺之議審若此公卿以下必以死争不奉詔臣願先賜死以示羣臣天子素仁不忍見丹涕泣言又切至上意大感喟然太息曰吾日困劣而大子兩王幼少意中戀戀亦何不念乎然無有此議且皇后謹慎先帝又愛太子吾豈可違指駙馬都尉安所受此語丹即却頓首曰愚臣妄聞罪當死上因納謂丹曰吾病寖加恐不能自還善輔道太子毋違我意丹嘘唏而起太子由是遂為嗣矣史丹傳綏和中上即位二十五年無繼嗣至親有同産弟中山孝王及同産弟子定陶王在定陶王好學多材於帝子行而王祖母傅太后隂為王求漢嗣私事趙皇后昭儀及帝舅大司馬驃騎將軍王根故皆勸上上於是召丞相翟方進御史大夫光右將軍㢘褒後將軍朱博皆引入禁中議中山定陶王誰可為嗣者方進根以為定陶王帝弟之子禮曰昆弟之子猶子也為其後者為之子也定陶王宜為嗣褒博皆如方進根議孔光獨以為禮立嗣以親中山王先帝之子帝親弟也以尚書般庚殷之及王為比中山王宜為嗣上以禮兄弟不相入廟又皇后昭儀欲立陶王故遂立為太子光以議不中意左遷廷尉孔光傳皇子太上皇四男髙祖兄伯蚤卒追封武哀侯髙后六年追封武哀王次兄仲名喜初封宜信侯漢六年立為代王匈奴攻代仲棄國自歸天子不忍致法廢為合陽侯楚元王交髙祖同父少弟也自有傳以本紀及吴王濞傳修髙皇帝八男呂后生孝恵帝曹夫人生齊悼恵王肥薄姬生孝文帝戚夫人生趙隠王如意趙姬生淮南厲王長諸姬生趙幽王友趙共王恢燕靈王建髙五王傳孝文皇帝四男竇皇后生孝景帝梁孝王武諸姬生代孝王參梁懐王揖文三王傳孝景皇帝十四男王皇后生孝武皇帝栗姬生臨江閔王榮河間獻王徳臨江哀王閼程姬生魯共王餘江都易王非膠西于王端賈夫人生趙敬肅王彭祖中山靖王勝唐姬生長沙定王發王夫人生廣川恵王越膠東康王寄清河哀王乗常山憲王舜景十三王傳孝武皇帝六男衛皇后生戾太子趙倢伃生孝昭帝王夫人生齊懐王閎李姬生燕刺王旦廣陵厲王胥李夫人生昌邑哀王髆武五子傳孝宣皇帝五男許皇后生孝元帝張倢伃生淮陽憲王欽衛倢伃生楚孝王嚻公孫倢伃生東平思王宇戎倢伃生中山哀王竟宣元六王傳孝元皇帝三男王皇后生孝成帝傅昭儀生定陶共王康馮昭儀生中山孝王興宣元六王傳雜錄五宗司馬遷傳作五宗世家師古曰景帝子凡十三人為王而母五人所生遷謂同母者為一宗故云五宗也西漢㑹要卷四
