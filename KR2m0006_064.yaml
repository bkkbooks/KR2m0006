body:
  text: 西漢㑹要卷六十四宋徐天麟撰方域一都邑髙帝五年西都洛陽齊戍卒婁敬求見說上曰陛下都洛陽豈欲與周室比隆哉上曰然婁敬曰陛下取天下與周異周之先自后稷封邰積德絫善十有餘世至於太王王季文王武王而諸侯自歸之遂滅殷為天子及成王即位周公相焉乃營洛邑以為此天下之中也諸侯四方納貢職道里均矣有德則易以王無德則易以亡故周之盛時天下和洽諸侯四夷莫不賔服效其貢職及其衰也天下莫朝周不能制也非惟其德薄也形勢弱也今陛下起豐沛卷蜀漢定三秦與項羽戰滎陽成臯之間大戰七十小戰四十使天下之民肝腦塗地父子暴骨中野不可勝數哭泣之聲未絶傷夷者未起而欲比隆於康成之時臣竊以為不侔也且夫秦地被山帶河四塞以為固卒然有急百萬之衆可立具也因秦之故資甚美膏腴之地此所謂天府者也陛下入關而都之山東雖亂秦之故地可全而有也夫與人鬬不扼其吭拊其背未能全其勝也今陛下案秦之故地此亦扼天下之吭而附其背也帝問羣臣羣臣皆山東人爭言周王數百年秦二世即位洛陽東有成臯西有殽黽倍河鄉雒其固亦足恃也上問張良良曰雒陽雖有此固其中小不過數百里田地薄四面受敵此非用武之地關中左殽函右隴蜀沃野千里南有巴蜀之饒北有胡宛之利阻三靣而固守獨以一靣東制諸侯諸侯安定河渭漕挽天下西給京師諸侯有變順流而下足以委輸此所謂金城千里天府之國婁敬說是也上即日車駕西都長安拜婁敬為郎中號曰奉春君賜姓劉氏婁敬張良傳元帝時翼奉上疏曰臣聞昔盤庚改邑以興殷道聖人美之臣願陛下徙都於成周左據成臯右阻黽池前鄉嵩高後介大河建滎陽扶河東南北千里以為關而入敖倉地方百里者八九足以自娛東厭諸侯之權西遠羌胡之難陛下共已亡為按成周之君兼盤庚之德萬嵗之後長為髙宗漢家郊兆寢廟祭祀之禮多不應古臣奉誠難亶居而改作故願陛下遷都正本衆制皆定臣願陛下因天變而徙都所謂與天下更始者也書奏天子異其意答曰問奉今園廟有七云東徙狀何如奉對曰昔成王徙洛盤庚遷殷其所避就皆陛下所明知也非有聖明不能一變天下之道唯陛下裁赦翼奉傳郡國㳂革本秦京師為內史分天下作三十六郡漢興以其郡太大稍復開置又立諸侯王國武帝開廣三邊故自高祖增二十六文景各六武帝二十八昭帝一訖於孝平凡郡國一百三縣邑千三百一十四道三十二邑有蠻夷曰道侯國二百四十一地東西九千三百二里南北萬三千三百六十八里地理志武帝元封五年初置刺史部十三州紀京兆尹故秦內史漢元年項羽立司馬欣為塞王為塞國三年欣降漢為渭南郡九年罷復為內史武帝建元六年分為右內史太初元年更為京兆尹左馮翊故秦內史高帝元年屬塞國二年更名河上郡九年罷復為內史武帝建元六年分為左內史太初元年更名左馮翊右扶風故秦內史漢元年項羽立章邯為雍王為雍國二年漢王併三秦以雍置中地郡九年罷復為內史武帝建元六年分為右內史太初元年更名右扶風已上為三輔𢎞農郡右函谷關秦人恃之以為險固武帝元鼎四年徙函谷關於新安而以故關置𢎞農郡河東郡漢初屬魏髙帝二年韓信等虜魏王豹定魏地置河東郡河內郡髙帝元年立司馬卭為殷王為殷國二年卭降漢為河內郡河南郡本周王城秦為三川郡項羽立瑕丘申陽為河南王高帝取之置河南郡右司𨽻校尉領郡七潁川郡秦置高帝封韓王信為韓國六年徙國人於太原復為潁川郡汝南郡髙帝置沛郡故秦泗水郡髙帝更名梁國故秦碭郡高祖五年封彭越為梁國十一年反誅立子恢為梁王罷東郡頗益梁高后七年恢徙王趙以梁封吕産文帝二年封懷王楫魯國故秦薛郡高后元年封張敖子偃為魯國孝景二年封共王餘右豫州刺史領郡國五魏郡髙帝置巨鹿郡戰國趙地秦始皇二十五年滅趙置巨鹿郡漢因之常山郡漢元年項羽分趙立張耳為常山王四年耳為趙王更屬趙八年國除置常山郡清河郡高帝置景帝中三年立子乘為清河國武帝建元五年國除復為郡廣平國戰國屬趙秦屬邯鄲郡漢為廣平國武帝征和二年為平干國宣帝五鳯二年國廢復為廣平國真定國武帝元鼎四年置中山國高帝置中山郡景帝封中山靖王勝更為國信都國景帝二年立子彭祖為廣川國五年國除為信都郡中二年封惠王越復為廣川國宣帝甘露三年為信都國河間國故趙文帝二年封河間王辟疆始置國十五年國除為郡景帝二年封獻王德復為國趙國高帝四年封張耳為趙王八年國除九年封子如意又封幽王灰高后封共王恢文帝元年封幽王子遂景帝三年國除為邯鄲郡五年封趙敬肅王彭祖復為國右冀州刺史領郡國十東郡秦置漢十一年罷東郡頗益梁後復為郡陳留郡漢初屬河南郡武帝置陳留郡山陽郡漢初屬梁國景帝中六年分梁為五國别為山陽國以封梁孝王子定武帝建元五年國除為郡天漢四年更為昌邑國昭帝元平元年復為山陽郡濟隂郡漢初屬梁國景帝中六年别為濟隂國武帝建元三年國除為郡宣帝甘露二年更名帝陶國明年復為郡成帝河平四年復為定陶國哀帝建平二年復為濟隂郡泰山郡高帝置城陽國高祖封子肥為齊王屬齊國惠帝二年悼惠王獻城陽郡以益魯元公主邑更屬魯文帝二年封朱虛侯章為城陽王别為國淮陽國高帝十一年封子友始置國孝惠元年國除為淮陽郡高后元年封惠帝子强五年立子武孝文元年國除四年復為國十一年復為郡孝景二年復為國四年復為郡宣帝元康二年復為國東平國漢初屬梁國景帝中六年封梁孝王子彭離别為濟東國武帝元景元年國除為大河郡宣帝甘露二年為東平國右兖州刺史領郡國八琅邪郡秦置漢初屬齊吕后七年封劉澤為琅邪王别為國文帝元年更為郡東海郡高帝置臨淮郡武帝元狩六年置泗水國漢初屬東海郡武帝元鼎四年封泗水勤上綜别為國楚國高帝五年封韓王信六年封元王交宣帝地節元年國除為彭城郡黃龍元年仍復為楚國右徐州刺史領郡國五平原郡高祖六年置千乘郡髙帝置濟南郡漢初為齊郡孝文十六年别為濟南國景帝三年國除為郡齊郡秦置齊郡漢元年項羽分齊為三國田都為齊王田市為濟北王田安為膠東王三年併屬漢為郡六年封子肥為齊國孝文時分置城陽菑川膠西濟南濟北國而齊地浸狹武帝元朔中齊王次昌亡後國除為郡北海郡景帝中二年置東萊郡高帝置膠東國故齊地漢元年項羽立田市為膠東王五月併屬齊文帝十六年封膠東王雄渠别為國髙密國漢初屬齊文帝十六年别為膠西國宣帝本始元年更為髙密國災川國漢初屬齊文帝十六年封災川王賢别為國地理志云十八年誤也右青州刺史領郡國九南陽郡秦置南郡秦置髙祖元年更為臨江郡五年復故景帝二年封子榮為臨江國中二年國除復為南郡江夏郡髙帝置桂陽郡髙帝置武陵郡高帝置零陵郡武帝元鼎六年置廣陵國髙帝六年封荆王賈屬吳景帝四年封子非為江都國武帝元狩二年國除為廣陵郡六年封子胥為廣陵國長沙國本秦長沙郡高帝五年立吳芮為長沙國右荆州刺史領郡國八廬江郡漢初屬淮南國文帝十六年别為國景帝四年國除為郡九江郡秦置髙帝四年為淮南國武帝元狩元年國除復為郎㑹稽郡秦置髙帝六年封劉賈為荆國十二年封劉濞為吳國景帝三年國除為㑹稽郡丹陽郡秦為鄣郡漢初屬荆國後屬吳國景帝四年置江都國更屬江都武帝元狩二年國除為廣陵郡元封二年别為丹陽郡豫章郡髙帝置六安國髙帝元年分楚置衡山國五年國廢屬淮南國文帝十六年復為衡山國武帝元狩六年别為六安國右揚州刺史領郡國六漢中郡秦置廣漢郡髙帝置巴郡秦置蜀郡秦置犍為郡武帝建元六年開西南夷置越嶲郡武帝元鼎六年定西南夷置牂柯郡武帝元鼎六年通夜郎置益州郡武帝元封二年滇舉國降置以為郡右益州刺史領郡八安定郡武帝元鼎三年置北地郡秦置隴西郡秦置漢元年屬雍國二年併三秦復置隴西郡武威郡武帝紀云元狩二年胸奴昆邪王殺休屠王并將其衆來降以其地為武威郡地理志云太初四年開與紀不同金城郡昭帝始元六年置天水郡武帝元鼎三年置武都郡武帝元鼎六年置張掖郡本胸奴昆邪王地地理志云武帝太初元年開本紀云元狩二年置與志不同酒泉郡武帝紀云元狩二年置地理志云太初元年開與紀不同燉煌郡志云武帝後元元年分酒泉置本紀云元鼎六年置右凉州刺史領郡十太原郡秦置漢二年魏豹反盡有太原上黨之地九月虜豹定魏地置上黨太原等郡五年立韓王信為韓國六年復為郡十一年取山南太原之地益屬代遂廢太原郡文帝即位復分代為太原國三年復為郡黨郡秦置漢二年魏豹有其地九月虜魏豹復置郡上郡秦置髙帝元年封董翳為翟國七月復故西河郡武帝元朔四年置朔方郡武帝元朔二年置五原郡秦九原郡武帝元朔二年更名雲中郡秦置髙帝六年併屬代國十一年詔以代之雲中以西為雲中郡以為代之屏蔽定襄郡高帝置鴈門郡秦置髙帝六年併屬代國後復為郡右并州刺史領郡九涿郡髙帝六年分燕置涿郡勃海郡髙帝置代郡春秋為代國秦置代郡髙祖元年徙趙歇為代王是時雲中鴈門之地皆屬代國二年代王歇還王趙而以陳餘為代王三年十月斬陳餘以其地封兄喜為代王七年胸奴攻伐喜棄國自歸立子如意為代王以陳豨為相九年如意徙王趙代地皆入趙十年陳豨反代地十一年漢破擊之周勃入定代地上乃取山南太原之地益屬代立子常為代王趙晉陽或云都中都文帝即位分代為二國立子武為代王參為大原王三年武徙王淮陽更立參為代王而大原遂為郡參傳至孫義徙清河而國除代亦復為郡蓋元鼎三年也上谷郡秦置漁陽郡秦置右北平郡秦置遼西郡秦置遼東郡秦置廣陽國髙帝元年為燕國武帝元朔元年國除為郡元狩元年復置燕國昭帝元鳯元年復為廣陽郡宣帝本始元年為廣陽國樂浪郡武帝元封二年滅朝鮮置右幽州刺史領郡國十南海郡秦置秦敗尉他王此地武帝元鼎六年滅南粵後置郡鬱林郡故秦桂林郡屬尉他武帝元鼎六年開更名蒼梧郡武帝元鼎元年開交趾郡武帝元鼎六年開合浦郡武帝元鼎六年開九真郡武帝元鼎六年開日南郡故秦東郡武帝元鼎六年開更名右交州刺史領郡七廢郡蒼海郡武帝元朔元年東夷嵗君南閭等口二十八萬人降置以為蒼海郡三年罷沈黎郡武帝元鼎六年定西南夷以莋都為沈黎郡後罷文山郡同上宣帝地節三年省併蜀郡儋耳郡武帝元鼎六年滅南粵置昭帝始元五年罷珠崖郡武帝元鼎六年滅南粵置元帝初元三年罷真畨郡武帝元封三年定朝鮮置昭帝始元五年罷真畨并入𤣥莬臨屯郡置同昭帝始元五年罷並樂浪象郡昭帝元鳯五年罷分屬鬱林牂柯初武帝滅南越開置珠崖儋耳郡在海中洲上吏卒皆中國人多侵陵之其民亦暴惡自以阻絶數犯吏禁率數年一反殺吏漢輒發兵擊定之二十餘年間凡六反至宣帝時又再反元帝即位之明年珠崖山南縣反發兵擊之諸縣更叛連年不定上博謀於郡臣欲大發軍待詔賈捐之曰臣聞堯舜禹之聖德地方不過數千里西被流沙東漸于海朔南暨聲教迄于四海言欲與聲教則治之不欲與者不強治也故君臣歌德含氣之物各得其宜武丁成王殷周之大仁也然地東不過江黃西不過氐羌南不過蠻荆北不過朔方是以頌聲並作視聽之類咸樂其生越裳氏重九譯而獻此非兵革之所能致以至乎秦興兵遠攻貪外虛內而天下潰畔孝文皇帝偃武行文當此時而斷獄數百賦役輕簡孝武皇帝厲兵馬以攘四夷天下斷獄數萬賦煩役重冦賊並起軍旅數發父既戰死於前子鬬死於後女子乘亭障孤兒號於道老母寡妻飲泣巷哭是皆闢地泰大征伐不休之故也今關東民衆久困流離道路人情莫親父母莫樂夫婦至嫁妻賣子法不能禁義不能止此社稷之憂也今陛下不忍悁悁之忿欲驅士衆擠之大海之中快心幽冥之地非所以救助饑饉保全元元也詩云蠢爾蠻荆大邦為讐言聖人起則後服中國衰則先畔自古而患之何况乃復其南方萬里之蠻乎駱越之人父子同川而浴相習以鼻飲與禽獸無異本不足郡縣置也顓顓獨居一海之中霧露氣濕多毒草蟲蛇水土之害人未見虜戰士自死又非獨珠崖有珠犀玳瑁也棄之不足惜不擊不損威其民譬猶魚鱉何足貪也臣竊以往者羌軍言之暴師曽未一年兵出不踰千里費四十餘萬萬大司農錢盡乃以少府禁錢續之夫一隅為不善費尚如此况於勞使遠攻亡士毋功乎求之往古則不合施之當今又不便臣愚以為非冠帶之國禹貢所及春秋所治皆可且無以為願遂棄珠崖專用恤關東為憂上以問丞相御史御史大夫陳萬年以為當擊丞相于定國以為前日興兵擊之連年護軍都尉校尉及丞凡十一人還者二人卒士及轉輸死者萬人以上費用三萬萬餘尚未能盡降今關東困乏民難搖動捐之議是上從之初元三年春詔曰珠崖虜殺吏民皆畔為逆今廷議者或言可擊或言可守或欲棄之其指各殊朕日夜惟思議者之言羞威不行則欲誅之狐疑辟難則守屯田通於時變則憂萬民夫萬民之飢餓與遠蠻之不討危孰大焉且宗廟之祭凶年不備况乎辟不嫌之辱哉今關東大困倉庫空虛無以相贍又以動兵非特勞民凶年隨之其罷珠崖郡民有慕義欲內屬便處之不欲勿疆珠崖由是罷賈捐之傳平帝元始四年置西海郡徙天下犯禁者處之分京師置前輝光後丞烈二郡更十二州名分界郡國所屬本紀西漢㑹要卷六十四
