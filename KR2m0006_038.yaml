body:
  text: 西漢㑹要卷三十八宋徐天麟撰職官八使外國孝武建元中月氐怨匈奴漢廼募能使者張騫以郎應募使月氐張騫傳元封五年詔令州郡察吏民有茂材異等可使絶國者本紀天漢元年遣蘓武以中郎將使持節送匈奴使留在漢者武與副中郎將張勝及假吏募士斥侯百餘人俱蘓武傳卭筰願為内臣妾孝武廼拜司馬相如為中郎將建節往使副使者王然于壺充國吕越人馳四乘之傳以賂西南夷至蜀大守㠯下郊迎縣令負弩矢先驅司馬相如傳天子聞張騫之言欲從蜀求大夏道廼令因蜀犍為發間使四道並出出駹出莋出徙音斯卭出𤏡張騫傳師古曰間使者求間隙而行又蒯通傳注間使謂使人伺間隙而單行孝昭始元六年移中監蘓武前使匈奴留十九歲廼還奉使全節㠯武為典屬國本紀宣帝時光禄大夫義渠安國使行諸𦍑趙充國傳元康元年上令羣臣舉可使西域者前將軍韓增舉上黨馮奉世以衛候使持節送大宛諸國客馮奉世傳元帝初元四年衛司馬谷吉使匈奴不還本紀建昭三年使䕶西域騎都尉甘延壽副校尉陳湯矯發戊巳校尉屯田吏士及西域胡兵攻郅支單于斬其首傳詣京師本紀蕭育遷謁者使匈奴副校尉師古曰時㠯校尉為使於匈奴而育為之副故授副校尉後復為中郎將使匈奴蕭望之傳蕭咸為中郎將使匈奴蕭由遷謁者使匈奴副校尉金參使匈奴匈奴中郎將師古曰㠯其出使匈奴故拜為匈奴中郎將行水灾流民孝武元狩三年遣謁者勸有水灾郡種宿麥舉吏民能假貸貧民者㠯名聞本紀元鼎二年九月詔方今水潦移於江南方下巴蜀之粟致之江陵遣博士中等分循行諭告所抵毋令重困吏民有賑救饑民免其戹者具舉以聞本紀元鼎中博士徐偃使行風俗偃矯制使膠東魯國鼓鑄鹽鐡中軍奏偃矯制顓行非奉使體終軍傳孝昭始元二年三月遣使者賑貸貧民毋種食者本紀孝宣本始四年正月詔今歲不登已遣使者賑貸困乏本紀孝成建始三年九月詔廼者郡國被水灾流殺人民遣諌大夫林等循行天下本紀河平四年三月遣光禄大夫博士嘉等十一人行舉瀕河之郡水所損傷困乏不能自存者財賑貸避水它郡國在所冗食之舉淳厚有行能直言之士本紀平當行流民幽州奉使十一人者為最本傳陽朔二年秋闗東大水流民欲入闗者勿苛留遣諌大夫博士分行視九月奉者不稱本紀鴻嘉四年正月詔水旱為灾闗東流冗者衆已遣使者循行郡國被菑害什四㠯上民貲不滿三萬勿出租賦逋貸未入皆勿收流民欲入闗輙籍内本紀孝哀初即位詔廼者河南潁川郡水出流殺人民壞廬舍已遣光禄大夫循行舉籍賜死者棺錢人三千本紀舉賢觀風孝武元狩六年遣博士大等六人分循行天下存問鰥寡廢疾亾㠯自振業者貸與之諭三老孝弟㠯為民師舉獨行之君子召詣行在所士有特招使者之任也詳問隠處亾位及寃失職姦猾為害野荒治苛者舉奏郡國有所㠯為便者上丞相御史㠯聞本紀下同孝昭始元元年遣故廷尉王平等五人持節行郡國舉賢良問民所疾苦寃失職者孝宣元康四年遣大中大夫彊等十二人循行天下存問鰥寡覽觀風俗察吏治得失舉茂材異倫之士本始二年遣使者持節詔郡國二千石謹牧養民而風徳化孝元初元元年詔方田作時朕懼蒸庶之失業臨遣光禄大夫褒等十二人循行天下存問耆老鰥寡孤獨困乏失職之民延登賢俊招顯側陋因覽風俗之化建昭四年臨遣諌大夫博士賞等二十一人循行天下存問耆老鰥寡孤獨困乏失職之人舉茂材特立之士孝成永始三年正月日有蝕之詔臨遣大中大夫嘉等循行天下存問耆老民所疾苦其與部刺史舉淳樸謙遜有行義者各一人孝平元始四年遣大僕王惲等八人置副假節分行天下覽觀風俗舉寃獄治獄使者内者令郭穰宣紀孝宣五鳳四年四月日有蝕之詔㠯前使使者問民所疾苦復遣丞相御史掾二十四人循行天下舉寃獄察擅為苛禁深刻不改者本紀孝成鴻嘉元年詔曰方生長時臨遣諌大夫理等舉三輔三河𢎞農寃獄本紀成帝初即位孔光為博士數使録寃獄行風俗賑贍流民奉使稱㫖本傳雜遣使吳楚反以袁盎為大常奉宗廟使吳王吳王弟子徳侯為宗正輔親戚使吳王濞傳宣帝時蔡祭以好農使勸郡國至大官食貨志稲田使者燕倉地節中光禄大夫郭昌使行河溝洫志李尋以騎都尉使䕶河隄李尋傳成帝時河决館陶河隄使者王延世使塞溝洫志鴻嘉四年河隄都尉許商與丞相許孫禁行圖視方略溝洫志馮野王㠯故二千石使行河隄馮野王平當㠯經明禹貢使行河為騎都尉領河隄平當傳河平三年謁者陳農使使求遺書於天下孝平元始元年遣諌大夫行三輔舉籍吏民㠯元壽二年倉卒時横歛者償其直元始二年使謁者大司馬掾四十四人持節行邊兵元始二年郡國大旱蝗遣使者捕蝗並本紀奉使矯制上武帝即位汲黯為謁者東粤相攻上使黯往視之至吳而還報曰粤人相攻固其俗不足以辱天子使者河内失火燒千餘家上使黯往視之還報曰家人失火屋比延燒不足憂臣過河内貧人傷水旱萬餘家或父子相食臣謹以便宜持節發河内倉粟以賑貧民請歸節伏矯制辠上賢而釋之本傳元鼎中博士徐偃使行風俗偃矯制使膠東魯國鼓鑄鹽鐡還奏事徙為大常丞御史大夫張湯劾偃矯制大害法至死偃以為春秋之義大夫出疆有可以安社稷存萬民顓之可也湯以致其法不能詘其義有詔下終軍問狀軍詰偃曰古者諸侯國異俗分百里不通時有聘㑹之事安危之埶呼吸成變故有不受辭造命顓已之宜今天下為一萬里同風故春秋王者無外偃廵封域之中稱以出疆何也且鹽鐡郡有餘臧正二國廢不鼓不足以為利害而以安社稷存萬民為辭何也又詰偃膠東南近琅邪北接北海魯國西枕泰山東有東海受其鹽鐡偃度四郡口數田地率其用器食鹽不足以并給二郡邪將埶宜有餘而吏不能也何以言之偃矯制而鼓鑄者欲及春耕種贍民器也今魯國之鼓當先具其備至秋乃能舉火此言與實反者非與偃以前三奏無詔不惟所為不許而直矯作威福以從民望干名采譽此明聖所必加誅也枉尺直尋孟子稱其不可今所犯罪重所就者小偃自予必死為之邪將幸誅不加而欲以采名也偃窮詘服罪當死軍奏偃矯制顓行非奉使體請下御史召偃即罪奏可上善其詰有詔示御史大夫終軍傳浩侯王恢坐使酒泉矯制害當功臣表宣帝元康元年上令羣臣舉可使西域者前將軍韓增舉上黨馮奉世以衛候使持節送大宛諸國客至伊修城㑹故莎車王弟呼屠證與旁國共殺其王萬年及漢使者奚充國自立為王時匈奴又發兵攻車師成不能下而去莎車遣使揚言北道諸國已屬匈奴矣於是攻劫南道與㰱盟畔漢從鄯善以西皆絶不通都䕶鄭吉校尉司馬意皆在北道諸國間奉世與其副嚴昌計以為不亟擊之則莎車日彊其執難制必危西域遂以節諭告諸國王因發其兵南北道合萬五千人進擊莎車攻拔其城莎車王自殺傳其首詣長安更立它昆弟子為莎車王諸國悉平威振西域奉世乃罷兵以聞帝召見韓增曰賀將軍所舉得其人奉世遂西至大宛大宛聞其斬莎車王敬之異於它使得其名馬象龍而還上甚説議封奉世丞相將軍皆以為可獨少府蕭望之以為奉世奉使有指而擅矯制違命發諸國兵雖有功效不可以為後法即封奉世開後奉使者利以奉世為比爭逐發兵要功萬里之外為國家生事於夷狄漸不可長奉世不宜受封上善望之議以奉世為光禄大夫馮奉世傳西漢㑹要卷三十八
