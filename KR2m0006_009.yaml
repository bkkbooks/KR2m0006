body:
  text: 西漢會要卷九宋徐天麟撰禮三吉禮親郊孝文親郊二幸雍始郊見五帝十五年四月郊祀五帝于渭陽十六年四月孝景親郊一幸雍郊五畤中六年十月孝武親郊十一幸雍祠五畤八元光二年十月二年十月元狩元年十月元鼎四年十月五年十月四年十月元封二年十月月大始四年十二幸甘泉郊泰畤三元封五年四月後元元年正月天漢元年正月孝宣親郊六幸雍祠五畤一五鳳二年三月幸甘泉郊泰畤五神爵元年正月甘露元年正月五鳳元年正月三年正月黃龍元年正月孝元親郊八幸雍祠五畤三初元五年三月建昭元年三月永光四年三月幸甘泉郊泰畤五初元二年正月永光元年正月四年正月五年正月建昭二年正月孝成親郊九幸雍祠五畤四永始二年十一月三年三月元延元年三月綏和元年三月幸甘泉郊泰畤四永始四年正月四年正月元延二年正月綏和二年正月郊祀長安南北郊一建始二年正月南郊三月北郊孝平親郊一郊祀髙祖以配天元始四年紀已上並本雜録漢王二年冬東擊項籍而還入關問故秦時上帝祠何帝也對曰四帝有白青黃赤帝之祠髙祖曰吾聞天有五帝而四何也莫知其説於是髙祖曰吾知之矣乃待我而具五也乃立黑帝祠名曰北畤有司進祠上不親往悉召故秦祀官復置太祝太宰如其故儀禮下詔曰吾甚重祠而敬祭今上帝之祭及山川諸神當祠者各以其時禮祠之如故孝文帝十四年以嵗比登詔有司增雍五畤路車各一乘駕被具西畤畦畤寓車各一乘寓馬四匹駕被具詔曰有異物之神見于成紀毋害於民朕幾郊祀上帝諸神禮官議毋諱以朕勞有司皆曰古者天子夏親郊祀上帝於郊故曰郊於是夏四月文帝始幸雍郊見五畤祠衣皆上赤趙人新垣平以望氣見上言長安東北有神氣成五采若人冠冕焉或曰東北神明之舍西方神明之墓也天瑞下宜立祠上帝以合符應於是作渭陽五帝廟同宇帝一殿面五門各如其帝色祠所用及儀亦如雍五畤明年夏四月文帝親拜霸渭之會以郊見渭陽五帝五帝廟臨渭其北穿蒲池溝水權火舉而祠若光輝然屬天焉文帝出長門若見五人於道北遂因其直立五帝壇祠以五牢其明年平使人持玉杯上書闕下獻之平言上曰闕下寶玉氣來者已視之果有獻玉杯者刻曰人主延夀平又言臣候日再中居頃之日卻復中於是始更以十七年為元年令天下大酺平言曰周鼎亡在泗水中今河決通於泗臣望東北汾隂直有金寶氣意周鼎其出乎兆見不迎則不至於是上使使治廟汾隂南臨河欲祠出周鼎人有上書告平所言皆詐也下吏治誅夷平是後文帝怠於改正服鬼神之事而渭陽長門五帝使祠官領以時致禮不往焉武帝時亳人謬忌奏祠泰一方曰天神貴者泰一泰一佐曰五帝古者天子以春秋祭泰一東南郊日一太牢七日為壇門八通之鬼道於是天子令太祝立其祠長安城東南郊常奉祀如忌方其後人上書言古者天子三年一用太牢祠三一天一地一泰一天子許之令太祝領祠之於忌泰一壇上如其方後人復有言古天子常以春解祠祠黃帝用一梟破鏡冥羊用羊祠馬行用一青牡馬泰一臯山山君用牛武夷君用乾魚隂陽使者以一牛令祠官領之如其方而祠泰一於忌泰一壇旁後二年郊雍獲一角獸若麃然有司曰陛下肅祗郊祀上帝報享錫一角獸蓋麟云於是以薦五畤畤加一牛以燎賜諸侯白金以風符應合于天也元鼎中上雍且郊或曰五帝泰一之佐也宜立泰一而上親郊之上疑未定明年上遂郊雍至隴西登空桐幸甘泉令祠官寬舒等具泰一祠壇壇放亳忌泰一壇三陔五帝壇環居其下各如其方黃帝西南除八通鬼道泰一所用如雍一畤物而加醴棗脯之屬殺一氂牛以為俎豆牢具而五帝獨有俎豆醴進其下四方地為腏食羣神從者及北斗云已祠胙餘皆燎之其牛色白白鹿居其中彘在鹿中鹿中水而酒之祭日以牛祭月以羊彘特泰一祝宰則衣紫及繡五帝各如其色日赤月白十一月辛巳朔旦冬至曶爽天子始郊拜泰一朝朝日夕夕月則揖而見泰一如雍郊禮其贊饗曰天始以寶鼎神策授皇帝朔而又朔終而復始皇帝敬拜見焉而衣上黃其祠列火滿壇壇旁亨炊具有司曰祠上有光公卿言皇帝始郊見泰一雲陽有司奉瑄玉嘉牲薦饗是夜有美光及晝黃氣上屬天大史令談祠官寬舒等曰神靈之休佑福兆祥宜因此地光域立泰畤壇以明應令太祝領秋及臘間祠三嵗天子一郊見宣帝元康四年下詔曰蓋聞天子尊事天地修祀山川古今通禮也間者上帝之祠闕而不親十有餘年朕甚懼焉朕親飭躬齊戒親奉祀為百姓蒙嘉氣獲豐年焉明年正月上始幸甘泉郊見泰畤數有美祥修武帝故事盛車服敬齊祠之禮頗作詩歌己上並郊祀志親祠后土北郊附孝武祠后土五幸河東祠后土元封四年三月月太初元年十二六年三月二年三月天漢元年三月孝宣祠后土二幸河東祠后土神爵元年三月五鳳元年三月孝元祠后土三郊祀志云五奉后土之祠今紀之所書止存其三幸河東祠后土初元四年三月建昭二年三月永光五年三月孝成祠后土五祀后土于長安北郊建始二年三月幸河東祠后土四永始四年三月元延四年三月元延二年三月綏和二年三月武帝元鼎四年天子郊雍曰今上帝朕親郊而后土無祀則禮不答也有司與太史令談祠官寬舒議天地牲角繭栗今陛下親祠后土后土宜於澤中圜丘為五壇壇一黃犢牢具已祠盡瘞而從祠衣上黃於是天子東幸汾隂汾隂男子公孫滂洋等見汾旁有光如絳上遂立后土祠於汾隂脽上如寬舒等議上親望拜如上帝禮郊祀志成帝建始元年徙甘泉泰畤河東后土於長安南北郊永始元年紀作三年三月以未有皇孫復甘泉河東祠綏和二年以卒不獲祐復長安南北郊建平三年懼孝哀皇帝之疾未瘳復甘泉汾隂祠平帝元始五年王莽言宜如建始時丞相衡等議復長安南北郊奏可三十餘年間天墬之祠五徙焉詳見郊議莽又與大師光大司徒宫羲和歆等八十九人議皆曰天子父事天母事地今稱天神曰皇天上帝泰一兆曰泰畤而稱墬祇曰后土與中央黃靈同又兆北郊未有尊稱宜令墬祇稱皇墬后祇兆曰廣畤奏可並郊祀志雜録元延二年三月將祭后土上乃率羣臣橫大河湊汾隂既祭行遊介山回安邑顧龍門覽鹽池登厯觀陟西嶽以望八荒迹殷周之虛眇然以思唐虞之風揚雄以為臨川羡魚不如歸而結罔還上河東賦以勸揚雄傳西漢會要卷九
