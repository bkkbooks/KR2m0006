body:
  text: 西漢會要卷四十六宋徐天麟撰民政一户口自髙祖訖於孝平民户千二百二十三萬三千六十二口五千九百五十九萬四千九百七十八漢極盛矣地理志師古曰漢之户口當元始二年最為殷盛故志舉之以為數京兆尹元始二年户十九萬五千七百有二口六十八萬二千四百六十八左馮翊户二十三萬五千一百一口九十一萬七千八百二十二右扶風户二十一萬六千三百七十七口八十三萬六千七十𢎞農郡户十一萬八千九十一口四十七萬五千九百五十四河東郡户二十三萬六千八百九十六口九十六萬二千九百一十二太原郡户十六萬九千八百六十三口六十八萬四百八十八上黨郡户七萬三千七百九十八口三十三萬七千七百六十六河內郡户二十四萬一千二百四十六口百六萬七千九十七河南郡户二十七萬六千四百四十四口一百七十四萬二百七十九東郡户四十萬一千二百九十七口百六十五萬九千二十八陳留郡户二十九萬六千二百八十四口一百五十萬九千五十潁川郡户四十三萬二千四百九十一口二百二十一萬九百七十三汝南郡户四十六萬一千五百八十七口二百五十九萬六千一百四十八南陽郡户三十五萬九千一百一十六口一百九十四萬二千五十一南郡户十二萬五千五百七十九口七十一萬八千五百四十江夏郡户五萬六千八百四十四口二十一萬九千二百一十八廬江郡户十二萬四千三百八十三口四十五萬七千三百三十三九江郡户十五萬五十二口七十八萬五百二十五山陽郡户十七萬二千八百四十七口八十萬一千二百八十八濟陰郡户二十九萬二千五口百三十八萬六千二百七十八沛郡户四十萬九千七十九口二百三萬四百八十魏郡户二十一萬二千八百四十九口九十萬九千六百五十五巨鹿郡户十五萬五千九百五十一口八十二萬七千一百七十七常山郡户十四萬一千七百四十一口六十七萬七千九百五十六清河郡户二十萬一千七百七十四口八十七萬五千四百二十三涿郡户十九萬五千六百七口七十八萬二千七百六十四勃海郡户二十五萬六千三百七十七口九十萬五千一百一十九平原郡户十五萬四千三百八十七口六十六萬四千五百四十三千乘郡户十一萬六千七百二十七口四十九萬七百二十濟南郡户十四萬七百六十一口六十四萬二千八百八十四泰山郡户十七萬二千八十六口七十二萬六千六百四齊郡户十五萬四千八百二十六口五十五萬四千四百四十四北海郡户十二萬七千口五十九萬三千百五十九東萊郡户十萬三千二百九十二口五十萬二千六百九十三琅邪郡户二十二萬八千九百六十口一百七萬九千一百東海郡户三十五萬八千四百九一十四口百五十五萬千三百五十七臨淮郡户二十六萬八千二百八十三口百二十三萬七千七百六十四會稽郡户二十二萬三千三十四八口百三萬二千六百丹陽郡户十萬七千五百四十一口四十萬五千一百一七十豫章郡户六萬七千四百六十二口三十五萬一千九百六十五桂陽郡户二萬八千一百一十九口十五萬六千四百八十八武陵郡户三萬四千一百七十七口十八萬五千七百五十八零陵郡户二萬一千九十二口十三萬九千三百七十八漢中郡户十萬一千五百七十口三十萬六百一十四廣漢郡户十六萬七千四百九十九口六十六萬二千二百四十九蜀郡户二十六萬八千二百七十九口百二十四萬五千九百二十九犍為郡户十萬九千四百一十九口四十八萬九千四百八十六越嶲郡户六萬一千二百八口四十萬八千四百五益州郡户八萬一千九百四十六口五十八萬四百六十三牂柯郡户二萬四千二百一十九口十五萬三千三百六十巴郡户十五萬八千六百四十三口七十萬八千一百四十八武都郡户五萬一千二百七十六口二十三萬五千五百六十隴西郡户五萬三千九百六十四口二十三萬六千八百二十四金城郡户三萬八千四百七十口十四萬九千六百四十八天水郡户六萬三百七十口二十六萬一千三百四十八武威郡户萬七千五百八十一口七萬六千四百一十九張掖郡户二萬四千三百五十二口八萬八千七百三十一酒泉郡户萬八千一百三十七口七萬六千七百二十六燉煌郡户萬一千二百口三萬八千三百三十五安定郡户四萬二千七百二十五口十四萬三千二百九十四北地郡户六萬四千四百六十一口二十一萬六百八十八上郡户十萬三千六百八十三口六十萬六千六百五十八西河郡户十三萬六千三百九十口六十九萬八千八百三十六朔方郡户三萬四千三百三十八口十三萬六千六百二十八五原郡户三萬九千三百二十二口二十三萬一千三百二十八雲中郡户三萬八千三百三口十七萬三千二百七十定襄郡户三萬八千五百五十九口十六萬三千一百四十四鴈門郡户七萬三千一百三十八口二十九萬三千四百五十四代郡户五萬六千七百七十一口二十七萬八千七百五十四上谷郡户三萬六千八口十一萬七千七百六十二漁陽郡户六萬八千八百二口二十六萬四千一百一十六右北平郡户六萬六千六百八十九口三十二萬七百八十遼西郡户七萬二千六百五十四口三十五萬二千三百二十五遼東郡户五萬五千九百七十二口二十七萬二千五百三十九玄菟郡户四萬五千六口二十二萬一千八百四十五樂浪郡户六萬二千八百十二口四十萬六千七百四十八南海郡户萬九千六百一十三口九萬四千二百五十三鬱林郡户萬二千四百一十五口七萬一千一百六十二蒼梧郡户二萬四千三百七十九口十四萬六千一百六十交趾郡户九萬二千四百四十口七十四萬六千二百三十七合浦郡户萬五千三百九十八口七萬八千九百八十九真郡户三萬五千七百四十三口十六萬六千一十三日南郡户萬五千四百六十口六萬九千四百八十五趙國户八萬四千二百二口三十四萬九千九百五十二廣平國户二萬七千九百八十四口十九萬八千五百五十八真定國户三萬七千一百二十六口十七萬八千六百一十六中山國户十六萬八百七十三口六十六萬八千八十信都國户六萬五千五百五十六口三十萬四千三百八十四河間國户四萬五千四十三口十八萬七千六百六十三廣陽國户二萬七百四十口七萬六百五十八淄川國户五萬二百八十九口二十二萬七千三十一膠東國户七萬二千二口二十二萬三千三百三十一髙密國户四萬五百三十一口十九萬二千五百三十六城陽國户五萬六千六百四十二口二十萬五千七百八十四淮陽國户十三萬五千五百四十四口九十八萬一千四百草三梁國户三萬八千七百九口十萬六千七百五十二東平國户十三萬一千七百五十三口六十萬七千九百七十六魯國户十一萬八千四十五口六十萬七千三百八十一楚國户十一萬四千七百三十八口四十九萬七千八百四泗水國户二萬五千二十五口十一萬九千一百十四廣陵國户三萬六千七百七十三口十四萬七百二十二六安國户三萬八千三百四十五口十七萬八千六百一十六長沙國户四萬三千四百七十口二十三萬五千八百二十五漢興大城名都民人散亡户口可得而數裁什二三及至文景四五世間流民既歸户口亦息髙惠文功臣表孝文即位趨勸農桑減省租賦蓄積嵗增户口䆮息刑法志文景務在養民武帝贊孝昭承奢侈餘弊師旅之後海內虛耗户口減半霍光知時務之要輕徭薄賦與民休息至元始元鳯之間胸奴和親百姓充實昭帝贊王成為膠東相勞來不怠流民自占八萬餘口賜爵關內侯秩中二千石後或言成偽自增加以蒙顯賞本傳黃霸為潁川守户口嵗增治為天下第一本傳召信臣為南陽守百姓歸之户口增倍本傳哀平之世百姓資富雖不及文景然天下户口最盛食貨志上風俗凡民函五常之性而其剛柔緩急音聲不同繫水土之風氣故謂之風好惡取舍動靜亡常隨君上之情欲故謂之俗孔子曰移風易俗莫善於樂言聖王在上統理人倫必移其本而易其末此混同天下一之呼中和然後王教成也漢承百王之末國土變改人民遷徙成帝時劉向略言其地分丞相張禹使屬潁川朱贛條其風俗猶未宣究故輯而論之終其本末著於篇秦地於天官東井輿鬼之分野也其界自𢎞農故關以西京兆扶風馮翊北地上郡西河安定天水隴西南有巴蜀廣漢犍為武都西有金城武威張掖酒泉燉煌又西南有牂柯越嶲益州皆宜屬焉漢興立都長安徙齊諸田楚昭屈景及諸功臣家於長陵後世世徙吏二千石髙訾富人及豪傑兼并之家於諸陵蓋亦以強幹弱支非獨為奉山園也是故五方雜處風俗不純其世家則好禮文富人則商賈為利豪傑則遊俠通姦瀕南山近夏陽多阻險輕薄易為盜賊常為天下劇又郡國輻輳浮食者多民去本就末列侯貴人車服僭上衆庶放效羞不相及嫁娶尤崇侈靡送死過度天水隴西山多材木民以板為室屋及安定北地上郡西河皆迫近戎狄修習戰備髙上氣力以射獵為先漢興六郡良家子選給羽林期門以材力為官名將多出焉故此數郡民俗質木不耻寇盜自武威以西本胸奴昆邪王休屠地武帝時攘之初置四郡以通西域鬲絶南羌胸奴其民或以關東下貧或以報怨過當或以悖逆無道家屬徙焉習俗頗殊地廣民稀水屮宜畜牧故涼州之畜為天下饒保邊塞二千石治之咸以兵馬為務酒禮之會上下通焉吏民相親是以其俗風雨時節穀糴常賤少盜賊有和氣之應賢於內郡此政寬厚吏不苛刻之所致也巴蜀廣漢本南夷秦并以為郡土地肥美有江水沃野山林竹木疏食果實之饒南賈滇𤏡僮西近卬莋莋馬旄牛民食稻魚亡凶年憂俗不愁苦而輕易淫佚柔弱褊厄景武間文翁為蜀守教民讀書法令未能篤信道德反以好文刺譏貴慕權藝及司馬相如遊宦京師諸侯以文辭顯於世鄉黨慕循其迹後有王褒嚴遵楊雄之徒文章冠天下繇文翁倡其教相如為之師故孔子曰有教無類武都地雜氐羌及犍為牂柯越嶲皆西南外夷武帝初開置民俗略與巴蜀同而武都近天水俗頗似焉故秦地天下三分之一而人衆不過什三然量其富居什六秦豳吳札觀樂為之歌秦曰此之謂夏聲夫能夏則大大之至也其周之舊乎自井十度至栁三度謂之鶉首之次秦之分也自魏地至具地並見地理志不詳録西漢會要卷四十六
