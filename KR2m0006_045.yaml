  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0006_WYG_045-1a, image: WYG0609/WYG0609-0287c.png}
body:
  text: 西漢會要卷四十五宋徐天麟撰選舉下舉亷孝亷附孝文十二年詔曰孝悌天下之大順也力田為生之本也亷吏民之表也朕甚嘉此二三大夫之行今萬家之縣云亡應令豈實人情是吏舉賢之道未備也其遣謁者勞賜孝者帛人五匹悌者力田二匹亷吏二百石㠯上率百石者三匹師古曰自二百石㠯上每石加三匹也孝景後二年詔曰其唯亷士寡欲易足今訾算十㠯上廼得官亷士算不必衆有市籍不得官亡訾又不得官朕甚愍之訾算四得官亡令亷士久失職貪夫長利孝武元光元年冬初令郡國舉孝亷各一人并本紀董仲舒曰臣愚以為使諸列侯郡守二千石各擇其吏民之賢者嵗貢各二人故州郡舉茂材孝亷皆自仲舒發之本傳元朔元年冬詔曰朕深詔執事興亷舉孝今或至闔郡而不薦一人其與中二千石禮官博士議不舉者罪有司奏議曰不舉孝不奉詔當以不敬論不察亷不勝任也當免奏可本紀孝宣黄龍元年詔曰舉亷吏誠欲得其真也吏六百石位大夫有罪先請秩禄上通足㠯効其賢材自今㠯來毋得舉韋昭曰吏六百石不得復舉為亷吏孝平元始元年令宗室其為吏舉亷佐史補四百石趙廣漢為平凖令察亷為陽翟令朱博以太常掾察亷補安陵丞蕭望之察亷為大行治禮丞薛宣㠯大司農斗食屬察亷補不其丞光禄勲于永除王嘉為掾察亷為南陵丞復察亷為長陵尉張敞補太守卒史察亷為甘泉倉長黄霸察補河東均輸長復察亷為河南太守丞尹賞㠯郡吏察亷為樓煩長王吉㠯郡吏舉孝亷為郎池陽令舉亷吏獄掾王立京房㠯孝亷為郎師丹孟喜並舉孝亷為郎劉輔舉孝亷為襄賁令平當察亷為順陽長孝弟力田孝惠四年正月舉民孝弟力田者復其身本紀下同髙后元年二月初置孝弟力田二千石者一人孝文十二年三月詔以户口率置三老孝弟力田常員令各率其意以導民任子父任漢儀注吏二千石㠯上視事滿三嵗得任同産若子一人為郎蘓武以父任為郎劉向以父任為輦郎孔光子男放為侍郎董恭為御史任賢為太子舍人蕭育以父任為太子庻人史丹九男皆以丹任為侍中汲黯以父任為太子洗馬伏湛以父任為博士弟子史丹馮野王皆以父任為太子中庻子杜延年以三公子補軍司空辛慶忌以父任為右校丞虎賁諸郎皆父死子代兄任霍去病任光為郎楊惲以忠任為郎爰盎兄噲任盎為郎中族父任成帝時侯霸以族父任為太子舍人宗家任趙兼淮南王舅子由以宗家任為郎致仕元始二年遣龔勝邴漢策曰其上子若孫若同産同産子一人所上子男皆除為郎董仲舒曰夫長吏多出於郎中中郎吏二千石子弟未必賢也宣帝時王吉上疏曰舜湯不用三公九卿之世而舉臯陶伊尹不仁者逺今使俗吏得任子弟率多驕驁不通古今至於積功治人亡益於民此伐檀所為作也宜明選求賢除任子之令王吉傳哀帝初即位除任子令本紀貲張釋之以貲為騎郎本傳漢注貲五百萬得為常侍郎孝景後二年詔曰今貲算十㠯上廼得宦亷士算不必衆有市籍不得宦亡貲又不得宦朕甚愍之貲算四得宦本紀司馬相如㠯貲為郎本傳董仲舒曰選郎吏又㠯富貲未必賢也本傳鬻官武帝即位干戈日滋財賂衰耗而不贍入物者補官選舉陵遲亷耻相冒興利之臣自此始也其後府庫益虚廼募民能入奴婢得以終身復為郎增秩及入羊為郎始於此其後四年元朔五年置賞官命曰武功爵大者封侯卿大夫小者郎吏道雜而多端則官職耗廢元狩四年除故鹽鐡官家富者為吏吏道益雜不選而多賈人矣元鼎二年始令吏得入穀補官郎至六百師古曰交更選髙官郎又就增其秩至六百石所忠言元鼎三年世家子弟富人或鬬雞走狗馬弋獵博戲亂齊民廼召諸犯令相引數千人命曰株送徒入財者得補郎郎選衰矣𢎞羊又請令吏得入粟補官平凖書黄霸以待詔入錢賞官補侍郎謁者坐罪免後復入穀沈黎郡補左馮翊二百石卒史馮翊以霸入財為官不補右職方技衛綰以戲車為郎事文帝鄧通以濯船為黄門郎周仁以毉見景帝為太子時為舍人吾邱夀王年少以善格五召待詔荀彘以御見侍中武帝時虞初以方士侍祠東郭先生以方士待詔公車武帝即位博開蓻能之路悉延百端之學通一技之士咸得自効絶倫超竒者為右亡所阿私龜策傳丞相魏相奏言知音善鼓雅琴者趙定龔徳皆召見待詔伍宏以毉待詔成帝時言祭祀方術者皆得待詔郊祀志本草待詔郊祀志師古曰以方藥本草而待詔郡吏趙禹以佐史補中都官用亷為令史咸宣以佐史給事河東守魏相為郡卒史舉賢良王吉以郡吏舉孝亷為郎尹齊以刀筆吏稍遷至御史朱邑少時為舒桐鄉嗇夫遷補太守卒史鮑宣為縣鄉嗇夫補束州丞張敞以鄉有補太守卒史察亷為甘泉倉長尹賞以郡吏察亷為樓煩長焦延夀為郡吏察亷為小黄令趙廣漢為郡吏州從事舉茂材陳萬年為郡吏察舉至縣令龔勝為郡吏楚王聘為常侍王訢以郡縣吏積功稍遷被陽令丙吉為魯獄吏積功勞稍遷廷尉右監王尊為獄小吏給事太守府補書佐尹翁歸為獄小吏除補卒史于定國為郡决曺補廷尉上書武帝初即位詔天下舉方正賢良文學材力之士待以不次之位四方士多上書言得失自衒鬻者㠯千數其不足采者輒報聞罷東方朔傳東方朔初入長安至公車上書凡用三千奏牘公車令兩人共持舉其書僅然能勝之人主從上方讀之止輒乙其處讀之二月廼盡詔拜㠯為郎史記朔上書曰可以為天子大臣文辭不遜髙自稱譽上偉之令待詔公車漢書朱買臣隨上計吏詣闕上書書久不報待詔公車主父偃元光元年上書闕下朝奏暮召入見是時徐樂嚴安亦俱上書言世務書奏上召見三人謂曰公等安在何相見之晚也廼拜偃樂安皆為郎中終軍至長安上書言事武帝異其文拜為謁者給事中枚臯上書北闕自陳枚乘之子上得之大喜召入見待詔宣帝初即位思進賢良多上書言便宜輒下蕭望之問狀髙者請丞相御史次者中二千石試事滿嵗以狀聞下者報聞或罷歸田里望之傳元帝初即位賈捐之上疏言得失召待詔金馬門哀帝初即位息夫躬上書召待詔從軍周勃材官引彊師古曰彊其兩反服䖍曰引彊弓弩官也申屠嘉以材官蹶張遷為隊率師古曰弩以足蹋者如蹶張漢興六郡良家子選給羽林期門師古曰六郡謂隴西天水安定北地上郡西河也㠯材力為官名將多出焉地理志公孫賀北地人少為騎士從軍李廣隴西人㠯良家子從軍趙充國隴西人㠯六郡良家子善騎射補羽林傅介子北地人㠯從軍為官甘延夀北地人㠯良家子善騎射為羽林馮奉世上黨人㠯良家子選為郎張次公以勇悍從軍義縱傳常惠應募隨蘓武使匈奴鄭吉以卒伍從軍傅介子斬樓蘭王士刺王者皆補侍郎軍功多用超等大者封侯卿大夫小者郎食貨志選舉雜録孝惠髙后時市井子孫不得仕官為吏景紀詔有市籍不得宦無貲又不得宦入財為官不補右職黄霸宗室不宜典三河劉向王國人不得宿衛龔勝彭宣王舅不宜備九卿馮野王馮立馮彦弟犯法不得宿衛蕭望之賈人不得為吏哀帝詔執金吾韓立御史大夫張譚並坐選舉不實免丞相張蒼任人為中候大為奸利上以為責張勃舉陳湯司𨽻奏湯亡循行勃選舉故不以實削户二百何武所舉方正槃辟雅拜坐左遷楚内史山陽侯張當居坐為太常擇博士弟子故不以實全為城旦表元始二年大理復坐除吏不次免河平四年宗正劉順坐使合陽侯舉子免建平二年卭成侯王勲坐選舉不以實罵廷史大不敬免元延元年詔舉方正直言之士紅陽侯立舉陳咸對策拜為光禄大夫給事中丞相方進奏咸不當䝉方正并劾立選舉故不㠯實有詔免咸勿劾立嚴延年察獄史亷有臧不入身延年選舉不實貶秩司𨽻奏杜業為大常選舉不實業坐免官平帝初即位詔曰選舉者其歴職更事有名之士則以為難保廢而弗舉甚謬於赦小過舉賢材之義諸有臧及内惡未發而薦舉者皆勿案驗令士厲精鄉進不㠯小疵妨大才西漢會要卷四十五
