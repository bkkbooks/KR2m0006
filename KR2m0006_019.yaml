body:
  text: 西漢會要卷十九宋徐天麟撰禮十四山陵萬年陵太上皇長陵髙帝安陵惠帝霸陵文帝陽陵景帝茂陵武帝平陵昭帝杜陵宣帝渭陵元帝延陵成帝義陵哀帝康陵平帝小黃昭靈后南陵文帝母薄太后元始中罷為縣雲陵昭帝母趙太后元始中罷為縣雜録孝文治霸陵皆瓦器不得以金銀銅錫為飾本贊東園匠令丞主作陵內器物百官表漢興立都長安徙齊田楚昭屈景及諸功臣家於長陵後世世徙吏二千石髙資富人及豪傑并兼之家於諸陵地理志孝景五年作陽陵邑本紀孝武建元二年初置茂陵邑本紀元帝即位貢禹奏言武帝棄天下昭帝幼弱霍光専事不知禮正妄多藏金錢財物鳥獸魚鱉牛馬虎豹生禽凡百九十物盡瘞藏之又皆以後宫女置於園陵大失禮逆天心又未必稱武帝意也昭帝晏駕光復行之至孝宣皇帝時陛下惡有所言羣臣亦隨故事甚可痛也唯陛下深察古道諸園陵女亡子者宜悉遣獨杜陵宫數百誠可哀憐也貢禹傳永光四年分諸陵屬三輔以渭城夀陵亭部原上為初陵詔曰安土重遷黎民之性骨肉相附人情所願也頃者有司緣臣子之義奏徙郡國民以奉園陵令百姓逺棄先祖墳墓破業失産親戚别離人懷思慕之心家有不自安之意是以東垂被虗耗之害關中有無聊之民非久長之策也詩不云乎民亦勞止迄可小康惠此中國以綏四方今所為初陵者勿置縣邑使天下咸安土樂業亡有動搖之心布告天下令明知之本紀陳湯與將作大匠解萬年相善自元帝時渭陵不復徙民起邑成帝起初陵數年後樂霸陵曲亭南更營之萬年與湯議以為武帝時工楊光以所作數可意自致將作大匠及大司農中丞耿夀昌造杜陵賜爵關內矦將作大匠乘馬延年以勞苦秩中二千石今作初陵而營起邑居成大功萬年亦當蒙重賞子公妻家在長安兒子生長長安不樂東方宜求徙可得賜田宅俱善湯心利之即上封事言初陵京師之地最為肥美可立一縣天下民不徙諸陵三十餘嵗矣關東富人益衆多規良田役使貧民可徙初陵以強京師衰弱諸矦又使中家以下得均貧富湯願與妻子家屬徙初陵為天下先於是天子從其計果起昌陵邑後徙內郡國民萬年自詭三年可成後卒不就羣臣多言其不便者下有司議皆曰昌陵因卑為髙積土為山度便房猶在平地上客土之中不保幽冥之靈淺外不固卒徙工庸以巨萬數至㸐脂火夜作取土東山且與榖同賈作治數年天下遍被其勞國家罷敝府藏空虗下至衆庶熬熬苦之故陵因天性據真土處藝髙敞旁近祖考前又已有十年功緒宜還復故陵勿徙民上乃下詔罷昌陵陳湯傳孝成永始元年七月詔曰朕執德不固謀不盡下過聽將作大匠萬年言昌陵三年可成作治五年中陵司馬殿門內尚未加功天下虗耗百姓罷勞客土疏惡終不可成朕惟其難怛然傷心夫過而不改是謂過矣其罷昌陵及故陵勿徙吏民令天下毋有動搖之心本紀二年詔曰前將作大匠萬年知昌陵卑下不可為萬嵗居奏請營作建置郭邑妄為巧詐積土增髙多賦斂繇役興卒暴之作卒徒蒙辜死者連屬百姓罷極天下匱竭常侍閎前為大司農中丞數奏昌陵不可成侍中衛尉長數白宜早止徙家反故處朕以長言下閎章公卿議皆合長計首建至策閎典主省大費民以康寧閎前賜爵關內矦黃金百斤其賜長爵關內矦食邑千户閎五百户萬年佞邪不忠毒流衆庶海內怨望至今不息雖蒙赦令不宜居京師其徙萬年燉煌郡本紀成帝營起昌陵數年不成復還歸延陵制度泰奢劉向上疏諌曰臣聞易曰安不忘危存不忘亡是以身安而國家可保也故賢聖之君博觀終始窮極事情而是非分明王者必通三統明天命所授者博非獨一姓也孔子論詩至於殷士膚敏裸將于京喟然歎曰大哉天命善不可不傳于子孫是以富貴無常不如是則王公其何以戒謹民萌何以勸勉蓋傷微子之事周而痛殷之亡也雖有堯舜之聖不能化丹朱之子雖有禹湯之德不能訓末孫之桀紂自古及今未有不亡之國也昔髙皇帝既滅秦將都雒陽感寤劉敬之言自以德不及周而賢於秦遂徙都關中依周之德因秦之阻世之長短以德為效故常戰栗不敢諱亡孔子所謂富貴無常蓋謂此也孝文皇帝居霸陵北臨厠意悽愴悲懷顧謂羣臣曰嗟乎以北山石為椁用紵絮陳漆其間豈可動哉張釋之進曰使其中有可欲雖錮南山猶有隙使其中無可欲雖無石椁又何戚焉夫死者無終極而國家有廢興故釋之之言為無窮計也孝文寤焉遂薄葬不起山墳易曰古之葬者厚衣之以薪葬之中野不封不樹後世聖人易之以棺槨棺槨之作自黃帝始黃帝葬於橋山堯葬濟隂邱壠皆小葬具甚微舜葬蒼梧二妃不從禹葬會稽不改其列殷湯無葬處文武周公葬於畢秦穆公葬於雍橐泉宫祈年館下樗里子葬於武庫皆無邱壠之處此聖帝明王賢君智士逺覽獨慮無窮之計也其賢臣孝子亦承命順意而薄葬之此誠奉安君父忠孝之至也夫周公武王弟也葬兄甚微孔子葬母於防稱古墓而不墳曰丘東西南北之人也不可不識也為四尺墳遇雨而崩弟子修之以告孔子孔子流涕曰吾聞之古者不修墓蓋非之也延陵季子適齊而反其子死於嬴博之間穿不及泉斂以時服封墳掩坎其髙可隱而號曰骨肉歸復於土命也魂氣則無不之也夫嬴博去吳千有餘里季子不歸葬孔子往觀曰延陵季子於禮合矣故仲尼孝子而延陵慈父舜禹忠臣周公弟弟其葬君親骨肉皆微薄矣非苟為儉誠便於體也宋桓司馬為石槨仲尼曰不如速朽秦相吕不韋集知略之士而造春秋亦言薄葬之義皆明於事者也逮至吳王闔閭違禮厚葬十有餘年越人發之及秦惠文武昭莊襄五王皆大作邱壠多其瘞藏咸盡發掘暴露甚足悲也秦始皇帝葬於驪山之阿下錮三泉上崇山墳其髙五十餘丈周回五里有餘石槨為遊館人膏為燈燭水銀為江海黃金為鳬鴈珍寶之藏機械之變棺槨之麗宫館之盛不可勝原又多殺宫人生薶工匠計以萬數天下苦其役而反之驪山之作未成而周章百萬之師至其下矣項籍燔其宫室營宇往者咸見發掘其後牧兒亡羊羊入其鑿牧者持火照求羊失火燒其藏椁自古至今葬未有盛如始皇者也數年之間外被項籍之災內離牧童之禍豈不哀哉是故德彌厚者葬彌薄知愈深者葬愈微無德寡知其葬愈厚邱壠彌髙宫廟甚麗發掘必速由是觀之明暗之效葬之吉凶昭然可見矣周德既衰而奢侈宣王賢而中興更為儉宫室小寢廟詩人美之斯干之詩是也上章道宫室之如制下章言子孫之衆多也及魯莊公刻飾宗廟多築臺囿後嗣再絶春秋刺焉周宣如彼而昌魯秦如此而絶是則奢儉之得失也陛下即位躬親節儉始營初陵其制約小天下莫不稱賢明及徙昌陵增埤為髙積土為山發民墳墓積以萬數營起邑居期日迫卒功費大萬百餘死者恨於下生者愁於上怨氣感動隂陽因之以飢饉物故流離以千萬數臣甚惛焉以死者為有知發人之墓其害多矣若其無知又安用大謀之賢知則不説以示衆庶則苦之若茍以説愚夫淫侈之人又何為哉陛下慈仁篤美甚厚聰明疏達蓋世宜𢎞漢家之德崇劉氏之美光昭五帝三王而顧與暴秦亂君競為奢侈比方邱壠説愚夫之目隆一時之觀違賢知之心亡萬世之安臣竊為陛下羞之雖陛下上覽明聖黃帝堯舜禹湯文武周公仲尼之制下觀賢知穆公延陵樗里張釋之之意孝文皇帝去墳薄葬以儉安神可以為則秦昭始皇增山厚藏以侈生害足以為戒初陵之橅宜從公卿大臣之議以息衆庶書奏上甚感向言而不能從其計劉向傳成帝永始四年出杜陵諸未嘗御者歸家本紀張晏曰宫人無子乃守園陵也元朔二年孔臧坐為太常南陵橋壞衣冠道絶免百官表六年周平為大常坐不繕園陵免百官表元狩五年丞相李蔡坐侵賣園陵道壖地自殺功臣表綏和二年王况坐山陵未成置酒歌舞免外戚表丞相孔光四時行園陵鮑宣傳寢園太上皇寢園永光五年毁竟寧元年毁建昭五年復河平元年復髙祖皇帝寢園孝惠皇帝寢園永光五年毁竟寧元年復孝文皇帝寢園孝景皇帝寢園孝武皇帝寢園孝昭皇帝寢園孝宣皇帝寢園孝元皇帝寢園孝成皇帝寢園孝哀皇帝寢園孝平皇帝寢園昭靈后寢園永光四年罷竟寧元年罷建昭五年復武哀王寢園永光四年罷竟寧元年罷建昭五年復昭哀后寢園永光四年罷竟寧元年罷建昭五年復孝文太后寢園建昭元年罷五月罷竟寧元年三月復陵平帝元始中罷南孝昭太后寢園建昭元年罷五月罷竟寧元年六月復陵平帝元始中罷雲衛思后園永光四年罷建昭五年復戾園永光四年罷建昭五年復戾后園永光四年罷皇曽祖悼孝廟園平帝元始中毁奉明園孝宣許皇后南園父戴矦同薄太后父靈文矦園薄太后母靈文夫人園竇皇后父安成矦園孝景王皇后父共矦園孝景王皇后母平原君園趙偼妤父順成矦園史皇孫王夫人父恩成矦園霍皇后父博陸矦園孝宣王皇后父其矦園共皇帝寢園哀帝建平二年立雜録奉常屬官有諸廟寢園令長丞百官表寢郎馮參園郎班稚故事近臣皆隨陵為園郎金敞傳園中各有寢便殿日祭於寢月祭於廟時祭於便殿寢日四上食韋玄成傳詳見廟祭丞相以四時行園張湯傳人有盜孝文園瘞錢丞相嚴青翟自殺張湯傳任宫坐為太常人盜茂陵園中物免百官表武帝建元六年二月丁酉遼東髙廟災四月壬子髙園便殿火董仲舒曰哀公三年桓釐宫災四月亳社火天皆燔其不當立者以示魯今髙廟不當居遼東髙園殿不當居陵旁於禮亦不當立與魯災同五行志西漢會要卷十九
