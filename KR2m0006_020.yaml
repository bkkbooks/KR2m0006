body:
  text: 西漢㑹要卷二十宋徐天麟撰禮十五凶禮服制孝文遺詔曰朕既不徳無以佐百姓今崩又使重服久臨以罹寒暑之數哀人父子傷長老之志損其飲食絶鬼神之祭祀以重吾不徳謂天下何朕獲保宗廟以𦕈𦕈之身託于天下君王之上二十有餘年矣賴天之靈社稷之福方内安寧靡有兵革朕既不敏常畏過行以羞先帝之遺徳惟年之久長懼于不終今乃幸以天年得復供養於髙廟朕之不明與嘉之其奚哀念之有其令天下吏民令到出臨三日皆釋服無禁取婦嫁女祠祀飲酒食肉自當給喪事服臨者皆無踐絰帯無過三寸無布車及兵噐無發民哭臨宫殿中殿中當臨者皆以旦夕十五舉音禮畢罷非旦夕臨時禁無得擅哭臨以下服大紅十五日小紅十四日纎七日釋服它不在令中者皆以此令比類從事本紀孝宣地節四年詔曰導民以孝則天下順今百姓或遭衰絰凶灾而吏繇事使不得葬傷孝子之心朕甚憐之自今諸有大父母父母喪者勿繇事使得収歛送終盡其子道本紀名京師本傳結以倚廬揚雄傳注云行服三年也漢律不為親行三年䘮不得選舉服舍江都易王傳師古曰倚廬堊室之次也䘮葬髙祖十二年四月甲辰崩于未央宫丁未發喪五月丙寅葬長陵已下已下棺也皇太子羣臣皆反至太上皇廟本紀恵帝即位賜給䘮事者二千石錢二萬六百石以上萬五百石二百石以下至佐史五千視作斥上者将軍四十金本紀服䖍曰斥上壙上也文帝至霸陵意悽愴悲懐顧謂羣臣曰嗟乎以北山石為椁用紵絮陳漆其間豈可動哉左右皆曰善釋之前曰使其中有可欲雖錮南山猶有隙使其中亡可欲雖亡石椁又何戚焉文帝稱善張釋之傳文帝遺詔霸陵山川因其故無有所改郎中令張武為復土將軍發近縣卒萬六千人發内史卒萬五千人藏郭穿復土屬將軍武乙巳葬覇陵本紀武帝建元六年竇太后崩丞相許昌御史大夫嚴青翟坐喪事不辦免田蚡傳元帝時貢禹奏言武帝時多取好女至數千人以填後宫及弃天下昭帝㓜弱霍光專事不知禮正妄多藏金錢財物鳥獸魚鼈牛馬虎豹生禽凡百九十物盡瘞藏之又皆以後宫女置於園陵大失禮逆天道又未必稱武帝意也昭帝晏駕光復行之至孝宣皇帝時陛下惡有所言羣臣亦随故事甚可痛也故使天下承化衆庻葬埋皆虗地上以實地下其過自上生皆在大臣循故事之辠也唯陛下深察古道從其儉者諸園陵女亡子者宜悉遣獨杜陵宫人數百誠可哀憐也貢禹傳元帝崩有司言乘輿牛馬禽獸皆非禮不宜以葬奏可成紀哀帝建平二年帝太后丁氏崩上曰朕聞夫婦一體詩云榖則異室死則同穴昔季武子成寢杜氏之殯在西階下請合葬而許之祔葬之禮自周興焉郁郁乎文哉吾從周孝子事亡如事存帝太后宜起陵恭皇之園遂葬定陶發陳留濟隂近郡國五萬人穿復土本紀平帝元始五年崩于未央宫大赦天下有司議曰禮臣不殤君皇帝年十有四嵗宜以禮歛加元服奏可葬康陵本紀孝景中二年令諸王薨大鴻臚奏謚誄策列矦薨大行奏謚誄策王薨遣光禄大夫吊襚祠賵視喪事因立嗣子列矦薨遣大中大夫吊祠視䘮事因立嗣其薨葬國得發民輓䘮穿復土治墳無過三百人畢事本紀雜録楚元王夫人薨賜塋師古曰謂為界域霍去病薨上悼之發屬國元甲軍陳自長安至茂陵為冡象祁連山本傳李蔡以丞相坐詔賜冡地陽陵當得二十畆蔡盗取三頃頗賣得四十餘萬又盗取神道外據地一畆葬其中當下獄自殺李廣傳張安世薨天子贈印綬送以輕車介士賜塋杜東本傳霍光薨上及皇太后親臨光喪大中大夫任宣與侍御史五人持節䕶䘮事中二千石治莫府塚上賜金畫棺以朱砂塗之而又雕畫四時之色左蒼龍右白虎上著金銀日月玉衣珠璧以棺至尊無以加臣請沒入財物縣官本傳楊王孫病且終先令其子曰吾欲臝葬以反吾真必亡易吾意死則為布囊盛尸入地七尺既下從足引脱其囊以身新土其子欲黙而不從重廢父命欲從之心又不忍乃徃見王孫友人祁矦祁矦與王孫書曰王孫苦疾僕廹從上祠雍未得詣前願存精神省思慮進近醫藥厚自持竊聞王孫先令臝葬令死者亡知則已若有知是戮尸地下將臝見先人竊為王孫不取也且孝經曰為之棺椁衣衾是亦聖人之遺制何必區區獨守所聞願王孫察焉王孫報曰盖聞古之聖王縁人情不忍其親故為制禮今則越之吾是以臝葬将以矯世也夫厚葬誠無益於死者而俗人競以相髙靡財單幣腐之地下或乃今日入而明日發此真與暴骸於中野何異且夫死者終生之化而物之歸者也歸者得至化者得變是物各反其真也反真㝠㝠亡形亡聲乃合道情夫飾外以華衆厚葬以鬲真使歸者不得至化者不得變是使物各失其所也且吾聞之精神者天之有也形骸者地之有也精神離形各歸其真故謂之鬼鬼之為言歸也其尸塊然獨處豈有知哉裹以幣帛鬲以棺椁支體絡束口含玉石欲化不得鬰為枯腊千載之後棺椁朽腐乃得歸土就其真宅由是言之焉用乆客昔帝堯之葬也窽木為匵葛藟為緘其穿下不亂泉上不泄殠故聖王生易尚死易葬也不加功於亡用不損財於亡謂今費財厚葬留歸鬲至死者不知生者不得是謂重惑於戯吾不為也祁矦曰善遂臝葬恤死事漢法父子俱有死事得以䘮歸灌夫傳漢四年下令軍士不幸死者吏為衣衾棺歛轉送其家本紀八年令士卒從軍死者為槥歸其縣縣給衣衾棺葬具祠以少牢長吏視葬本紀文帝十四年缾矦孫單以父邛北地都尉力戰死事子矦功臣表景帝中二年封故楚趙傅相前死事者四人子皆為列矦本紀武帝取從軍死事之子孫飬羽林教以五兵號曰羽林孤兒百官表西漢㑹要卷二十
