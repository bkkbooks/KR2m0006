body:
  text: 西漢㑹要卷二十六宋徐天麟撰學校下圖書下儒五十三家八百三十六篇道三十七家九百九十三篇隂陽二十一家三百六十九篇法十家二百一十七篇名七家三十六篇墨六家八十六篇從横十二家百七篇雜二十家四百三篇農九家百一十四篇小説十五家千三百八十篇凢諸子百八十九家四千三百二十四篇賦二十家三百六十一篇賦二十一家二百七十四篇賦二十五家百三十六篇雜賦十二家二百三十三篇歌詩二十八家三百一十四篇凡詩賦百六家千三百一十八篇兵權謀十三家二百五十九篇兵形勢十一家九十二篇圖十八卷隂陽十六家二百四十九篇兵技巧十三家百九十九篇凡兵書五十三家七百九十篇圖四十三卷漢興張良韓信序次兵法凡百八十二家刪取要用定著三十五家諸吕用事而盜取之武帝時軍政楊僕捃摭遺逸紀奏兵録猶未能備至於孝成命任宏論次兵書為四種天文二十一家四百四十五卷厯譜十八家六百六卷五行三十一家六百五十二卷蓍龜十五家四百一卷雜占十八家三百一十三卷形法六家百二十二卷凡數術百九十家二千五百二十八卷醫經七家二百一十六卷經方十一家二百七十四卷房中八家百八十六卷神仙十家二百五卷凡方技三十六家八百六十八卷大凡書六畧三十八種五百九十六家萬三千二百六十九卷並藝文志雜録漢元年髙祖入闗蕭何盡收秦丞相府圖籍文書本紀恵帝四年除挾書律本紀御史中丞在殿中蘭臺掌圖籍秘書百官表臣天麟謹按通典云漢凡圖書所在有石渠石室延閣廣内貯之於外府又有御史中丞居殿中掌蘭臺秘書及麒麟天禄二閣藏之於内禁成帝河平三年劉向校中秘書謁者陳農使使求遺書於天下本紀臣天麟按劉歆七畧云外則有太常府太史博士之藏内則有延閣廣内秘丞之史記石室金匱之書司馬遷傳蘓昌為太常坐籍霍山書泄秘書免百官表師古曰以秘書借霍山霍山坐冩秘書自殺光傳河間獻王脩學好古實事求是從民得善書必為好寫與之留其真加金帛賜以招之繇是四方道術之人不逺千里或有先祖舊書多奉以奏獻王者故得書多與漢朝等是時淮南王安亦好書所招致率多浮辯獻王所得書皆古文先秦舊書周官尚書禮禮記孟子老子之屬皆經傳説記七十子之徒所論其學舉六藝立毛氏詩左氏春秋博士脩禮樂被服儒術造次必於儒者山東諸儒者從而遊本傳講論經義校讎附瑕丘江公受榖梁春秋及詩於魯申公傳子至孫為博士武帝時江公與董仲舒並仲舒通五經能持論善屬文江公呐於口上使與仲舒議不如仲舒而丞相公孫𢎞本為公羊學比輯其議卒用董生於是上因尊公羊家詔太子受公羊春秋由是公羊大興太子既通復私問榖梁而善之其後寖㣲唯魯榮廣王孫皓星公二人受焉廣盡能傳其詩春秋髙材敏捷與公羊大師眭孟等論數困之故好學者頗復受榖梁沛蔡千秋少君梁周慶㓜君丁姓子孫皆從廣受千秋又事皓星公為學最篤宣帝即位聞衛太子好榖梁春秋以問丞相韋賢長信少府夏侯勝及侍中樂陵侯史髙皆魯人也言榖梁子本魯學公羊氏迺齊學也宜興榖梁時千秋為郎召見與公羊家並説上善榖梁説擢千秋為諌大夫給事中後有過左遷平陵令復求為榖梁者莫及千秋上愍其學且絶迺以千秋為郎中户將選郎十人從受汝南尹更始翁君本自事千秋能説矣㑹千秋病死召江公孫為博士劉向以故諌大夫通達待詔受榖梁欲令助之江博士復死迺召周慶丁姓待詔保宫使卒授十人自元康中始講至甘露元年積十餘嵗皆明習迺召五經名儒太子太傅蕭望之等大議殿中平公羊榖梁同異各以經處是非時公羊博士嚴彭祖侍郎申輓伊推宋顯榖梁議郎尹更始待詔劉向周慶丁姓並論公羊家多不見從願請内侍郎許廣使者亦並内榖梁家中郎王亥各五人議三十餘事望之等十一人各以經誼對多從榖梁由是榖梁之學大盛儒林傳孝宣甘露三年三月詔諸儒論五經同異太子太𫝊蕭望之等平奏其議上親稱制臨决焉紀韋𤣥成拜淮揚中尉受詔與蕭望之及五經諸儒雜論同異於石渠閣條奏其對𤣥成傳臣天麟謹按三輔黄圖云石渠閣蕭何造其下龍石為渠以導水若今御溝因為閣名所藏入闗所得秦之圖籍至成帝又於此藏書焉天禄藏閣藏典籍之所漢宫殿疏云天禄麒麟閣蕭何造以藏書處賢才也施讎受王孫易為愽士甘露中與五經諸儒雜論同異於石渠閣本傳梁丘臨傳賀易甘露中奉使問諸儒於石渠梁丘賀傳歐陽地餘傳尚書為愽士論石渠歐陽生傳林尊為愽士論石渠尊傳周堪與孔霸俱事大夏侯勝論於石渠經為最髙堪傳張山拊事小夏侯建為博士論石渠本傳張生薛廣徳以魯詩論石渠王式傳戴德號大戴聖號小戴以博士論石渠孟卿傳聞人通漢以太子舍人論石渠上劉向受榖梁講論五經於石渠本傳注云三輔舊事石渠閣在未央宫大殿北以藏秘書五經雜議十八篇書議奏四十二篇禮議奏三十八篇春秋議奏三十九篇論語議奏十八篇並見藝文志注云宣帝時石渠論少府五鹿充宗貴幸為梁丘易自宣帝時善梁丘氏説元帝好之欲考其異同令充宗與諸易家議充宗乘貴辯口諸儒莫能與抗皆稱疾不敢㑹有薦朱雲者召入攝齋登堂抗首而請音動左右既論難連柱五鹿君故諸儒為之語曰五鹿嶽嶽朱雲折其角繇是為博士朱雲傳成帝河平三年詔光禄大夫劉向校經傳諸子詩賦歩兵校尉任宏校兵書太史令尹咸校數術侍醫李柱國校方技毎一書已向輒條其篇目撮其指意録而奏之㑹向卒子歆卒父業歆於是總羣書而奏其七畧有輯畧有六藝畧有諸子略有詩賦略有兵書略有術數略有方技略藝文志班伯受詩於師丹大將軍王鳯薦伯宜勸學召見宴昵殿容貌甚麗誦説有法拜為中常侍時上方鄉學鄭寛中張禹朝夕入説尚書論語於金華殿中詔伯受焉既通大義又講異同於許商遷奉車都尉數年金華之業絶出叙傳楊雄校書天禄閣本傳國史楚漢春秋九篇陸賈所傳髙祖傳十三篇髙祖與大臣述古語及詔䇿也孝文傳十一篇文帝所稱及詔䇿大史公百三篇十篇有録無書馮商所續大史公七篇商受詔續漢著記百九十卷師古曰若今之起居注漢大年紀五篇已上並藝文志史記石室金鐀之書司馬遷傳柱下方書張蒼為御史主柱下方書太常屬官有太史令丞司馬氏世典周史至談為大史公大史公仕於建元元封之間如淳曰漢儀注大史公武帝置位在丞相上天下計書先上大史公副上丞相序事如古春秋遷死後宣帝以其官為令行大史公文書而已晉灼曰百官表無大史公在丞相上又衛宏所説多不實未可以為正師古曰談為大史令耳遷尊其父故謂之為公如説非也大史公既掌天官不治民有子曰遷遷生龍門耕牧河山之陽年十嵗則誦古文二十而南逰江淮上㑹稽探禹穴窺九疑浮沅湘北涉汶泗講業齊魯之都觀夫子遺風鄉射鄒嶧阨困鄱薛彭城過梁楚以歸於是遷仕為郎中奉使西征巴蜀以南略卭筰昆明還報命是嵗天子始建漢家之封而太史公留滯周南不得與從事發憤且卒而子遷適反見父於河雒之間大史公執遷手而泣曰予先周室之大史也自上世嘗顯功名虞夏典天官事後世中衰絶於予乎女復為大史則續吾祖矣今天子接千嵗之統封泰山而予不得從行是命也夫命也夫予死爾必為太史毋忘吾所欲論著矣且夫孝始於事親中於事君終於立身揚名於後世以顯父母此孝之大也夫天下稱周公言其能論歌文武之徳宣周召之風逹大王王季思慮爰及公劉以尊后稷也幽厲之後王道缺禮樂衰孔子脩舊起廢論詩書作春秋則學者至今則之自獲麟以来四百有餘嵗而諸侯相兼史記放絶今漢興海内一統明主賢君忠臣義士予為大史而不論載廢天下之文予甚懼焉爾其念哉遷俯首流涕曰小子不敏請悉論先人所次舊聞不敢闕卒三嵗而遷為大史令紬史記石室金鐀之書五年而當大初元年十一月甲子朔旦冬至天厯始改建於明堂諸神受紀大史公曰先人有言自周公卒五百嵗而有孔子孔子至於今五百嵗有能紹而明之正易傳繼春秋本詩書禮樂之際意在斯乎意在斯乎小子何敢讓焉於是論次其文卒述陶唐以来至於麟止自黄帝始逮漢繼五帝末流接三代絶業周道既廢秦撥去古文焚㓕詩書故明堂石室金鐀玉版圖籍散亂漢興蕭何次律令韓信申軍法張倉為章程叔孫通定禮儀則文學彬彬稍進詩書徃徃間出自曹参薦葢公言黄老而賈誼朝錯明申韓公孫𢎞以儒顯百年之間天下遺文古事靡不畢集大史公仍父子相繼纂其職曰於戲余維先人嘗掌斯事顯於唐虞至於周復典之故司馬氏世主天官至於余乎欽念哉罔羅天下放失舊聞王迹所興原始察終見盛觀衰論考之行事略三代録秦漢上記黄帝下至於兹著十二本紀既科條之矣並時異世年差不明作十表禮樂損益律厯改易兵權山川鬼神天人之際承敝通變作八書二十八宿環北辰三十輻共一轂運行無窮輔弼股肱之臣配焉忠信行道以奉主上作三十世家扶義俶儻不令已失時立功名於天下作七十列傳凡百三十篇五十二萬六千五百字為大史公書序略以拾遺補藝成一家言協六經異傳齊百家雜語藏之名山副在京師以俟後聖君子而十篇闕有録無書張晏曰遷没之後亡景紀武紀禮書樂書兵書漢興以来將相年表日者列傳三王世家龜䇿列傳傅靳列傳元成之間禇先生補闕作武帝紀三王世家龜䇿日者傳言辭鄙陋非遷本意也師古曰序目本無兵書張云亡失此説非也劉奉世曰兵書即厯書葢當時有二名耳遷既死後其書稍出宣帝時遷外孫平通侯楊惲祖述其書遂宣布焉司馬遷傳賜書諸侯王求書附班斿進讀羣書成帝賜以秘書之副叙傳東平思王来朝上疏求諸子及太史公書上以問大將軍王鳯對曰臣聞諸侯朝聘考文章正法度非禮不信今東平王幸得来朝不思制節謹度以防危失而求諸書非朝聘之義也諸子書或反經術非聖人或明鬼神信物怪大史書有戰國從横權譎之謀漢興之初謀臣竒策天官災異地形扼塞皆不宜在諸侯王不可予不許之辭宜曰五經聖人所制萬事靡不畢載王審樂道傅相皆儒者旦夕講誦足以正身虞意夫小辯破義小道不通致遠恐泥皆不足以留意諸益於經術者不愛於王對奏天子如鳯言遂不與宣元六王傳黜百家孝武初立卓然罷黜百家表章六經本賛董仲舒對䇿曰春秋大一統者天地之常經古今之通誼也今師異道人異論百家殊方意指不同是以上亡以持一統法制數變人不知所守臣愚以為諸不在六藝之科孔子之術者勿使並進邪辟之説滅息然後統紀可一而法度可明民知所從矣傳建元元年丞相綰奏所舉賢良或治申商韓非蘇秦張儀之言亂國政請皆罷奏可武紀西漢㑹要卷二十六
