body:
  text: 西漢會要卷四十二宋徐天麟撰職官十二告寧告歸髙紀髙祖嘗告歸之田李斐曰休謁之名吉曰告凶曰寧孟康曰古者名吏休假曰告漢律吏二千石有予告有賜告予告者在官有功最法所當得也賜告者病滿三月當免天子優賜其告使得帶綬印將官屬歸家治病至成帝時郡國二千石賜告不得歸家至和帝時予賜皆絶師古曰告者請謁之言謂請休耳或謂之謝謝亦告也五日休吏薛宣傳師古曰冬夏之日至不省官事故休吏五日洗沐鄭莊郎官五日闕石慶傳汲黯為主爵都尉多病病且滿三月上常賜告者數最後嚴助為請告汲黯傳故事公卿病輙賜告谷永為大司農病三月有司奏請免獨即時免谷永傳琅邪大守馮野王病滿三月賜告與妻子歸杜陵就醫藥御史中丞劾奏野王賜告養病而私自便持虎符出界歸家奉詔不敬杜欽曰竊見令曰吏二千石告過長安謁不分别予賜今有司㠯為予告得歸賜告不得歸是一律两科失省刑之意夫三最予告令也病滿三月賜告詔恩也今告則得詔恩則不得失輕重之差又二千石病賜告得歸有故事不得去郡亡著令即以二千石守千里之地任兵馬之重不宜去郡將以制刑為後法者則野王之辠在未制令之前也不聽竟免野王郡國二千石病賜告不得歸家自此始本傳郎官故事令郎出錢市財用給文書廼得出名曰山郎張晏曰山財用之所出故取名焉移病盡一日輒償一沐或至歳餘不得沐其豪富郎日出遊戲或行錢得善部師古曰郎官之職各有所部楊惲為中郎將罷山郎移長度大司農㠯給財用其􅍚病休謁洗沐皆以法令從事楊惲傳孝哀初即位令博士弟子父母死予寧三年本紀奉朝請朝朔望時㑹朝請宣紀如淳曰春曰朝秋曰請丞相張禹遜位㠯特進奉朝請𫝊喜位特進奉朝請馮參以列侯奉朝請杜緩前免太常㠯列侯奉朝請闗内侯蕭望之給事中朝朔望坐次將軍萬石君奮歸老於家㠯歳時為朝臣蘇武以著節老臣令朝朔望並本傳久任孝文時吏居官者或長子孫㠯官為氏倉氏庫氏則倉庫吏之後也其二千石長吏亦安官樂職然後上下相望莫有苟且之意王嘉傳武帝即位數歳為吏者長子孫居官者㠯為姓號平凖書孝宣地節二年上始親政事侍中尚書功勞當遷及有異善至于子孫終不改易本紀宣帝以為太守吏民之本也數變易則下不安民知其將久不可欺㒺廼服從其教化黄霸曰數易長吏送故迎新之費及奸吏縁絶簿書盗財物公私耗費甚多皆當出於民黄霸傳丞相蕭何曺參公孫賀並十三年張蒼孝文四年十二月相後元二年八月免凡十五年陳平孝恵元年相孝文二年薨凡十二年石慶孝武元鼎五年相大初二年薨凡十年于定國魏相並九年光禄勲徐自為二十六年王恬啟二十五年張武二十三年周仁十三年于永十六年太僕夏侯嬰自髙帝為沛公時常奉車至孝文八年薨廷尉于定國十八年大鴻臚商邱成十二年大司農髙帝元年執盾襄為治粟内史至孝景後二年大農令惠凡六十五年恐表有闕文中尉張歐九年御史中丞咸宣為御史及中丞者幾二十歳郎張釋之為騎郎十年不得調楊雄為郎給事黄門三世不徙官尚書故事尚書㠯久轉遷孔光傳大樂樂家有制氏目雅樂聲律世世在大樂官刺史故事刺史居部九嵗舉為守相郡守黄霸為潁川八年張敞為京兆九歳恩賜帶劍履上殿入朝不趨髙帝五年奏位次令蕭何第一賜帶劍履上殿入朝不趨奏事不名入殿不趨髙帝褒賞元功相國蕭何邑户既倍又䝉殊禮奏事不名入殿不趨入殿門不趨殺人不死髙帝欲自擊陳豨周緤泣諫上㠯為愛我賜入殿門不趨殺人不死几杖不朝吳王濞稱疾不朝京師及後使人為秋請上賜吳王几杖者不朝孝武元朔二年賜淮南王菑川王几杖毋朝師古曰安忘皆武帝諸父列也天子旌旗梁孝王武得賜天子旌旗從千乘萬騎出稱警入言䟆江都易王非以軍功賜天子旌旗祭酒吳王濞賜號為劉氏祭酒宣帝以蘓武著節老臣號為祭酒外繇卜式持錢二千萬與河内太守㠯給徙民上廼賜式外繇四百人安車駟馬薛廣徳為御史大夫乞骸骨安車駟馬黄金六十斤罷杜延年為御史大夫乞骸骨賜安車駟馬永始中左將軍史丹乞骸骨賜安車駟馬歸第大司空彭宣乞骸骨王莽恨宣求退故不賜安車駟馬武庫兵毋將隆曰漢家邊吏職在距㓂亦賜武庫兵皆任其事然後䝉之車屏官屬宣帝㠯賢良髙第揚州刺史黄霸為潁川太守賜車蓋特髙一丈别駕主簿車緹油屏泥於軾前金常賜也今但舉其畧賜張良金百鎰本傳服䖍曰二十四曰鎰師古曰秦以鎰名金若漢之論斤也賜將軍四斤金恵紀晉灼曰凢言黄金真金也不言黄謂錢也食貨志黄金一斤直錢萬師古曰諸賜言黄金者皆與之金不言黄者一金與萬錢也宣帝時郡國有理効輒增秩賜金常賜養牛上尊酒甲第奴婢錢繒帛東園秘器冢地致仕萬石君奮㠯上大夫禄歸老於家㠯嵗時為朝臣周仁病免㠯二千石禄歸老張歐以上大夫禄歸老於家韋賢七十餘為相地節三年㠯老病乞骸骨賜黄金百斤罷歸賜第一區丞相致仕自賢始薛廣徳為御史大夫乞骸骨賜安車駟馬黄金六十斤罷杜延年為御史大夫乞骸骨天子優之使光禄大夫持節賜延年黄金百斤牛酒加致醫藥延年遂稱病篤賜安車駟馬罷就第疏廣疏受父子並為師傅俱上疏乞骸骨上㠯其年皆老許之加賜黄金二十斤皇太子贈㠯五十斤公卿大夫故人邑子設祖道供張東都門外送者車數百兩孝平元始元年令天下吏比二千石㠯上年老致仕者三分故禄終其身龔勝邴漢俱乞骸骨惟元始二年六月庚寅光禄大夫大中大夫耆艾二人㠯老病罷太皇太后使謁者僕射策詔之曰蓋聞古者有司年至則致事所㠯恭遜而不盡其力也今大夫年至矣朕愍㠯官職之事煩大夫其上子若孫若同産同産子一人大夫其修身守道㠯終髙年賜帛及行道舍宿嵗時羊酒衣衾皆如韓福故事所上子男皆除為郎並本傳圖功臣孝宣甘露三年單于始入朝帝思股肱之羙廼圖畵其人於麒麟閣法其形貎書其官爵姓名唯霍光不名凡十一人蘓武傳大將馬將軍博陸侯姓霍氏衛將軍富平侯張安世車騎將軍龍頟侯韓增後將軍營平侯趙充國丞相髙平侯魏相丞相博陽侯丙吉宗正陽城侯劉徳御史大夫建平侯杜延年少府梁邱賀太子太傅蕭望之典屬國蘓武初趙充國㠯功徳與霍光等列畵未央宫成帝時西𦍑有警上思將帥之臣追羙充國廼召黄門郎楊雄即充國圖畵而頌之趙充國傳孝平元始四年詔書祀百辟卿士有益於民者蜀郡以文翁九江㠯召父應詔書循吏傳西漢會要卷四十二
