body:
  text: 西漢㑹要卷八宋徐天麟撰禮二吉禮封禪孝文十五年用新垣平言既郊見渭陽五帝於是使博士諸生刺六經中作王制謀議巡狩封禪事明年人有上書告平所言皆詐也下吏治誅垣平是後文帝怠於改正服鬼神之事郊祀志武帝初即位尤敬鬼神之祀漢興已六十餘嵗矣天下乂安縉紳之屬皆望天子封禪改正度也而上鄉儒術招賢良趙綰王臧等以文學為公卿欲議古立明堂城南以朝諸侯草巡狩封禪改厯服色事未就竇太后不好儒術使人微伺趙綰等姦利事按綰臧自殺諸所興為皆廢郊祀志元狩元年上幸雍祠五畤獲白麟竒木博謀羣臣終軍對曰宜因昭時令日改定告元苴白茅於江淮發嘉號于營丘以應緝熙使著事者有紀焉終軍傳司馬相如既病免家居茂陵天子曰相如病甚可往從悉取其書若後之矣使所忠往師古曰使者姓名也而相如已死家無遺書問其妻對曰長卿未死時為一卷書曰有使來求書奏之其遺扎書言封禪事所忠奏焉天子異之其辭曰伊上古之初肇自皓穹生民厯選列辟以迄乎秦率邇者踵武聽逖者風聲紛輪威蕤堙滅而不稱者不可勝數也繼昭夏崇號諡略可道者七十有二君罔若淑而不昌疇逆失而能存黃帝之前遐哉邈乎其詳不可得聞已五三六經載籍之傳維見可觀也書曰元首明哉股肱良哉因斯以談君莫盛於堯臣莫賢於后稷后稷創業於唐公劉發迹於西戎文王改制爰周郅隆大行越成而后陵遲衰微千載亡聲豈不善始善終哉然無異端審所由於前謹遺教於後耳故軌迹夷易易遵也湛恩厖洪易豐也憲度著明易則也垂統理順易繼也是以業隆於繦保而崇冠乎二后揆厥所元終都攸卒未有殊尤絶迹可考於今者也然猶躡梁父登太山建顯號施尊名大漢之德㷭涌原泉沕潏曼羡旁魄四塞雲布霧散上暢九垓下泝八埏懷生之類沾濡浸潤協氣橫流武節焱逝邇狹游原迥闊泳末首惡鬱沒暗昧昭晣昆蟲闓懌回首面內然后囿騶虞之珍羣徼麋鹿之怪獸導一莖六穗於庖犧雙觡共抵之獸獲周餘放龜于岐招翠黃乘龍於沼鬼神接靈圉賓於閒館竒物譎詭俶儻窮變欽哉符瑞臻兹猶以為薄不敢道封禪蓋周躍魚隕杭休之以燎微夫斯之為符也以登介丘不亦恧乎進遜之道何其爽與於是大司馬進曰陛下仁育羣生義征不譓諸夏樂貢百蠻執贄德牟往初功無與二休烈液洽符瑞衆變期應紹至不特創見意者太山梁父設壇場望幸蓋號以况榮上帝垂恩儲祉將以慶成陛下嗛讓而弗發也挈三神之歡缺王道之儀羣臣恧焉或謂且天為贊暗示珍符固不可辭若然辭之是泰山靡記而梁甫罔幾也亦各並時而榮咸濟厥世而屈說者尚何稱於後而云七十二君哉夫修德以錫符奉符以行事不為越進也故聖王弗替而修禮地祗謁欵天神勒功中嶽以章至尊舒盛德發號榮受厚福以浸黎民皇皇哉斯事天下之壯觀王者之卒業不可貶也願陛下全之而后因雜縉紳先生之略術使獲曜日月之末光絶炎以展采錯事猶兼正列其義祓飾厥文作春秋一藝將襲舊六為七攄之無窮俾萬世得激清流揚微波蜚英聲騰茂實前聖之所以永保鴻名而常為稱首者用此宜命掌故悉奏其儀而覽焉於是天子沛然改容曰俞乎朕其試哉乃遷思回慮總公卿之議詢封禪之事詩大澤之博廣符瑞之富遂作頌曰自我天覆雲之油油甘露時雨厥壤可游滋液滲漉何生不育嘉穀六穗我穡曷蓄匪唯雨之又潤澤之匪唯偏我汜布護之萬物熙煕懷而慕之名山顯位望君之來君兮君兮侯不邁哉􅶤􅶤之獸樂我君圃白質黑章其儀可喜旻旻穆穆君子之態蓋聞其聲今視其來厥塗靡從天瑞之徵兹爾於舜虞氏以興濯濯之麟游彼靈畤孟冬十月君徂郊祀馳我君輿帝用享祉三代之前蓋未嘗有宛宛黃龍興德而升采色𤣥耀煥炳輝煌正陽顯見覺寤黎蒸於傳載之云受命所乘厥之有章不必諄諄依類託寓諭以封巒披藝觀之天人之際已交上下相發允答聖王之事兢兢翼翼故曰於興必慮衰安必思危是以湯武至尊嚴不失肅祗舜在假典顧省厥遺此之謂也相如既卒五嵗上始祭后土八年而遂禮中嶽封於太山至梁父禪肅然司馬相如傳是時李少君以祠竈卻老方見上言祠竈皆可致物而丹砂可化為黃金黃金成以為飲食器則益夀益夀則海中蓬萊仙者可見之以封禪則不死黃帝是也於是天子始親祠竈後二年郊雍獲一角獸若麃然有司曰陛下肅祗郊祀上帝報享錫一角獸蓋麟云於是以薦五畤畤加一牛以燎賜諸侯白金以風符應合乎天也於是濟北王以為天子且封禪上書獻泰山及其旁邑天子以它縣償之常山王有罪天子封其弟貞定以續先王祀而以常山為郡然後五嶽皆在天子之郡郊祀志元鼎四年上始巡幸郡縣寖尋於泰山矣其夏六月上得寶鼎公孫卿有札書曰黃帝得寶鼎冕候問於鬼臾區鬼臾區對曰黃帝得寶鼎神策是嵗己酉朔旦冬至得天之紀終而復始於是黃帝迎日推策後率二十嵗復朔旦冬至凡二十推三百八十年黃帝仙登于天卿因所忠欲奏之所忠視其書不經疑其妄言謝曰寶鼎事已決矣尚何以為卿因嬖人奏之上大說乃召問卿對曰受此書申公申公已死上曰申公何人也卿曰齊人與安期生通受黃帝言無書獨有此鼎書曰漢興復當黃帝之時曰漢之聖者在之髙祖孫且曾孫也寶鼎出而與神通封禪封禪七十二王唯黃帝得上泰山封申公曰漢帝亦當上封禪封禪則能仙登天矣黃帝萬諸侯而神靈之封君七千天下名山八而三在變夷五在中國中國華山首山太室山泰山東萊山此五山黃帝之所常游與神㑹黃帝且戰且學仙患百姓非其道乃斷斬非鬼神者百餘嵗然後得與神通黃帝郊雍上帝宿三月鬼臾區號大鴻死葬雍故鴻冢是也其後黃帝接萬靈明庭明庭者甘泉也所謂寒門者谷口也黃帝采首山銅鑄鼎於荆山下鼎既成有龍垂胡䫇下迎黃帝黃帝上騎羣臣後宮從上龍七十餘人龍乃上去餘小臣不得上乃悉持龍䫇龍䫇拔墯墯黃帝之弓百姓仰望黃帝既上天乃抱其弓與龍䫇號故後世因名其處曰鼎湖其弓曰烏號於是天子曰嗟乎誠得如黃帝吾視去妻子如脫屣耳郊祀志帝議欲放古巡守封禪之事諸儒對者五十餘人未能有所定先是司馬相如病死有遺書頌功德言符瑞足以封泰山上竒其書以問兒寬寬對曰陛下躬發聖德統楫羣元宗祀天地薦禮百神精神所鄉徵兆必報天地並應符瑞昭明其封泰山禪梁父昭姓考瑞帝王之盛節也然享薦之義不著於經以為封禪告成合袪於天地神祗祗戒精専以接神明總百官之職各稱事宜而為之節文唯聖王所由制定其當非羣臣之所能列今將舉大事優游數年使羣臣得人自盡終莫能成唯天子建中和之極兼總條貫金聲而玉振之以順成天慶垂萬世之基上然之乃自制儀采儒術以文焉兒寬傳元封元年冬上議曰古者先振兵釋旅然後封禪乃遂北巡朔方勒兵十餘萬騎還祭黃帝冢橋山釋兵凉如上曰吾聞黃帝不死有冢何也或對曰黃帝以仙上天羣臣葬其衣冠既至甘泉為且用事泰山先類祠泰一日得寶鼎上與公卿諸生議封禪封禪用希曠世莫知其儀體而羣儒采封禪尚書周官王制之望祀射牛事齊人丁公年九十餘曰封禪者古不死之名也秦皇帝不得上封陛下必欲上稍上即無風雨遂上封矣上於是乃令諸儒習射牛草封禪儀數年至且行天子既聞公孫卿及方士之言黃帝以封禪皆致怪物與神通欲放黃帝以接神人蓬萊髙世比德於九皇而頗采儒術以文之羣儒既已不能辨明封禪事又拘於詩書古文而不敢騁上為封祠器視羣儒羣儒或曰不與古同徐偃又曰太常諸生行禮不如魯善周霸屬圖封事於是上黜偃霸而盡罷諸儒弗用三月乃東幸緱氏禮登中嶽太室從官在山上聞若有言萬嵗云問上上不言問下下不言乃令祠官加增太室祠禁無伐其山木以山下户凡三百封崈髙為之奉邑獨給祠復無有所與上因東上泰山泰山草木未生乃令人上石立之泰山顛上遂東巡海上行禮祠八神齊人之上疏言神怪竒方者以萬數乃益發船令言海中神山者數千人求蓬萊神人公孫卿持節常先行候名山至東萊言夜見大人長數丈就之則不見見其迹甚大類禽獸云羣臣有言見一老父牽狗言吾欲見巨公已忽不見上既見大迹未信及羣臣又言老父則大以為仙人也宿留海上與方士傳車及間使求神仙人以千數四月還至奉髙上念諸儒及方士言封禪人殊不經難施行天子至梁父禮祠地主至乙卯令侍中儒者皮辨縉紳射牛行事封泰山下東方如郊祠泰一之禮封廣丈二尺髙九尺其下則有玉牒書祕禮畢天子獨與侍中奉車子侯上泰山亦有封其事皆禁明日下隂道丙辰禪泰山下址東北肅然山如祭后土禮天子皆親拜見衣上黃而盡用樂焉江淮間一茅三脊為神籍五色土益雜封縱逺方竒獸飛禽及白雉諸物頗以加祠兕牛象犀之屬不用皆至泰山然後去封禪祠其夜若有光晝有白雲出封中天子從禪還坐明堂羣臣更上夀下詔改元封元年又曰古者天子五載一巡狩用事泰山諸侯有朝宿地其令諸侯各治邸泰山下天子既已封泰山無風雨而方士更言蓬萊諸神若將可得於是上欣然庶幾遇之復東至海上望焉車子侯暴病一日死上乃遂去並海上北至碣石巡自遼西厯北邊至九原五月乃至甘泉周萬八千里云其秋有星孛于東井後十餘日有星孛于三能望氣王朔言復獨見填星出如瓜食頃復入有司皆曰陛下建漢家封禪天其報德星云郊祀志又本紀云春正月行幸緱氏詔曰朕用事華山至于中嶽獲駮麃見夏后啓母石翌日親登嵩高御史乘屬在廟旁吏卒咸聞呼萬嵗者三登禮罔不答其令祠官加增太室祠禁無伐其草木以山下户三百為之奉邑名曰崇髙獨給祠復亡所與行遂東巡海上夏四月癸卯上還登封泰山降坐明堂詔曰朕以眇身承至尊兢兢焉惟德菲薄不明于禮樂故用事八神遭天地况施著見景象㞕然如有聞震于怪物欲止不敢遂登封泰山至於梁父然後升䄠肅然自新嘉與士大夫更始其以十月為元封元年行所巡至博奉髙蛇丘厯城梁父民田租逋賦貸已除加年七十以上孤寡帛人二匹四縣無出今年算賜天下民爵一級女子百户牛酒行自泰山復東巡海上至碣石自遼西歷北邊九原歸于甘泉郊祀志元封五年行南巡狩春三月還至泰山增封紀下同太初元年冬十月行幸泰山十二月䄠髙里按封禪書云祠上帝明堂毋修封禪徐廣曰常五年一修耳今適二年故但祠明堂三年修泰山䄠石閭自元封五年修封至是五年天漢三年行幸泰山修封太始四年行幸泰山修封䄠石閭征和四年上幸泰山修封禪石閭泰山五年一修封武帝凡五修封郊祀志霍去病伐胸奴封狼居胥山禪於故衍登臨翰海本傳封禪議對十九篇武帝時也漢封禪羣祀三十六篇藝文志西漢㑹要卷八
