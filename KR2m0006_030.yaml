body:
  text: 西漢會要卷三十宋徐天麟撰祥異下地震惠帝二年正月地震隴西厭四百餘家厭一甲反下同髙后二年正月武都山崩地震至八月乃止武帝征和二年八月癸亥地震厭殺人宣帝本始四年四月壬寅地震河南以東四十九郡北海琅邪壞祖宗廟城郭殺六千餘人元帝永先三年冬地震並五行志成帝建始三年十二月戊申其夜未央殿中地震本紀河平三年二月犍為地震積二十一日百二十四動綏和二年九月丙辰地震自京師至北邉郡國三十餘壞城廓凡殺四百一十五人並五行志山崩髙后二年正月武都山崩殺七百六十人文帝元年四月齊楚地山二十九所同日俱發大水潰出並五行志成帝建始三年越嶲山崩本紀河平三年二月丙戌犍為柏江山崩損江山崩皆雍江水江水逆流壞城殺十三人元延三年正月丙寅蜀郡岷山崩雍江江水逆流三日乃通並五行志石鳴成帝鴻嘉三年乙亥天水冀南山石鳴聲隆隆如雷有頃止聞平襄二百四十里壄雞皆鳴石長丈三尺廣厚略等旁著岸脅去地二百餘丈民俗名曰石鼓石鼓鳴有兵五行志石立孝昭元鳯三年正月泰山萊蕪山南胸胸有數千人聲民視之有大石自立髙丈五尺大四十八圍入地深八尺三石為足石立處有白烏數千集其旁五行志隕石惠帝三年隕石綿諸一武帝征和四年二月丁酉隕石雍二天晏亡雲聲聞四百里元帝建昭元年正月戊辰隕石梁國六成帝建始四年正月癸卯隕石稿四肥纍一陽朔三年二月壬戌隕石白馬八鴻嘉二年五月癸未隕石杜衍三元延四年三月隕石都關二哀帝建平元年正月丁未隕石北地十其九月甲辰隕石虞二平帝元始二年六月隕石巨鹿二自惠盡平隕石凡十一皆有光耀雷聲成哀尤屢並五行志火災鐵飛附髙后元年五月丙申趙叢臺災惠帝四年十月乙亥未央宫凌室災丙子織室災文帝七年六月癸酉未央宫東闕罘罳災景帝中五年八月己酉未央宫東闕災武帝建元六年六月丁酉遼東髙廟災四月壬子髙園便殿火太初元年十一月乙酉未央宫柏梁臺災昭帝元鳯元年燕城南門災四年五月丁丑孝文廟正殿災宣帝甘露元年四月丙申中山太上皇廟災甲辰孝文廟災元帝初元二年四月己未孝武園白鶴館災永光四年六月甲戌孝宣杜陵園東闕南方災成帝建始元年正月乙丑皇考廟災鴻嘉三年八月乙卯孝景廟北闕災永始元年正月癸丑大官凌室災戊午戾后園南闕災四年四月癸未長樂宫臨華殿及未央宫東司馬門災六月甲午孝文霸陵園東闕南方災哀帝建平三年正月癸卯桂宫鴻寧殿災平帝元始五年七月己亥髙皇帝原廟殿門災盡武帝征和二年春涿郡鐵官鑄鐵鐵銷皆飛上去成帝河平二年正月沛郡鐵官鑄鐵鐵不下隆隆如雷聲又如鼓音二十三人驚走音止還視地地陷數尺爐分為十一爐中銷鐵散如流星皆上去並五行志旱惠帝五年夏大旱江河水少溪谷絶文帝三年秋天下旱後六年春天下大旱景帝中三年秋大旱武帝元光六年夏大旱元朔五年春大旱元狩三年夏大旱天漢元年夏大旱三年夏大旱征和元年夏大旱昭帝始元六年大旱宣帝本始三年夏大旱東西數千里神爵元年秋大旱成帝永始三年四月夏大旱並五行志蝗螟景帝中三年秋蝗武帝元光五年秋螟六年夏蝗元鼎五年秋蝗元封六年秋蝗大初元年夏蝗從東方飛來至燉煌三年秋復蝗征和三年秋蝗四年夏蝗平帝元始二年秋蝗遍天下並五行志人妖哀帝建平中豫章有男子化為女子嫁為人婦生一子建平四年四月山陽方與女子田無嗇生子先未生二月兒啼腹中及生不舉葬之陌上三日人過聞啼聲母掘收養平帝元始元年二月朔方廣牧女子趙春病死斂棺積六日出在棺外自言見夫死父曰二十七不當死六月長安女子有生兒兩頭異頸面相鄉四臂共胸俱前鄉凥上有目長二寸所景帝二年九月膠東下密人年七十餘生角角有毛成帝建始三年十月丁未京師相驚言大水至渭水虒上小女陳特弓年九嵗走入橫城門入未央宫尚方掖門殿門衛户者莫見至句䋸禁中而覺得綏和二年八月庚申鄭通里男子王褒衣絳衣小冠帶劔入北司馬門殿東門上前殿入非常室中解帷組結佩之招前殿署長業等曰天帝令我居此業等收問褒故公車大誰卒病狂易不自知入宫狀下獄死哀帝建平四年正月民驚走持稿或掫一枚傳相付與曰行詔籌道中相過逢多至千數或被髮徒跣或夜折關或踰牆入或乘車騎奔馳以置驛傳行經歷郡國二十六至京師其夏京師郡國民聚會崖巷阡陌設祭張博具歌舞祠西王母又傳書曰母告百姓佩此書者不死不信我言視門樞下當有白髮至秋止鳥獸之妖魚蛙附宣帝黃龍元年未央殿輅軨中雌雞化為雄毛衣變化而不鳴不將無距雞禍元帝初元中丞相府史家雌雞伏子漸化為雄冠距鳴將永光中有獻雄雞生角者景帝三年十一月有白頸烏與黑烏羣鬬楚國吕縣白頸不勝墮泗水中死者數千白黑祥昭帝元鳯元年有烏與鵲鬬燕王宫中池上烏墮池死黑祥昭帝時有鵜鶘或曰秃鶖集昌邑王殿下王使人射殺之青祥成帝河平元年二月庚子泰山山桑有鳶焚其巢巢㸐盡墮地中有三鳶雛燒死黑祥鴻嘉二年三月博士行大射禮有飛雉集于庭歷階登堂而鳴後雉又集太常宗正丞相御史大夫大司馬車騎將軍之府又集未央宫承明殿屋上綏和二年三月天水平襄有燕生爵哺食至大俱飛去景帝中六年梁孝王田北山有獻牛足上出背上昭帝元鳯元年燕王宫永巷中豕出圂壞都竈銜其釜六七枚置殿前昭帝元鳯元年九月燕有黃鼠銜其尾舞王宫端門中往視之鼠舞如故王使吏以酒脯祠鼠舞不休一日一夜死黃祥成帝建始四年九月長安城南有鼠銜黃蒿柏葉上民冢柏及榆木上為巢桐柏尤多巢中無子皆有乾鼠矢數十昭帝時昌邑王賀聞人聲曰熊視而見大熊左右莫見髙后八年三月祓霸上過枳道見物如蒼狗撠髙后掖忽而不見犬禍文帝後五年齊雍城門外有狗生角景帝三年二月邯鄲狗與彘交成帝河平元年長安男子石良劉音相與同居有如人狀在其室中擊之為狗走去後有數人被甲持兵弩至良家良等格擊或死或傷皆狗也自二月至六月乃止鴻嘉中狗與彘交成帝綏和二年二月大廄馬生角在左耳前圍長各二寸哀帝建平二年定襄牡馬生駒三足隨羣飲食惠帝二年正月癸酉旦有兩龍見於蘭陵廷東里溫陵井中至乙亥夜去武帝元鼎五年蛙與蝦蟇羣鬭大始四年七月趙有蛇從郭外入與邑中蛇鬭孝文廟下邑中蛇死蛇孽成帝鴻嘉四年秋雨魚于信都長五寸以下永始元年春北海出大魚長六丈髙一丈四枚哀帝建平二年東萊平度出大魚長八丈髙丈一尺七枚皆死並五行志草木之妖惠帝五年十月桃李華棗實五行志文帝六年冬十月桃李華本紀昭帝時上林苑中大栁斷仆地一朝起立生枝葉有蟲食其葉成文字曰公孫病已立又昌邑王國社有枯木復生枝葉眭孟以為當有故廢之家公孫氏復民間受命為天子者元帝初元四年皇后曽祖父濟南東平陵王伯墓門梓柱辛生枝葉上出屋建昭五年元州刺史浩賞禁民私所自立社山陽槖茅鄉社有大槐吏伐斷之其夜槐復立其故處並五行志成帝建始四年秋桃李實本紀永始元年二月河南街郵樗木生支如人頭眉目鬚皆具亡髮耳哀帝建平二年十月汝南西平遂陽鄉柱仆地生支如人形身青黃色面白頭有髭髮稍長大凡長六寸一分建平三年零陵有木僵地圍丈六尺長十丈七尺民斷其本長九尺餘皆枯三月卒自立故處元帝永光三年天雨草而葉相膠結大如彈平帝元始三年正月天雨草狀如永光時並五行志雜變異景帝三年十二月吳二城門自傾大船自覆宣帝時大司馬霍禹所居第門自壞成帝元延元年正月長安章城門牡自亡函谷關次門牡亦自亡哀帝時大司馬董賢第門自壞哀帝建平二年四月乙亥朔御史大夫朱博為丞相少府趙元為御史大夫臨延登受策有大聲如鐘鳴殿中郎吏陛者皆聞焉並五行志元夀元年九月孝元廟殿門銅龜鋪首鳴紀平帝元始元年二月乙未義陵寢神衣在柙中丙申旦衣在外床上寢令以聞用太牢祠紀占驗漢興承秦滅學之後景武之世董仲舒治公羊春秋始推隂陽為儒者宗宣元之後劉向治榖梁春秋數其禍福傳以洪範與仲舒錯至向子歆治左氏傳其春秋意亦已乖矣言五行傳又頗不同是以攬仲舒别向歆傳載眭孟夏侯勝京房谷永李尋之徒所陳行事訖於王莾舉十二世以傳春秋著于篇文具五行志此不詳載漢興推隂陽言災異者孝武時有董仲舒夏侯始昌昭宣則眭孟夏侯勝元成則京房翼奉劉向谷永哀平則李尋田終術此其納説時君著明者也察其所言仿佛一端假經設誼依託象類或不免乎億則屢中仲舒下吏夏侯囚執眭孟誅戮李尋流放此學者之大戒京房區區不量淺深危言刺譏結怨強臣罪辜不旋踵亦不密以失身悲夫李尋贊金度玉衡漢五星客流出入八篇藝文志下同漢五星彗客行事占驗八卷漢日旁氣行事占驗三卷漢流星行事占驗八卷漢日旁氣行事占驗十三卷漢日食月暈雜變行事占驗十三卷西漢會要卷三十
