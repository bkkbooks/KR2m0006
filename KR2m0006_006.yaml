body:
  text: 西漢會要卷六宋徐天麟撰帝系六公主公主髙紀如淳曰公羊傳曰天子嫁女於諸侯必使諸侯同姓者主之故謂之公主帝姊妹曰長公主諸王女曰翁主師古曰如是説也天子不親主婚故謂之公主諸王即自主婚故其女曰翁主翁者父也太上皇女昭哀后髙帝姊初封宣夫人呂后七年尊曰昭哀后髙祖一女魯元公主宣于侯張敖尚之孝惠時齊悼惠王尊為魯元太后文帝二女館陶長公主竇后生女嫖文帝即位為館陶長公主師古曰年最長故謂長公主堂邑侯陳午尚之見竇后傳公主周勃太子勝之尚之見周勃傳景帝三女平陽公主王皇后長女本陽信長公主也為平陽侯曹夀所尚故稱平陽公主曹夀有惡疾上乃詔衛青尚平陽主見衛青傳南宮公主王皇后次女隆慮公主王皇后少女並見王皇后傳武帝五女鄂邑蓋長公主昭帝姊燕剌王傳云食邑鄂而為蓋侯妻也張晏云蓋侯王信師古曰信不取鄂主為妻當是信子頃侯充耳夷安公主隆慮公主子昭平君尚見東方朔傳衛長公主外戚傳云子夫生三女長主衛大子姊也帝以妻欒大見郊祀志諸邑公主五行志征和二年巫蠱事興帝死女諸邑公主陽石公主皆下獄陽石公主見上又武紀注云二公主皆衛皇后女宣帝二女館陶公主華倢妤女名施于定國子于永尚敬武公主張臨尚臨死元帝令薛宣尚後王莽白太后賜藥死見宣傳元帝三女平都公主傅昭儀女平陽公主衛倢妤女見中山衛朋傳潁邑公主杜業尚王主本紀建始元年張晏曰王主王之女也師古曰王主則翁主也王自主婚故曰王主雜録諸公主家令門尉皆屬宗正百官表主傅東方朔傳昭平君醉殺主傅師古曰傅姆是也中府東方朔傳館陶公主中府師古曰中府掌金帛之藏孝惠二年十月齊悼惠王來朝獻城陽郡以益魯元公主邑尊公主為太后本紀江充出逢館陶長公主行馳道中充呵問之公主曰有太后詔充曰獨公主得行車騎皆不得盡劾沒入官江充傳衛青父鄭季以縣吏給事侯家平陽侯曹夀尚武帝姊陽信長公主季與主家僮衛媪通生青青既尊貴而平陽侯曹夀有惡疾就國長公主問列侯誰賢者左右皆言大將軍主笑曰此出吾家常騎從我奈何左右曰於今尊貴無比於是公主風白皇后皇后言之乃詔青尚平陽公主衛青霍去病傳王吉曰漢家列侯尚公主諸侯則國人承翁主使男事女夫詘於婦逆隂陽之位故多女亂王吉傳夏侯嬰曾孫頗尚平陽公主主隨外家姓號孫公主故滕公子孫更為孫氏夏侯嬰傳博成侯張建坐尚陽邑公主與婢姦主旁數醉罵主免昭宣功臣表和蕃公主髙帝罷平城歸是時冒頓單于兵強控弦四十萬騎數苦北邊上患之以問婁敬敬曰陛下誠能以適長公主妻單于厚奉遺之彼知漢女送厚蠻夷必慕以為閼氏生子必為太子代單于冒頓在固為子壻死外孫為單于豈曽聞外孫敢與大父亢禮哉可毋戰以漸臣也若陛下不能遣長公主而令宗室及後宮詐稱公主彼亦知不肯貴近無益也髙帝曰善遣長公主呂后泣曰妾唯以一太子一女奈何棄之胸奴上竟不能遣長公主而取家人子為公主妻單于使敬往結和親約婁敬傳孝惠三年以宗室女為公主嫁胸奴單于本紀胸奴老上單于初立文帝復遣宗人女翁主為單于閼氏使官者中行説傅翁主胸奴傳孝景五年遣公主嫁胸奴單于本紀孝武元封中烏孫昆莫使使獻馬願得尚漢公主為昆弟天子問羣臣議許曰必先納聘然後遣女烏孫以馬千匹聘漢遣江都王建女細君為公主以妻焉賜乘輿服御物為備官屬宦官侍御數百人贈送甚盛昆莫以為右夫人昆莫年老欲使其孫尚公主公主不聽上書言狀天子報從其國俗岑陬遂妻公主生一女少夫公主死漢復以楚王戊之孫解憂為公主妻岑陬西域傳宣帝元康二年烏孫昆彌上書欲以漢外孫元貴靡為嗣得令復尚漢公主結婚重親畔絶胸奴願聘馬騾各千匹上遣使至烏孫先迎取聘昆彌及太子左右大將軍都尉皆遣使凡三百餘人入漢迎取少主上乃以烏孫主解憂弟子相夫為公主置官屬侍御百餘人舍上林學烏孫言天子自臨平樂觀會胸奴使者外國君長大角抵設樂而遣之未出塞聞烏孫昆彌翁歸靡死天子徵還少主西域傳先是烏孫昆彌歸靡因長羅侯常惠上書願以漢外孫元貴靡為嗣得復尚少主結婚內附畔去胸奴詔下公卿議望之以為烏孫絶域信其美言萬里結婚非長策也天子不聽神爵二年遣長羅侯惠使送公主配元貴靡未出塞翁歸靡死其兄子狂王背約自立惠從塞下上書願留少主燉煌郡惠至烏孫責以負約因立元貴靡還迎少主詔下公卿議望之復以為不可烏孫持兩端亡堅約其效可見前少主在烏孫四十餘年恩愛不親密邊境未以安此己事之驗也今少主以元貴靡不得立而還信無負於四夷此中國之大福也少主不止繇役將興其原起此天子從其議召少主還後烏孫雖分國兩立以元貴靡為大昆彌漢遂不復與結婚蕭望之傳甘露三年楚公主上書言年老土思願得歸骸骨葬漢地天子閔而迎之公主與烏孫男女三人俱來至京師時年且七十賜田宅奴婢奉養甚厚朝見儀比公主西域傳元帝竟寧元年胸奴呼韓邪單于復入朝自言願壻漢氏以自親帝以後宮良家子王嬙字昭君賜單于單于歡喜王昭君號寧胡閼氏生一男呼韓邪死株絫單于復妻王昭君生二女長女為須卜居次小女為當于居次居次者女之號若漢言公主也見胸奴傳內職漢興因秦之稱號妾皆稱夫人又有美人良人八子七子長使少使之號焉至武帝制倢妤娙娥傛華充依各有爵位而元帝加昭儀之號凡十四等云昭儀位視丞相爵比諸侯王倢妤視上卿比列侯娙娥視中二千石比關內侯傛華視真二千石比大上造美人視二千石比少上造八子視千石比中更充依視千石比左更七子視八百石比右庶長良人視八百石比左庶長長使視六百石比五大夫少使視四百石比公乘五官視三百石順常視二百石無涓共和娛靈保林良使夜者皆視百石以上凡十四等上家人子中家人子視有秩斗食並外戚傳諸姬諸姬見髙五王傳又文紀薄姬注如淳曰姬衆妾之總稱漢官儀曰姬妾數百外戚傳亦曰幸姬戚夫人師古曰姬本周之姓貴於衆國之女所以婦人美號皆稱姬焉史記云髙祖居山東時多美姬是也長御戾太子傳長御竒華趙皇后傳宮長李南漢官考云長御即宮長也材人翼奉傳未央建章甘泉材人名以百數官藝文志未央材人師古曰材人天子內待詔掖庭元帝賜單于待詔掖庭王嬙為閼氏應劭曰郡國獻女未御見須命於掖庭故曰待詔中宮史許皇后傳曹立學事史許皇后傳曹宮太子有妃有良娣有孺子凡三等外戚傳太子中人李敢女為太子中人皇孫妻稱夫人史皇孫王夫人皇孫妾無位號皆稱家人子外戚雜録元帝既重傅倢妤及馮倢妤亦幸生中山孝王上欲殊之於後宮以二人皆有子為王上尚在未得稱太后乃更號曰昭儀賜以印綬在倢妤上昭其儀尊之也至成哀時趙昭儀董昭儀皆無子猶稱焉傅昭儀傳傅昭儀及子定陶王愛幸寵於皇后太子匡衡上疏曰臣聞室家之道修則天下之理得故詩始國風禮本冠婚始乎國風原情性而明人倫也本乎冠婚正基兆而防未然也福之興莫不本乎室家之道衰莫不始乎梱內故聖王必謹妃后之際别適長之位禮之於內也卑不隃尊新不先故所以統人情而理隂氣也其尊適而卑庶也適子冠乎阼禮之用醴衆子不得與列所以貴正體而明嫌疑也非虛加其禮文而已乃中心與之殊異故禮探其情而見之外也聖人動靜遊燕所親物得其序則海內自修百姓從化如當親者疏當尊者卑則佞巧之姦因時而動以亂國家故聖人謹防其端禁於未然不以私恩害公義陛下聖德純備莫不修正則天下無為而治詩云于以四方克定厥家傳曰正家而天下定矣匡衡傳孝成趙皇后既立後寵少衰而弟絶幸為昭儀居昭陽舍其中庭彤朱而殿上髤漆切皆銅沓冒黃金塗白玉階壁帶往往為黃金釭函藍田璧明珠翠羽飾之自後宮未常有焉趙后傳建始三年冬日食地震同日俱發詔舉方正直言極諫之士谷永對曰明王即位正五事建大中以承天心則庶徵序於下日月理於上如人君淫溺後宮般樂遊田五事失於躬大中之道不立則咎徵降而六極至凡災異之發各象過失以類告人乃十二月朔日食婺女之分地震蕭牆之內二者同日俱發以丁寧陛下厥咎不逺宜厚求諸身意豈陛下志在閨門內寵太盛女不遵道嫉妬専上妨繼嗣歟古之王者廢五事之中失夫婦之紀妻妾得意謁行於內藝行於外至覆傾國或亂隂陽昔褒姒用國宗周以喪閻妻驕扇日以不臧此其效也夫妻之際王事綱紀安危之機聖王所致謹也昔舜飭正二女以崇至德楚莊忍絶丹姬以成伯功幽王惑於褒姒周德降亡魯威脅於齊女社稷以傾誠修後宮之政明尊卑之序貴者不得嫉妬専寵以絶驕嫚之端抑褒閻之亂賤者咸得秩進各得厥職以廣繼嗣之統息白華之怨後宮親屬饒之以財勿與政事以逺皇父之類損妻黨之權未有閨門治而天下亂者也谷永傳其夏復令方正對策永對曰日食地震皇后貴妾専寵所致陛下誠深察愚臣之言平天覆之施使列妾得人人更進猶尚未足也急復益納宜子婦人毋擇好醜毋避嘗字毋論年齒推法言之陛下得繼嗣於微賤之間乃反為福得繼嗣而已母非有賤也後宮女史使令有直意者廣求於微賤之間以遇天所開右慰釋皇太后之憂慍解謝上帝之譴怒則繼嗣蕃滋災異訖息谷永傳杜欽對策曰日以戊申蝕時加未戊未土也土者中宮之部其夜地震未央宮殿中此必適妾將有爭寵相害而為患者唯陛下深戒之正后妾抑女寵防奢泰去佚遊如此即堯舜不足與比隆咎異何足消滅杜欽傳哀帝召董賢女弟以為昭儀位次皇后更名其舍為椒風以配椒房云董賢傳五官以下葬司馬門外外戚傳出宮人呂太后時出宮人以賜諸王各五人竇皇后傳孝文十二年出孝惠皇帝後宮美人令得嫁本紀後七年遺詔歸夫人以下及少使本紀孝景後三年遺詔出宮人歸其家復終身本紀元帝初即位年嵗不登諫大夫貢禹奏言古者宮女不過九人髙祖考文考景皇帝循古節儉宮女不過十餘後世爭為奢侈轉轉益甚武帝時又多取好女至數千人以填後宫及棄天下昭帝幼弱霍光専事皆以後宮女置於園陵大失禮逆天心昭帝晏駕光復行之至孝宣皇帝時陛下惡有所言羣臣亦隨故事甚可痛也故使天下承化取女皆大過度諸侯妻妾或至數百人豪富吏民蓄歌者至數十人是以內多怨女外多曠夫皆在大臣循故事之罪也唯陛下審察後宮擇其賢者留二十人餘悉歸之及諸園陵女無子者宜悉遣獨杜陵宮數百誠可哀憐也天子納善其忠本傳成帝永始四年出杜陵諸未嘗御者歸家本紀張晏曰宫人無子乃守國陵也哀帝即位掖庭宫人年三十以下出嫁之本紀平帝崩太后詔出媵妾皆歸家得嫁如孝文時故事本紀西漢會要卷六
