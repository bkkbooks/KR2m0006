body:
  text: 西漢㑹要卷三十三宋徐天麟撰職官三三輔京兆尹師古曰京大也兆者衆數言大衆所在內史周官秦因之掌治京師景帝二年分置左內史右內史武帝大初元年更名京兆尹屬官有長安市厨兩令丞又都水鐵官兩長丞左內史更名左馮翊屬官有廩犧令丞尉又左都水鐵官雲壘長安四市四長丞皆屬焉百官表長安游徼獄吏秩百官趙廣漢傳左馮翊張晏曰馮輔也翊佐也見上京兆尹條司東市令貨殖傳左馮翊二百石卒史黃霸入穀補此官右扶風張晏曰扶助也風化也主爵中尉秦官掌列侯景帝中六年更名都尉武帝大初元年更名右扶風治內史右地屬官有掌畜令丞又有都水鐵官廄雍厨四長丞皆屬焉與左馮翊京兆尹是為三輔皆有兩丞列侯更屬大鴻臚元鼎四年更置三輔都尉都尉丞各一人百官表又元帝紀建昭三年分三輔都尉秩皆二千石郡國諸侯王國諸侯王髙帝初置金璽盩綬掌治其國有大𫝊輔王內史治國民中尉掌武職丞相統衆官群卿大夫都官如漢朝景帝中五年令諸侯王不得復治國天子為置吏改丞相曰相省御史大夫廷尉少府宗正博士官大夫謁者郎諸官長丞皆損其員武帝改漢內史為京兆尹由尉為執金吾郎中令為光祿勳故王國如故損其郎中令秩千石改大僕曰僕秩亦千石成帝綏和元年省內史更令相治民如郡太守中尉如郡都尉百官表成帝綏和中何武為御史大夫司空與丞相方進共奏言往者諸侯不斷獄治政內史典獄事相總綱紀輔王中尉備盜賊今王不斷獄與政師古曰與讀曰豫中尉官罷職并內史郡國守相委任所以一統信安百姓也今內史位卑而權重威職相踰不統尊者難以為治臣請相如太守內史如都尉以順尊卑之序平輕重之權制曰可以內史為中尉何武傳景遭七國之難抑損諸侯減黜其官武有衡山淮南之謀左官之律諸侯王表應劭曰人道上右今舍天子而仕諸侯故謂之左官也相掾梁平王襄傳舍人魏勃掃齊舍人門從史爰盎傳內史丞藝文志河間內史丞王定內史掾廣川王傳侍御史太倉公傳齊侍御史成大中大夫史記年表薄昭中大夫太倉公傳齊中大夫病齲齒中郎曹將梁王立傳中郎伍被為淮南中郎侍郎王尊傳衛士長昌邑王傳廄長王尊傳太倉令齊太倉令淳于公宰人龔遂傳昌邑王嘗與騶奴宰人游戲私府長路溫舒遷廣陽私府長師古曰藏錢之府天子曰少府諸侯曰私府中御府長太倉公傳齊中御府長信田叔傳云魯王發中府錢師古曰中府長之財物藏也中謁者東平王傳中謁者信黃門郎師丹傳段猶大官令燕王旦傳食官長梁王襄傳尚食監馮唐傳髙袪永巷長大倉公傳宦者齊王肥傳中傅武紀濟川王明坐射殺其太𫝊中傅廢應劭曰中傅宦者也文三王傳作中尉與紀不同醫工長燕王旦傳大醫大倉公傳侍醫大倉公傳尚方郊祀志欒大注云主藥方少史河間王恕少史留貴侍中霍光傳昌邑王書問侍中君卿常侍楚王聘龔舍為常侍長史梁平王傳曰欲以傷梁長史司馬司空大倉公傳齊淳于司馬北宫司空太子師傅吳王濞傳大將軍吳田祿伯為大將軍將軍齊王襄以魏勃為將軍丁寬為梁孝王將軍關內侯霍光傳姊夫昌邑關內侯左右關都尉大倉公傳齊左右關都尉大與成侯董朝為濟南大與馮解為代大與師古曰主爵祿也冗從枚臯為梁王使與冗從爭師古曰冗職之從王者也內官夫人廣川王傳明正夫人修靡夫人乘華夫人美人淮南王傳令故美人材人得幸者從居材人見上八子髙三王傳以令置八子秩比六百石孺子中山王傳家人子景十三王傳永巷僕射廣川王傳使其大婢為僕射主永巷異姓諸侯王漢亡尺土之階繇一劍之任五載而成帝業書傳所記未嘗有焉故據漢受命譜十八王訖于孝文異姓盡矣表昔髙祖定天下功臣異姓而王者八國張耳吳芮彭越黥布臧荼盧綰與兩韓信贊髙后欲立諸吕為王問王陵陵曰髙皇帝刑白馬而盟曰非劉氏而王者天下共擊之今王吕氏非約也太后不說問左丞相平及絳侯周勃等皆曰髙帝定天下王子弟今太后稱制欲王昆弟諸吕無所不可太后喜罷朝陵責平勃曰始與髙帝唼血而盟諸君不在邪今髙帝崩太后女主欲王吕氏諸君縱欲阿意背約何面目見髙帝於地下乎平曰於面折廷爭臣不如君全社稷安劉氏後君亦不如臣陵無以應之王陵傳西楚霸王項籍都彭城漢五年誅徙韓信為楚王六年廢為侯衡山王吳芮都邾漢五年芮徙長沙臨江王共敖都江陵漢三年八月子尉嗣為王五年十二月漢虜尉九江王英布都六漢二年十二月降漢四年漢立布為淮南王十一年布反誅趙王張耳都襄國漢元年九月耳降漢十月代王歇還王趙二年十月漢滅歇三年十一月漢復立張耳為趙王五年耳薨子敖嗣為王八年敖廢為侯代王趙歇都代漢元年十月徙歇王趙以陳餘為代王號安成君二年十一月屬漢為太原郡五年以太原為國王韓信九月反降胸奴齊王田都都臨菑漢元年四月降楚田榮為齊王十二月項籍擊殺榮立故齊王田假為齊王二年二月田榮弟橫擊殺假立田榮弟廣為齊王三年十一月漢將韓信擊殺廣屬漢為郡四年置齊國王韓信五年徙王楚立濟北王田安都博陽漢九年六月田廣擊殺安屬齊膠東王田市都即墨漢元年五月田榮擊殺市屬齊雍王章邯都廢丘漢二年漢殺邯屬漢為中地隴西北地郡塞王司馬欣都櫟陽漢元年七月降漢為渭南河上郡翟王董醫都髙奴漢元年七月降漢為上郡燕王臧荼都薊漢四年九月反誅後九月盧綰為燕王十一年反降胸奴遼東王韓廣都無終漢元年臧荼擊殺廣屬燕魏王魏豹都平陽漢二年豹降漢為王從漢伐楚四月歸畔漢八月韓信擊虜豹屬漢為河東上黨郡殷王司馬卭都朝歌漢二年二月降屬漢為河內郡韓王韓成都陽翟漢元年六月項籍誅成立鄭昌為韓王十月漢立韓信為韓王六年信徙太原河南王申陽都離陽漢元年九月降屬漢為河南郡長沙王吳芮漢五年二月立六月薨成王臣嗣傳至靖王産無嗣國除魯王張偃髙后元年四月以外孫立八年為侯淮陽王吕彊髙后元年四月立五年薨六年壼關侯武立八年以非孝惠子誅常山王吕不疑髙后元年四月立二年薨襄城侯義立四年立為帝軹侯朝立八年以非惠帝子誅吕王吕台髙后四年以髙后兄子立二年薨子嘉嗣六年嘉廢十一月王吕産立七年徙梁十一月王吕大立八年以非惠帝子誅燕王吕通髙后八年七月立八月誅梁王吕産髙后七年二月立八年誅中大夫淮南王布中大夫賁赫大宰黔布傳隨何使淮南至太宰主之部刺史監御史秦官掌監郡漢省丞相遣史分刺州不常置武帝元封五年初置部刺史掌奉詔條察州師古曰漢官典職儀云刺史班宣周行郡國省察治狀黜陟能否斷治寃獄以六條問事非條所問即不省一條彊宗豪右田宅踰制以彊陵弱以衆暴寡二條二千石不奉詔書遵承典制倍公向私旁招守利侵漁百姓聚斂為姦三條二千石不恤疑獄風厲殺人怒則任刑喜則淫賞煩擾刻暴剝截黎元為百姓所疾山崩石裂託祥進言四條二十石選補不平茍阿所愛蔽賢寵頑五條二千石子弟怙恃榮藝請託所監六條二千石違公下比阿附豪彊通行貨賂割損正令也秩六百石員十三人成帝綏和元年更名牧秩二千石哀帝建平二年復為刺史元夀二年復為牧百官表郡守郡守秦官掌治其郡秩二千石有丞邉郡又有長史掌兵馬秩皆六百石景帝中二年更名太守百官表郡掾别駕黃霸傳别駕主簿車緹油屏泥於軾前主簿朱博傳書佐朱博傳又王尊補書佐注云律太守書佐十人功曹鮑宣為都尉太守功曹朱博為亭長遷為功曹議曹扶風謁請原涉為議曹賊曹掾薛宣傳賊曹掾張扶通典云主刑罰决曹掾薛宣傳决曹掾王立又路溫舒補决曹史漢舊儀云决曹主罪法事賊捕掾張敞傳賊捕掾絮舜師古曰主捕掾五官掾王尊傳五官掾張輔門下掾朱博傳門下掾贑遂門下督蕭章為京兆尹門下督郡掾祭酒鮑宣傳薛方嘗為郡掾祭酒郡文學梅福為郡文學郡文學史鄭崇為郡文學史郡文學卒史史記匡衡補平原文學卒史學經師平紀元始三年立學官郡國立學置經師一人宗師平紀元始五年郡國置宗師舍人髙紀南陽太守舍人史陳遵與張竦俱為京兆史注云律太守都尉史各一人從史陳遵為河南太守遣從史西諸曹史朱博傳右曹掾史朱博傳太守卒史張敞尹翁歸並補太守卒史又儒林傳比百石以下補太守卒史五經百石卒史儒林傳元帝好儒郡國置五經百石卒史直符史王尊傳獄史丙吉為魯獄史獄小史尹翁歸為獄小史小史谷永少為長安小史翟方進給事太守府為小史督郵田延年徙卒史尹翁歸補督郵又孫寶補侯文東部督郵督郵掾馮野王傳督郵掾趙都督郵書掾朱博出為督郵書掾所部職辦都史武紀二千石遣都史如淳曰律說都史今督郵是也間惠曉事即為文無害都史少府文翁減省少府用度師古曰少府郡掌財物之府以供太守者也守屬王尊補守屬給事太守府咸宣以佐史給事河東守張湯給事內守為寧成掾司空陳咸為南陽太守犯法者以律程作司空師古曰司空主作役官都尉秦官掌佐守典武職甲卒秩比二千石有丞秩皆六百石景帝中二年更名都尉百官表關都尉秦官農都尉屬國都尉皆武帝初置百官表受降都尉田廣明傳宜禾都尉地理志燉煌郡護漕都尉朱博徙為并州刺史護漕都尉尉史田廣明傳尉史蘇昌漢律近塞置都百里一人士史尉史各二人京兆華隂京輔都尉治馮翊高陵左輔都尉治扶風郿右輔都尉治大原廣武都尉治東郡東阿都尉治陳留外黃都尉治汝南女隂都尉治南陽鄧都尉治南郡夷陵都尉治九江歷陽都尉治清河貝丘都尉治巨鹿下曲陽都尉治魏魏都尉治涿安平都尉治常山南行唐都尉治勃海髙城都尉治平原樂陵都尉治千乘蓼城都尉治濟南於陵都尉治秦山盧都尉治琅邪姑幕都尉治東海費都尉治山陽單父都尉治沛蘄都尉治臨淮盱眙都尉治丹陽歙都尉治㑹稽錢塘西部都尉治孟康回浦南部都尉治治楊雄賦東南一尉曰㑹稽東郡都尉豫章新淦都尉治漢中褒中都尉治廣漢綿竹都尉治都尉治隂平道北部犍為漢陽都尉治越嶲定都尉治牂牱夜郎都尉治尉治進桑南部都金城孝宣神爵二年置金城屬國以處降羌金趙充國傳充國西至西部都尉府孟康曰在城張掖曰勒都尉治治畨和農都尉居延都尉治天水勇士屬國都尉治滿福源道騎都尉治安定參䜌主騎都尉治三水屬國都尉治隴西臨洮南部都尉冶酒泉㑹水北部都尉治偃陵障又東部都尉治東部障乾齊西部都尉治西部障燉煌燉煌中部都尉治部廣侯官廣至宜禾都尉治昆侖障龍勒有陽關玉門關皆都尉治北地冨平北部都尉治神泉障渾懷都尉治塞外渾懷障上郡胸歸都尉治塞外胸歸障龜兹北部都尉治髙望北部都尉治望松北部都尉治魯山北部都尉治上河農都尉師虎猛西部都尉治曰班况部參皆嘗為古曰上河地名又上河在西河富平於此為農都尉朔方西部都尉治窳渾渠搜中部都尉治廣牧東部都尉治五原東部都尉治稒陽原髙成宜中部都尉治蒲澤屬國都尉治西部都尉治田辟雲中陶林東部都尉治真陵西部都尉治北輿中部都尉治定襄武進西部都尉治武要東部都尉治武臯中部都尉鴈門沃陽西部都尉治平城東部都尉治上谷寧西部都尉治治女祁東部都尉代郡髙栁西部都尉治且如東部都尉治馬城東部都尉治漁陽要陽都尉治右北平薋都尉治遼西栁城東部都尉治交梨東部都尉治