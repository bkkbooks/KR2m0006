body:
  text: 西漢會要卷二十八宋徐天麟撰運厯下天文漢元年十月五星聚東井三年秋大白出西方有光幾中乍北乍南過期乃入辰星出四孟七年月暈圍參畢七重十二年春熒惑守心孝惠二年天開東北廣十餘丈長二十餘丈孝文後二年正月壬寅天欃夕出西南其四月乙巳水木火三合于東井八月天狗下梁壄其十一月戊戌土水合于危其七月火東行行畢陽環畢東北出而西逆行至昴即南乃東行孝景元年正月癸酉金水合于婺女其七月乙丑金木水三合於張其二年七月丙子火與水晨出東方因守斗其十二月水火合於斗是嵗彗星出西南七月天狗下三年填星在婁幾入還居奎四年七月癸未火入東井行隂又以九月己未入輿鬼戊寅出中元年填星當在觜觿參去東井其三年正月丁亥金木合為觜觿其三月丁酉彗星夜見西北色白長丈在觜觿旦去益小十五日不見其五月甲午金木俱在東井戊金去木留守之二十日其六月壬戌蓬星見西南在房南去房可二丈大如二斗器色白癸亥在心東北可長丈所甲子在尾北可六丈丁卯在箕北近漢稍小旦去時大如桃壬申去凡十日中三年十一月庚午夕金火合於虛相去一寸四年四月丙申金木合於東井其五年四月乙巳水火合於參後元年五月壬午火金合於輿鬼之東北不至栁出輿鬼北可五寸孝武建元三年三月有星孛于注張厯太微干紫宫至於天漢三年四月有星孛於天紀至織女六年熒惑守輿鬼元光元年六月客星見于房元光中天星盡搖元鼎五年太白入于天苑元鼎中熒惑守南斗元封中星孛于河戍太初中星孛于招搖孝昭始元中蓬星出西方天市東門行過河鼓入營室中後太白出西方下行一舍復上行二舍而下去後太白出東方入咸池東下入東井後太白入太微西藩第一星北出東藩第一星北東下去後太白入昴後熒惑出東方守太白後流星下燕萬載宫極東去元鳯四年九月客星在紫宫中斗樞極間五年四月燭星見奎婁間元平元年正月庚子日出時有黑雲狀如焱風亂鬊轉出西北東南行轉而西有頃亡二月甲申晨有大星如月有衆星隨而西行乙酉牂雲如狗赤色長尾三枚夾漢西行三月丙戌流星出翼軫東北干太微入紫宫始出小旦入大有光入有頃聲如雷三鳴止孝宣本始元年四月壬戌甲夜辰星與參出西方其二年七月辛亥夕辰星與翼出皆為蚤其後熒惑守房之鉤鈐四年七月甲辰辰星在翼月犯之是日熒惑入輿鬼天質地節元年正月戊午乙夜月食熒惑熒惑在角亢其六月戊戌甲夜客星又居左右角間東南指長可二尺色白其丙寅又有客星見貫索東北南行至七月癸酉夜入天市芒炎東南指其色白黃龍元年三月客星居王梁東北可九尺長丈餘西指出閣道間至紫宫元帝元初元年四月客星大如瓜色青白在南斗第二星東可四尺二年五月客星見昴分居卷舌東可五尺青白色炎長三寸五年四月彗星出西北赤黃色長八尺所後數日長丈餘東北指在參分孝成建始元年九月戊子有流星出文昌色白光燭地長可四丈大一圍動搖如龍蛇形有頃長可五六丈大四圍所詘折委曲貫紫宫西在斗西北子亥間後詘如環北方不合留一刻所四年七月熒惑隃嵗星居其東北半寸所如連李時嵗星在關星西四尺所熒惑初從畢口大星東東北住數日至往疾去遲四年十一月乙卯月食填星星不見時在輿鬼西北八九尺所河平二年十月下旬填星在東井軒轅南專大星尺餘嵗星在其西北尺所熒惑在其西北二尺所皆從西方來填星貫輿鬼先到嵗星次熒惑亦貫輿鬼十一月上旬嵗星熒惑西去填星皆西北逆行陽朔元年七月壬子月犯心星四年閏月庚午飛星大如缶出西南入斗下永始元年二月癸未夜東方有赤色大三四圍長二三丈索索如樹南方有大四五圍下行十餘丈皆不至地滅元延元年四月丁酉日餔時天暒晏殷殷如雷聲有流星頭大如缶長十餘丈皎然赤白色從日下東南去四面或大如盂或如雞子耀耀如雨下至昏止綏和元年正月辛未有流星從東南入北斗長數十丈二刻所息二年春熒惑守心哀帝建平元年正月丁未日出時有著天白氣廣如一匹布長十餘丈西南行歡如雷一刻而止名曰天狗十二月白氣出西南從地上至天出參下貫天厠廣如一匹布長十餘丈十餘日去二年二月彗星出牽牛七十餘日元夀元年十一月嵗星入太微逆行干右執法並天文志權量張倉定章程髙紀如淳曰章厯數之章術也程者權衡丈尺斗斛之平法也一曰備數二曰和聲三曰審度四曰嘉量五曰權衡數者一十百千萬也所以算數事物順性命之理也夫推厯生律制器規圜矩方權重衡平準繩嘉量探頥索隱鈎深致逺莫不用焉度長短者不失毫釐量多少者不失圭撮權輕重者不失黍絫其法在算術職在太史羲和掌之聲者宫商角徴羽也職在大樂太常掌之度者分寸尺丈引也所以度長短也本起黃鐘之長以子榖秬黍中者一黍之廣度之九十分黃鐘之長一為一分十分為寸十寸為尺十尺為丈十丈為引而五度審矣其法用銅髙一寸廣二寸長一丈而分寸尺丈存焉用竹為引髙一分廣六分長十丈其法方矩髙廣之數隂陽之象也分者自三微而成著可分别也寸忖也尺者蒦也丈者張也引者信也夫度者别於分忖於寸蒦於尺張於丈信於引引者信天下也職在內官廷尉掌之量者籥合升斗斛所以量多少也本起於黃鐘之籥用度數審其容以子榖秬黍中者千有二百實其籥以井水準其槩十籥為合十合為升十升為斗十斗為斛而五量嘉矣其法用銅方尺而圜其外旁有庣焉其上為斛其下為斗左耳為升右耳為合籥其狀似爵以縻爵祿上三下二參天兩地圜而函方左一右二隂陽之象也其圜象規其重二鈞備氣物之數合萬有一千五百二十聲中黃鐘始於黃鐘而反覆焉君制器之象也籥者黃鐘律之實也躍微動氣而生物也合者合籥之量也升者登合之量也斗者聚升之量也斛者角斗平多少之量也夫量者躍於籥合於合登於升聚於斗角於斛職在大倉大司農掌之衡權者衡平也權重也衡所以任權而均物平輕重也其道如底以見準之正繩之直左旋見規右折見矩其在天也佐助旋璣斟酌建指以齊七政故曰玉衡論語曰立則見其參於前也在車則見其倚於衡也又曰齊之以禮此衡在前居南方之義也權者銖兩斤鈞石也所以稱物平施知輕重也本起於黃鐘之重一籥容千二百黍重十二銖兩之為兩二十四銖為兩十六兩為斤三十斤為鈞四鈞為石忖為十八易十有八變之象也五權之制以義立之以物鈞之其餘小大之差以輕重為宜圜而環之令之肉倍好者周旋無端終而復始無窮已也銖者物繇忽微始至於成著可殊異也兩者兩黃鐘律之重也二十四銖而成兩者二十四氣之象也斤者明也三百八十四銖易二篇之爻隂陽變動之象也十六兩成斤者四時乘四方之象也鈞者均也陽施其氣隂化其物皆得其成就平均也權與物均重萬一千五百二十銖當萬物之象也四百八十兩者六旬行八節之象也三十斤成鈞者一月之象也石者大也權之大者也始於銖兩於兩明於斤均於鈞終於石物終石大也四鈞為石者四時之象也重百二十斤者十二月之象也終于十二辰而復于子黃鐘之象也千九百二十兩者隂陽之數也三百八十四爻五行之象也四萬六千八十銖者萬一千五百二十物厯四時之象也而嵗功成就五權謹矣權與物鈞而生衡衡運生規規圜生矩矩方生繩繩直生準準正則平衡而鈞權矣是為五則規者所以規圜器械令得其類也矩者所以矩方器械令不失其形也規矩相須隂陽位序圜方乃成準者所以揆平取正也繩者上下端直經緯四通也準繩連體衡權合德百工繇焉以定法式凡律度量衡用銅者名自名也所以同天下齊風俗也銅為物之至精不為燥濕寒暑變其節不為風雨暴露改其形介然有常有似於士君子之行是以用銅也用竹為引者事之宜也並律厯志時令文帝元年詔曰方春和時草木羣生之物皆有以自樂而吾百姓鰥寡孤獨窮困之人或阽於死亡而莫之省憂為民父母將如何其議所以振貸之本紀宣帝時魏相表采易隂陽及月令明堂奏之臣聞易曰天地以順動故日月不過四時不忒聖王以順動故刑罰清而民服天地變化必繇隂陽隂陽之分以日為紀日冬夏至則八風之序立萬物之性成各有常職不得相干東方之神大昊乘震執規司春南方之神炎帝乘離執衡司夏西方之神少昊乘兌執矩司秋北方之神顓帝乘坎執權司冬中央之神黃帝乘坤艮執繩司下土兹五帝所司各有時也東方之卦不可以治西方南方之卦不可以治北方春興兌治則飢秋興震治則華冬興離治則泄夏興坎治則雹明王謹於尊天重於養人故立羲和之官以乘四時節授民事君動靜以道奉順隂陽則日月光明風雨時節寒暑調和三者得敘則災害不生五榖熟絲麻遂屮木茂鳥獸蕃民不夭疾衣食有餘若是則君尊民説上下亡怨政教不違禮遜可興夫風雨不時則傷農桑農桑傷則民飢寒飢寒在身則亡亷恥冦賊姦宄所繇生也臣愚以為隂陽者王事之本羣生之命自古賢聖未有不繇者也天子之義必純取法天地而觀于先聖髙祖所述書天子所服第八曰大謁者臣章受詔長樂宫曰令羣臣議天子所服以安治天下相國臣何御史大夫臣昌謹與將軍臣陵太子太傅臣通等議春夏秋冬天子所服當法天地之數中得人和故自天子王侯有土之君下及兆民能法天地順四時以治國家身亡禍殃年夀永究是奉宗廟安天下之大禮也臣請法之中謁者趙堯舉春李舜舉夏兒湯舉秋貢禹舉冬四人各職一時大謁者襄章奏制曰可孝文皇帝時以二月施恩惠於天下賜孝弟力田及罷軍卒祠死事者頗非時節御史大夫朝錯時為太子家令言其狀臣相伏念陛下恩澤甚厚然而災氣未息竊恐詔令有未合當時者也願陛選明經通知隂陽者四人各主一時時至明言所職以和隂陽天下幸甚相傳元康三年六月詔三輔毋得以春夏擲巢探卵彈射飛鳥具為令紀立春行寃獄使者出張敞傳元帝初元三年詔百官勉之毋犯四時之禁本紀永光三年十一月詔曰乃者己丑地動中冬兩水大霧盜賊並起吏何不以時禁各悉意對本紀師古曰時禁謂月令所當禁斷者也甘延夀陳湯上疏斬郅支頭及名王以下冝縣頭藁街事下有司丞相匡衡御史大夫繁延夀以為月令春掩骼埋胔之時冝勿縣車騎將軍許嘉右將軍王商以為夾谷之會優施笑君孔子誅之方盛夏首足異門而出冝縣十日乃埋之有詔將軍議是陳湯傳建詔五年詔曰方春農桑興百姓戮力自盡之時也故是月勞農勸民無使後時今不良之吏覆案小罪追召證案興不急之事以妨百姓使失一時之作亡終嵗之功公卿其明察申敕之紀成帝陽朔二年春寒詔曰昔在帝堯立羲和之官命以四時之事令不失其序故書云黎民於變時雍明以隂陽之本也今公卿大夫或不信隂陽薄而小之所奏請多違時政傳以不知周行天下而欲望隂陽和調豈不謬哉其務順四時月令紀鴻嘉元年二月詔曰方春生長時臨遣諌大夫理等舉三輔三河𢎞農寃獄紀哀帝即位李尋對曰辰星主四時四時失序則辰星作異令出於嵗首之孟天所以譴告陛下也加以號令不順四時間者春三月治大獄時賊隂立逆恐嵗小收季夏舉兵法時寒氣應恐後有霜雹之災秋月行封爵其月土濕奧恐後有雷雹之變古之王者尊天地重隂陽敬四時嚴月令今朝廷忽於時月之令諸侍中尚書近臣宜皆令通知月令之意設羣下請事若陛下出令有謬於時者當知爭之以順時傳梁王立殺人遣廷尉大鴻臚雜問對曰冬月迫促貪生畏死即詐僵仆陽病僥幸得踰於須臾師古曰冀得踰冬而減死謹以實對時冬月盡其春大赦不治本傳孫寶以春月作詆欺免為庶人本傳王溫舒為河內太守捕郡中豪猾大者至族小者乃死會春溫舒頓足嘆曰令冬月益展一月足吾事矣本傳師古曰立春之後不復行刑故云然張敞收絮舜繫獄是時冬月未盡數日晝夜驗治竟致其死敞使告舜曰五日京兆竟何如冬月已盡延命乎敞傳劉向坐鑄偽黃金得踰冬減死論本傳服虔曰踰冬至春行寬大而減死罪諸葛豐以春夏繫治人在位多言其短上乃制詔御史豐前為司𨽻不順四時専作苛暴其免為庶人傳孫寶以立秋日補侯文東部督郵入見敕曰今日鷹隼始擊當順天氣取姦惡以成嚴霜之誅寶傳冬月治請讞于定國傳冬月傳屬縣囚會論府上嚴延年傳平當為丞相以冬月賜爵關內侯本傳李竒曰以冬月非封侯時故且先賜爵關內侯孔光等請謁者召王嘉詣廷尉詔獄永信少府猛等十人以為今春月寒氣錯謬霖露數降宜示天下以寬和王嘉傳西漢會要卷二十八
