body:
  text: 西漢㑹要卷三十六宋徐天麟撰職官六特進王談位特進領城門兵外戚傳按漢雜事諸侯功德優盛朝廷所敬異者賜位特進位莽三公上秩王商位特進領城門兵置幕府得舉吏如將軍傅喜位特進奉朝請薛宣加寵特進位次師安昌侯給事中視尚書事張禹以列侯朝朔望位特進見禮如丞相置從事史五人並本傳領尚書事霍光霍山以大將軍領尚書事張安世以車騎將軍領尚書事又以衛將軍領尚書事師丹以左將軍領尚書事蕭望之以前將軍領尚書事王鳳大司馬領尚書事鄭寬中以光祿大夫領尚書事張山拊傳孔光光祿勳領尚書事張禹光祿大夫領尚書事霍山奉車都尉領尚書事並本傳周堪光祿大夫領尚書事劉向傳車騎將軍王音內領尚書外典兵馬毋將隆傳史髙以外屬為大司馬車騎將軍領尚書事匡衡傳平尚書事于定國光祿大夫平尚書事張敬中大夫平尚書事領他官桑𢎞羊為治粟都尉領大農食貨志東邪咸陽孔僅為大農丞領鹽鐡事食貨志霍山奉車都尉侍中領三輔胡越騎本傳孔光為帝太傅領宿衛本傳王談王商位特進領城門兵元后傳金涉為侍中騎都尉領三輔胡越騎本傳鍾元為尚書令領廷尉何並傳劉向以故九卿召拜為郎中領護三輔都水本傳息夫躬以左曺光祿大夫使持節領護三輔都水本傳馮參為諫大夫領護左馮翊都水本傳劉向為光祿大夫領校中五經袐書劉歆河平中受詔與父向領校袐書本傳兼官張安世車騎將軍光祿勳又遷右將軍光祿勳宣帝徙度遼將軍未央衛尉范明友為光祿勳宣帝拜蕭望之為前將軍光祿勳趙充國權為後將軍兼水衡都尉征胸奴還為後將軍少府王莽為右將軍衛尉右將軍典屬國常惠馮奉世王尊轉守槐里兼行美陽令事並本傳行官闕則卑者攝為之曰行張湯韓安國並以御史大夫行丞相事平陽侯曺窋行御史大夫事吕后本紀八年劉攽刋誤曰校表及張蒼傳髙后四年窋為御史大夫誅諸吕後免則非行也疑此紀誤太僕臣賀行御史大夫事三王世家行太常事大中大夫劉歆孝平王后傳汾陽侯靳石為太常行太僕事韓延年為太常行大行令事功臣表行大鴻臚事少府樂成太子少𫝊臣安行宗正事少府忠行廷尉事王溫舒為右輔行中尉留侯張良行太子少傅事黃霸廷尉監行丞相長史事蓋寬饒遷諌大夫行郎中户將事王尊守京輔都尉行京兆尹事劉德宗正行京兆尹事翟義南陽都尉行太守事王尊轉守槐里兼行美陽令事本傳守如淳曰諸官初加皆試守一歲延為真食全奉朱雲以六百石秩守御史大夫光祿大夫劉辟疆守長樂衛尉守少府蕭望之蕭育泰山太守入守大鴻臚執金吾任宏守大鴻臚哀紀御史臣光守尚書令三王世家趙廣漢京輔都尉守京兆尹龔勝光祿大夫守右扶風王欣為右輔都尉守右扶風武帝出駐車拜欣為真薛宣入守左馮翊滿歲稱職為真朱博以髙第入守左馮翊滿歲為真並本傳守丞相長史邉通張湯傳守軍正丞胡建守廷史路溫舒張敞守大原大守王尊守京輔都尉並本傳茂陵守令尹公原涉傳華陰守丞嘉朱雲傳假假攝也漢二年拜曺參為假右丞相入屯兵關中本傳假稻田使者燕倉趙充國以假司馬從二師將軍本傳軍候假丞杜勳陳湯傳宿衛漢二年六月漢王還櫟陽令諸侯子在關中者皆集櫟陽為衛髙紀髙帝崩陳平畏讒固請之得宿衛陳平傳髙后二年齊哀王遣弟章入宿衛於漢封朱虛侯四年封章弟興居為東牟侯皆宿衛長安文帝入未央宫有謁者十人列㦸衛端門周勃傳武帝時董仲舒對策曰使諸列侯郡守二千石各擇其吏民之賢者歲貢各二人以給宿衛本傳終軍曰得列宿衛食祿五年本傳王臧上言宿衛纍遷一歲至郎中令本傳張安世輔政宿衛十有三年封為富平侯本傳昭帝時燕王旦上書願歸符璽入宿衛宣帝地節二年詔曰博陸侯宿衛武帝三十餘年陽城侯劉德親親行謹厚以德得官宿衛者二十餘年魏相奏張安世子延壽重厚可以為光祿勳領宿衛臣楊惲與孫㑹宗書曰幸賴先人餘業得備宿衛馮參為黃門郎給事中宿衛十餘年孔光為帝太傅位四輔給事中領宿衛成帝詔曰車騎將軍王音宿衛忠正勤勞王家元后益封孔光詔曰博陸侯光宿衛四世世為傅相光祿勳豐宿衛三世奉車都尉甄邯宿衛勤勞建議定策待詔尚方待詔郊祀志待詔金馬門公孫𢎞劉向馮商張子喬華龍栁宫待詔公車東方朔朱買臣谷永待詔承明之庭揚雄待詔殿中韓生以易召待詔殿中待詔五柞宮執金吾廣意待詔丞相府劉德待詔官者廬東方朔蘇武劉向翼奉待詔黃門李尋梁邱賀武帝詔求能為韓詩者召蔡義待詔伍宏以醫待詔吾邱壽王以善格五待詔宣帝詔見王褒以為待詔何武傳魏相奏言知音善鼓雅琴者趙定龔德皆召見待詔本草待詔郊祀志成帝時言祭祀方術者皆得待詔郊祀志上計孝武元封五年三月至泰山增封因朝諸侯王列侯受郡國計本紀師古曰若今之諸州計帳也太初元年春受計於甘泉紀下同天漢三年三月行幸泰山修封祀明堂因受計太始四年三月行幸泰山因受計孝宣黃龍元年詔曰上計簿具文而已務為欺謾以避其課御史察計簿非實者按之使真僞毋相亂本紀臣天麟謹按通典云漢制郡守歲盡遣上計掾史各一人條上郡內衆事謂之計簿嚴助願奉三年計最本傳如淳曰舊法當使丞奉計今助自願入奉也京房為魏郡太守自請歲竟乘傳奏事天子許焉傳張蒼為計相一月更以列侯為主計四歲蕭何為相國令蒼以列侯居相府領郡國上計者本傳司𨽻校尉奏丞相衡位三公領計簿而顓地盜上本傳郝賢坐為上谷太守入弋財物計謾免表西漢㑹要卷三十六
