body:
  text: 西漢㑹要卷七宋徐天麟撰禮一吉禮禮秦兼天下燔詩書殺術士六學從此缺矣陳涉之王也魯諸儒持孔氏禮器往歸之於是孔甲為涉博士卒與俱死陳涉起匹夫敺適戍以立號不滿嵗而滅亡其事至微淺然而搢紳先生負禮器往委質為臣者何也以秦禁其業積怨而發憤於陳王也及髙皇帝誅項籍引兵圍魯魯中諸儒尚講誦習禮弦歌之音不絶豈非聖人遺化好學之國哉於是諸儒始得修其經學講大射鄉飲之禮儒林序漢王已并天下諸侯共尊為皇帝於定陶叔孫通就其儀號髙帝悉去秦儀法為簡易羣臣飲醉或争功妄呼按劒擊柱上患之通知上益厭之說上曰夫儒者難與進取可與守成臣願召魯諸生與臣弟子共起朝儀髙帝曰得無難乎通曰五帝異樂三王不同禮禮者因時世人情為之節文者也故夏殷周禮所因損益可知者謂不相復也臣願頗采古禮與秦儀雜就之上曰可試為之令易知度吾所能行為之於是通使召魯諸生三十餘人魯有兩生不肯行曰今天下初定死者未葬傷者未起又欲起禮樂禮樂所由起百年積徳而後可興也吾不忍為公所為公所為不合古吾不行公往矣毋汚我通笑曰若真鄙儒不知時變遂與所召三十人西及上左右為學者與其弟子百餘人為緜蕞野外如淳曰謂以茅剪植地為纂位尊也卑之次習之月餘通曰上可試觀上使行禮曰吾能為此迺令羣臣習肄㑹十月漢七年長樂宫成諸侯羣臣朝十月儀先平明謁者治禮引以次入殿門廷中陳車騎戍卒衛官設兵張旗志志與幟同傳曰趨殿下郎中俠陛陛數百人功臣列侯諸將軍軍吏以次陳西方東郷文官丞相以下陳東方西郷大行設九賓臚句傳蘇林曰上傳語告下為臚下告上為句也韋昭曰大行掌賓客之禮今之鴻臚也九賓則周禮九儀也謂公侯伯子男孤卿大夫士也於是皇帝輦出房百官執㦸傳警㦸史記作職引諸侯王以下莫不震恐肅敬至禮畢盡伏置法酒師古曰法酒猶言禮酌謂不飲之至醉諸侍坐殿上皆伏抑首以尊卑次起上夀觴九行謁者言罷酒御史執法舉不如儀者輒引去竟朝置酒無敢讙譁失禮者於是髙帝曰吾迺今日知為皇帝之貴也拜通為奉常賜金五百斤九年髙帝徙通為太子太傅孝恵即位迺謂通曰先帝園陵寢廟羣臣莫習徙通為奉常師古曰又重為之也定宗廟儀法及稍定漢諸儀法皆通所論著也叔孫通傳文帝時賈誼以為漢興至今二十餘年宜定制度興禮樂然後諸侯軌道百姓素樸獄訟衰息迺草具其儀天子說焉而大臣絳灌之屬害之故其儀遂寢志又誼傳云誼乃草具其儀奏之文帝謙讓未遑也賈誼言今民賣僮者為之繡衣絲履偏諸縁内之閑中是古天子后服所以廟而不宴者也而庶人得以衣婢妾白縠之表薄紈之裏緁以偏諸美者黼繡是古天子之服今富人大賈嘉㑹召客者以被牆古者以奉一帝一后而節適今庶人屋壁得為帝服倡優下賤得為后飾然而天下不屈者殆未有也且帝之身自衣皁綈而富民牆屋被文繡天子之后以縁其領庶人妾縁其履此臣所謂舛也夫百人作之不能衣一人欲天下無寒胡可得也一人耕之十人聚而食之欲天下亡飢不可得也飢寒切於民之飢膚欲其亡為姦邪不可得也國已屈矣盜賊直須時耳然而獻計者曰毋動為大耳夫俗至大不敬也至亡等也至冒上也進計者猶曰無為可為長太息者此也商君遺禮義棄仁恩并心於進取行之二嵗秦俗日敗故秦人家富子壯則出分家貧子壯則出贅借父耰鉏慮有徳色母取箕箒立而誶語抱哺其子與公併倨婦姑不相說則反脣而相稽其慈子耆利不同禽獸者亡幾耳然并心而赴時猶日蹷六國兼天下功成求得矣終不知反㢘愧之節仁義之厚信并兼之法遂進取之業天下大敗衆掩寡智欺愚勇威怯壯陵衰其亂至矣是以大賢起之威震海内徳從天下曩之為秦者今轉而為漢矣然其遺風餘俗猶尚未改今世以侈靡相競而上亡制度棄禮誼捐㢘恥日甚可謂月異而嵗不同矣逐利不耳慮非顧行也今其甚者殺父兄矣盜者剟寢户之簾搴兩廟之器白晝大都之中剽吏而奪之金矯偽者出幾十萬石粟賦六百餘萬錢乗傳而行郡國此其亡行義之先至者也而大臣特以簿書不報期㑹之間以為大故至於俗流失世壊敗因恬而不知怪慮不動於耳目以為是適然耳夫移風易俗使天下囘心而鄉道類非俗吏之所能為也俗吏之所務在於刀筆筐篋而不知大體陛下又不自憂竊為陛下惜之夫立君臣等上下使父子有禮六親有紀此非天之所為人之所設也夫人之所設不為不立不植則僵不修則壊筦子曰禮義㢘恥是謂四維四維不張國乃滅亡使筦子愚人也則可筦子而稍知治體則是豈可不為寒心哉秦滅四維而不張故君臣乖亂六親殃戮姦人並起萬民離叛凡十五嵗而社稷為虚今四維猶未備也故姦人幾幸而衆心疑惑豈如今定經制令君君臣臣上下有差父子六親各得其宜姦人亡所幾幸而羣臣衆信上不疑惑此業壹定世世常安而後有所持循矣若夫經制不定是猶度江河亡維楫中流而遇風波船必覆矣可為長太息者此也夫禮者禁於將然之前而法者禁於已然之後是故法之所用易見而禮之所為至難知也曰禮云禮云者貴絶惡於未萌而起教於微眇使民日遷善逺辠而不自知也賈誼傳武帝即位進用英雋議立明堂制禮服以興太平㑹竇太后好黄老言不說儒術其事又廢後董仲舒對策言漢得天下以來常欲善治而至今不能善治者失之於當更化而不更化也更化則可以善治而灾害日去福禄日來矣時上方征討四夷不暇留意禮文之事志元朔五年夏六月詔曰蓋聞導民以禮風之以樂今禮壊樂崩朕甚閔焉故詳延天下方聞之士咸薦諸朝其令禮官勸學講義洽聞舉遺興禮以為天下先太常其議予博士弟子崇鄉黨之化以厲賢材焉本紀漢承百王之弊髙祖撥亂反正文景務在養民至于稽古禮文之事猶多闕焉孝武初立卓然罷黜百家表章六經遂疇咨海内舉其俊茂與之立功興大學修郊祀改正朔定厯數協音律作詩樂建封禪禮百神紹周後號令文章煥焉可述後嗣得遵洪業而有三代之風如武帝之雄材大略不改文景之恭儉以濟斯民雖詩書所稱何有加焉武帝賛宣帝時琅邪王吉為諫大夫上疏言欲治之主不世出公卿幸得遭遇其時未有建萬世之長策舉明主於三代之隆者也其務在於簿書㫁獄聴訟而已此非太平之基也今俗吏所以牧民者非有禮義科指可世世通行者也以意穿鑿各取一切是以詐偽萌生刑罰無極質樸日消恩愛寖薄孔子曰安上治民莫善於禮非空言也願與大臣延及儒生述舊禮明王制驅一世之民躋之仁夀之域則俗何以不若成康夀何以不若髙宗上不納其言吉以病去至成帝時犍為郡於水濱得古磬十六枝議者以為譱祥劉向因是說上宜興辟雍設庠序陳禮樂隆雅頌之聲盛揖遜之容以風化天下如此而不治者未之有也或曰不能具禮禮以養人為本如有過差是過而養人也刑罰之過或至死傷今之刑非臯陶之法也而有司請定法削則削筆則筆救時務也至於禮樂則曰不敢是敢於殺人不敢於養人也為其俎豆筦弦之間小不備因是絶而不為是去小不備而就大不備或莫甚焉夫教化之比於刑法刑法輕是舍所重而急所輕也且教化所恃以為治也刑法所以助治也今廢所恃而獨立其所助非所以致太平也自京師有誖逆不順之子孫至於陷大辟受刑戮者不絶繇不習五常之道也夫承千嵗之衰周繼暴秦之餘敝民漸漬惡俗貪饕險詖不閑義理不示以大化而獨敺以刑罰終已不改故曰導之禮樂而民以和睦初叔孫通將制定禮儀見非於齊魯之士然卒為漢儒宗業垂後嗣斯成法也成帝以向言下公卿議㑹向病卒丞相大司空奏請立辟廱案行長安城南營表未作遭成帝崩羣臣引以定諡及王莽為宰衡欲燿衆庶遂興辟廱因以簒位海内畔之世祖受命中興撥亂反正改定京師于土中即位三十年四夷賓服百姓家給政教清明迺營立明堂辟廱顯宗即位躬行其禮宗祀光武皇帝于明堂養三老五更於辟廱威儀既盛美矣然徳化未流洽者禮樂未具羣下無所誦說而庠序尚未設之故也孔子曰辟如為山未成一簣止吾止也今叔孫通所撰禮儀與律令同錄蔵於理官法家又復不傳漢興寢而不著民臣莫有言者又通沒之後河間獻王采禮樂古事稍稍増輯至五百餘篇今學者不能昭見但推士禮以及天子説義又頗謬異故君臣長幼交接之道寖以不章志司徒掾班彪曰漢承亡秦絶學之後祖宗之制因時施宜自𤣥成後學者蕃滋貢禹毁宗廟匡衡改郊兆何武定三公後皆數復故紛紛不定何者禮文缺微古今異制各為一家未易可偏定也韋𤣥成賛西漢㑹要卷七
