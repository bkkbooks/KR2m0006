body:
  text: 西漢㑹要卷五十七宋徐天麟撰兵二教閱武帝太初二年令天下膢五日本紀如淳曰立秋貙膢伏儼曰膢音劉劉殺也師古曰續漢書作貙劉膢劉義名通耳漢儀注云立秋之日斬牲於郊東門外以薦陵廟武官肄兵習戰陣之儀斬牲之禮名曰貙劉兵官皆肄孫吳六十四陣名曰乘之霍光都肄郎羽林霍光傳都郎羽林燕剌王傳師古曰謂大㑹試之九月都試翟方進傳如淳曰太守都尉令長相丞㑹都試課殿最也韓延夀為東郡太守都試騎士治飾兵車畫龍虎朱爵延夀黄袍方領駕四馬傅總建幢棨植羽葆鼔車歌車功曺引車皆駕四馬載棨㦸五騎為伍分左右部軍假司馬千人持幢旁轂歌者先居射室望見延夀車噭咷楚歌延夀坐射室騎吏持㦸夾陛列立騎士從者帶弓鞬羅後令騎士兵車四面營陳被甲鞮鞪居馬上抱弩負籣又使騎士戲車弄馬盗驂及治飾車甲三百萬以上於是蕭望之劾延夀上僭不道坐棄市韓延夀傳繇戍秦用商鞅之法月為更卒已復為正一歲屯戍一歲力役三十倍於古漢興循而未改食貨志又昭紀如淳注云天下人皆直戍邊三日亦名為更律所謂繇戍也雖丞相子亦在戍邊之調不可人人自行三日戍又行者當自戍三日不可往便還因便住一歲一更諸不行者出錢三百入官官以給戍者是為過更也漢初因秦法而行之後遂改易有謫乃戍邊一歲耳髙后五年初令戍卒歲更本紀逺方之卒守塞一歲而更晁錯傳文帝減外繇賈山傳十三年除戍卒令史記大事記景帝後二年省繇賊本紀武帝賜卜式外繇四百人卜式傳蘇林曰外繇謂戍邊也一人出三百錢謂之過更式歲省十二萬錢也一說在繇役之外得復除四百人也師古曰一說是也元狩三年減隴西北地上郡戍卒半本紀天漢元年發謫戍屯五原本紀昭帝元平元年減外繇本紀宣帝五鳳四年以邊塞亡寇減戍卒什二本紀淮南之地縣屬於漢其吏民往來長安者自悉而補中道衣敝錢用諸費稱此賈誼傳蓋寛饒身為司𨽻子弟常步行戍邊本傳調發羽檄虎符髙祖曰吾以羽檄召天下兵本紀師古曰檄者以木簡為書長尺二寸用呼召也其有急事則加以鳥羽挿之示疾速也文帝二年初與郡國守相為銅虎符史記本紀漢書無國相二字齊王欲發兵誅諸呂魏勃曰王欲發兵非有漢虎符驗也御史中丞劾馮野王持虎符出界歸家遂免傳淮南王盗舄虎符賈捐之傳武帝建元三年東甌告急上曰吾新即位不欲出虎符召兵郡國乃遣嚴助以節發㑹稽兵㑹稽守欲距法不為發助乃斬一司馬諭指意遂發兵嚴助傳戾太子以節發兵武紀征和二年七國敗弓髙侯誥膠西王卭曰未有詔虎符擅發兵王其自圖之卭遂自殺吳王濞傳公孫戎奴為上黨太守發兵不以聞免功臣表段㑹宗為西域都䕶以擅發戊己校尉之兵乏興有詔贖論本傳黎扶為東海太守坐擅發卒為衞當斬功臣表選募勇敢伉健犇命募士武帝天漢四年發勇敢士出朔方紀趙王彭祖願從國中勇敢擊匈奴景十三王傳李陵將勇敢五千人教射酒泉張掖以備胡本傳昭帝始元元年募吏民及發犍為蜀郡犇命擊益州本紀注云常兵不足故權選取精勇聞命犇走故謂之犇命灌夫伐吳王募軍中壯士所善願從者數十人灌夫傳宣帝本始二年選郡國吏三百石伉健習射者皆從軍本紀神爵元年發應募詣金城本紀趙充國願罷騎兵留㢮刑應募本紀元帝永光二年發募士萬人擊西羌平帝元始二年募汝南南陽勇敢吏士三百人諭說江湖賊本紀發謫徒七科謫亡命惡少年㢮刑髙帝十一年征英布赦天下死罪令從軍本紀惠帝三年發諸侯王徒𨽻二萬人城長安本紀武帝元狩三年發謫吏穿昆明池本紀師古曰吏有罪者罰而役之元鼎五年呂嘉反遣路博德皆將罪人馳義越侯遣别將巴蜀罪人咸㑹畨禺本紀元封二年四月募天下死罪擊朝鮮六月遣楊僕荀彘將應募罪人擊朝鮮本紀六年赦京師亡命令從軍本紀太初元年以李廣利為貳師將軍發郡國惡少年數萬人期至貳師取善馬李廣利傳太初元年發天下謫民西征大宛本紀天漢元年發謫戍屯五原本紀四年發天下七科謫出朔方本紀張晏曰吏有罪一亡命二贅壻三賈人四故有市籍五父母有市籍六大父母有市籍七凡七科也昭帝元鳳元年武都氐人反發三輔太常徒皆免刑擊之本紀五年發三輔及郡國惡少年吏有告劾亡者屯遼東本紀六年募郡國徒築遼東𤣥菟城本紀宣帝神爵元年發三輔中都官徒㢮刑詣金城本紀行伍部校什伍俱前晁錯傳師古曰五人為伍二伍為什李廣擊胡行無部曲行陣本傳注引續漢書百官志云將軍領軍皆有部曲大將軍營五部校一人部下有曲曲有軍侯一人馮唐曰士卒皆家人子起田中從軍安知尺籍伍符馮唐傳李竒曰尺籍所以書軍令伍符五五相保之符信也韓延夀都試騎士五騎為伍本傳什器平帝紀天下吏舍亡得置什器師古曰軍法五人為五十人為什則共其器物故通謂生生之其為什器亦猶今之從軍作役者十人為火共蓄調度也傳校衞青傳傳校獲王師古曰校者營壘之稱故謂軍之一部為一校益置揚威白虎合騎之校陳湯傳師古曰一校則别為一部故軍稱校也諸校韓信傳師古曰諸校諸部也猶今言諸營校司馬南粤傳校司馬蘇𢎞部勒行陣陳湯傳王尊坐擅離部曲㑹赦免本傳壁壘中壘校尉掌北軍壘門内百官表文帝勞軍細栁先驅至不得入先驅曰天子且至軍門都尉曰軍中聞將軍之令不聞天子之詔有頃上至又不得入於是上使使持節詔將軍曰吾欲勞軍亞夫乃傳言開壁門周亞夫傳李陵軍居兩山間以大車為營本傳胡建守軍正丞時監軍御史為姦穿北軍壘垣以為賈區建斬之遂上奏曰黄帝李法曰壁壘已定穿窬不繇路是謂姦人姦人者殺臣謹以斬昧死以聞胡建京師兵器蕭何治未央宮立武庫髙紀按三輔黄圖武庫在未央宮蕭何造以藏兵器中尉屬官有武庫令丞少府屬官有若盧考工室令丞百官表注云若盧主藏兵器考工主作器械工官地理志河南南陽濟南泰山潁川河内蜀廣漢等郡皆有工官臣天麟按工官雖在外郡而所作器械實輸京師故武帝邊兵不足乃發武庫工官兵以澹之也武庫精兵所聚故以丞相子為令魏相傳武帝征伐邊兵不足迺發武庫工官兵以澹之食貨志戾太子矯制發武庫兵劉屈氂傳成帝發武庫兵前後十輩送董賢及乳母王阿舍毋將隆奏言武庫兵器天下公用國家武備繕治造作皆度大司農錢漢家邊吏職在距寇亦賜武庫兵皆任其事然後䝉之臣請收還武庫毋將隆傳羽林孤兒教以五兵師古曰五兵謂弓矢殳矛戈㦸也郡國兵器髙帝八年令賈人毋得操兵乘騎馬本傳晁錯說文帝募民徙塞下曰以便為之髙城深塹具藺石布渠答晁錯傳如淳曰藺石城上雷石也蘇林曰渠答鐡蒺䔧也武帝征伐邊兵不足乃發武庫工官兵以澹之食貨志武帝時公孫𢎞奏言民不得挾弓弩吾丘夀王對不便上以難𢎞𢎞詘服焉吾丘夀王傳昭帝始元五年罷天下馬弩闗本紀注云漢法弩十石以上不得出闗江都王建聞淮南衡山陰謀恐一日發為所并遂作兵器鑄將軍都尉印遣人通越江都易王傳膠東康王聞淮南王謀反私作兵車鏃矢戰守之備景十三王傳成帝陽朔三年潁川鐵官徒申屠聖等殺長吏盗庫兵本紀鴻嘉三年廣漢男子鄭躬等攻官寺簒囚徒盗庫兵本紀永始三年山陽鐵官徒蘇令等反盗庫兵本紀燕王旦反詐言受武帝詔得領庫兵飭武備武五子傳平帝元始三年陽陵任横等盗庫兵攻官寺本紀上郡庫令成帝紀建始元年注云比邊郡庫官之兵器所藏故置令南郡發弩官主教放弩地理志雜錄文帝時晁錯言兵事曰臣聞用兵臨戰合刃之急者三一曰得地形二曰卒服習三曰器用利兵法曰丈五之溝漸車之水山林積石經川丘阜屮木所在此步兵之地也車騎二不當一土山丘陵曼衍相屬平原廣野此車騎之地步兵十不當一平陵相逺川谷居間仰髙臨下此弓弩之地也短兵百不當一兩陳相近平地淺屮可前可後此長㦸之地也劒楯三不當一萑葦竹蕭屮木䝉蘢支葉茂接此矛鋋之地也長㦸二不當一曲道相伏險阸相薄此劒楯之地也弓弩三不當一士不選練卒不服習起居不精動靜不集趍利弗及避難不畢前擊後解與金鼓之音相失此不習勒卒之過也百不當十兵不完利與空手同甲不堅密與袒裼同弩不可以及逺與短兵同射不能中與亡矢同中不能入與亡鏃同此將不省兵之禍也五不當一故兵法曰器械不利以其卒予敵也卒不可用以其將予敵也將不知兵以其主予敵也君不擇將以其國予敵也四者兵之至要也臣又聞小大異形彊弱異勢險易異備夫卑身以事彊小國之形也合小以攻大敵國之形也以蠻夷攻蠻夷中國之形也今匈奴地形技藝與中國異上下山阪出入溪澗中國之馬弗與也險道傾仄且馳且射中國之騎弗與也風雨罷勞飢渇不困中國之人弗與也此匈奴之長技也若夫平原易地輕車突騎則匈奴之衆易撓亂也勁弩長㦸射疏及逺則匈奴之弓弗能格也堅甲利刃長短相雜遊弩往來什伍俱前則匈奴之兵弗能當也材官騶發矢道同的則匈奴之革笥木薦弗能支也下馬地鬬劒㦸相接去就相薄則匈奴之足弗能給也此中國之長技也以此觀之匈奴之長技三中國之長技五陛下又興數十萬之衆以誅數萬之匈奴衆寡之計以一擊十之術也雖然兵凶器戰危事也以大為小以彊為弱在俛仰之間耳夫以人之死爭勝跌而不振則悔之亡及也帝王之道出於萬全今降胡義渠蠻夷之屬來歸誼者其衆數千飲食長技與匈奴同可賜之堅甲絮衣勁弓利矢益以邊郡之良騎令明將能知其習俗和輯其心者以陛下之明約將之即有險阻以此當之平地通道則以輕車材官制之兩軍相為表裏各用其長技衡加之以衆此萬全之術也晁錯傳藺石晁錯傳具藺石如淳曰城上雷石也渠答晁錯傳布渠答蘇林曰渠答鐵蒺䔧也遊弩晁錯傳遊弩往來大黄李廣傳以大黄射其裨將服䖍曰黄肩弩也連李陵傳發連弩射單于刁斗李廣傳孟康曰以銅作鐎受一斗畫炊飰夜擊持行名曰刁斗壘石李陵傳師古曰壘音盧對反西漢㑹要卷五十七
