body:
  text: 西漢會要卷三十九宋徐天麟撰職官九奉使矯制下元帝建昭三年使西域都護騎都尉甘延壽副校尉陳湯共誅斬胸奴郅支單于於康居始郅支單于困辱使者上書驕嫚湯為人沈勇有太慮多策謀喜奇功每過城邑山川常登望既領外國與延壽謀曰邊方畏服大種其天性也西域本屬胸奴今郅支單于威名逺聞侵陵烏孫大宛常為康居畫計欲降服之如得此二國北擊伊列西取安息南排月氐山離烏弋數年之間城郭諸國危矣且其人剽悍好戰伐數取勝久蓄之必為西域患郅支單于雖所在絶逺蠻夷無金城強弩之守如發屯田吏士驅從烏孫衆兵直指其城下彼亡則無所之守則不足自保千載之功可一朝而定也延壽亦以為然欲奏請之陳湯曰國家與公卿議大策非凡所見事必不從延壽猶與不聽會其久病湯獨矯制發城郭諸國兵車師戊巳校尉屯田吏士延壽聞之驚起欲止焉湯怒按劍叱延壽曰大衆已集會豎子欲阻衆邪延壽遂從之部勒行陳益置揚威白虎合騎之校漢兵胡兵合四萬餘人延壽湯上疏自劾奏矯制陳言兵狀遂斬單于首既至論功石顯匡衡以為延夀湯擅興師矯制幸得不誅如復加爵土則後奉使者爭欲乘危僥幸生事於蠻夷為國招難漸不可開元帝內嘉延壽湯功而重違衡顯之議議久不決故宗正劉向上疏曰郅至單于囚殺使者吏士以百數事暴揚外國傷威毁重羣臣皆閔焉陛下赫然欲誅之意未嘗有忘西域都護延壽校尉副湯承聖指倚神靈總百蠻之君攬城郭之兵出百死入絶域遂蹈康居屠五重城搴歙侯之旗斬郅支之首垂旌萬里之外揚威昆山之西掃谷吉之耻立昭明之功萬國懾伏莫不懼震呼韓邪單于見郅支已誅且喜且懼鄉風馳義稽首來賔願守北藩纍世稱臣立千載之功建萬世之安羣臣之勳莫大焉昔周大夫方叔吉甫為宣王誅獫狁而百蠻從其詩曰嘽嘽焞焞如霆如雷顯允方叔征伐獫狁蠻荆來威易曰有嘉折首獲匪其醜言美誅首惡之人而諸不順者皆來從也今延壽湯所誅震雖易之折首詩之雷霆不能及也論大功者不録小過舉大美者不疵細瑕司馬法曰軍賞不踰月欲民速得為善之利也蓋急武功重用人也吉甫之歸周厚賜之其詩曰吉甫宴喜既多受祉來歸自鎬我行永久千里之鎬猶以為逺况萬里之外其勤至矣延壽湯既未獲受祉之報反屈捐命之功久挫於刀筆之前非所以勸有功勵戎士也昔齊桓前有尊周之功後有滅項之罪君子以功覆過而為之諱行事二師將軍李廣利捐五萬之師縻億萬之費經四年之勞而僅獲駿馬三十匹雖斬宛王母鼓之首猶不足以復費其私罪惡甚多孝武以為萬里征伐不録其過遂封拜兩侯三卿二千石百有餘人今康居國強於大宛郅支之號重於宛王殺使者罪甚於留馬而延壽湯不煩漢士不費什糧比於二師功德百之且常惠隨欲擊之烏孫鄭吉迎自來之日逐猶皆裂土受爵故言威武勤勞則大於方叔吉甫列功覆過則優於齊威二師近事之功則髙於安逺長羅而大功未著小惡數布臣竊痛之宜以時解縣通籍除過勿治尊寵爵位以勸有功於是天子下詔曰胸奴郅支單于背畔禮義留殺漢使者吏士甚逆道理朕豈忘之哉所以優遊而不征者重動師衆勞將率故隱忍而未有云也今延壽湯睹便宜乘時利結城郭諸國擅興師矯制而征之賴天地宗廟之靈誅討郅支單于斬獲其首及閼氏貴人名王以下千數雖踰義干法內不煩一夫之役不開府庫之藏因敵之糧以贍軍用立功萬里之外威震百蠻名顯四海為國除殘兵革之原息邊竟得以安然猶不免死亡之患罪當於在奉憲朕甚閔之其赦延壽湯罪勿治詔公卿議焉議者以為宜如軍法捕斬單于令匡衡石顯以為郅支本亡逃失國竊號絶域非真單于元帝取安逺侯鄭吉故事封千户衡顯復爭乃封延夀為義成侯賜湯爵關內侯食邑各三百户加賜黃金百斤告上帝宗廟大赦天下拜延壽為長水校尉湯為射聲校尉陳湯傳矯節偽節附周勃欲入北軍襄平侯紀通尚符節乃令持節矯內勃北軍吕后紀少帝令謁者持節勞劉章章欲奪節謁者不肯章乃與載因節信馳斬長樂衛尉吕更始還入北軍同上汲黯以便宜持節發河內倉粟以賑貧民請歸節伏矯制罪上賢而釋之本傳戾太子使舍人無且持節夜入未央宫戾太子傳征和三年衛太子擅發兵盧賀坐受太子節掠死功臣表太子召監北軍使者任安發北軍兵安受節已閉軍門不肯應太子太子敗安坐受太子節懷二心要斬劉屈氂傳考課公卿課羣吏宣帝始親政事自丞相以下各奉職奏事以傳奏其言考試功能侍中尚書功勞當遷及有異善厚加賞賜本紀丙吉曰歲竟丞相課其殿最奏行賞罰丙吉傳地節四年詔令郡國歲上繫囚以掠笞若瘦死者所坐名縣爵里丞相御史課殿最以聞本紀黃龍元年詔曰上計簿具文而已務為欺謾以避其課三公不以為意朕將何任御史察計簿疑非實者按之使真偽毋相亂本紀孝元使尚書選第中二千石而大鴻臚馮野玉行能第一本紀陳成為御史中丞總領州郡奏事課第諸刺史本傳班上况為河農都尉大司農奏課連最敘傳谷永薦薛宣疏曰宣考績功課簡在兩府不敢過稱薛宣傳光祿第郎從官孝元永光元年詔丞相御史舉質朴淳厚謙遜有行者光祿歲以此科第郎從官本紀光祿勳舉何武四行本傳博士選三科成帝時博士選三科髙第為尚書次為刺史其不通政事以久次補諸侯大傅孔光傳孔光以髙第為尚書同上州郡課河南守吳公治平為天下第一召入為廷尉賈傳兒寬為左內史有軍發臣負租課殿當免民恐失之輸租不絶課更以最本傳刺史以六條問事百官公卿表故事選郡國守相髙第為中二千石朱博傳宣帝厲精為治二千石有治理效輒以璽書勉厲公卿闕則選諸所表以次用之循吏傳宣帝以賢良髙第揚州刺史黃霸為潁川太守秩比二千石居官户口嵗增治為天下第一召守京兆尹秩二千石坐發民治馳道不先以聞又發騎士詣北軍馬不適士效乏軍興連貶秩有詔歸潁川太守官以八百石居郡中愈治下詔稱揚賜爵關內侯黃金百斤秩中二千石黃霸傳朱邑北海太守以治行第一入為大司農朱邑傳尹翁歸為扶風盜賊課常為三輔最尹翁歸傳韓延夀為東郡太守斷獄大減為天下最韓延夀傳河南太守召信臣治行常為第一荆州刺史奏信臣為百姓興利賜黃金四十斤召信臣傳何武為清河太守坐郡中被災害什四免何武傳天水太守陳立勸民耕農為下最陳萬年廣陵太守髙第入為右扶風陳萬年傳鄭昌遷淮陽相以髙第入為右扶風鄭𢎞傳郡縣課秋冬課吏尹翁歸傳卜式為成皋令將漕最拜齊太傅卜式傳義縱補上黨郡中令縣亡逋事舉第一遷為長陵及長安令義縱傳趙廣漢為翟陽令以治行尤異遷京輔都尉趙廣漢傳張敞拜膠東相上名尚書調補縣令者數十人張敞傳尹賞以三輔髙第選守長安令尹賞傳何顯家有市籍租常不入縣數負其課何武傳焦延夀為小黃令臣候司先知姦邪盜賊不得發舉最當先京房傳朱博櫟陽令徙雲陽平陵三縣以髙第入為長安令朱博傳蕭育為茂陵令會課育第六而漆令郭舜殿見責問育為之請扶風怒曰君課第六裁自脫何暇欲為左右言及罷出傳召茂陵令詣後曺當以職事對蕭育傳功次周仁為太子舍人積功遷至大中大夫周仁傳衛綰為郎功次遷中郎將衛綰傳石奮積功勞孝文時官至大中大夫石奮傳趙禹以刀筆吏積勞為御史趙禹傳兒寬為掌故功次補廷尉文學卒史兒寬傳田廣明以郎為天水司馬功次遷河南都尉田廣明傳王欣以郡縣吏積功稍遷被陽令王欣傳馮奉世為郎昭帝時以功次補武安長馮奉世傳馮野王為大子中庶子以功次補武陽長馮野王傳馮逡為美陽令功次遷長樂屯衛司馬馮逡傳馮談以孝亷為郎功次補天水司馬薛恭本郡孝者恭次稍遷平當少為大行治禮丞功次補大鴻臚文學平當傳元帝數召見京房對曰古帝王以功舉賢則萬化成瑞應著末世以毁譽取人故業功廢而致災異宜令百官各試其功災異可息詔使房作其事房奏考功課吏法上令公卿朝臣與房會議溫室皆以房言煩碎令上下相司不可許上意鄉之時部刺史奏事京師上召見諸刺史令房曉以課事刺史復以為不可行惟御史大夫鄭𢎞光祿大夫周堪初言不可後善之上令房上弟子曉知考功課吏事者欲試用之房上中郎任良姚平願以為刺史試考功法臣得通籍殿中為奏事以防雍塞石顯五鹿充宗皆疾房欲逺之建言宜試以房為郡守元帝於是以房為魏郡大守秩八百石居得以考功法治郡房自請願無屬刺史得除用它郡人自第吏千石已下歲竟乘傳奏事天子許焉房自知數以論議為大臣所非內與石顯五鹿充宗有隙不欲逺離左右及為大守憂懼以建昭二年二月朔拜上封事曰辛酉已來蒙氣衰去大陽精明臣獨欣然以為陛下有所定也然少陰倍力而乘消息臣疑陛下雖行此道猶不得如意臣竊悼懼守陽平侯鳯欲見未得至己卯臣拜為大守此言上雖明下猶勝之效也臣出之後恐必為用事所蔽身死而功不成故願歲盡乘傳奏事蒙哀見許乃辛巳蒙氣復乘卦大陽侵色此上大夫覆陽而上意疑也己卯庚辰之間必有欲隔絶臣令不得乘傳奏事者房未發上令陽平侯鳯承制詔房止無乘傳奏事房意愈恐去至新豐因郵上封事房去月餘竟下獄京房傳官稱大府杜周傳師古曰大府丞相御史之府也張湯傳又注云大府丞相府也二説不同二府劉向傳如淳曰府丞相御史也兩府杜周傳如淳曰丞相御史府也四府趙充國傳四府辛武賢小弟湯五府趙充國傳五府復舉辛湯假會宗傳五府舉會宗從官元紀令從官給事官司馬中者師古曰從官親近天子常侍從者皆是也中都官百官表司𨽻校尉侍御從中都官師古曰中都官京師諸官府也中朝劉輔傳孟康曰中朝內朝也大司馬左右前後將軍侍中常侍散騎諸吏為中朝丞相以下至六百石為外朝也外官終軍傳師古曰謂非侍衛之臣左官諸侯王表作左官之律應劭曰又道上古今舍天子而仕諸侯故謂之左官也郡將嚴延年傳延年新將師古曰謂郡守為郡將者以其兼領武事也郡主吏朝錯傳師古曰郡守也府官貢禹傳師古曰謂太守之府西漢會要卷三十九
