body:
  text: 西漢㑹要卷六十宋徐天麟撰兵五處降典屬國掌蠻夷降者武帝元狩三年昆邪王降復增屬國置都尉丞侯千人屬官九譯令成帝河平元年省併大鴻臚百官表文帝時弓髙侯韓隤當以匈奴相國降侯功臣表襄城侯韓嬰以匈奴相國降侯功臣表景帝時匈奴徐盧等五人降漢上欲侯之以勸後周亞夫曰彼背其主降陛下陛下侯之即何以責人臣不守節者乎上曰丞相議不可用迺悉封徐盧等為列侯周亞夫傳武帝元狩二年表作三年匈奴昆邪王殺休屠王并將其屬合四萬餘人來降置五屬國以處之紀凡言增屬國者皆增屬國都尉也安定三水天水勇士上郡龜兹西河美稷五原已上並屬國都尉治地理志宣帝神爵二年置金城屬國以處降羌本紀五鳳三年置西河北地屬國以處匈奴降者本紀諸從蠻夷來歸誼及以亡名數自占者内史縣令主淮南厲王傳越騎校尉掌越騎百官表如淳曰越人内附以為騎也長水校尉掌長水宣曲胡騎長水胡名也宣曲觀名胡騎之屯於宣曲者胡騎校尉掌池陽胡騎師古曰胡騎之屯於池陽者也武帝遣趙破奴將屬國騎及郡兵數萬以擊胡張騫傳太初元年以李廣利為貳師將軍發屬國六十騎期至貳師取善馬宣帝神爵元年發胡越騎羌騎詣金城本紀臣天麟按羌騎亦以羌人内附者為之杜侯復陸支以匈奴歸義因孰王從驃騎將軍擊左王以少破多捕虜三千一百侯三百户表衆利侯伊即軒以匈奴歸義樓剸王從驃騎將軍擊左王手劒合侯千一百户表捕盗武帝時杜周任用是時郡守尉諸侯相二千石欲為治者大抵盡效王温舒等而吏民益輕犯法盗賊滋起南陽有梅免百政楚有段中杜少齊有徐勃燕趙之間有堅盧范主之屬大羣至數千人擅自號攻城邑取庫兵釋死罪縳辱郡守都尉殺二千石為檄告縣趨具食小羣以百數掠鹵鄉里者不可稱數於是上始使御史中丞丞相長史使督之猶弗能禁乃使光禄大夫范昆諸部都尉乃故九鄉張德等衣繡衣持節虎符發兵以興擊斬首大部或至萬餘級及以法誅通行飲食坐相連郡甚者數千人數歲迺頗得其渠率散卒失亡復聚黨阻山川往往而羣無可奈何於是作沈命法曰羣盗起不發覺發覺而弗捕滿品者二千石以下至小吏主者皆死其後小吏畏誅雖有盗弗敢發恐不能得坐課累府府亦使不言故盗賊寖多上下相為匿以避文法焉咸宣傳江充為置指繡衣使者督三輔盗賊本傳天漢元年正月閉城門大搜本紀二年大搜索姦人也泰山琅邪羣盗徐勃等阻山攻城道路不通遣直指使者暴勝之等衣繡衣杖斧分部逐捕刺史郡守以下皆伏誅十一月詔闗都尉曰今豪傑多逺交東方羣盗其謹察出入者本紀征和元年發三輔騎士大搜上林閉長安城門索十一日迺解本紀宣帝即位久之渤海左右郡歲飢盗賊並起二千石不能禽制上選能治者丞相御史舉龔遂可用上以為渤海太守時遂年七十餘召見形貌短小宣帝望見不副所聞心内輕焉謂遂曰渤海廢亂朕甚憂之君欲何以息其盗賊以稱朕意遂對曰海瀕避逺不霑聖化其民困於飢寒而吏不恤故使陛下赤子盗弄陛下之兵於潢池中耳今欲使臣勝之邪將安之也上聞遂對甚說答曰選用賢良固欲安之也遂曰臣聞治亂民猶治亂繩不可急也唯緩之然後可治臣願丞相御史且無拘臣以文法得一切便宜從事上許焉加賜黄金贈遣乘傳至渤海界郡聞新太守至發兵以迎遂皆遣還移書勅屬縣悉罷逐捕盗賊吏諸持鉏鉤田器者皆為良民吏毋得問持兵者迺為盗賊遂單車獨行至府郡中翕然盗賊亦皆罷渤海又多刼掠相隨聞遂教令即時解散棄其兵弩而持鉤鉏盗賊於是悉平民安土樂業龔遂傳尹翁歸守右扶風選用㢘平疾姦吏以為右職姦邪罪名亦縣縣有名籍盗賊發其比伍中翁歸輒召其縣長吏曉告以姦黠主名教使用類推迹盗賊所過抵類常如翁歸言無有遺脫緩於小弱急於豪彊豪彊有論罪輸掌蓄官使所莝責以員程不得取代不中程輒笞督極者至以􅎂自剄而死京師畏其威嚴扶風大治盗賊課常為三輔最尹翁歸傳宣帝時勃海膠東盗賊並起張敞上書自請治之曰山陽郡户九萬三千口五十萬以上訖計盗賊未得者七十七人它課諸事亦略如此臣敞愚駑既無以佐思慮久處閒郡身逸樂而忘國事非忠孝之節也伏聞膠東勃海左右郡歲數不登盗賊並起至攻官寺簒囚徒搜市朝刼列侯吏失綱紀姦軌不禁臣敞不敢愛身避死唯明詔之所處願盡力摧剉其暴虐存撫其孤弱事即有業所至郡條奏其所由廢及所以興之狀書奏天子召敞拜膠東相賜黄金三十斤敞辭之官自請治劇郡非賞罰無以勸善懲惡吏追捕有功效者願得壹切比三輔尤異天子許之敞到膠東明設賞開羣盗令相捕斬除罪吏追捕有功上名尚書調補縣令者數十人由是盗賊解散傳相捕斬吏民歙然國中遂平張敞傳張敞守京兆尹長安市偷盗尤多百賈苦之上以問敞敞以為可禁敞既視事求問長安父老偷盗酋長數人居皆温厚出從童騎閭里以為長者敞皆召見責問因貰其罪把其宿負令致諸偷以自贖偷長曰令一旦召詣府恐諸偷驚駭願壹切受署敞皆以為吏遣歸休置酒小偷悉來賀且飲醉偷長以赭汙其衣裾吏坐里閭閱出者汙赭輒收縳之一日捕得數百人窮治所犯或一人百餘發盡行法罰由是枹鼓稀鳴市無偷盗張敞傳敞拜冀州刺史既到部而廣川王國羣輩不道賊連發不得敞以耳目發起賊主名區處誅其渠帥廣川王姬昆弟及王同族宗室劉調等通行為之囊橐吏逐捕窮窘蹤迹皆入王宮敞自將郡國吏車數百兩圍守王宮搜索調等果得之殿屋重轑中敞傅吏皆捕格斷頭縣其頭王宮門外因劾奏廣川王天子不忍致法削其户敞居部歲餘冀州盗賊禁止張敞傳建平侯杜緩為太常坐盗賊多免百官志王尊以病免㑹南山羣盗傰宗等數百人為吏民害拜故𢎞農太守傅剛為校尉將迹射士千人逐捕歲餘不能禽或說大將軍鳳賊數百人在轂下發軍擊之不能得難以視四夷獨選賢京兆尹乃可於是鳳薦尊徵為諌大夫守京輔都尉行京兆尹事旬月間盗賊清本傳成帝河平中單于來朝上使班伯持節迎於塞下㑹定襄大姓石季羣輩報怨殺追捕吏伯上狀因自請願試守期月上遣侍中中郎將王舜馳傳代伯䕶單于并奉璽書印綬即拜伯為定襄太守定襄聞伯素貴年少自請治劇畏其下車作威吏民竦息伯至請問耆老父祖故人有舊恩者迎延滿堂日為供具執子孫禮部中益弛諸所賓禮皆名豪懐恩醉酒共諌伯宜頗攝錄盗賊具言本謀亡匿處伯曰是所望於父師矣迺召屬縣長吏選精進掾史分部收捕及它隱伏旬日盡得郡中震肅咸稱神明叙傳陽朔三年潁川鐵官申屠聖等百八十人殺長吏盗庫兵自稱將軍經歴九郡遣丞相長史御史中丞逐捕以軍興從事皆伏辜本傳鴻嘉三年廣漢男子鄭躬等六十餘人攻官寺簒囚徒盗庫兵自稱山君四年黨與寖廣犯歴四縣衆且萬人拜河東都尉趙䕶為廣漢太守發郡中及蜀郡合五萬人擊之或相捕斬除罪旬月平遷䕶為執金吾賜黄金百斤本紀鴻嘉中廣漢羣盗起選孫寶為益州刺史廣漢太守扈商者大司馬車騎將軍王音姊子軟弱不任職寶到部親入山谷諭告羣盗非本造意渠率皆得悔過自出遣歸田里自劾矯制奏商為亂首春秋之義誅首惡而已商亦奏寶所縱或有渠率當坐者商下獄寶坐失死罪免益州吏民多陳寶功效言為車騎將軍所排上復拜寶為冀州刺史孫寶傳永始二年丞相薛宣坐西州盗賊羣輩免恩澤侯表永始三年十一月尉氏男子樊並等十三人謀反殺陳留太守刼畧吏民自稱將軍徒李譚等五人共格殺並等皆封為列侯本紀永始三年十二月山陽鐵官徒蘇令等二百二十八人攻殺長吏盗庫兵自稱將軍經歴郡國十九殺東郡太守汝南都尉遣丞相長史御史中丞持節督趣逐捕汝南太守嚴訢捕斬令等遷訢為大司農賜黄金百斤本紀平帝元始二年遣執金吾侯陳茂假以征鼓募汝南南陽勇敢吏士三百人諭說江湖賊成重等二百餘人皆自出送家在所收事重徙雲陽賜公田宅本紀三年陽陵任横等自稱將軍盗庫兵攻官寺出囚徒大司徒掾督逐皆伏辜本紀西漢㑹要卷六十
