body:
  text: 西漢㑹要卷四十宋徐天麟撰職官十集議上議立君髙后四年詔曰皇帝疾久不已不可屬天下其議代之羣臣頓首奉詔本紀漢大臣使人迎代王郎中令張武等議皆曰願稱疾無往中尉宋昌進曰大王勿疑也文紀按張武宋昌皆代邸官故與此議代王入代邸羣臣上議曰丞相臣平大尉臣勃大將軍臣武御史大夫臣蒼宗正臣郢朱虚侯臣章東牟侯臣興居典客臣揭再拜言云云臣謹請陰安侯頃王后兄仲妻也琅琊王澤列侯吏二千石議大王髙皇帝子宜為嗣文紀元平元年昭帝崩亡嗣羣臣議所立咸持廣陵王郎有上書言王不可以承宗廟霍光承皇太后詔召昌邑王旣至即位行􅁋亂光遂召丞相御史將軍列侯中二千石大夫博士㑹議未央宫羣臣皆驚愕失色田延年曰今日之議不得旋踵於是議者皆叩頭曰唯將軍令光與羣臣連名奏王尚書令讀奏曰丞相臣敞等云云臣敞等謹與博士臣霸臣雋舍臣徳臣虞舍臣射臣蒼等議當廢太后詔歸賀昌邑光坐庭中㑹丞相以下定議所立廣陵王已前不用及燕刺王謀反其子不在議中近親唯有皇曾孫光遂與丞相上奏皇太后詔曰可霍光傳議儲嗣文帝元年有司請蚤建太子詔曰其安之有司固請更議不宜上乃許之本紀成帝召丞相翟方進御史大夫孔光右將軍亷褒後將軍朱博皆引入禁中議中山定陶王誰宜為嗣者方進王根以為定陶王宜為嗣褒博皆如方進根議光獨以為中山王宜為嗣上以禮兄弟不相入廟遂立定陶王為太子孔光傳議宗廟髙后七年詔曰昭靈夫人太上皇妃也武哀侯宣夫人髙帝兄姊也號諡不稱其議尊號丞相臣平等請尊昭靈夫人曰昭靈后武哀侯曰武哀王宣夫人曰昭哀后髙后紀孝景元年詔曰其為孝文皇帝廟為昭徳之舞以明休徳其與丞相列侯中二千石禮官具禮儀奏丞相臣嘉等謹議世功莫大於髙皇帝徳莫盛於孝文皇帝髙帝廟宜為帝者太祖之廟孝文皇帝廟宜為帝者太宗之廟制曰可景紀宣帝即位詔丞相御史曰孝武廟樂未稱其與列侯二千石博士議於是羣臣大議庭中皆曰宜如詔書長信少府夏侯勝獨曰不宜立廟樂公卿共難勝曰此詔書也勝曰詔書不可用也於是丞相義御史大夫廣明劾奏勝非議詔書毁先帝不道下獄有司遂請尊孝武帝為世宗廟奏盛徳文始五行之舞夏侯勝傳本始元年詔曰故皇太子在湖未有號諡歳時祠其議諡置園邑本紀元帝時貢禹奏言古者天子七廟今孝惠孝景廟皆親盡宜毁及郡國廟不應古禮天子是其議元光四年廼下詔先議罷郡國廟其與將軍列侯中二千石二千石諸大夫博士議郎議丞相元成御史大夫鄭𢎞太子太傅嚴彭祖少府歐陽地餘諌大夫尹更始等七十人皆曰宗廟在郡國宜亡修臣請勿復修奏可因罷郡國廟後月餘復下詔曰祖宗之廟不敢自顓其與將軍列侯中二千石二千石諸大夫博士議元成等四十四人奏議㠯為髙帝宜為帝者太祖之廟世世不毁承後屬盡者宜毁今宗廟異處昭穆不序宜入就太祖廟而序昭穆如禮大司馬車騎將軍許嘉等二十九人㠯為孝文宜為帝者太宗之廟廷尉忠㠯為孝武宜為世宗之廟諌大夫尹更始等十八人㠯為皇考廟非正禮宜毁於是上重其事依違者一年廼下詔曰云云其正禮儀元成等奏曰祖宗之廟世世不毁繼祖以下五世而迭毁云云奏可後歳餘元成薨匡衡為丞相上詔問衡議欲復之衡深言不可久之遂盡復所罷寢廟園皆修祀如故哀帝即位丞相光大司空武奏言迭毁之次當㠯時定臣請與羣臣雜議奏可於是光禄勲彭宣詹事滿昌博士左咸等五十三人皆以為繼祖宗㠯下五世而迭毁孝武皇帝親盡宜毁太僕王舜中壘校尉劉歆議㠯七廟言之孝武皇帝未宜毁上覽其議而從之制曰太僕舜中壘校尉歆議可至平帝元始中大司馬王莽奏皇考廟本不當立又南陵雲陵園陵名未正謹與大司徒晏等百四十七人議請皇考廟毁勿修罷南陵雲陵為縣奏可韋𤣥成傳議郊祀孝文十五年黄龍見於成紀上乃下詔議郊祀本紀元狩二年天子郊雍議曰今上帝朕親郊而后土母祀則禮不答也有司與太史公祠官寛舒等議云云於是天子遂東立后土祠如寛舒等議郊祀志李延年以好音見上善之下公卿議曰民間祠有鼓舞樂今郊祀而無樂豈稱乎公卿曰云云同上成帝初即位丞相衡御史大夫譚奏言甘泉㤗畤河東后土之祠宜可徙置長安願與羣臣議定奏可大司馬車騎將軍許嘉等八人㠯為宜如故右將軍王商博士師丹議郎翟方進等五十人㠯為宜徙於是衡譚奏議曰今議者五十八人其五十言當徙八人以為不宜宜於長安定南北郊天子從之同上平帝元始五年大司馬王莽奏臣謹與太師孔光長樂少府平晏大司農左咸中壘校尉劉歆大中大夫朱陽博士薛順議郎國由等六十七人議皆曰宜如建始時丞相衡等議復長安南北郊奏可後莽又奏言臣謹與大師光大司徒宫羲和歆等八十九人議皆曰宜令墬祗稱皇墬后祗兆曰廣畤奏可同上議典禮文帝十五年使博士諸生刺六經中作王制謀議廵守封禪事郊祀志武帝建元元年議立明堂本紀又見申公傳元朔元年詔曰朕深詔執事興亷舉孝今或至闔郡而不薦一人其與中二千石禮官博士議不舉者罪本紀五年詔太常其議與博士弟子員丞相𢎞謹與太常臧博士平等議曰云云儒林傳序元鼎四年六月汾陰得寳鼎迎至長安公卿大夫皆議尊寳鼎天子曰鼎曷為出哉有司皆言鼎宜視宗禰廟藏於帝庭以合明應制曰可郊祀志自得寳鼎上與公卿諸生議封禪封禪用希曠絶莫知其儀體而羣儒采封禪尚書周官王制之望祀射牛事齊人丁公年九十餘對曰云云羣臣旣已不能辨明封禪事上為封祠器以示羣儒於是盡罷羣儒弗用同上帝議欲放古廵守封禪之事諸儒對者五十餘人未能有所定上乃自制儀頗采儒術以文之焉禇大與兒寛議封禪於上前大不能及兒寛傳元封七年大中大夫公孫卿壺遂大史令司馬遷等言厯紀廢壞宜改正朔上乃詔御史大夫寛曰與博士共議今宜何以為正朔服色何上寛與博士賜等議皆曰云云遂詔卿遂等與侍郎尊大典星射姓等議造漢厯律厯志宣帝時美陽得鼎獻之下有司議多㠯為宜薦見在宗廟如元鼎時故事張敞上議曰今此鼎細小不宜薦見於宗廟制曰京兆尹議是郊祀志石渠論五經同異見圖書條司𨽻校尉涓勲奏言丞相請遣掾史以宰士督察天子奉使命大夫甚悖逆順之理願下中朝特進列侯將軍㠯正國法度議者以為丞相掾不宜移書督趂司𨽻翟方進傳哀帝即位有詔問丞相大司空定陶共王太后宜何居禮光議以為定陶太后宜改築宫大司空何武曰可居北宫上從武言孔光傳傅大后欲與成帝毋俱稱尊號羣下多順指言宜立尊號唯師丹與孔光持不可上重違大臣又内廹傅太后依違者連嵗同上議封建漢五年詔諸侯王視有功者立㠯為燕王荆王臣信等十人皆曰太尉盧綰功最多請立以為燕王本紀下同六年詔齊其復㠯為諸侯及擇寛惠修潔者王齊荆地韓王信奏請云云十一年詔王相國通侯吏二千石擇可立為代王者燕王綰相國何等三十三人皆曰子常請立㠯為代王詔擇可以為梁王淮陽王者燕王綰相國何等請立子恢為梁王子友為淮陽王詔王相國擇可立為淮陽王者羣臣請立子長為王十二年詔朕欲復立吳王其議可者長沙王臣等言沛侯濞請立為吳王詔諸侯王議可立為燕王者長沙王臣等請立子建為燕王武帝元狩六年大司馬臣去病請定皇子位制曰下御史丞相臣青翟御史大夫臣陽太常臣充大行令臣息太子少傅臣安行宗正事謹與二千石臣賀等議制曰更議丞相御史謹與列侯臣嬰齊中二千石臣賀諌大夫博士臣安等議制曰云云丞相臣青翟御史大夫臣湯昧死言臣青翟等與列侯二千石諌大夫博士臣慶等議奏留中不下臣青翟等竊與列侯臣夀成等二十七人議制曰立皇子閑為齊王旦為燕王胥為廣陵王三王世家昌邑王賀薨豫章太守廖奏言宜以禮絶賀以奉天意願下有司議議皆㠯為不宜為立嗣昌邑王傳議功賞漢五年列侯畢已受封奏位次皆曰平陽侯曺參功最多宜第一闗内侯鄂千秋時為謁者進曰羣臣議皆誤蕭何當第一曺參次之上曰善乃令何第一蕭何功雖髙待鄂君乃得明于是因鄂千秋故所食闗内侯邑二千戸封為安平侯蕭何傳髙后二年詔曰欲差次列侯功㠯定朝位其與列侯議定奏之丞相臣平言謹與絳侯臣勃曲周侯臣商潁陰侯臣嬰安國侯臣陵等議云云奏可本紀馮奉世擊莎車王自殺上甚說下議封奉世丞相將軍皆曰奉世功效尤著宜加爵土之賞少府蕭望之獨以奉世不宜受封上善望之議馮奉世傳甘延夀陳湯斬郅支單于既至論功石顯匡衡以為延夀湯擅興師矯制為國招難漸不可開元帝内嘉延夀湯功而重違衡顯之議議久不决故宗正劉向上疏曰宜尊寵爵位以勸有功於是天子下詔曰其赦延夀湯罪勿治詔公卿議封焉議者以為宜如軍法捕斬單于令匡衡石顯以為郅支本非真單于元帝取鄭吉故事封千户衡顯復爭廼封延夀為義成侯賜湯爵闗内侯陳湯傳成帝既罷昌陵以淳于長首建忠策下公卿議封長平當以長雖有善言不應封爵之科當坐前議不正左遷鉅鹿太守後遂封長平當傳西漢會要卷四十
