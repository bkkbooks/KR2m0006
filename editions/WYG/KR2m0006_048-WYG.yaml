body:
  text: 西漢㑹要卷四十八宋徐天麟撰民政三置三老賜帛附髙祖二年舉民年五十以上有修行能帥衆為善置以為三老鄉一人擇鄉三老一人為縣三老與縣令丞尉㠯事相教復勿繇戍以十月賜酒肉本紀文帝十二年詔以户口率置三老常員本紀十里一亭十亭一鄉鄉有三老掌教化百官表武帝元狩六年遺謁者循行天下諭三老孝弟以為民師本紀賈山曰天子之尊尊養三老於大學執爵而饋執爵而酢祝䭇在前祝鯁在後公卿奉杖大夫進履賈山傳新城三老董公遮說漢王曰項羽無道放弑其主天下之賊也夫仁不以勇義不以力三軍之衆為之素服以告之諸侯為此東伐此三王之舉也漢王曰善非夫子無所聞於是漢王為義帝發喪兵皆縞素髙紀武帝遣司馬相如諭告巴蜀責三老以不教誨之過相如傳戾太子發兵誅江充長安中擾亂言太子反上怒甚壺闗三老茂上書竊以為亡邪心書奏天子感悟太子傳王尊為京兆尹坐免湖三老公乗興等上書訟尊治京兆功效日著書奏天子復以尊為徐州刺史尊傳王尊為東郡太守河水盛溢尊躬率吏民投沈白馬請以身填金堤水波稍却白馬三老奏其狀制詔秩尊中二千石同上黄霸守潁川吏民興於行誼賜三老爵及帛黄霸博韓延夀守馮翊有昆弟訟田延夀曰咎在馮翊移病不聽事令丞嗇夫三老亦自繫待罪延夀傳賜三老帛髙祖以十月賜酒肉見上文帝十二年遣謁者勞賜三老帛人五匹本紀下同武帝元狩元年遣謁者賜縣三老帛人五匹鄉三老人三匹宣帝元康元年加賜三老帛四年加賜三老帛人二匹甘露三年鳳皇集新蔡賜新蔡三老帛有差元帝初元元年賜三老帛人五匹五年賜三老帛人五匹元光二年賜三老帛建昭五年賜三老帛成帝建始元年賜三老錢帛綏和元年賜三老帛平帝元始三年賜三老帛尊髙年文帝元年詔曰老者非帛不煖非肉不飽今歲首不時使人存問長老又無布帛酒肉之賜將何以佐天下子孫孝養其親今聞吏禀當受鬻者或以陳粟師古曰禀給也鬻淖糜也給米使為糜鬻也以文帝詔文考之則受鬻之法其來必久豈稱養老之意哉具為令有司請令縣道年八十以上賜米人月一石肉二十斤酒五斗其九十以上又賜帛人二匹絮三斤賜勿及當禀鬻米者長吏閱視丞若尉致不滿九十嗇夫令史致二千石遣都吏循行不稱者督之刑者及有罪耐以上不用此令本紀文帝禮髙年九十者一子不事八十者二算不事賈山傳師古曰一子不事蠲其賦役二算不事免二口之算賦也武帝建元元年民年八十復二算九十復甲卒四月詔民年九十已上已有受鬻法為復子若孫令得身帥妻妾遂其供養之事武帝元狩元年詔曰朕哀夫老眊孤寡鰥獨或匱於衣食甚憐愍焉其遣謁者巡行天下存問致賜有寃失職使者㠯聞元帝初元元年遣使存問耆老建昭四年臨遣諫大夫博士賞等二十一人循行天下存問耆老成帝永始三年臨遣大中大夫嘉等存問耆老並本紀賜髙年帛武帝元狩二年遣謁者賜年九十已上帛人二匹絮三斤八十已上米人三石元封元年加年七十以上帛人二匹二年賜髙年米人四石宣帝地節三年加賜髙年帛元康二年賜髙年帛三年賜髙年帛神爵元年賜髙年帛四年賜髙年帛五鳳三年加賜髙年帛甘露二年賜髙年帛元帝初元四年賜髙年帛永光元年賜髙年帛成帝鴻嘉元年加賜髙年帛永始四年賜髙年帛並本紀賜孝弟力田錢帛賜爵孝文十二年遣謁者勞賜孝者帛人五匹悌者力田二匹紀下同後七年遣詔賜孝弟力田金錢帛各有數武帝元狩元年賜孝者帛人五匹弟者力田人三匹宣帝元康元年加賜孝弟力田帛四年加賜孝弟力田帛人二匹甘露二年鳳皇集賜新蔡孝弟力田帛元帝初元元年賜孝者帛五匹弟者力田三疋五年賜孝者帛人五匹弟者力田三疋永光二年賜孝弟力田帛建昭五年賜孝弟力田帛成帝建始元年賜孝弟力田錢帛有差綏和元年賜孝弟力田帛哀帝即位賜孝弟力田帛宣帝神爵四年黄霸治行尤異潁川孝弟力田皆以差賜爵黄霸傳按紀云一級成帝建始三年賜孝弟力田爵二級河平四年賜孝弟力田爵二級並本紀恤鰥寡孤獨文帝一三年賜天下孤獨布帛絮按賈山傳云出帛十萬疋以振貧民武帝元狩元年遣謁者存問致賜鰥寡孤獨帛人三匹絮三斤縣鄉即賜毋贅聚六年遣博士六人分廵行天下存問鰥寡廢疾無以自業者貸與之元封元年加孤寡帛人二疋二年賜孤寡米四石五年賜鰥寡孤獨帛貧窮者粟六年賜天下貧民布帛人一匹太始三年賜鰥寡孤獨帛人一匹宣帝即位賜金錢鰥寡孤獨各有差地節三年詔曰鰥寡孤獨髙年貧困之民朕所憐也前下詔假公田貸種食其加賜鰥寡孤獨髙年帛二千石嚴教吏謹視遇毋令失職元康元年加賜鰥寡孤獨帛二年賜鰥寡孤獨帛三年賜鰥寡孤獨帛四年正月遣太中大夫彊等十二人廵行天下存問鰥寡三月加賜帛鰥寡孤獨各一疋神爵元年賜鰥寡孤獨帛四年賜鰥寡孤獨帛五鳳三年加賜鰥寡孤獨帛甘露二年賜鰥寡孤獨帛三年鳳皇集賜新蔡鰥寡孤獨帛元帝初元元年臨遣光祿大夫褒等十二人循行天下存問耆老鰥寡孤獨困乏失職之民五年賜鰥寡孤獨帛二疋永光元年賜鰥寡孤獨帛二年賜鰥寡孤獨帛建昭四年臨遣諫大夫博士賞等二十一人廵行天下存問耆長鰥寡孤獨困乏失職之人成帝建始元年賜鰥寡孤獨錢帛各有差鴻嘉元年賜鰥寡孤獨帛永始四年賜雲陽鰥寡孤獨帛平帝元始四年賜鰥寡孤獨帛並本紀恤流民漢二年闗中大飢米斛萬錢人相食令民就食蜀漢髙紀五年諸民畧在楚者皆歸之民前或相聚保山澤不書名數今天下已定令各歸其縣復故爵田宅吏以文法教訓辨告勿笞辱同上漢興大城名都民人散亡逮文景四五世間流民既歸户口亦息功臣表景帝即位議民欲徙寛大地者聽之本紀武帝元狩四年山東被水災民多飢乏天子遣使振貧民尚不能救及徙民於闗西以及充朔方以南新秦中七十餘萬口本紀凡七十二萬五千口衣食皆仰給于縣官數歲貸與産業使者分部䕶冠盖相望費以億計食貨志元鼎六年山東被河災及歲不發令飢民得就食江淮間欲留留處使者冠盖屬於道䕶之下巴蜀粟以振焉同上元封四年闗東流民二百萬口無名數者四十萬公卿議欲請徙流民於邊以適之石慶上書願歸丞相印上報曰惟吏多私需求無已去者便居者擾故為流民法以禁重賦君不繩責長吏而請以興徙四十萬口蕩搖百姓孤兒幼年未滿十歲無罪而坐率朕失望焉石慶傳宣帝本始三年大旱三輔民就賤者且毋收事本紀地節三年流民還歸者假公田貸種食且勿算事本紀膠東相王成勞來不怠流民自占八萬餘口賜爵闗内侯秩中二千石本傳成帝河平元年流民入函谷闗天文志四年遣博士嘉等舉行瀕河之郡避水它郡國者在所冗食之謹遇以文理毋令失職本紀陽朔二年秋闗東大水流民欲入函谷天井壺口五阮闗者勿苛留遣諫大夫博士分行視本紀鴻嘉四年流民欲入闗輒籍納所之郡國謹遇以理本紀平帝元始二年郡國大旱蝗青州尤甚民流亡罷安定呼池苑以為安民縣起官寺市里募徙貧民縣次給食至徙所賜田宅什器假與犁牛種食又起五里於長安城中宅二百區以居貧民本紀西漢㑹要卷四十八
