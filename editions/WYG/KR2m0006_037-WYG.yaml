body:
  text: 西漢㑹要卷三十七宋徐天麟撰職官七秩禄萬石穀月三百五十斛太師太傅太保丞相太尉御史大夫前後左右將軍並表下同中二千石師古曰中二千石實得二千石也中之言滿也月得百八十斛是為一歲凢得二千一百六十石言二千石者舉成數耳太常光禄勲衛尉太僕廷尉大鴻臚宗正大司農少府執金吾真二千石臣天麟謹按外戚傳容華秩視真二千石在中二千石之下二千石之上師古曰真二千石月得百五十斛一歳凢得千八百石又按如淳注汲黯傳亦云諸侯相秩真二千石月得百五十斛臣瓚注詹事引茂陵中書秩真二千石而百官表廼亾此秩欠考東京則有此秩矣二千石師古曰穀月百二十斛一歳凡得一千四百四十石太子太傅荀恱漢紀自太子太傅至扶風比二千石太子少傅詹事茂陵中書秩真二千石將作少府大長秋長樂少府建平四年四大后各置少府皆中二千石長信少府典屬國水衡都尉京兆尹左馮翊右扶風以上並表後漢志云三輔皆秩中二千石京輔都尉左輔都尉右輔都尉以上元帝増秩司𨽻校尉荀恱紀校尉並比二千石城門校尉中壘校尉屯騎校尉歩兵校尉越騎校尉長水校尉胡騎校尉射聲校尉虎賁校尉諸侯相初金印吳楚反後改銀印初真二千石在郡守上郡太守増秩者為中二千石元帝建昭二年益三河大郡大守秩長信中太僕以上並表諸侯太傅諸侯御史大夫後漢志漢初傅相御史大夫及諸卿皆秩二千石諸侯中尉哀帝曰傅相中尉皆國二千石中少府師丹傳左曺右曺大郡都尉元帝紀州牧朱博傳秩真二千石長陵令吕后六年秩長陵令二千石大内史記孝景本紀比二千石穀月百斛丞相司直䕶軍都尉光禄大夫亾印綬增秩者為中二千石五官中郎將左中郎將右中郎將虎賁中郎將監羽林中郎將西域都䕶奉車都尉駙馬都尉騎都尉郡都尉以上並表千石穀月九十斛丞相長史大司馬長史御史中丞將軍長史太常丞光禄丞衛尉丞六典注比千石太僕丞大鴻臚丞宗正丞大司農丞少府丞執金吾廷尉正廷尉左監廷尉右監荀恱漢紀正監秩比千石諸侯郎中令諸侯僕武帝損郎中令秩千石僕秩亦千石後漢志僕比三千石萬户縣令侯國相以上表比千石穀月八十斛大中大夫郎中車將郎中户將郎中騎將謁者僕射期門僕射八百石成帝陽朔二年除吏八百石秩李奇曰除八百就六百比八百石諌大夫表六百石將作少府丞詹事丞水衡都尉丞廷尉左平廷尉右平京兆丞左馮翊丞右扶風丞京輔都尉丞右輔都尉丞左輔都尉丞郡長史州刺史郡太守丞郡都尉丞萬户縣令侯國相以上表朔方刺史太子門大夫太子庶子以上表注太常掌故晁錯傳武騎常侍司馬相如傳公車司馬令漢官儀大廐令後漢志本注舊有六廐皆六百石令未央令家馬令車府令路軨令騎馬令式道左候式道右候式道中候廩犠令外史閭師以上孝平紀比六百石博士議郎左中郎右中郎五官郎中戊巳校尉太子洗馬謁者五百石成帝陽朔二年除吏五百石秩李奇曰除五百就四百縣長候國相四百石榖月五十斛縣丞縣尉比四百石榖月四十五斛五官侍郎左侍郎右侍郎三百石榖月四十斛次縣長侯國相比三百石五官郎左郎中右郎中二百石穀月三十斛左馮翊卒史黄霸傳縣丞縣尉比二百石榖月二十七斛百石榖月十六斛又律百石奉月六百御史屬匡衡傳左右内史卒史郡國五經卒史大行卒史以上儒林傳長安游徼長安獄史以上趙廣漢傳比百石斗食師古曰斗食者言一歲不滿百石日食一斗二升大司農屬佐史漢官名秩爵云榖月八斛增秩汲黯以諸侯相秩居淮陽詔增符璽郎秩二等霍光傳宣帝時二千石有治理效輒㠯璽書勉厲增秩賜金循吏傳如淳曰太守雖號二千石有千石八百石居者功徳茂異乃得滿秩王成為膠東相治甚有聲宣帝最先褒之下詔曰膠東相成治有異等其秩成中二千石賜爵闗内侯潁川太守黄霸秩以八百石居以治行褒揚秩中二千石召信臣為南陽大守為百姓興利又為河南太守治行第一數增秩賜金周堪召拜光禄大夫秩中二千石此類甚多舉一為例小黄令焦延壽舉最當遷三老官屬上書借留有詔許增秩留京房傳馮野王為大鴻臚王舅不宜備九卿以秩為上郡太守班伯遷水衡都尉秩中二千石蕭咸為𢎞農河東太守所居有政迹數增秩賜金蕭由遷江夏太守平江賊成重等有功增秩陳立為巴郡太守秩中二千石居西南夷傳平帝元始元年賜吏在位二百石以上壹切滿秩如真益吏禄孝惠即位詔曰吏所以治民也能盡其治則民頼之故重其禄所以為民也紀下同孝宣神爵三年詔曰吏不亷平則治道衰令小吏皆勤事而奉禄薄欲其毋侵漁百姓難矣其益吏百石以下奉十五韋昭曰若食一斛則益五斗孝成綏和元年益大司馬大司空奉如丞相班序太師位在太傅上太保次太傅太傅位在三公上武帝㠯衛青為大將軍位在諸公上漢興置大將軍驃騎將軍位次丞相舊列侯奉朝請者位次三公元壽二年賜大司馬位在司徒上御史大夫位上卿前後左右將軍位上卿詹事位在長秋上中太僕位在正卿太僕上給事中位次侍中中常侍並表故事司𨽻校尉位在司直下其有所㑹居二千石前翟方進傳諸侯羣臣朝十月儀先平明謁者治禮引㠯次入殿門傳曰趨殿下郎中俠陛陛數百人功臣列侯諸將軍軍吏㠯次陳西方東鄉文官丞相以下陳東方西鄉大行設九賔臚句傳於是皇帝輦出房引諸侯王㠯下至吏六百石㠯次奉賀叔孫通傳諸侯王相國太師太傅太保丞相大司馬御史大夫大將軍列將軍兼官特進列將軍列侯奉朝請太常光禄勲衛尉太僕廷尉宗正大司農大鴻臚少府長信少府中少府執金吾太子太傅水衡都尉京兆尹左馮翊右扶風典屬國將作少府就國侯潁川三河大守齊楚等相東海等太守髙密等侯太子少府太子詹事闗内侯丞相司直與州郡叙則居刺史守相上司𨽻校尉與州郡叙則居刺史守相上城門校尉八校尉搜粟都尉光禄大夫非中二千石者叙在三輔都尉下御史中丞與刺史守相叙則居其上丞相長史三輔都尉五官左右中郎將羽林中郎將䕶軍都尉奉車都尉秩光禄大夫者在闗内侯下駙馬都尉騎都尉尚書令西域都䕶大中大夫尚書僕射尚書諸侯太傅十三州刺史與守相叙則居其上朔方刺史郡都尉闗都尉農都尉屬國都尉西域副都尉郎中車將郎中户騎二將諸侯中尉諸侯内史諌大夫太子家令博士九卿列卿丞謁者僕射公車司馬令將軍長史廷尉正監長安令千石令黄門侍郎尚書丞郎議郎五官左右中郎從事中郎太史令廷尉平三輔丞六百石令五百石長郡司馬長史五官左右侍郎太守丞都尉丞三百石長侍御史太子門大夫五官左右郎中太子庶子中庶子太子舍人太子洗馬羽林郎蠻夷叙位孝宣甘露三年匈奴呼韓邪單于欵五原塞願奉國珍朝三年正月詔公卿議其儀丞相霸御史大夫定國議曰聖王之制施徳行禮先京師而後諸夏先諸夏而後邊方詩云率禮不越遂視旣發相土烈烈海外有截陛下聖徳充塞天地光被四表匈奴單于郷風慕義舉國同心奉珍朝賀自古未之有也單于非正朔所加王者所客也禮儀宜如諸侯王稱臣昧死再拜位次諸侯王下太子太傅蕭望之以為單于非正朔所加故稱敵國宜待以不臣之禮位在諸侯王上殊域稽首稱藩中國遜而不臣此則羈縻之誼謙亨之福也書曰戎狄荒服言其來服荒忽亾常如使匈奴後嗣卒有鳥竄鼠伏闕於朝享不為畔臣信義行乎蠻貉福祚流於亾窮萬世之長策也天子采之下詔曰蓋聞五帝三王教化所不施不及以政今匈奴單于稱北蕃朝正朔朕之不逮徳不能𢎞覆其以客禮待之令單于位在諸侯王上贊謁稱臣而不名宣紀及蕭望之傳西漢㑹要卷三十七
