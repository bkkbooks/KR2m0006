body:
  text: 西漢㑹要卷三十二宋徐天麟撰職官二宫官詹事詹事秦官應劭曰詹省也給也臣瓉曰茂陵書詹事秩直二千石掌皇后太子家有丞師古曰皇后太子各置詹事随其所在以名官屬官有太子率更家令丞僕中盾衛率厨廄長丞張晏曰太子稱家故曰家令臣瓉曰茂陵中書太子家令秩八百石應劭曰中盾主周衛徼道秩四百石如淳曰漢儀注衛率主門衛秩千石師古曰掌知漏刻故曰率更自此以上太子之官也更音工衡反又中長秋私府永巷倉廄祠祀食官令長丞諸官官皆屬焉師古曰自此以上皆皇后之官成帝鴻嘉三年省詹事官并屬大長秋百官表師古曰省皇后詹事縂屬長秋也中廄令桑𢎞羊為中廄令三輔黄圖云中廄皇后車馬所在中御府令霍光傳中御府令髙昌又谷永傳願減中御府用度中少府王昌韓勲師古曰皇后官舍人功臣表成陶侯周信為昌氏舍人長信詹事長信詹事掌皇太后宫景帝中六年更名長信少府平帝元始四年更名長樂少府百官表張晏曰以太后所居宫為名也居長信宫則曰長信少府居長樂宫則曰長樂少府也哀帝即位尊定陶太后曰共皇太后丁姫曰共皇后各置左右詹事本紀臣天麟按詹事置左右始於此建平二年尊傅太后為皇太大后稱永信宫丁太后為帝太后稱中安宫而成帝母太皇太后本稱長信宫成帝趙后為皇太后並四太后各置少府太僕秩皆中二千石外戚傳中太僕掌皇太后輿馬見太僕條長信太僕王莽傳長信太僕閎臣天麟按此官即哀帝所置四太僕之一也長樂衛尉見衛尉條長樂長御王莽傳上長信庭林表叙傳師古曰林表官名長信宫庭之林表孟康曰婦人之官也太公家令附太公僕史記功臣表嚴彭祖大長秋將行秦官應劭曰皇后卿也景帝中六年更名大長秋師古曰秋者收成之時長者常乆之義故以為皇后官名或用中人或用士人百官表太子太傅少傅太子太傅少傅古官屬官有太子門大夫應劭曰員五人秩六百石庶子應劭曰員五人秩六百石洗馬張晏曰員十六人秩比謁者如淳曰前驅也洗或作先舍人漢官儀云秩二百石太子中庶子史丹金敞皆為之臣天麟按鄒陽傳奏任中庶子䝉恬扁鵲傳虢有中庶子則六國時已有此官沈約云漢置六典云秦官皆非是也太子御驂乗恵紀䕶太子家元帝詔史丹軍官大將軍髙帝拜韓信為大將軍本傳景帝拜竇嬰為大將軍本傳武帝以衛青為大將軍位在諸公上史記汲黯傳元狩四年置大司馬位大將軍驃騎將軍皆為大司馬霍去病傳按後漢志云初武帝以衛青數征伐冇功為大將軍欲尊􅃂之以古尊官唯有三公諸將軍始自秦晉以為卿號故置大司馬官號以冠之其後霍光王鳯等皆然莫府大將軍長史丙吉自軍市令遷大將軍軍中司馬王鳯奏請王尊補莫府校尉霍光擅調益莫府校尉大將軍從事中郎王鳯奏以陳湯為之大將軍軍監匈奴傳上治衆等四人大將軍史王仲翁漢儀注大將軍史秩四百石給事大將軍莫府蔡義票騎將軍史記作剽騎武帝元狩四年置大司馬位大將軍票騎將軍皆為大司馬定令票騎將軍秩禄與大將軍等霍去病傳莫府票騎將軍司馬趙破奴鷹撃司馬霍去病傳趙破奴票姚校尉霍去病為之荀恱漢紀作嫖姚驃騎將軍史藝文志朱字車騎將軍髙帝八年遷靳歙為車騎將軍本傳宣帝地節三年拜張安世為大司馬車騎將軍領尚書事七月罷車騎將軍屯兵兩宫衛尉城門北軍兵屬焉張安世傳車騎將軍王音以外親冝典兵馬入為將軍元后傳莫府車騎將軍長史趙充國由中郎遷車騎都尉韓昌夫馮唐拜車騎都尉主車尉及郡國車士從事中郎大司馬車騎將軍王音踵故選置從事毋將隆車騎將軍市令丙吉車騎將軍掾王舜表奏云敞為掾車騎將軍千人王莽傳上扈雲師古曰千人官名屬車騎將軍衛將軍山都正侯王恬啟以衛將軍撃陳豨功臣表文帝即位拜宋昌為衛將軍領南北軍二年罷衛將軍紀張安世拜大司馬車騎將軍領尚書事數月更為衛將軍本傳莫府衛將軍舍人史記衛將軍舍人百餘人田仁以壯勇為衛將軍舍人衛將軍掾蕭由前後左右將軍前後左右將軍皆周末官秦因之位上卿金印紫綬漢不常置或有前後或有左右皆掌兵及四夷有長史秩千石百官表莫府右將軍史律歴志詔右將軍史雜候清臺列將軍别將并莫府附上將軍髙后七年以趙王吕禄為上將軍見本紀游撃將軍功臣表髙帝初陳豨以游撃將軍别定代復土將軍文紀後七年張武為復土將軍如淳曰主穿壙窴瘞事將屯將軍文紀後七年令屬國悍為將屯將軍復土都尉哀帝崩蕭由為復土都尉元后崩原渉守復土都尉驍騎將軍武紀元光二年李廣驍騎都尉功臣表齊受驍騎都尉又史記功臣表董忠為梟騎都尉䕶軍將軍韓安國傳元光二年為䕶軍將軍諸將皆屬焉輕車將軍武紀元光二年公孫賀為輕車將軍輕車都尉材官將軍武紀元光二年大中大夫李息為材官將軍騎將軍武紀元光六年騎將軍公孫敖出代下又云代郡將軍伏波將軍元鼎五年路博徳為伏波將軍見南粤傳伏波司馬功臣表蘓𢎞樓船將軍元鼎五年楊僕為樓船將軍見南粤傳戈船將軍武紀元鼎五年歸義越侯嚴為戈船將軍師古曰船下安戈㦸以防蛟鼉水蟲之害下瀬將軍武紀元鼎五年甲為下瀬將軍横海將軍武紀元鼎六年韓說横海校尉東粤傳横海校尉福浮沮將軍武紀元鼎六年公孫賀匈河將軍武紀元鼎六年趙破奴十二部將軍武紀元封六年詔曰朕將巡邉垂置十二部將軍親帥師焉拔胡將軍元封四年郭昌見本傳中將軍公孫敖以中將軍從大將軍再出定襄見本傳因杅將軍太初元年公孫敖見本紀服䖍曰因杅地名因所征以名將軍貳師將軍太初元年以李廣利為貳師將軍期至貳師城取善馬故號貳師將軍見本傳執馬校尉武帝拜習者二人為執驅馬校尉驅馬校尉浚稽將軍武紀太初三年趙破奴應劭曰浚稽山在武威北彊弩將軍武帝立十七嵗李沮吕尤内史為彊弩將軍彊弩將軍長史韓延夀請嚴延年為長史彊弩都尉度遼將軍昭紀元鳯二年以中郎將范明友為度遼號將軍應劭曰當度遼水往撃烏桓故以為虎牙將軍宣紀本始二年田順蒲類將軍宣紀本始二年趙充國晉灼曰匈奴傳有蒲類澤祁連將軍宣紀本始二年田廣明應劭曰祁連匈奴中山名也破羌將軍宣紀神爵元年辛武賢䕶羌將軍見王尊傳䕶羌將軍轉校尉師古曰為校尉主轉運事而屬䕶羌將軍也王尊為之奮威將軍元紀永光二年以太常仕千秋為奮威將軍馮奉世傳作奮武將軍未詳孰誤建威將軍永光三年韓安國歩兵將軍平帝元始五年執金吾王駿見百官表下文成將軍武帝元狩中拜少翁文成將軍見封禅書五利將軍封禅書元鼎四年拜欒大為五利將軍得四印佩天士將軍地士將軍大通將軍印天士將軍見上地士將軍見上大通將軍見上天道將軍封禅書天子又刻玉印曰天道將軍使使立白茅上五利亦立白茅上天道者且為天子道天神也别將重將功臣表南安侯宣虎以重將破臧荼侯師古曰主將領輜重也廄將功臣表留侯張良以廄將起下邳城將功臣表東武侯郭䝉入為漢城將師古曰將策城之兵右林將功臣表漢三年宋子侯許瘛用趙右林將初從師古曰猶言羽林之將弩將功臣表清簡侯室中同以弩將初起從入漢總莫府軍正正平楊僕軍正丞胡建傳天漢中建守軍正丞師古曰南北軍各有軍正正又置丞都尉蕭何傳上令卒五百人一都尉為何衛爰盎傳吳王使一都尉以五百人圍守盎長鉟都尉功臣表周竈史記作長鈹軍門都尉周亞夫傳校司馬趙充國傳諸校司馬輕騎校尉衛青傳郭成營軍司馬車騎將軍音請谷永補營軍司馬軍司馬楊敞給事大將軍莫府為軍司馬左司馬孔聚以左司馬入漢右司馬陳胥以右司馬撃項籍侯騎司馬王虞人以騎司馬從車司馬王競以車司馬從張晏曰主車官軍司空杜延年補軍司空蘓林曰主獄官也軍司空令前將軍増奏馮奉世為之連敖韓信歸漢為連敖李竒曰楚官名軍候假丞陳湯傳杜勲將軍舍人魏尚饗軍吏舍人軍武庫令王鳯奏請杜欽為大將軍軍武庫令門尉芒侯耏跖以門尉初起碭壘尉主壘壁之事軍匠梧侯陽城延以軍匠從職志沛公以周昌為職志應劭曰掌主幟也駢驎功臣表許盎以駢驎從師古曰二馬曰駢駢驎謂並兩騎為軍翼也説衛許盎以說衛入漢師古曰説讀曰稅謂軍行初舍止之時為衛隊率申屠嘉林官遷為隊率隊史棘丘侯襄以執盾隊史從執矛中邑侯朱進以執矛從並功臣表䕶軍都尉䕶軍都尉秦官武帝元狩四年屬大司馬成帝綏和元年居大司馬府比司直哀帝元夀元年更名司冦平帝元始元年更名䕶軍百官表䕶軍中尉髙帝時陳平䕶軍中尉使盡䕶諸將見本傳䕶軍射師藝文志王賀司𨽻校尉司𨽻校尉周官武帝征和四年初置持節從中郎都官徒千二百人捕巫蠱督大姦猾後罷其兵察三輔三河𢎞農元帝初元四年去節成帝元延四年省綏和二年哀帝復置但為司𨽻冠進賢冠屬大司空比司直百官表從事鮑宣使掾趙后傳司𨽻解光遣從事掾業史望史趙后傳見上假佐王尊傳假佐放城門校尉城門校尉掌京師城門屯兵有司馬十二城門候百官表又劉屈氂傳云武帝征和二年以太子在外始置屯兵長安諸城門領城門兵孔光為太師領城門兵王音為特進領城門兵置莫府得舉吏如將軍城門令史王莽傳王興者故城門令史八校尉中壘長水屯騎胡騎歩兵射聲越騎虎賁中壘校尉掌北軍壘門内外掌西域師古曰掌北軍壘門之内而又外掌西域屯騎校尉掌騎士歩兵校尉掌上林苑門屯兵越騎校尉掌越騎如淳曰越人内附以為騎也晉灼曰取其材力超越也師古曰宣紀言佽飛射士胡越騎又此有胡騎校尉如説是長水校尉掌長水宣曲胡騎師古曰長水胡名也宣曲觀名胡騎之屯以宣曲者又有胡騎校尉掌池陽胡騎不常置師古曰胡騎之屯池陽者也射聲校尉掌待詔射聲士服䖍曰工射者也𡨕𡨕中聞聲則中之因以名也應劭曰須詔所命而射故曰待詔射也虎賁校尉掌輕車凡八校尉皆武帝初置有丞司馬自司𨽻至虎賁校尉秩皆二千石百官表臣天麟按中壘校尉掌北軍則知八校皆北軍也東都五營即八校之併省者而後書毎有北軍五校之稱則八校屬北軍又明矣監北軍使者劉屈氂傳任安又史記武帝使任安䕶北軍北軍錢官史記任安笞辱北軍錢官西域都䕶西域都䕶加官宣帝地節二年初置以騎都尉諌大夫使䕶西域三十六國有副校尉秩比二千石丞一人司馬候千人各二人百官表又西域傳云都䕶治烏壘城去陽闗二千七百叁十八里陽威白虎合騎之校陳湯斬郅攴益置陽威白虎合騎之校見本傳屯田校尉西域傳云武帝通西域而輪臺渠犂皆有田卒數百人置使者校尉領䕶以給使外國者至宣帝置都䕶匈奴益弱不得近西域於是徙屯田於北胥鞬莎車之地屯田校尉始屬都䕶渠犂田官西域傳即謂屯田校尉北假田官元紀初元五年罷北假田官伊循都尉西域傳元鳯四年立尉屠耆為樓蘭王更名其國為鄯善王請曰國中有伊城願漢遣一將屯田積榖令臣得依其威重於是漢遣司馬一人吏士四十人田伊循以鎮撫之其後更置都尉伊循官置始此矣司馬見上䕶菀使者大司馬音薦長史谷永為之戊巳校尉西域傳元帝置戊巳校尉屯田車師前王庭戊巳校尉元帝初元元年置有丞司馬各一人候五人秩比六百石百官表師古曰甲乙丙丁庚辛壬癸皆有正位唯戊巳寄治耳今所置校尉亦無常居故取戊巳為名也有戊校尉有巳校尉一説戊巳居中鎮覆四方今所置校尉亦處西域之中撫諸國也戊巳校尉王莽傳中陳終帶奉車都尉駙馬都尉奉車都尉掌御乗輿車駙馬都尉掌駙馬皆武帝初置秩比二千石百官表師古曰駙副馬也非止駕車皆為駙馬一曰駙近也疾也西漢㑹要卷三十二
