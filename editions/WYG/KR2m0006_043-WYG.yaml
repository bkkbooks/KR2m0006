body:
  text: 西漢會要卷四十三宋徐天麟撰職官十三改官名秦兼天下立百官之職漢因循而不革明簡易隨時宜也其後稍有所改表孝景中六年更命廷尉為大理將作少府為將作大匠主爵中尉為都尉長信詹事為長信少府將行為大長秋大行為行人奉常為太常典客為大行治粟内史為大農以大内為二千石置左右内官屬大内史記本紀孝武太初元年定官名本紀初漢興襲秦官置丞相御史大夫太尉至武帝罷太尉始置大司馬以冠將軍之號非有印綬官屬也及成帝時何武為九卿建言古者民樸事約國之輔佐必得賢聖然猶則天三光備三公官各有分職今末俗文弊政事煩多宰相之才不能及古而丞相獨兼三公之事所以久廢而不治也宜建三公官定卿大夫之任分職授政以考功效其後上以問師安昌侯張禹禹以為然時曲陽侯王根為大司馬驃騎將軍而何武為御史大夫於是上賜曲陽侯根大司馬印綬置官屬罷驃騎將軍官以御史大夫何武為大司空封列侯皆增奉如丞相以備三公官焉議者多以為古今異制漢自天子之號下至佐史皆不同於古而獨改三公職事難分明無益於治亂是時御史府吏舍百餘區井水皆竭又其府中列栢樹嘗有野烏數千棲宿其上晨去暮來號曰朝夕烏烏去不来者數月長老異之後二歳餘朱博為大司空奏言帝王之道不必相襲各繇時務髙皇帝以聖徳受命建立鴻業置御史大夫位次丞相典正法度以職相參總領百官上下相監臨歴載二百年天下安寧今更為大司空與丞相同位未獲嘉祐故事選郡國守相髙第為中二千石選中二千石為御史大夫任職者為丞相位次有序所以尊聖徳重國相也今中二千石未更御史大夫而為丞相權輕非所以重國政也臣愚以為大司空官可罷復置御史大夫遵奉舊制臣願盡力以御史大夫為百僚率哀帝從之廼更拜博為御史大夫會大司馬喜免以陽安侯丁明為大司馬衛將軍置官屬大司馬冠號如故事後四歳哀帝遂改丞相為大司徒復置大司空大司馬焉朱博傳哀帝元夀二年五月正三公官分職大司馬衛將軍董賢為大司馬丞相孔光為大司徒御史大夫彭宣為大司空正司直司𨽻造司㓂職事未定帝崩本紀初何武為大司空又與丞相方進共奏言古選諸侯賢者以為州伯書曰咨十有二牧所以廣聪明燭幽隠也今部刺史居牧伯之位秉一州之統選第大吏所薦位髙至九卿所惡立退任重職大春秋之義用貴治賤不以卑臨尊刺史位下大夫而臨二千石輕重不相凖失位次之序臣請罷刺史更置州牧以應古制奏可及博奏復御史大夫官又奏言漢家至徳溥大宇内萬里立置郡縣部刺史奉使典州督察郡國吏民安寧故事居部九歳舉為守相其有異材功效著者輙登擢秩卑而賞厚咸勸功樂進前丞相方進奏罷刺史更置州牧秩真二千石位次九卿九卿闕以髙第補其中材則苟自守而已恐功效陵夷奸軌不禁臣請罷州牧置刺史如故奏可朱博傳孝平元始五年更公卿大夫八十一元士官位名次及十二州名分界郡國所屬罷置改易天下多事吏不能紀本紀省官漢吏員自丞相至佐史凡十三萬二百八十五人表孝文後六年大旱蝗損郎吏員孝武損郎員三王世家孝昭元平元年詔日者省用罷不急官本紀戒敇官吏孝文十二年詔曰吾詔書數下歳勸民種植而功未興是吏奉吾詔不勤而勸民不明也且吾農民甚苦而吏莫之省將何以勸焉紀下同孝景後二年詔曰今歳或不登民食頗寡其咎安在或詐偽為吏吏以貨賂為市漁奪百姓侵牟萬民縣丞長吏也奸法與盗盗甚無謂也其令二千石各修其職不事官職耗亂者丞相以聞請其罪孝武元狩六年詔曰夫仁行而從善義立則俗易意奉憲者所以導之未明與將百姓所安殊路而矯䖍吏因乗埶㠯侵蒸庻邪今遣博士大等六人循行天下存問鰥寡孤獨及寃失職奸􅠕為害野荒治苛者舉奏孝宣地節四年詔曰朕惟百姓失職不贍吏或營私煩擾不顧厥咎又曰令甲死者不可生刑者不可息此先帝之所重而吏未稱今繫者或以掠辜若饑寒瘦死獄中何用心逆人道也朕甚痛之其令郡國歳上繫囚以掠笞若瘦死者所坐名縣爵里丞相御史課殿最以聞元康二年正月詔曰今吏修身奉法未有能稱朕意者朕甚愍焉其赦天下與士大夫厲精更始五月詔曰獄者萬民之命所以禁暴止邪養育羣生也能使生者不怨死者不恨則可謂文吏矣今則不然用法或持巧心析律二端深淺不平增辭餙非以成其罪奏不如實上亦亡繇知此朕之不明吏之不稱四方黎民將何仰哉二千石各察官屬勿用此人吏務平法或擅興繇役餙厨傳稱過使客越職踰法㠯取名譽譬猶踐薄氷以待白日豈不殆哉黄龍元年詔曰上古之治君臣同心舉措曲直各得其所朕數詔公卿務行寛大順民所疾苦今吏或以不禁奸邪為寛大縱釋有罪為不苛或以酷惡為賢皆失其中奉詔宣化如此豈不繆哉方今天下少事繇役减省兵革不動而民多貧盗賊不止其咎安在上計簿具文而已務為欺謾以避其課三公不以為意朕將何任諸請詔省卒徒自給者皆止御史察計簿疑非實者按之使真偽無相亂孝成建始元年詔曰羣公孜孜率先百僚輔朕不逮崇寛大長和睦凡事恕已毋行苛刻孝哀元夀元年詔曰朕獲保宗廟不明不敏夙夜憂勞未遑寧息惟陰陽不調元元不贍未睹厥咎屢敇公卿庻幾有望至今有司執法未得其中或上暴虐假勢獲名溫良寛柔䧟於亡滅是故殘賊彌長和睦日衰百姓愁怨靡所措躬廼正月朔日有蝕之厥咎不逺在余一人公卿大夫其各悉心勉帥百寮崇任仁人黜逺殘賊期於安民陳朕之過失無有所諱戒貪吏文帝十三年定律曰吏坐受賕枉法守縣官財物而即盗之已論命復有笞罪者皆棄市刑法志景帝元年詔曰吏受所監臨以飲食免重受財物賤買貴賣論輕廷尉與丞相更議著令廷尉信謹與丞相議曰吏及諸有秩受其官屬所監所治所行所將其與飲食計償費勿論它物若買故賤賣故貴皆坐贓為盗沒入贓縣官吏遷徙免受其故官屬所將監治送財物奪爵為士伍免之無爵罰金二斤令沒入所受有能捕告畀其所受贓紀後二年詔曰吏以貨賂為市漁奪百姓侵牟萬民縣丞長吏也奸法與盗盗其無謂也其令二千石各修其職不事官職耗亂者丞相以聞請其罪紀三年詔吏發民若取庸采黄金珠玊者坐贓為盗二千石聽者與同罪紀策免大臣宣帝五鳯二年策御史大夫蕭望之曰有司奏君責使者禮過丞相亡禮亷聲不聞敖慢不遜亡以扶政帥先百竂君不深思䧟于兹􅁾朕不忍致君于理使光禄勲惲策詔左遷君為太子太傅授印其上故印使者便道之官君其秉道明孝正直是與帥意亡諐靡有後言本傳成帝河平四年左將軍史丹等奏王商位三公爵列侯親受詔策為天下師不遵法度以翼國家而回辟下媚以進其私執左道以亂政為臣不忠罔上不道甫刑之辟皆為上戮罪名明白臣請詔謁者召商詣若盧詔獄上素重商知正言多險制曰勿治鳯固争之於是制詔御史蓋丞相以徳輔翼國家典領百僚協和萬國為職任莫重焉今樂昌侯商為丞相出入五年未聞忠言嘉謀而有不忠執左道之辜䧟于大辟前商女弟内行不修奴賊殺人疑商教使為商重臣故抑而不窮今或言商不以自悔而反怨懟朕甚傷之惟商與先帝有外親未忍致于理其赦商罪使者收丞相印綬本傳永始二年册丞相薛宣曰君為丞相出入六年忠孝之行率先百僚朕無聞焉朕既不明變異數見嵗比不登倉廩空虚百姓饑饉流離道路疾疫死者以萬數人至相食盗賊並興羣職曠廢是朕之不徳而股肱不良也廼者廣漢羣盗横恣殘賊吏民朕惻然傷之教以問君君對輙不如其實西州鬲絶幾不為郡三輔賦歛無度酷吏並縁為奸侵擾百姓詔君案驗復無欲得事實之意九卿以下咸承風㫖同時䧟于謾欺之罪咎繇君焉有司法君領職解嫚開謾欺之路傷薄風化無以帥示四方不忍致君于理其上丞相髙陽侯印綬罷歸本傳永始三年賜左將軍史丹策曰左將軍寢病不衰願歸治疾朕愍以官職之事久􅇔將軍使射不瘳使光禄勲賜將軍黄金五十斤安車駟馬其上將軍印綬宜專精神務近醫藥以補不衰本傳綏和二年賜丞相翟方進册曰皇帝問丞相君有孔子之慮孟賁之勇朕嘉與君同心一意庻幾有成上君登位于今十年灾害並臻民被飢饉加以􅍚疫溺死闗門牡開失國守備盗賊黨軰吏民殘賊毆殺良民斷獄嵗嵗多前上書言事交錯道路懷姦朋黨相為隠蔽皆亡忠慮羣下匈匈更相嫉妬其咎安在觀君之治無欲輔朕富民便安元元之念間者郡國穀雖頗熟百姓不足者尚衆前去城郭未能盡還夙夜未嘗㤀焉朕惟往時之用與今一也百僚用度各有數君不量多少一聽羣下言用度不足奏請一切增賦税城郭壞及園田過更算馬牛羊增益鹽鐡變更無常朕既不明隨奉許可後議者以為不便制詔下君君云賣酒醪後詩止未盡月復奏議今賣酒醪朕誠怪君何持容容之計無忠固意將何以輔朕帥道羣下而欲久䝉顯尊之位豈不難哉傳曰髙而不危所以長守貴也欲退君位尚未忍君其熟念詳計塞絶姦原憂國如家務便百姓以輔朕朕既已改君其自思彊食謹職使尚書令賜君上尊酒十石養牛一君審處焉本傳哀帝建平元年策免大司空師丹曰夫三公者朕之腹心也輔善相過正率百僚和合天下者也朕既不明委政於公間者陰陽不調寒暑失常變異屢臻山崩地震河决泉湧流殺人民百姓流連無何歸心司空之職尤廢焉君在位出入三年未聞忠言嘉謀而反有朋黨相進不公之名乃者以挺力田議改幣章示君君内為朕建可改不疑以君之言博考朝臣君乃希衆雷同外以為不便令觀聽者歸非於朕朕隠忍不宣為君受愆朕疾夫比周之徒虚偽壊化浸以成俗故屢以書飭君庻幾君省過求已而反不受退有後言及君奏封事傳於道路布聞朝市言事者以為大臣不忠辜䧟重辟獲虚采名謗譏匈匈流於四方腹心如此謂疏者何殆謬於二人同心之利焉將何以率示羣下附親逺方朕惟君位尊任重慮不周宻懷諼迷國進退違命反覆異言甚為君耻之非所以共承天地永保國家之意以君嘗託傳位未忍考于理已詔有司赦君勿治其上大司空髙樂侯印綬罷歸本傳建平二年策大司馬傅喜曰君輔政出入三年未有昭然正朕不逮而本朝大臣遂其姦心咎由君焉其上大司馬印綬就第本傳策免丞相孔光曰丞相者朕之股肱所與共承宗廟統理海内輔朕之不逮以治天下也朕既不明灾異重仍日月無光山崩河决五星失行是章朕之不徳而股肱之不良也君前為御史大夫輔翼先帝出入八年卒無忠言嘉謀今相朕出入三年憂國之風復無聞焉陰陽錯繆歳比不登天下空虚百姓飢饉父子分㪚流離道路以十萬數而百官羣職曠廢奸宄放縱盗賊並起或攻官寺殺長吏數以問君君無怵􅅥憂懼之意對無能為是羣卿大夫咸惰哉莫以為意咎由君焉君秉社稷之重總百僚之任上無以正朕之闕下不能綏安百姓書不云乎毋曠庻官天工人其代之於虖君其上丞相博山侯印綬罷歸本傳策左將軍彭宣曰有司數奏言諸侯國人不得宿衛將軍不宜典兵馬處大位朕惟將軍任漢將之重而子又前取淮陽王女婚姻不絶非國之制使光禄大夫曼賜將軍黄金五十斤安車駟馬其上左將軍印綬以闗内侯歸家本傳策免大司空何武曰君舉錯煩苛不合衆心孝聲不聞惡名流行無以率示四方其上大司空印綬罷歸就國本傳建平三年詔御史大夫王崇曰朕以君有累世之羙故踰列次在位以來忠誠正國未聞所繇反懷詐諼之辭欲以攀救舊姻之家大逆之辜舉錯專恣不遵法度亡以示百僚左遷為大司農王吉傳哀帝元夀二年册免大司馬丁明曰前東平王雲貪欲上位祠祭祝詛雲后舅伍宏以毉待詔與校秘書郎楊雄結謀反逆禍甚廹切頼宗廟神靈董賢等以聞咸伏其辜將軍從弟侍中奉車都尉吳族父左曺屯騎校尉宣皆知宏及栩丹諸侯王后親而宣除用丹為御屬吳與宏交通厚善數稱薦宏宏以附吳得興其惡心因毉技進幾危社稷朕以恭皇后故不忍有云將軍位尊任重既不能明威立義折消未萌又不深疾雲宏之惡而懷非君上阿為宣吳反痛恨雲等揚言為羣下所寃又親見言伍宏善醫死可惜也賢等獲封極幸嫉妬忠良非毁有功於戲傷哉蓋君親無將將而誅之是以季友鴆叔牙春秋賢之趙盾不討賊謂之弑君朕閔將軍䧟于重刑故以書飭將軍遂非不改復與丞相嘉相比今嘉有依得以罔上有司致法將軍請獄治朕惟噬膚之恩未忍其上驃騎將軍印綬罷歸就第哀帝崩王莽使謁者以大后詔即闕下册董賢曰間者以來陰陽不調菑害並臻元元䝉辜夫三公鼎足之輔也髙安侯賢未更事理為大司馬不合衆心非所以折衝綏逺也其收大司馬印綬罷歸第哀帝崩彭宣上書願上大司空長平侯印綬乞骸骨歸郷里俟寘溝壑莽白太后策宣曰惟君視事日寡功徳未効廹於老眊昏亂非所以輔國家綏海内也使光禄勲豐册詔君其上大司空印綬使就國彭宣傳元始中莽以太皇太后詔賜太師大司徒馬宫策曰太師大司徒扶徳侯上書言前以光禄勲議故定陶共王毋諡曰婦人以夫爵尊為號諡宜曰孝元傅皇后稱渭陵東園臣知妾不得體君卑不得敵尊而希指雷同詭經辟説以感誤上為臣不忠當伏斧鉞之誅幸䝉洒心自新又令得保首領伏自惟念入稱四輔出備三公爵為列侯誠無顔復望闕廷無心復居官府無宜復食國邑願上大師大司徒扶徳侯印綬避賢者路下君章有司皆以為四輔之職為國維綱三公之任鼎足承君不有鮮明固守無以居位如君言至誠可聽帷君之惡在洒心前不敢文過朕甚多之不奪君之爵邑以著自古皆有死之義其上大師大司徒印綬使者以侯就第馬宫傳西漢會要卷四十三
