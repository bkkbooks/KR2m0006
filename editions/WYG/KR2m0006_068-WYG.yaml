body:
  text: 西漢㑹要卷六十八宋徐天麟撰蕃夷上匃奴匃奴其先夏后氏之苗裔曰淳維自淳維以至頭曼千有餘歳時大時小别散分離尚矣單于頭曼有太子曰冒頓冒頓殺父自立是時漢初定徙韓王信於代都馬邑匃奴大攻圍馬邑韓信降匃奴匃奴得信因引兵南踰句注攻大原至晉陽下髙帝自將兵徃擊之㑹東大寒雨雪卒之墮指者十二三於是冒頓陽敗走誘漢兵漢逐擊冒頓冒頓匿其精兵見羸弱髙帝先至平城步兵未盡到冒頓縱精兵三十餘萬騎圍髙帝於白登七日髙帝迺使使間厚遺閼氏閼氏迺謂冒頓曰兩主不相困今得漢地單于終非能居之冒頓與韓信將王黄趙利期而兵乆不來疑其與漢有謀亦取閼氏之言迺開圍一角於是髙皇帝令士皆持滿傅矢外鄉從解角直出得與大軍合而冒頓遂引兵去漢亦引兵罷使劉敬結和親之約奉宗室女翁主為單于閼氏歳奉匈奴絮繒酒食物各有數約為兄弟以和親孝惠髙后時冒頓寖驕迺為書使使遺髙后曰孤僨之君生於沮澤之中長於平野牛馬之域數至邊境願遊中國陛下獨立孤僨獨居兩主不樂無以自虞願以所有易其所無髙后大怒召丞相平及樊噲季布等議斬其使者發兵擊之樊噲曰臣願得十萬衆横行匃奴中季布曰噲可斬也前陳豨反於代漢兵三十二萬噲為上將軍時匈奴圍髙帝於平城噲不能解圍今傷痍者甫起而噲欲揺動天下妄言以十萬衆横行是面謾也且匃奴逺處絶漠得其善言不足喜惡言不足怒也髙后曰善令大謁者張澤報書曰單于不忘敝邑賜之以書敝邑恐懼退日自圖年老氣衰髮齒墮落行步失度單于過聽不足以自汗敝邑無罪宜在見赦竊有御車二乘馬二駟以奉常駕冒頓得書復使使來謝曰未嘗聞中國禮義陛下幸而赦之因獻馬遂和親至孝文即位復修和親其三年夏匃奴右賢王入居河南地為冦於是文帝遣丞相灌嬰將軍擊右賢王走出塞其明年單于遺漢書曰願寝兵休士養馬除前事復故約以安邊民書至漢議擊與和親孰便公卿皆曰和親甚便漢許之孝文前六年遺匃奴書曰漢與匃奴約為兄弟所遺單于甚厚背約離兄弟之親者常在匃奴然右賢王事已在赦前勿深誅單于若稱書意明告諸吏使無負約有信敬如單于書使者言單于自將并國有功甚苦兵事服繡祫綺衣長襦錦袍各一比疎一黄金飾具帶一黄金犀毗一繡十匹錦二十匹赤綈緑繒各四十匹使中大夫意謁者令肩遣單于後頃之冒頓死子稽粥立號曰老上單于文帝復遣宗人女翁主為單于閼氏使宦者中行説傅翁主説不欲行漢彊使之説曰必我也為漢患者中行説既至因降單于單于愛幸之日夜教單于候利害處孝文十四年匃奴單于十四萬騎入朝那蕭闗殺北地都尉卬虜人民蓄産甚多遂至彭陽使騎兵入燒回中宫候騎至雍甘泉於是文帝以中尉周舎郎中令張武為將軍發車千乘十萬騎軍長安旁以備胡冦而拜昌侯盧卿為上郡將軍寗侯魏遫為北地將軍隆慮侯周竈為隴西將軍東陽侯張相如為大將軍成侯董赤為將軍大發車騎徃擊胡單于留塞内月餘漢逐出塞即還匃奴日以驕歳入邊漢甚患之迺使使遺匃奴書單于亦使當户報謝復言和親事孝文後二年使使遺匃奴書曰朕與單于皆捐細故俱蹈大道也墮壞前惡以圖長乆和親之後漢過不先單于其察之後四年老上單于死子軍臣單于立漢復與匃奴和親軍臣單于立歳餘匃奴復絶和親大入上郡雲中各三萬騎所殺畧甚衆於是漢使三將軍軍屯北地代屯句注趙屯飛狐口縁邊亦各堅守以備胡冦又置三將軍軍長安西細栁渭北棘門霸上以備邊後歳餘文帝崩景帝立復與匃奴和親通闗市給遺單于遣翁主如故約終景帝世時時小入盜邊無大冦武帝即位明和親約束厚遇闗市饒給之漢使馬邑人聶翁壹閒闌出物與匃奴交易陽為賣馬邑城以誘單于單于信之而貪馬邑財物迺以十萬騎入武州塞漢伏兵三十餘萬馬邑旁御史大夫韓安國為䕶軍將軍四將軍以伏單于單于入漢塞見畜布野而無人牧者怪之時鴈門尉史知漢謀具告單于單于大驚曰吾固疑之乃引兵還漢以恢本建造兵謀而不進誅恢自是後匃奴絶和親自馬邑軍後五歲之秋漢使四將各萬騎擊胡闗市下將軍衛青出上谷至龍城得胡首虜七百人公孫賀出雲中無所得公孫敖出代郡為胡所敗七千李廣出鴈門為胡所敗匃奴生得廣廣道亡歸其明年秋匃奴二萬騎入漢殺遼西太守畧二千餘人又敗漁陽太守軍千餘人圍將軍安國安國時千餘騎亦且盡㑹燕救之至匃奴迺去又入鴈門殺畧千餘人於是漢使將軍衛青將三萬騎出鴈門李息出代郡擊胡得首虜數千其明年衛青復出雲中以西至隴西擊胡之樓煩白羊王於河南得胡首虜數千羊百餘萬於是漢遂取河南地築朔方復繕故秦時䝉恬所為塞因河而為固漢亦築上谷之斗辟縣造陽地以予胡是歳元朔二年也其冬軍臣單于死其弟左谷蠡王伊穉斜自立為單于攻敗軍臣單于太子於單於單亡降漢數月死伊穉斜單于既立其夏匃奴數萬騎入代郡秋又入鴈門明年又入代郡定襄上郡匃奴右賢王怨漢奪之河南地而築朔方數冦盜邊及入河南侵擾朔方殺掠吏民甚衆其明年春漢遣衛青將六將軍十餘萬人出朔方髙闕夜圍右賢王脱身逃走漢將軍得右賢王人衆男女萬五千人禆小王十餘人其明年春漢復遣大將軍衛青將六將軍十餘萬騎仍再出定襄數百里擊匃奴得首虜前後萬九千餘級而漢亦亡兩將軍三千餘騎右將軍建得以身脱而前將軍趙信兵不利降匃奴其明年胡數萬騎入上谷殺數百人明年春漢使票騎將軍去病將萬騎出隴西過焉耆山千餘里得胡首虜八千餘級得休屠王祭天金人其夏驃騎將軍復與合騎侯數萬騎出隴西北地二千里過居延攻祁連山得胡首虜三萬餘級禆小王以下十餘人是時匃奴亦來入代郡鴈門殺掠數百人漢使博望侯及李將軍廣出右北平擊匃奴左賢王左賢王圍李廣廣軍四千人死者過半㑹博望侯軍救至李將軍得脱盡亡其軍其秋單于怒昆邪王休屠王居西方為漢所殺虜數萬人欲召誅之昆邪王殺休屠王并將其衆降漢漢已得昆邪則隴西北地河西益漢少胡冦徙闗東貧民處所奪匃奴河南地新秦中以實之西減北地以西戍卒半明年春匃奴入右北平定襄各數萬騎殺掠千餘人其年春漢令大將軍青驃騎將軍去病中分軍大將軍出定襄驃騎將軍出代咸約絶幕擊匃奴單于聞之逺其輜重以精兵待於幕北與漢大將軍接戰一日㑹暮大風起漢兵縱左右翼圍單于單于自度戰不能與漢兵遂獨與壯騎數百潰漢圍西北遁走驃騎封於狼居胥山禪姑衍臨翰海而還是後匃奴逺遁而幕南無王庭漢度河自朔方以西至令居徃往通渠置田官吏卒五六萬人㑹驃騎將軍去病死於是漢乆不北擊胡數歳伊穉斜單于立十三年死子烏維立為單于是歳元鼎三年也其後漢方南誅兩越不擊匃奴匃奴亦不入邊烏維立三年漢已滅兩越天子巡邊親至朔方勒兵十八萬騎以見武節而使郭吉風告單于曰南越王頭已垂於漢北闕下令單于即能與漢戰天子自將兵待邊即不能亟南面而臣於漢何但逺走亡匿於幕北寒苦無水草之地為語卒單于大怒留郭吉不歸遷辱之北海上而單于終不肯為冦於漢邊休養士馬習射獵數使使好辭甘言求和親漢使王烏等闚匃奴匃奴法漢使不去節不以墨黥其面不得入穹廬王烏北地人習胡俗去其節黥面入廬單于愛之陽許曰吾為遣其太子入質於漢以求和親漢使楊信使於於匃奴是時漢東拔濊貉朝鮮以為郡而西置酒泉郡以隔絶胡與羌通之路又西月氏大夏以翁主妻烏孫王以分匃奴西方之援國又北益廣田至眩雷為塞而匃奴終不敢以為言烏維單于立十歳死子詹師廬立年少號為兒單于是歳元封六年也明年春漢使浞野侯破奴將二萬騎出朔方北二千餘里期至浚稽山而還匃奴生得浞野侯軍遂沒於匃奴兒單于立三歳而死子少匃奴迺立其季父烏維單于弟右賢王句黎湖為單于是歳太初三年也句黎湖單于立漢使光禄徐自為出五原塞數百里逺者千里築城障列亭至盧朐而使游擊將軍韓説長平侯衛伉屯其旁使彊弩都尉路博德築居延澤上其秋匃奴大入雲中定襄五原朔方殺掠數千人行壞光禄所築亭障又使右賢王入酒泉張掖掠數千人㑹任文擊救盡復失其所得而去句黎湖單于立一歳死其弟左大都尉且鞮侯立為單于漢既誅大宛威震外國天子意欲遂困胡迺下詔曰髙皇帝遺朕平城之憂昔齊襄公復九世之讐春秋大之是歳太初四年也漢遣中郎將蘇武厚幣賂遺單于單于益驕禮甚倨明年漢使貳師將軍將三萬騎出酒泉擊右賢王於天山得首虜萬餘級而還匃奴大圍貳師幾不得脱漢兵物故什六七漢又使因杅將軍出西河與彊弩都尉㑹涿邪山亡所得使騎都尉李陵將步兵五千人出居延北千餘里與單于㑹合戰陵所殺傷萬餘人兵食盡欲歸單于圍陵陵降匃奴其兵得脱歸漢者四百人單于迺貴陵以其女妻之後二歳漢使貳師將軍六萬騎步兵七萬出朔方彊弩都尉路博德將萬餘人與貳師㑹游擊將軍説步兵三萬人出五原因杅將軍敖將騎萬步兵三萬人出鴈門匃奴聞悉逺其累重於余吾水北而單于以十萬待水南與貳師接戰貳師解而引歸與單于連鬭十餘日游擊亡所得因杅與左賢王戰不利引歸明年且鞮侯單于死立五年長子左賢王立為狐鹿姑單于以左大將為左賢王數年病死其子先賢撣不得代更以為日逐王日逐王者賤於左賢王單于自以其子為左賢王單于既立六年而匃奴入上谷五原殺掠吏民其年匃奴復入五原酒泉殺兩部都尉於是漢遣貳師將軍七萬人出五原御史大夫商丘成將三萬餘人出西河重合侯莽通將四萬騎出酒泉千餘里單于聞漢兵大出悉遣其輜重徙趙信城北邸郅居水左賢王驅其人民度余吾水六七百里居兠銜山單于自將精兵左安侯度姑且水御史大夫軍至追邪徑無所見還匃奴使大將與李陵將三萬餘騎追漢軍至浚稽山合轉戰九日漢兵陷陳卻敵殺傷虜甚衆至蒲奴水虜不利還去貳師將軍出塞匃奴使右大都尉與衛律將五千騎要擊漢軍於夫羊句山狹貳師遣屬國胡騎二千與戰虜兵壞散死傷者數百人漢軍乘勝追北匃奴奔走莫敢距敵㑹貳師妻子坐巫蠱收聞之憂懼其掾胡亞夫説貳師曰夫人室家皆在吏若還不稱意適與獄㑹貳師由是狐疑欲深入要功長史與決眭都尉煇渠侯謀曰將軍懷異心欲危衆求功恐必敗謀共執貳師貳師聞之斬長史引兵還至速邪烏燕然山單于知漢軍勞倦自將五萬騎遮擊貳師相殺傷甚衆夜塹漢軍前深數尺從後急擊之軍大亂敗貳師降單于以女妻之尊寵在衛律上其明年單于遣使遺漢書云南有大漢北有彊胡胡者天之驕子也不為小禮以自煩今欲與漢闓大闗取漢女為妻歳給遺我糵酒萬石稷米五千斛雜繒萬匹它如故約則邊不相盜矣漢遣使者報送其使單于留使者三歳迺得還貳師在匃奴歳餘衛律害其寵㑹母閼氏病律飭胡巫言先單于怒曰胡故時祠兵常言得貳師以社今何故不用於是收貳師貳師罵曰我死必滅匃奴遂屠貳師以祠武帝崩前此者漢兵深入窮追二十餘年匃奴孕重墮殰罷極苦之後三年單于欲求和親㑹病死更立子左谷蠡王為壺衍鞮單于是歳始元二年也後復得匃奴降者言烏桓嘗發先單于冢匃奴怨之方發二萬騎擊烏桓大將軍霍光欲發兵邀擊之以問䕶軍都尉趙充國充國以為蠻夷自相攻擊而發兵要之招冦生事非計也光更問中郎將范明友明友言可擊於是拜明友為度遼將軍將二萬騎出遼東匃奴聞漢兵至引去明友因乘烏桓敝擊之斬首六千餘級獲三王首還匃奴繇是恐即使使之烏孫求欲得漢公主擊烏孫取車延惡師地烏孫公主上書下公卿議救未決昭帝崩宣帝即位烏孫昆彌復上書言連為匃奴所侵削昆彌願發國半精兵人馬五萬匹盡力擊匃奴唯天子出兵哀救公主本始二年漢大發闗東輕鋭士選郡國吏三百名伉健習騎射者皆從軍遣御史大夫田廣明為祁連將軍四萬餘騎出西河度遼將軍范明友三萬餘騎出張掖前將軍韓增三萬餘騎出雲中後將軍趙充國為蒲類將軍三萬餘騎出酒泉雲中太守田順為虎牙將軍三萬餘騎出五原凡五將軍兵十餘萬騎出塞各二千餘里及校尉常惠使䕶發兵烏孫西域昆彌自將翕侯以下五萬餘騎從西方入與五將軍兵凡二十餘萬衆匈奴聞漢兵大出老弱犇走敺蓄産逺遁逃是以五將少所得度遼將軍出塞千二百餘里至蒲離候水斬首捕虜七百餘級前將軍出塞千二百餘里至烏貟斬首捕虜至候山百餘級蒲類將軍兵當與烏孫合擊匃奴蒲類澤烏孫先期至而去漢兵不與相及蒲類將軍出塞千八百餘里西去候山斬首捕虜得單于使者蒲隂王以下三百餘級祁連將軍出塞千六百里至雞秩山斬首捕虜十九級虎牙將軍出塞八百餘里至丹余吾水上即止兵不進斬首捕虜千九百餘級校尉常惠與烏孫兵至右谷蠡庭獲單于父行及嫂居次名王犂汗都尉干長將以下三萬九千餘級虜馬牛羊驢驘橐駝七十餘萬漢封惠為長羅侯然匃奴民衆死傷而去者及蓄産逺移死亡不可勝數於是匈奴遂衰耗怒烏孫其冬單于自將數萬騎擊烏孫頗得老弱欲還㑹天大雨雪一日深丈餘人民蓄産凍死還者不能什一於是丁令乘弱攻其北烏桓入其東烏孫擊其西凡三國所殺數萬級馬數萬匹牛羊甚衆又重以餓死人民死者什三蓄産什五匃奴大虚弱諸國羈屬者皆瓦解攻盜不能理其後漢出三千餘騎為三道並入匃奴捕虜得數千人還匃奴終不敢取當兹欲鄉和親而邊境少事矣壺衍鞮單于立十七年死弟左賢王立為虛閭權渠單于是歳地節二年也虚閭權渠單于立九年死握衍朐鞮單于立復修和親遣弟伊酋若王勝之入漢獻見日逐王素與握衍胊鞮單于有隙即率其衆數萬騎歸漢漢封日逐王為歸德侯時單于已立二歳暴虐殺伐國中不附及太子左賢王數讒左地貴人左地貴人皆怨其明年烏桓擊匃奴東邊姑夕王頗得人民單于怒姑夕王恐即與烏禪幕及左地貴人共立稽侯狦為呼韓邪單于發左地兵四五萬人西擊握衍朐鞮單于至姑且水北未戰握衍朐鞮單于兵敗走自殺左大且渠都隆竒亡之右賢王所其民衆盡降呼韓邪單于是歳神爵四年也呼韓邪單于歸庭數月罷兵使各歸故地乃收其兄呼屠吾斯在民間者立為左谷蠡王使人告右賢貴人欲令殺右賢王其冬都隆竒與右賢王共立日逐王薄胥堂為屠耆單于發兵數萬人東襲呼韓邪單于呼韓邪單于兵敗走屠耆單于還以其長子都塗吾西為左谷蠡王少子姑瞀樓頭為右谷蠡王留居單于庭明年秋屠耆單于使日逐王先賢撣兄右奥鞬王為烏藉都尉各二萬騎屯東方以備呼韓邪單于是時西方呼掲王來與唯犂當户謀共讒右賢王言欲自立為烏藉單于屠耆單于殺右賢王父子後知其寃復殺唯犂當户於是呼掲王恐遂畔去自立為呼掲單于右奥鞬王聞之即自立為車犂單于烏藉都尉亦自立為烏藉單于凡五單于屠耆單于自將兵東擊車犂單于使都隆竒擊烏藉烏藉車犂皆敗西北走與呼掲單于兵合為四萬人烏藉呼掲皆去單于號共并力尊輔車犂單于屠耆單于聞之使左大將都尉將四萬騎分屯東方以備呼韓邪單于自將四萬騎西擊車犂單于車犂單于敗西北走屠耆單于即引西南留闟敦地其明年呼韓邪單于遣其弟右谷蠡王等西襲屠耆單于屯兵殺畧萬餘人屠耆單于聞之即自將六萬騎擊呼韓邪單于行千里未至嗕姑地逢呼韓邪單于兵可四萬人合戰屠耆單于兵敗自殺都隆竒乃與屠耆少子左谷蠡王姑瞀樓頭亡歸漢車犂單于東降呼韓邪單于呼韓邪單于左大將烏厲屈與父呼遫累烏厲温敦皆見匃奴亂率其衆數萬人南降漢封烏厲屈為新城侯烏厲温敦為義陽侯是時李陵子復立烏藉都尉為單于呼韓邪單于捕斬之遂復都單于庭然衆裁數萬人屠耆單于從弟休旬王將所主五六百騎擊殺左大且渠并其兵至右地自立為閏振單于在西邊其後呼韓邪單于兄左賢王呼屠吾斯亦自立為郅支骨都侯單于在東邊其後二年閏振單于率其衆東擊郅支單于郅支單于與戰殺之并其兵遂進攻呼韓邪呼韓邪破其兵走郅支都單于庭呼韓邪之敗也左伊秩訾王為呼韓邪計勸令稱臣入朝事漢從漢求助如此匈奴乃定呼韓邪議問諸大臣皆曰匃奴之俗本上氣力而下服役以馬上戰鬭為國故有威名於百蠻戰死壯士所有也今兄弟爭國不在兄則在弟雖死猶有威名子孫常長諸國漢雖彊猶不能兼并匃奴柰何亂先古之制臣事於漢卑辱先單于為諸國所笑雖如是而安何以復長百蠻左伊秩訾曰不然彊弱有時今漢方盛烏孫城郭諸國皆為臣妾今事漢則安存不事則危亡呼韓邪從其計引衆南近塞遣子右賢王銖婁渠堂入侍郅支單于亦遣子右大將駒于利受入侍是歳甘露元年也明年呼韓邪單于欵五原塞願朝三年正月漢遣車騎都尉韓昌迎發過所七郡郡二千騎為陳道上單于正月朝天子于甘泉宫漢寵以殊禮位在諸侯王上贊謁稱臣而不名賜以冠帶衣裳黄金璽盭綬玉具劒佩刀弓一張矢四發棨㦸十安車一乘鞍勒一具馬十五匹金二十斤錢二十萬衣被七十七襲錦繡綺縠雜帛八千匹絮六千斤單于就邸留月餘遣歸國郅支單于亦遣使奉獻漢遇之甚厚明年兩單于俱遣使朝獻漢待呼韓邪使有加明年呼韓邪單于復入朝禮賜如初加衣百一十襲錦帛九千匹絮八千斤始郅支單于以為呼韓邪降漢兵弱不能復自還即引其衆西欲攻定右地又屠耆單于小弟本侍呼韓邪亦亡之右地收兩兄餘兵得數千人自立為伊利目單于道逢郅支合戰郅支殺之并其兵五萬餘人聞漢出兵穀助呼韓邪即遂留居右地自度力不能定匈奴乃益西近烏孫欲與并力遣使見小昆彌烏就屠烏就屠見呼韓邪為漢所擁郅支亡虜欲攻之以稱漢乃殺郅支使持頭送都䕶在所發八千騎迎郅支郅支見烏孫兵多其使又不反勒兵逢擊烏孫破之因北擊烏掲烏掲降發其兵西破堅昆北降丁令并三國數遣兵擊烏孫常勝之堅昆東去單于庭七千里南去車師五千里郅支留都之元帝初即位呼韓邪單于復上書言民衆困乏漢詔雲中五原郡轉穀二萬斛以給焉郅支單于自以道逺又怨漢擁䕶呼韓邪遣使上書求侍子漢遣谷吉送之郅支殺吉漢不知吉音問而匃奴降者言聞甌脱皆殺之呼韓邪單于使來漢輒簿責之甚急明年漢遣車騎都尉韓昌光禄大夫張猛送呼韓邪侍子求問吉等因赦其罪勿令自疑昌猛見單于民衆益盛塞下禽獸盡單于足以自衛不畏郅支聞其大臣多勸單于北歸者恐北去後難約束昌猛即與為盟約曰自今以來漢與匃奴合為一家世世毋得相詐相攻其後呼韓邪竟北歸庭人衆稍稍歸之國中遂定郅支既殺使者自知負漢又聞呼韓邪益彊恐見襲擊欲逺去㑹康居王數為烏孫所困與諸闟侯計以為匈奴大國烏孫素服屬之今郅支單于困阸在外可迎置東邊使合兵取烏孫以立長無匃奴憂矣即使使至堅昆通語郅支郅支素恐又怨烏孫聞康居計大説遂與相結引兵而西康居亦遣貴人橐駝驢馬數千匹迎郅支郅支人衆中寒道死餘財三千人到康居其後都䕶甘延夀與副陳湯發兵即康居誅斬郅支郅支既誅呼韓邪單于且喜且懼上書言曰常願謁見天子誠以郅支在西方恐其與烏孫俱來擊臣以故未得至漢今郅支已伏誅願入朝見竟寧元年單于復入朝禮賜如初加衣服錦帛絮皆倍於黄龍時單于自言願壻漢氏以自親元帝以後宫良家子王牆字昭君賜單于單于驩喜上書願保塞上谷以西至敦煌傳之無窮請罷邊備塞吏卒以休天子人民天子令下有司議議者皆以為便郎中侯應習邊事以為不可許對奏天子有詔勿議罷邊塞事王昭君號寧胡閼氏生一男伊屠智牙師為右日逐王呼韓邪立二十八年建始二年死雕陶莫臯立為復株絫若鞮單于復株纍若鞮單于立遣子右致盧兒王醯諧屠奴侯入侍河平元年單于遣右臯林王伊邪莫演等奉獻朝正月河平四年正月遂入朝加賜繡繒帛二萬匹絮二萬斤它如竟寕時復株絫單于立十歳死弟且糜胥立為搜諧若鞮單于搜諧若鞮單于立遣子左祝都韓王朐留斯侯入侍以且莫車為左賢王搜諧單于立八歳元延元年為朝二年發行未入塞病死弟且莫車立為車牙若鞮單于車牙單于立遣子右於涂仇撣王烏夷當入侍以囊知牙斯為左賢王車牙單于立四歳死弟囊知牙斯立為烏珠留若鞮單于烏珠留單于立以第二閼氏子樂為左賢王以第五閼氏子輿為右賢王遣子右股奴王烏鞮牙斯入侍建平四年單于上書願朝五年時哀帝被疾或言匃奴從上游來厭人自黄龍竟寧時單于朝中國輒有大故上由是難之以問公卿亦以為虚費府帑可且勿許單于使辭去未發黄門郎揚雄上書諫曰今單于上書求朝國家不許而辭之臣愚以為漢與匃奴從此隙矣書奏天子悟焉召還匃奴使者更報單于書而許之賜繒帛五十匹黄金十斤單于未發㑹病復遣使願朝明年故事單于朝從名王以下及從者二百餘人單于又上書言䝉天子神靈人民盛壯願從五百人入朝以明天子盛德上皆許之元夀二年單于來朝上以大嵗厭勝所在舎之上林苑蒲陶宫告之以加敬於單于單于知之加賜衣三百七十襲錦繡繒帛三萬匹絮三萬斤他如河平時既罷遣中郎將韓況送單于初上遣稽留昆隨單于去到國復遣稽留昆同母兄大且方與婦入侍還歸復遣且方同母兄左日逐王都與婦入侍是時漢平帝幼太皇太后稱制王莽秉政迺風單于令遣王昭君女須卜居次云入侍太后所以賞賜之甚厚㑹西域車師後王句姑去胡來王唐兠皆怨恨都䕶校尉將妻子人民亡降匃奴單于受置左谷蠡地遣使上書言狀曰臣謹已受詔遣中郎將韓隆王昌副校尉甄阜侍中謁者帛敞長水校尉王歙使匈奴告單于曰西域内屬不當得受今遣之單于叩頭謝罪執二虜還付使者詔使中郎將王萌待西域惡都奴界上逆受單于遣使送到國因請其罪使者以聞有詔不聽㑹西域諸國王斬以示之迺造設四條中國人亡入匃奴者烏孫亡降匃奴者西域諸國佩中國印綬降匈奴者烏桓降匃奴者皆不得受遣中郎將王駿王昌副校尉甄阜王尋使匃奴班四條與單于雜函封付單于令奉行因收故宣帝所為約束封函還時莽奏令中國不得有二名因使使者以風單于宜上書慕化為一名單于從之上書言幸得備藩臣竊樂太平聖制臣故名囊知牙斯今謹更名曰知莽大説白太后遣使者答諭厚賞賜焉匃奴傳西漢㑹要卷六十八
