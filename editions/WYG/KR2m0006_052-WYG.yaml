body:
  text: 西漢㑹要卷五十二宋徐天麟撰食貨三算訾訾算景紀後二年服䖍注云訾萬錢算百二十七算車船武帝元光六年初算商車本紀注云始稅商賈車船令出算時公卿言異時算軺車有差請算如故非吏比者三老北邊騎士軺車一算師古曰比例也身非為吏之例非為三老非為北邊騎士而有軺車皆令出一算商賈人船車二算船五丈以上一算匿不自占占不悉戍邊一歲有能告者以其半畀之食貨志算緡錢武帝元狩四年初算緡錢本紀李斐曰一貫千錢出算二十也師古曰謂有儲積錢者計其緡而稅之公卿言異時算軺車賈人緡錢有差請算如故諸賈人末作貰貸賣買居邑積諸物及商以取利者雖無市籍各以其物自占率緡錢二千而一算瓚曰此緡錢為是儲緡錢也故隨其用所施施於利重者其算亦多諸作有租及鑄如淳曰以手力所作而賣之率緡錢四千而一算匿不自占占不悉戍邊一歲沒入緡錢有能告者以其半畀之食貨志元鼎三年十一月令民告緡者以其半與之本紀天子既下緡錢令而尊卜式百姓終莫分財佐縣官於是告緡錢縱矣故令相告言也楊可告緡徧天下中家以上大氐皆遇告杜周治之獄少反者迺分遣御史廷尉正監分曹往往即治郡國緡錢得民財物以億計奴以千萬數田大縣數百頃小縣百餘頃宅亦如之於是商賈中家以上大氐破民媮甘食好衣不事蓄臧之業而縣官以鹽鐵緡錢之故用少饒矣食貨志楊可方受告緡義縱以為此亂民部吏捕其為可使者天子聞使杜式治以為廢格沮事業縱市史記義縱傳元鼎四年令民得蓄邊縣官假馬母三歲而歸及息什一以除告緡用充入新秦中食貨志師古曰官得毋馬之息以給用度故除告緡之令也租六蓄武帝租及六蓄西域傳贊昭帝元鳳二年令郡國無歛今年馬口錢本紀文穎曰往時有馬口出歛錢今省如淳曰所請租及六蓄也翟方進請算馬牛羊張晏曰馬牛羊頭數出稅算千輸二十也雜稅武帝太初四年徙𢎞農都尉治武闗稅出入者以給闗吏卒食本紀軍市租馮唐傳魏尚為雲中守軍市租盡以給士卒市籍租何武傳槀租貢禹傳海租食貨志耿夀昌白增海租三倍海稅平紀注云海丞主海稅給獻費髙帝十一年詔曰欲省賦甚今獻未有呈吏或多賦以為獻而諸侯王尤多民疾之令諸侯王通侯常以十月朝獻及郡各以其口數率人歲六十三錢以給獻費本紀以粟當賦昭帝元鳳二年令三輔太常郡得以菽粟當賦紀師古曰諸侯應出賦算租稅者皆聽以菽粟當錢物也六年詔穀賤傷農今三輔太常穀賤其令以菽粟當今年賦本紀募民入粟晁錯說文帝曰方今之務莫若使民務農欲民務農在於貴粟貴粟之道在於以粟為賞罰今募天下入粟縣官得以拜爵得以除罪如此則富人有爵農民有錢粟有所渫夫能入粟以受爵者皆有餘者也取於有餘以供上用則貧民之賦可損所謂損有餘補不足令出而民利者也粟者王者大用政之本務令民入粟受爵至五大夫乃復一人耳此其與騎馬之功相去逺矣爵者上之所擅出於口而亡窮粟者民之所種生於地而不乏夫得髙爵與免罪人之所甚欲也天下使人入粟於邊以受爵免罪不過三歲塞下之粟必多矣於是文帝從錯之言令民入粟邊六百石爵上造稍增至四千石為五大夫萬二千石為大庶長各以多少級數為差錯復奏言陛下幸使天下入粟塞下以拜爵甚大惠也竊恐塞卒之食不足用大渫天下粟邊食足以支五歲可令入粟郡縣矣足支一歲以上可時赦勿收農民租時有軍役若遭水旱民不困乏天下安寧歲熟且美則民大富樂矣上復從其言迺下詔賜民十二年租稅之半明年遂除民田之租稅食貨志武帝通西南夷道悉巴蜀租賦不足以供之乃募豪民田南夷入粟縣官而内受錢於都内同上榷酤文帝後三年詔曰以口量地其於古猶有餘而食之甚不足者其咎安在無乃為酒醪以靡穀者多與本紀景帝中三年夏旱禁酤酒本紀後元年夏民得酤酒本紀武帝天漢三年初榷酒酤本紀韋昭曰以木渡水曰榷謂禁民酤釀獨官開置如道路設木為榷獨取利也師古曰榷者獨歩橋今畧彴是昭帝始元六年二月詔有司問郡國所舉賢良文學民所疾苦議罷鹽鐵榷酤秋七月罷榷酤官賣酒升四錢本紀按食貨志云𢎞羊與丞相千秋共奏罷酒酤鹽鐵秦田租口賦鹽鐵之利二十倍於古漢興循而未改食貨志孝惠髙后時吳有豫章銅山即招致天下亡命盗鑄錢東煑海水為鹽以故無賦國用饒足吳王濞傳班固贊曰吳王擅山之利能薄歛以使其衆逆亂之萌自其子興古者諸侯不過百里山海不以封盖防此矣文帝後六年㢮山澤本紀董仲舒說武帝曰宜少近古鹽鐵皆歸於民然後可善治也食貨志元狩中兵連不解縣官大空富商大賈冶鑄䰞鹽財或累萬金而不佐公家之急於是以東郭咸陽孔僅為大農丞領鹽鐵事已上元狩四年事五年大農上鹽鐵丞孔僅咸陽言山海天地之藏宜屬少府陛下弗私以屬大農佐賦願募民自給費因官器作䰞鹽官與牢盆蘇林曰牢價直也今世人言顧手牢如淳曰牢廪食也古者名廪為牢盆煑鹽盆也師古曰牢蘇說是浮食竒民欲擅斡山海之貨以致富羡役利細民其沮事之議不可勝聽敢私鑄鐵器煑鹽者釱左趾沒入其器物郡不出鐵者置小鐵官鑄故鐵使屬在所縣使僅咸陽乗傳舉行天下鹽鐵作官府除故鹽鐵家富者為吏吏益多賈人矣孔僅使天下鑄作器三年中拜為大農列於九卿而縣官以鹽鐵緡錢之故用少饒矣少史作益益廣開置左右輔初大農幹鹽鐵官布多置水衡欲以主鹽鐵及楊可告緡上林財物衆乃令水衡主上林上林既充滿益廣云云元鼎六年拜卜式為御史大夫式既在位見郡國多不便縣官作鹽鐵器苦惡鹽味苦器脆惡賈貴或彊令民買之迺因孔僅言事上不說漢連出兵三歲費仰大農以均翰調鹽鐵助賦故能澹之食貨志元鼎中博士徐偃使行風俗偃矯制使膠東魯國鼓鑄鐵鹽還奏事徙為太常丞御史大夫張湯劾偃矯制大害法至死偃以為春秋之義大夫出疆有可以安社稷存萬民顓之可也湯以致其法不能詘其義有詔下終軍問狀軍詰偃曰古者諸侯國異俗分百里不通時有聘㑹之事安危之埶呼吸成變故有不受辭造命顓已之宜今天下為一萬里同風故春秋王者無外偃巡封域之中稱以出疆何也且鹽鐵郡有餘臧正二國廢不鼓不足以為利害而以安社稷存萬民為辭何也又詰偃膠東南近琅邪北接北海魯國西枕泰山東有東海受其鹽鐵偃度四郡口數田地率其用器食鹽不足以并給二郡邪將埶宜有餘而吏不能也何以言之偃矯制而鼓鑄者欲及春耕種贍民器也今魯國之鼓當先具其備至秋乃能舉火此言與實反者非偃已前三奏無詔不惟所為不許而直矯作威福以從民望干名采譽此明聖所必加誅也枉尺直尋孟子稱其不可令所犯罪重所就者小偃自予必死而為之邪將幸誅不加欲以采名也偃窮詘服罪當死軍奏偃矯制顓行非奉使體請下御史召偃即罪奏可上善其詰有詔示御史大夫終軍傳元封元年桑𢎞羊為治粟都尉領大農盡民僅幹天下鹽鐵迺請置大農部丞數十人分部主郡國各往往置均輸鹽鐵官食貨志昭帝即位六年詔郡國舉賢良文學之士問以民所疾苦教化之要皆對願罷鹽鐵酒榷均輸官毋與天下爭利示以儉節𢎞羊難以為國家大業所以制四夷安邊足用之本不可廢也食貨志所謂鹽鐵議者起始元中召文學賢良問以治亂皆對願罷郡國鹽鐵酒榷均輸毋與天下爭利御史大夫𢎞羊以為此迺所以安邊竟制域外國家大業不可廢也當時相詰難頗有其議文至宣帝時汝南桓寛次公推衍鹽鐵之議増廣條目極其論難著數萬言亦欲以究治亂成一家之法焉其辭曰觀公卿賢良文學之議異乎吾所聞聞汝南朱生言當此之時英俊並進賢良茂陵唐生文學魯國萬生之徒六十有餘人咸聚闕庭抒六藝之風陳治平之原知者贊其慮仁者明其施勇者見其斷辨者騁其辭斷斷焉行行焉雖未詳備斯可畧觀矣山中劉子推言王道矯當世反諸正彬彬然𢎞博君子也九江祝生奮史魚之節發憤懣譏公卿介然直而不撓可謂不畏彊圉矣桑大夫據當世合時變上𣙜利之略雖非正法鉅儒宿學不能自解博物通達之士也然攝公卿之柄不師古始放於末利處非其位行非其道果隕其性以及厥宗車丞相履伊呂之列當軸處中括囊不言容身而去彼哉彼哉若夫丞相御史兩府之士不能正議以輔宰相成同類長同行阿意茍合以說其上斗筲之徒何足選也車千秋贊宣帝地節四年詔鹽民食之而賈咸貴其減天下鹽賈本紀元帝元初五年罷鹽鐵官本紀永光二年復鹽鐵官紀按食貨志云元帝罷鹽鐵官三年而復之成帝綏和二年賜翟方進冊曰百僚用度各有數君增益鹽鐵更變無常朕既不明隨奏許可云云方進自殺翟方進傳倚頓用鹽鐵起甘鄲郭縱以鑄冶成業與王者埒富蜀卓氏用鐵冶富程鄭亦冶鑄賈魋結民富埒卓氏擅鹽井之利期年所得自倍遂殖其貨宛孔氏用鐵冶為業大鼓鑄家致數千金丙氏以鐵冶起富至鉅萬並貨殖傳西漢㑹要卷五十二
