body:
  text: 西漢㑹要卷二十七宋徐天麟撰運厯上五運正朔服色附自齊威宣時騶子之徒論著終始五徳之運如淳曰今其書有五徳終始五徳各以所勝為行秦謂周為火徳滅火者水故自謂水徳師古曰騶子即騶衍及秦帝而齊人奏之故始皇采用之郊祀志秦兼天下頗推五勝而自以為獲水徳乃以十月為正色上黒漢興方綱紀大基庶事草創襲秦正朔以北平侯張倉言用顓帝厯然正朔服色未覩其真云云律厯志髙祖立為沛公旗幟皆赤由所殺蛇白帝子所殺者赤帝子故也本紀漢承堯運徳祚已盛斷蛇著符旗幟尚赤協於火徳自然之應得天統矣髙帝賛漢興髙祖曰北畤待我而起亦自以為獲水徳之瑞雖明習厯及張倉等咸以為然是時天下初定方綱紀本基髙后女主皆未遑故襲秦正朔服色厯書文帝時賈誼以為漢興二十餘年宜當改正朔易服色制度迺草具儀其儀法色上黄數用五帝謙遜未遑也本傳文帝十六年魯人公孫臣上書曰始秦得水徳及漢受之推終始傳則漢當土徳土徳之應黄龍見宜改正朔服色上黄張蒼以為漢迺水徳之時河决金隄其符也年始冬十月色外黒内赤與徳相應公孫臣言非是罷之明年黄龍見成紀文帝召公孫臣拜為博士與諸生申明土徳草改厯服色事新垣平玉杯詐覺是後文帝怠於改正服鬼神之事郊祀志武帝即位天下乂安縉紳之屬皆望天子封禪改正度也趙綰王臧議草改厯服色事未就竇太后不好儒術使人按綰臧自殺郊祀志元封七年司馬遷等言厯紀壊廢宜改正朔是時御史大夫兒寛明經術上迺詔寛曰今宜何以為正朔服色何上寛與博士賜等議皆曰帝王必改正朔易服色所以明受命於天也創業變改制不相復推傳序文則今夏時也於是迺詔以七年為元年律厯志太初元年夏五月正厯以正月為嵗首色上黄數用五張晏曰漢據土徳土數五故用五定官名協音律紀班固曰漢興之初庶事草創唯一叔孫生略定朝廷之儀若迺正朔服色郊望之事數世猶未章焉至於孝文始以夏郊而張蒼據水徳公孫臣賈誼更以為土徳卒不能明孝武之世文章為盛太初改制而兒寛司馬遷等猶從臣誼之言服色度數遂順黄徳彼以為五徳之傳從所不勝秦在水徳故漢據土而克之劉向父子以為帝出于震故庖羲氏始受木徳其後以母傳子終而復始自神農黄帝下厯唐虞三代而漢得火焉故髙祖始起神母夜號著赤帝之符旗章遂赤自得天統矣昔共工氏以水徳間于木火與秦同運非其次序故皆不永由是言之祖宗之制葢有自然之應順時宜矣郊祀志賛厯漢興方綱紀大基庶事草創襲秦正朔以北平侯張倉言用顓帝厯比於六厯疏濶中最為㣲近然正朔服色未覩其真而朔晦月見弦望滿虧多非是至武帝元封七年漢興百二嵗矣大中大夫公孫卿壺遂太史令司馬遷等言厯紀壊廢冝改正朔是時御史大夫兒寛明經術上迺詔寛曰與博士共議今宜何以為正朔服色何上寛與博士賜等議皆曰帝王必改正朔易服色所以明受命於天也創業變改制不相復推傳序文則今夏時也臣等聞學褊陋不能明陛下躬聖發憤詔配天地臣愚以為三統之制後聖復前聖者二代在前也今二代之統絶而不序矣唯陛下發聖徳宣考天地四時之極則順隂陽以定大明之制為萬世則於是迺詔御史曰迺者有司言厯未定廣延宣問以考星度未能讎也葢聞古者黄帝合而不死名察發歛定清濁起五部建氣物分數然則上矣書缺樂弛朕甚難之依違以惟未能修明其以七年為元年遂詔卿遂遷與侍郎尊大典星射姓等議造漢厯迺定東西立晷儀下漏刻以追二十八宿相距於四方舉終以定朔晦分至躔離弦望迺以前厯上元泰初四千六百一十七嵗至於元封七年復得閼逢攝提格之嵗中冬十一月甲子朔旦冬至日月在建星大嵗在子已得太初本星度新正姓等奏不能為算願募治厯者更造宻度各自増減以造漢太初厯迺選治厯鄧平及長樂司馬可酒泉侯宜君侍郎尊及與民間治厯者凡二十餘人方士唐都巴郡落下閎與焉都分天部而閎運算轉厯其法以律起厯曰律容一龠積八十一寸則一日之分也與長相終律長九寸百七十一分而終復三復而得甲子夫律隂陽九六爻象所從出也故黄鐘紀元氣之謂律律法也莫不取法焉與鄧平所治同於是皆觀新星度日月行更以算推如閎平法法一月之日二十九日八十一分日之四十三先藉半日名曰陽厯不藉名曰隂厯所謂陽厯者先朔月生隂厯者朔而後月迺生平曰陽厯朔皆先旦月生以朝諸侯王羣臣便迺詔遷用鄧平所造八十一分律厯罷廢尤疏逺者七十家復使校律厯昬明官者淳于陵渠復覆太初厯晦朔弦望皆最宻日月如合璧五星如連珠陵渠奏狀遂用鄧平厯以平為太史丞後二十七年元鳯三年太史令張夀王上書言厯者天地之大紀上帝所為傳黄帝調律厯漢元年以来用之今隂陽不調宜更厯之過也詔下主厯使者鮮于妄人詰問夀王不服妄人請與治厯大司農中丞麻光等二十餘人雜候日月晦朔弦望八節二十四氣鈞校諸厯用狀奏可詔與丞相御史大將軍右將軍史各一人雜候上林清臺課諸厯疏宻凡十一家以元鳯三年十一月朔旦冬至盡五年十二月各有第夀王課疏逺案漢元年不用黄帝調厯夀王非漢厯逆天道非所宜言大不敬有詔勿劾復候盡六年大初厯第一即墨徐萬且長安徐禹治大初厯亦第一夀王及待詔李信治黄帝調厯課皆疏濶又言黄帝至元鳯三年六千餘嵗丞相屬寳長安單安國安陵桮育治終始言黄帝以来三千六百二十九嵗不與夀王合夀王又移帝王録舜禹年嵗不合人年夀王言伯益為天子代禹驪山女亦為天子在殷周間皆不合經術夀王迺太史官殷厯也夀王猥曰安得五家厯又妄言太初厯虧四分日之三去小餘七百五分以故隂陽不調謂之亂世刼夀王吏八百石古之大夫服儒衣誦不祥之辭作妖言欲亂制度不道奏可夀王候課比三年下終不服再劾死更赦勿劾遂不更言誹謗益甚竟以下吏故厯本之驗在於天自漢厯初起盡元鳯六年三十六嵗而是非堅定至孝成世劉向縂六厯列是非作五紀論向子歆究其㣲眇作三統厯及譜以説春秋推法宻要故述焉律厯志漢興髙祖曰北畤待我而起亦自以為獲水徳之瑞雖明習厯及張倉等咸以為然是時天下初定方綱紀大基髙后女主皆未遑故襲秦正朔服色至孝文時魯人公孫臣以終始五徳上書言漢得土徳宜更元改正朔易服色當有黄龍見事下丞相張倉張倉亦學律厯以為非是罷之其後黄龍見成紀張倉自黜所欲論著不成而新垣平以望氣見頗言正厯服色事貴幸後作亂故孝文帝廢不復問至今上即位招致四方士唐都分天部漢書音義曰謂分二十八宿為距度而巴郡落下閎運算轉歴然後日辰之度與夏正同乃改元更官號封泰山因詔御史曰乃者有司言星度之未定也廣延宣問以理星度未能讐也葢聞昔者黄帝合而不死名察度驗定清濁起五部建氣物分數應劭曰言黄帝造厯得仙名節㑹察寒暑致啓閉分至定清濁起五部五部金木水火土也建氣物分數皆叙歴之意也孟康曰合作也黄帝作厯厯終復始無窮已故曰不死清濁律聲之清濁也五部五行也天有四時分為五行也氣二十四氣物萬物也分厯數之分也瓉曰黄帝聖徳與虚合契升龍登仙於天故曰合而不死題名宿度候察進退謂三辰之度吉凶之驗也然則尚矣書缺樂弛朕甚閔焉朕唯未能循明也紬績日分率應水徳之勝徐廣曰葢以為土徳土勝水今日順夏至黄鐘為宫林鐘為太簇為商南吕為羽姑洗為角自是以後氣復正羽聲復清名復正變以至子日當冬至則隂陽離合之道行焉十一月甲子朔旦冬至已詹其更以七年為太初元年年名焉逢攝提格徐廣曰嵗隂在寅左行嵗星在丑右行月名畢聚日得甲子夜半朔旦冬至厯書元始中王莽秉政欲耀名譽召天下通知鐘律者百餘人使羲和劉歆典領條奏言之最詳故刪其偽辭取正義著于篇律厯志漢髙祖皇帝著紀伐秦繼周木生火故為火徳天下號曰漢距上元年十四萬三千二十五嵗嵗在大棣之東井二十二度鶉首之六度也故漢志曰嵗在大棣名曰敦牂太嵗在午八年十一月乙巳朔旦冬至楚元三年也故殷厯以為丙午距元朔七十六嵗著紀髙帝即位十二年恵帝著紀即位七年髙后著紀即位八年文帝前十六年後七年著紀即位二十三年景帝前七年中六年後三年著紀即位十六年武帝建元元光元朔各六年元朔六年十一月甲申朔旦冬至殷厯以為乙酉距元初七十六嵗元狩元鼎元封各六年漢厯太初元年距上元十四萬三千一百二十七嵗前十一月甲子朔旦冬至嵗在星紀婺女六度故漢志曰嵗名困敦正月嵗星出婺女太初天漢太始征和各四年後二年著紀即位五十四年昭帝始元元鳯各六年元平一年著紀即位十三年宣帝本始地節元康神爵五鳯甘露各四年黄龍一年著紀即位二十五年元帝元初二年十一月癸亥朔旦冬至殷厯以為甲子以為紀首是嵗也十月日食非合辰之㑹不得為紀首距建武七十六嵗初元永光建昭各五年竟寧一年著紀即位十六年成帝建始河平陽朔鴻嘉永始元延各四年綏和二年著紀即位二十六年哀帝建平四年元夀二年著紀即位六年平帝著紀即位元始五年以宣帝𤣥孫嬰為嗣謂之孺子著紀新都侯王莽居攝三年王莽居攝盜襲帝位竊號曰新室始建國五年天鳯六年地皇三年著紀盜位十四年更始帝著紀以漢宗室滅王莽即位二年赤眉賊立宗室劉盆子滅更始帝自漢元年訖更始二年凡二百三十嵗並律厯志改元文帝十六年新垣平言上曰闕下有寳玉氣来者已視之果有獻玉杯者刻曰人主延夀平又言臣候日再中居頃之日却復中於是始更以十七年為元年郊祀志武帝建元元年本紀師古曰自古帝王未有年號始起於此劉攽曰封禪書云其後二年有司言元宜以天瑞命不宜以一二數推所謂其後三年者葢盡元符六年至元鼎三年也然元鼎四年方得寳鼎又無縁先三年而稱之以此而言自元鼎以前之元皆有司所追命其實年號之起在元鼎耳故元封改元則始有詔書矣有司言元宜以天瑞不宜以一二數一元曰建二元以長星曰光今郊得一角獸曰狩云郊祀志元封元年詔曰朕以𦕈身承至尊兢兢焉惟徳菲薄不明于禮樂故用事八神遭天地况施著見景象㞕然如有聞震于怪物欲止不敢遂登封泰山至于梁父然後升禮肅然自新嘉與士大夫更始其以十月為元封元年武紀元封七年漢興百二嵗矣大中大夫公孫卿壺遂太史令司馬遷等言厯紀壊廢宜改正朔是時御史大夫兒寛明經術上迺詔寛曰與博士共議今宜何以為正朔服色何上寛與博士賜等議皆曰帝王必改正朔易服色所以明受命於天也創業變改制不相復推傳序文則今夏時也臣等聞學褊陋不能明陛下躬聖發憤昭配天地臣愚以為三統之制後聖復前聖者二代在前也今二代之統絶而不序矣唯陛下發聖徳宣考天地四時之極則順隂陽以定大明之制為萬世則於是迺詔御史曰迺者有司言厯未定廣延宣問以考星度未能讎也葢聞古者黄帝合而不死名察發斂定清濁起五部建氣物分數然則上矣書缺樂弛朕甚難之依違以惟未能修明其以七年為元年律厯志宣帝神爵元年詔曰朕承宗廟戰戰栗栗惟萬事統未燭厥理迺元康四年嘉榖元稷降于郡國神爵仍集金芝九莖産於涵徳殿銅池中九真獻竒獸南郡獲白鹿威鳯為寳朕之不明震於珍物飭躬齊精祈為百姓東濟大河天氣清静神魚舞河幸萬嵗宫神爵翔集朕之不徳懼不能任其以五年為神爵元年本紀元帝竟寧元年春正月匈奴虖韓邪單于来朝詔曰匈奴郅支單于背叛禮義既伏其辜虖韓邪單于不忘恩徳鄉慕禮義復修朝賀之禮願保塞傳之無窮邉垂長無兵革之事其改元為竟寧本紀成帝河平元年春三月詔曰河決東郡流漂二州校尉王延世隄塞輒平其改元為河平本紀河平四年火生石中改元為陽朔紀哀帝建平二年待詔夏賀良等言赤精子之䜟漢家厯運中衰當再受命宜改元易號詔曰漢興二百載厯數開元皇天降非材之佑漢國再獲受命之符朕之不徳曷敢不通夫基事之元命必與天下自新其大赦天下以建平二年為太初元年號曰陳聖劉大平皇帝漏刻以百二十為度八月詔曰待詔夏賀良等建言改元易號増益漏刻可以永安國家朕過聴賀良等言兾為海内獲福卒亡嘉應皆違經背古不合時宜六月甲子制書非赦令也皆蠲除之賀良等反道惑衆下有司皆伏辜本紀西漢㑹要卷二十七
