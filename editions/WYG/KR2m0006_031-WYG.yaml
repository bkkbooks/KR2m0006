body:
  text: 西漢㑹要卷三十一宋徐天麟撰職官一上公四輔師友附太師臣天麟按沈約宋書云漢制保傅在三公上號曰上公太師古官平帝元始元年初置位在太傅上百官表下同太傅太傅古官髙后元年初置金印紫綬後省八年復置後省哀帝元夀二年復置位在三公上太保太保古官平帝元始元年初置位次太傅四輔平帝元始元年授四輔之職王莾傳張晏曰莾為太傅孔光為太師王舜為太保甄豐為少傅是為四輔師友成帝時張禹以特進為天子師本傳平帝即位年㓜選置師友大司徒孔光以明經髙行為孔氏師京兆尹金欽以家世忠孝為金氏友金日磾傳三公丞相相國丞相皆秦官金印紫綬掌丞天子助理萬幾秦有左右髙帝即位置一丞相十一年更名相國緑綬按表下卷九年蕭何已遷相國此云十一年當考孝恵髙后置左右丞相文帝二年復置一丞相有兩長史秩千石哀帝元夀二年更名大司徒武帝元狩五年初置司直秩比三千石掌佐丞相舉不法臣天麟按司馬遷將相表云孝景元年置司徒官本表不載姑俟詳考丞相徴事任官以丞相徴事捕斬反者漢儀注徴事比六百石丞相史尹咸孫禁秩四百石漢舊儀云丞相少史王夀王禁武帝又置丞相少史秩四百石漢儀注云東曹掾嚴延平父為東曹掾云敞為大司徒掾西曹掾蕭由為丞相西曹掾丙吉傳西曹主吏集曹掾匡衡補陸賜集曹掾奏曹匡衡傳主陸賜故居奏曹議曹李尋見翟方進傳主簿匡衡傳主簿陸賜大車屬鄭崇為丞相大車屬丞相屬地理志朱贛侍曹陳遵傳從史匡衡遣從史之僮取田租掾史翟方進傳丞相宣帝戒掾史謹事臣天麟按掾史者屬官之縂稱也漢舊注東西曹掾比四百石餘掾比三百石屬比二百石正曰掾副曰屬方進傳又云闔府三百餘人宰士翟方進傳師古曰謂丞相掾史為宰士者言其宰相之屬官而位為士臣計相張蒼為計相一月更以列侯為主計四嵗蕭何為相令蒼以列侯居相府領郡國上計者太尉太尉秦官金印紫綬掌武事表袁盎傳云本兵柄髙帝二年太尉長安侯盧綰五年罷太尉官十一年周勃為太尉後官省司馬遷將相表恵帝六年置太尉官以周勃為太尉本傳臣天麟按漢書及史記世家皆云六年而功臣表云髙后四年為太尉又將相表云髙后四年置太尉官綘侯為太尉世家及兩表其文自相牴牾今止従世家孝文三年罷太尉官屬丞相本紀孝景三年置太尉官司馬遷將相表及漢書周亞夫傳七年罷太尉官本紀孝武建元元年置太尉二年罷太尉官史記將相表元狩四年初置大司馬以冠將軍之號師古曰冠者加於其上共為一官也宣帝地節三年置大司馬不冠將軍亦無印綬官屬成帝綏和元年初賜大司馬金印紫綬置官屬秩比丞相去將軍哀帝建平二年復去大司馬印綬官屬冠將軍如故元夀二年復賜大司馬印綬置官屬去將軍位在司徒上有長史秩千石百官表大司馬司直平帝召金欽為大司馬司直置漢舊儀云武帝元狩五年初大尉史溝洫志張戎漢儀注大尉史秩四百石功曹大將軍王鳯除蕭育功曹西曹掾樓䕶傳大司馬掾孝平本紀議曹史大司馬史髙辟衡為議曹史門下史大司馬車騎將軍召揚雄以為門下史主簿大司馬商除杜鄴主簿御史大夫御史大夫秦官位上卿茂陵書御史大夫秩中二千石銀印青綬掌副丞相有兩丞秩千石一曰中丞在殿中蘭臺掌圖籍秘書外督部刺史内領侍御史員十五人受公卿奏事舉劾按章成帝綏和元年更名大司空金印紫綬禄比丞相置長史如中丞官職如故哀帝建平二年復為御史大夫元夀二年復為大司空御史中丞更名御史長史侍御史有繡衣直指服䖍曰指事而行無阿私也師古曰衣以繡者尊寵之也出討姦猾治大獄武帝所制不當置百官表御史中執法髙紀晉灼曰中執法中丞也御史中丞從事于定國與御史中丞従事治反者獄符璽御史周昌傳趙堯為符璽御史御史治書尚符璽者有印綬表治書御史見上監軍御史胡建傳御史大夫掾何並大司空掾掾嚴延年為御史西曹掾大司空何武除鮑宣為西曹掾主簿御史大夫張忠命孫寳主簿曰西府髙士俗不為主簿少史蕭望之使少史冠法冠為妻先引蘓林曰曹史之下者御史屬御史大夫除谷永補屬屬史記匡衡補御史百石柱下令髙帝五年王恬啟為柱下令又張蒼為御史主柱下方書臣天麟按應劭官儀云侍御史即柱下史故附于此列卿正卿九劉熈釋云漢置十二卿一曰太常二曰太僕三曰衛尉四曰光禄勲五曰宗正六曰執金吾七曰大司農八曰少府九曰大鴻臚十曰廷尉十一曰大長十二曰將作大匠韋昭辨云漢正卿九一曰太常二曰光禄三曰衛尉四曰太僕五曰廷尉六曰鴻臚七曰宗正八曰司農九曰少府是為九卿執金吾本故中尉掌檄巡宫外司執姦邪至武帝更執金吾為外卿不在九列大匠次金吾長秋自皇后官非天子卿員太常博士奉常秦官掌宗廟禮儀有丞景帝中六年更名太常師古曰太常王者旌旗也王有大事則建以行禮官主奉持之故曰奉常也後改曰太常尊大之義也屬官有太樂太祝太宰太史太卜太醫六令丞又均官都水兩長丞又諸廟寢園食官令長丞有廱太宰太祝令丞如淳曰五畤在廱故特置太宰以下諸官五畤各一尉又博士及諸陵縣皆屬焉景帝中六年更名太祝為祠祀武帝大初元年改曰廟祀初置太卜元帝永光元年分諸陵邑屬三輔王莾改太常曰秩宗百官表太常掾朱博太常掌故晁錯太史掌故儒林傳房鳯史書令史藝文志待詔律厯志待詔李信治黄帝調厯大典星律厯志射姓治厯律厯志鄧平望氣李廣傳望氣王翔望氣佐郊祀志武帝遣望氣佐候蓬莱髙廟僕射王莾傳上哀章持金匱至髙廟以付僕射廟郎功臣表江徳坐廟郎夜失火免寢郎馮參園郎班糴又金敞傳云故事近日皆随寢為園郎禮官大夫徐生以頌為禮官大夫曲臺署長孟喜冩書官武帝置寫書之官當屬太史故附于此博士博士秦官掌通古今秩比六百石員多至數千人武帝建元五年初置五經博士宣帝黄龍元年稍増員十二人百官表楊何易歐陽書后蒼禮公羊春秋以上武帝立施孟易梁丘易大小夏侯尚書榖梁春秋大小戴禮以上宣帝立京氏易元帝立尤氏春秋古文尚書毛詩逸禮以上平帝立博士弟子五十人儒林傳武帝置歌吹諸生儒林傳光禄勲大夫僕射郎謁者期門羽林郎中令秦官掌宫殿掖門户有丞武帝太初元年更名光禄勲應劭曰光者明也禄者爵也勲功也屬官有大夫郎謁者皆秦官又期門羽林皆屬焉百官表掾光禄勲于永舉王嘉為掾主事張安世為光禄勲郎醉主事白行法大夫大夫掌論議有大中大夫中大夫諌大夫皆無員多至數十人武帝元狩五年初置諌大夫秩比八百石大初元年更名中大夫為光禄大夫秩比二千石大中大夫秩比千石如故百官表文學光禄大夫夏侯勝郎郎掌守門户出充車騎有議郎中郎侍郎郎中皆無員多至千人議郎中郎秩比六百石侍郎比四百石郎中比三百石中郎有五官左右三將秩皆比二千石郎中有車户騎三將秩皆比千石百官表如淳曰主車曰車郎主户衛曰户郎漢儀注郎中令主郎中左右車將主左右軍郎左右户將主左右户郎也外郎恵紀外郎滿六嵗賜爵二級蘇林曰外郎散郎也郎署長馮唐為郎中署長師古曰為郎中而為郎署之長袁盎傳上幸上林郎署長布席引郤謹夫人坐車郎藝文志車郎張豐如淳曰主車曰車郎輦郎劉向户衛功臣郭䝉騎郎將王吸李廣師古曰為騎郎之將主騎郎郎中騎千人功臣表靳彊謁者謁者掌賔讃受事員七十人秩比六百石有僕射秩比千石百官表期門期門服䖍曰與期門下以㣲行後遂以名官掌執兵送從武帝建元三年初置比郎無員多至千人有僕射秩比千石平帝元始元年更名虎賁郎置中郎將秩比二千石百官表師古曰賁與奔同言如猛獸之奔給事期門史記功臣表董忠羽林羽林師古曰言其如羽之疾如林之多掌送従次期門武帝大初元年初置名建章營騎後更名羽林騎又取從軍死事之子孫養羽林官教以五兵號曰羽林孤兒羽林有令丞宣帝令中郎將騎都尉監羽林秩比二千石百官表羽林黄頭郎鄧通僕射僕射秦官自侍中尚書博士郎皆有古者重武官有主射以督課之軍屯吏騶宰永巷宫人皆有取其領事之號百官表孟康曰皆有僕射随所領之事以為號也若軍屯吏則曰軍屯僕射永巷則曰永巷僕射衛尉衛尉秦官掌宫門衛屯兵師古曰漢舊儀云衛尉寺在宫内胡廣云主宫闕之門内衛士於周垣下為區廬若今之宿仗屋矣有丞景帝初更名中大夫令後元年復為衛尉屬官有公車司馬衛士旅賁三令丞師古曰漢官儀云公車司馬掌殿司馬門夜徼宫中天下上事及闕下凡所徴召皆縂領之令秩六百石旅衆也賁與奔同言為奔走之仕也衛士三丞又諸屯衛候司馬二十二官皆屬焉長樂建章甘泉衛尉皆掌其宫職略同不常置百官表未央衛尉李廣長樂司馬律歴志長樂司馬可臣天麟按長樂宫四面皆有公車司馬門毎門各二司馬此即八屯司馬之一也衛司馬谷吉鄭吉衛候馮奉世長樂屯衛司馬馮逡長樂户將尹更始建章監衛青李陵給事建章衛青公車大誰卒五行志公車大誰卒注云大誰長令在司馬殿門衛士之師也執盾恵紀又功臣表孔聚執㦸恵紀武士應劭曰力士也髙祖使武士縳韓信是也騶恵紀師古曰本廄之馭者後又令為騎因謂騶騎也東方朔給騶侏儒太僕太僕秦官掌輿馬有两丞屬官有大廄未央家馬師古曰家馬者主供天子私用非大祀戎事軍國所湏故謂之家馬也三令各五丞一尉又車府路軨騎馬駿馬四令丞又龍馬閑駒橐泉騊駼承華五監長丞又邉郡六牧師菀令師古曰漢官儀云牧師諸苑三十六所分布北邉西邉分養馬三十萬匹各三丞又牧橐師古曰牧橐言牧養佗也昆蹏應劭曰昆蹏好馬名也蹏音蹄令丞皆屬焉中太僕掌皇太后輿馬不常置也武帝太初元年更名家馬為挏馬挏音徒孔反應劭曰主乳馬取其汁挏治之味酢可飲初置路軨駿馬監傅介子平樂廄監傅介子移中監蘇武師古曰移中廄名如淳曰移園之中馬廏家車吏齊受師古曰主漢王之家車非軍國所用廄司御夏侯嬰為沛廄司御農官食貨志武帝水衡少府太僕大農各置農官廷尉廷尉秦官掌刑辟有正左右監秩皆千石景帝中六年更名大理武帝建元四年復為廷尉宣帝地節三年初置左右平秩皆六百石哀帝元夀二年復為大理王莾改曰作士百官表又宣紀地節三年初置廷尉平四人廷尉史廷尉湯請博士弟子治尚書春秋補廷尉史見本傳又路温舒奏曹掾補廷尉史于定國郡次曹補廷尉史奏讞掾廷尉湯以兒寛為奏讞掾奏曹掾廷尉請路温舒署奏曹掾掾廷尉以従史兒寛為之從史兒寛傳師古曰只随官僚不主文書廷尉文學卒史兒寛以掌故功次補卒史書佐薛宣少為廷尉書佐大鴻臚典客秦官掌諸侯歸義蠻夷有丞景帝中六年更名大行令武帝太初元年更名大鴻臚應劭曰郊廟行禮䕶九賔鳴聲臚傳之也屬官有行人譯官别火三令丞如淳曰漢儀注别火獄令官主治改火之事及郡邸長丞武帝太初元年更名行人為大行令初置别火王莾改大鴻臚曰典樂初置郡國邸屬少府中屬中尉後屬大鴻臚百官表主客武帝時金岑為主客服又云主胡客屬大鴻臚大鴻臚文學平當治禮丞功次補文學大行治禮王莾傳公賔就故大行治禮大行治禮丞平當大行卒史儒林傳宗正宗正秦官掌親屬有丞平帝元始四年更名宗伯屬官有都司空令丞如淳曰律司空主水及罪人賈誼曰輸之司空編之徒官内官長丞師古曰律歴志厘分寸尺丈也又諸公主家令門尉皆屬焉王莽并其官於秩宗初内官屬少府中屬主爵後屬宗正百官表主傅東方朔傳昭平君醉殺主傅中府東方朔傳館陶公主中府師古曰中府掌金帛之藏舍人周長孺師古曰舍人家人也主家事者也大司農治粟内史秦官掌榖貨有兩丞景帝後元年更名大農令武帝大初元年更名大司農屬官有大倉均輸平凖都内籍田五令丞斡官如淳曰斡音筦或作幹斡主均輸之事所謂斡鹽鐵而㩁酒酤也鐵市兩長丞又郡國諸倉農監都水六十五官長丞皆屬焉捜粟都尉武帝軍官不常置王莽改大司農曰羲和後更為納言初斡官屬少府中屬主爵後屬大司農百官表大司農中丞管諸㑹計事食貨志下桑𢎞羊大司農部丞食貨志桑𢎞羊請置大農部丞數十人分部主郡國平紀元始元年置大司農部丞十三人大司農史蕭望之傳李宫大司農斗食屬薛宣治粟都尉食貨志桑𢎞羊為治粟都尉領大農盡斡天下鹽鐵農官食貨志武帝水衡少府太農太僕各置農官稻田使者昭紀元鳯元年假稻田使者燕倉㩁酤官昭紀始元元年罷㩁酤官少府以上九卿少府秦官掌山海池澤之税以給共養應劭曰名曰禁錢以給私養自别為藏師古曰大司農供軍國之用少府以養天子也有六丞屬官有尚書符節大醫大官湯官導官師古曰大官主膳食湯官主餅餌導官主擇米樂府若盧如淳曰若盧主藏兵器考工室臣瓉曰主作器械左弋師古曰地名居室甘泉居室左右司空東西織園匠師古曰東園匠主作陵内器物十二官令丞又胞人師古曰胞人主掌宰割者也胞與庖同都水均官三長丞又上林中十池監又中書謁者黄門鉤盾尚方御府師古曰鉤盾主近苑囿尚方主作禁器物御府主天子衣服也永巷内者宦者七官令丞諸僕射署長中黄門皆屬焉武帝太初元年更名考工室為考工左弋為佽飛居室為保宫甘泉居室為昆臺永巷為掖廷佽飛掌弋射有九丞兩尉大官七丞昆臺五丞樂府三丞掖廷八丞官者七丞鉤盾五丞兩尉成帝建始四年更名中書謁者令為中書謁者令初置尚書員五人有四丞河平元年省東織更名西織為織室綏和二年哀帝省樂府王莽改少府曰共工百官表蕭望之領尚書事建白以為尚書百官之本國家樞機宜以通明公正處之武帝游宴後庭故用宦者非古制也宜罷中書宦官應古不近刑人元帝不聴本傳成帝建始四年春罷中書宦官臣瓉曰漢初中人有中謁者令孝武中謁者令為中書謁者令置僕射宣帝加時任中書官𢎞恭為令石顯為僕射元帝即位數年恭死顯代為中書令専權用事至成帝乃罷其官初置尚書員五人師古曰漢舊儀云尚書四人為四曹常侍尚書主丞相御史事二千石尚書主刺史二千石事户曹尚書主庶人上書事主客尚書主外國事成帝置五人有三公曹主㫁獄事並見本紀尚書郎史記功臣表王遷宋百官志云西漢舊置四人尚書史藝文志給事尚書張安世為郎用善書給事尚書尚符璽郎霍光傳大醫監霍光傳侍醫藝文志侍醫李柱國校方書師古曰侍天子之醫大官獻食丞陳湯大官獻丞張勃蘓林注云主貢獻功食監昌邑王詔大官趣具亡闕食監尚食恵紀尚席周亞夫傳漢儀注省中有五尚曰尚食尚冠尚衣尚席尚帳後遂省并尚食於大官湯官樂府音監張放傳音監景武孟康曰監主樂人樂府游徼張放傳游徼莽令史張放傳東織室令史宣帝紀張赦中書僕射石顯黄門倡藝文志車忠倡監東方朔傳馬監金日磾黄門駙馬蘓武傳官騎與黄門駙馬争船師古曰天子駙馬之在黄門者也狗監蜀人楊得意為狗監師古曰主天子田獵犬給事狗監李延平鉤盾冗從藝文志李歩昌尚方待詔郊祀志下掖庭獄丞趙后傳籍武掖庭牛官令趙后傳掖庭户衛許后傳少内嗇夫丙吉傳注云掖庭主府藏之官暴室丞一作薄室師古曰掖庭主織作梁練之署三輔黄圖謂之暴室取暴曬為名耳有嗇夫官屬暴室嗇夫許廣漢農官食貨志武帝水衡少府皆置農官中謁者髙紀封中謁者張釋卿為列侯如淳曰灌嬰為中謁者後常以閹人為之諸官加中者多閹人也中涓曹參傳令以中涓従如淳曰中涓如中謁者也師古曰涓潔也言其在中主知潔清掃洒之事葢親近左右也協律都尉李延年海丞平紀元始元年置師古曰主海税果丞平紀元始元年置師古曰掌諸果實採珠玉金銀之官貢禹傳執金吾中尉秦官掌徼循京師有兩丞候司馬千人武帝太初元年更名執金吾師古曰金吾鳥名也主辟不祥天子出行主先導以禦非常故執此鳥之象屬官有中壘寺互武庫都船四令丞都舩武庫有三丞中壘兩尉又式道左右中候候丞及左右京輔都尉尉丞兵卒皆屬焉初寺互屬少府中屬主爵後屬中尉自大常至執金吾秩皆中二千石丞皆千石百官表備盜賊中尉史記淮南王傳備盜賊中尉臣福都船獄吏薛宣將作大匠將作少府秦官掌治宫室有兩丞左右中候景帝中六年更名將作大匠屬官有石庫東園主章左右前後中校七令丞又主章長丞武帝太初元年更名東園主章為木工成章陽朔三年省中候及左右前後中校五丞百官表典屬國典屬國秦官掌蠻夷降者武帝元狩三年昆邪王降復増屬國置都尉丞候千人屬官九譯令成帝河平元年省并大鴻臚百官表武帝紀元狩二年表作三年當考匈奴昆邪王殺休屠王并將其屬合四萬餘人来降置五屬國以處之注云凡言増屬國者皆増屬國都尉也安定三水天水勇士上都龜兹西河闕魏五原以上並屬國都尉治地理志宣帝神爵二年置金城屬國以處降羌本紀五鳯三年置西河北地屬國以處匈奴降者本紀水衡都尉水衡都尉武帝元鼎二年初置掌上林苑有五丞屬官有上林均輸御羞禁圃輯濯鍾官技巧六廏辯銅九官令丞如淳曰御羞地名也在監田其土肥沃多出御物可進者楊雄傳謂之御宿三輔黄圖御羞宜春皆苑名也輯濯船官也鍾官主鑄錢官也辨銅主分别銅之種類也師古曰御宿則今長安城南御宿川也不在藍田羞宿聲相近故或云御羞或云御宿耳羞者珍羞所出宿者止宿之義輯讀與楫同音集濯音直孝反皆所以行船也漢舊儀云天子六廄未央丞華騊駼騎馬輅軨大廄也馬皆萬匹據此表大僕屬官以有大廄未央輅軨騎馬騊駼丞華而水衡又云六廄技巧官是則技巧之徒供大廄者其官别屬水衡也又衡官水司空都水農倉又甘泉上林都水七官長丞皆屬焉上林有八丞十二尉均輸四丞御羞兩丞都水三丞禁圃兩尉甘泉上林四丞成帝建始二年省技巧六廄官王莽改水衡都尉曰予虞初御羞上林衡官及鑄錢皆屬少府百官表虎圈嗇夫張釋之輯濯士劉屈氂傳師古曰主用輯及濯行船者也農官食貨志武帝水衡少府皆置農官領䕶三輔都水息夫躬劉向又馮参領䕶佐馮翊都水西漢㑹要卷三十一
