  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0006_WYG_025-1a, image: WYG0609/WYG0609-0146c.png}
body:
  text: 西漢㑹要卷二十五宋徐天麟撰學校上大學髙祖尚有干戈平定四海未遑庠序之事儒林傳序武帝興大學本賛臣天麟按三輔黄圖云太學在長安西北七里有市有獄董仲舒對䇿曰養士之大者莫大乎大學大學者賢士之所闗也教化之本原也願陛下興大學置明師以養天下之士武帝立學校之官皆自仲舒發之本傳元朔五年制曰葢聞導民以禮風之以樂婚姻者居室之大倫也今禮廢樂崩朕甚愍焉故詳延天下方聞之士咸登諸朝其令禮官勸學講義洽聞舉遺興禮以為天下先太常議予博士弟子崇鄉里之化以厲賢材焉謹與太常臧博士平等議曰聞三代之道鄉里有教夏曰校殷曰序周曰庠其勸善也顯之朝廷其懲惡也加之刑罰故教化之行也建首善自京師始繇内及外今陛下昭至徳開大明配天地本人倫勸學興禮崇化厲賢以風四方太平之原也古者政教未洽不備其禮請因舊官而興焉為博士官置弟子五十人復其身太常擇民年十八以上儀狀端正者補博士弟子郡國縣官有好文學敬長上肅政教順鄉里出入不悖所聞令相長丞上屬所二千石二千石謹察可者常與計偕詣太常得受業如弟子一嵗皆輒課能通一藝以上補文學掌故闕其髙第可以為郎中太常籍奏即有秀才異等輒以其名聞其不事學若下材及不能通一藝輒罷之而請諸能稱者臣謹按詔書律令下者明天人分際通古今之誼文章爾雅訓辭深厚恩施甚美小吏淺聞弗能究宣亡以明布諭下以治禮掌故以文學禮義為官遷留滯請選擇其秩比二百石以上及吏百石通一蓺以上補左右内史大行卒史比百石以下補郡太守卒史皆各二人邉郡一人先用誦多者不足擇掌故以補中二千石屬文學掌故補郡屬備員請著功令他如律令制曰可自此以来公卿大夫士吏彬彬多文學之士矣昭帝時舉賢良文學増博士弟子員滿百人宣帝末増倍之元帝好儒能通一經者皆復數年以用度不足更為設員千人郡國置五經百石卒史成帝末或言孔子布衣養徒三千人今天子大學弟子少於是増弟子員三千人嵗餘復如故平帝時王莽秉政増元士之子得受業如弟子勿以為員嵗課甲科四十人為郎中乙科二十人為太子舍人丙科四十人補文學掌故云儒林傳序武帝立五經博士開弟子員設科射策訖於元始一經説至百餘萬言大師衆至千餘人儒林傳賛元帝初元五年罷博士弟子毋置員以廣學者永光三年冬復博士弟子員紀辟廱武帝封泰山還兒寛上夀曰間者聖統廢絶陛下發憤祖立明堂辟廱兒寛傳師古曰祖始也河間獻王来朝獻雅樂對三雍宫景十三王傳應劭曰辟廱明堂靈臺也雍和也言天地君臣人民皆和也成帝時犍為郡於水濵得古磬十六枚劉向因是説上宜興辟廱設庠序陳禮樂隆雅頌之聲盛揖遜之容以風化天下成帝以向言下公卿議㑹向病卒丞相大司空奏請立辟廱案行長安城南營表未作遭成帝崩羣臣引以定諡及王莽為宰衡欲耀衆庶遂興辟廱因以簒位世祖中興迺營立明堂辟廱顯宗即位躬行其禮養三老五更於辟廱威儀既盛美矣禮樂志臣天麟按三輔黄圖漢辟廱在長安西北七里河間獻王来朝獻雅樂武帝對之三雍宫即此平帝元始五年劉歆孔永孫遷平晏四人使治明堂辟廱得萬國驩心侯各千户恩澤侯表郡國學文翁為蜀郡守仁愛好教化見蜀地僻陋有蠻夷風文翁欲誘進之乃選郡縣小吏開敏有材者張叔等十餘人親自飭厲遣詣京師受業博士或學律令减省少府用度買刀布蜀物齎計吏以遺博士數嵗蜀生皆成就還歸文翁以為右職用次察舉官有至郡守刺史者又修起學宫於成都市中招下縣子弟以為學官弟子為除更繇髙者以補郡縣吏次為孝弟力田常選學官僮子使在便坐受事毎出行縣益從學官諸生明經飭行者與俱使傳教令出入閨閤縣邑吏民見而榮之數年争欲為學官弟子富人至出錢以求之繇是大化蜀地學於京師者比齊魯焉至武帝時乃令天下郡國皆立學校官自文翁為之始云循吏傳元帝郡國置五經百石卒史儒林序平帝元始三年立學官郡國曰學邑侯國曰校校學置經師一人鄉曰庠聚曰序序庠置孝經師一人紀何武為刺史行部必先即學宫見諸生試其誦論問以得失武傳圖書上漢興改秦之敝大收篇籍廣開獻書之路迄孝武世書缺簡脱禮壊樂崩聖上喟然而稱曰朕甚憫焉於是建藏書之䇿置冩書之官下及諸子傳説皆充秘府至成帝時以書頗散亡使謁者陳農求遺書於天下詔光禄大夫劉向校經傳諸子詩賦歩兵校尉任宏校兵書太史令尹咸校術數侍醫李柱國校方技毎一書已向輒條具篇目撮其指意録而奏之㑹向卒哀帝復使向子侍中奉車都尉歆卒父業歆於是總羣書而奏其七畧故有輯畧有六藝畧有諸子畧有詩賦畧有兵書畧有術數畧有方技畧今刪其要以備篇籍藝文志下同凡易十三家二百九十四篇易道深矣人更三聖世歴三古及秦燔書而易為筮卜之事傳者不絶漢興田何傳之迄於宣元有施孟梁丘京氏列於學官而民間有費髙二家之説劉向以中古文易經校施孟梁丘經或脱去旡咎悔亡唯費氏經與古文同凡書九家四百一十二篇書之所起逺矣至孔子纂焉上斷於堯下迄於秦凡百篇而為之序言其作意秦燔書禁學濟南伏生獨壁藏之漢興亡失求得二十九篇以教齊魯之間訖孝宣世有歐陽大小夏侯氏立於學宫古文尚書者出孔子壁中武帝末魯共王壊孔子宅欲以廣其宫而得古文尚書及禮記論語孝經凡數十篇皆古字也共王入徃其宅聞鼓琴瑟鐘磬之音於是懼乃止不壊孔安國孔子後也悉得其書以考二十九篇得多十六篇安國獻之遭巫蠱事未列於學宫劉向以中古文校歐陽大小夏侯三家經文酒誥脱簡一召誥脱簡二率簡二十五字者脱亦二十五字簡二十二字者脱亦二十二字文字異者七百有餘脱字數十書者古之號令號令於衆其言不立具則聴受施行者弗暁古文讀應爾雅故解古今語而可知也凡詩六家四百一十六卷漢興魯申公為詩訓故而齊轅固燕韓生皆為之傳或取春秋采雜説咸非其本義與不得已魯最為近之三家皆列於學官又有毛公之學自謂子夏所傳而河間獻王好之未得立凡禮十三家五百五十五篇漢興魯髙堂生傳士禮十七篇訖孝宣世后倉最明戴聖慶普皆其弟子三家立于學官禮古經者出於魯淹中及孔氏學七十篇文相似多三十九篇及明堂隂陽王史氏記所見多天子諸侯卿大夫之制雖不能備猶瘉倉等推士禮而致於天子之説凡樂六家百六十五篇漢興制氏以雅樂聲律世在樂官頗能紀其鏗鏘鼓舞而不能言其義六國之君魏文侯最為好古孝文時得其樂人竇公獻其書乃周官大宗伯之大司樂章也武帝時河間獻王好儒與毛生等共采周官及諸子言樂事者以作樂記獻八佾之舞與制氏不相逺其内史丞王定傳之以授常山王禹禹成帝時為謁者數言其義獻二十四卷記劉向校書得樂記二十三篇與禹不同其道寖以益㣲凡春秋二十三家九百四十八篇周室既㣲載籍殘缺仲尼與左丘明觀魯史記因興以立功就敗以成罰丘明論本事而作傳及末世有公羊榖梁鄒夾之傳四家之中公羊榖梁立於學官鄒氏無師夾氏未有書凡論語十二家二百二十九篇漢興有齊魯之説傳齊論者昌邑中尉王吉少府宋畸御史大夫貢禹尚書令五鹿充宗膠東庸生唯王陽名家傳魯論語者常山都尉龔奮長信少府夏侯勝丞相韋賢魯扶卿前將軍蕭望之安昌侯張禹皆名家張氏最後而行於世凡孝經十一家五十九篇漢興長孫氏博士江翁少府后倉諌大夫翼奉安昌侯張禹傳之各自名家經文皆同唯孔氏壁中古文為異父母生之續莫大焉故親生之膝下諸家説不安處古文字讀皆異凡小學十家四十五篇古者八嵗入小學故周官保氏掌養國子教之六書謂象形象事象意象聲轉注假借造字之本也漢興蕭何草律亦著其法曰太吏試學童能諷書九千字以上乃得為史又以六體試之課最者以為尚書御史史書令史吏民上書字或不正輒舉劾六體者古文竒字篆書𨽻書繆篆蟲書皆所以通知古今文字摹印章書幡信也漢興閭里書師合蒼頡爰歴博學三篇斷六十字以為一章凡五十五章并為蒼頡篇武帝時司馬相如作凡將篇無復字元帝時黄門令史游作急就篇成帝時將作大匠李長作元尚篇皆蒼頡中正字也凡將作則頗有出矣至元始中召天下通小學以百數各令記字於庭中楊雄取其有用者以作訓纂篇順續蒼頡又易蒼頡中重複之字凡八十九章臣復續楊雄作十二章凡一百二章無復字六藝羣書所載畧備矣蒼頡多古字俗師失其讀宣帝時召齊人能正讀者張敞從受之傳至外孫之子杜林為作訓故并列焉凡六藝一百三家三千一百二十三篇西漢㑹要卷二十五
