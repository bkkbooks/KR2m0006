body:
  text: 西漢㑹要卷六十九宋徐天麟撰蕃夷中西南夷南夷君長以十數夜郎􅇰大其西靡莫之屬以十數滇冣大自滇以北君長以十數卬都冣大此皆椎結耕田有邑聚其外西自桐師以東北至葉榆名為嶲昆明編髮隨畜移徙亡常處亡君長地方可數千里自嶲以東北君長以十數徙莋都冣大自莋以東北君長以十數冉駹􅇰大其俗或土著或移徙在蜀之西自駹以東北君長以十數白馬冣大皆氐類也此皆巴蜀西南外蠻夷也建元六年大行王恢擊東粤東粤殺王郢以報恢因兵威使番陽令唐䝉風曉南粤南粤食䝉蜀枸醬䝉問所從來曰道西北䍧柯江江廣數里出番禺城下䝉歸至長安問蜀賈人獨蜀出枸醬多持竊出市夜郎夜郎者臨牂牁江江廣百餘步足以行船南粤以財物役屬夜郎西至桐師然亦不能臣使也䝉迺上書説上曰南粤王黄屋左纛地東西萬餘里名為外臣實一州主今以長沙豫章徃水道多絶難行竊聞夜郎所有精兵可得十萬浮船牂牁出不意此制粤一竒也誠以漢之彊巴蜀之饒通夜郎道為置吏甚易上許之乃拜䝉以中郎將將千人食重萬餘人從巴莋闗入遂見夜郎侯多同厚賜諭以威德約為置吏使其子為令夜郎旁小邑皆貪漢繒帛以為漢道險終不能有也迺且聽䝉約還報迺以為犍為郡發巴蜀卒治道自僰道指牂牁江蜀人司馬相如亦言西夷卬莋可置郡使相如以中郎將往諭皆如南夷為置一都尉十餘縣屬蜀當是時巴蜀四郡通西南夷道載轉相饟數歳道不通士罷餓餧離暑濕死者甚衆西南夷又數反發兵興擊耗費亡功上患之使公孫𢎞徃視問焉還報言其不便及𢎞為御史大夫時方築朔方據河逐胡𢎞等因言西南夷為害可且罷專力事匃奴上許之罷西夷獨置南夷兩縣一都尉稍令犍為自保就及元狩元年博望侯張騫言使大夏時見蜀布卬竹杖問所從來曰從東南身毒國可數千里得蜀賈人市或問卬西可二千里有身毒國騫因盛言大夏在漢西南慕中國患匃奴隔其道誠通蜀身毒國道便近又亡害於是天子乃令王然于栢始昌吕越人等十餘輩間出西南夷指求身毒國至滇滇王當羌迺留為求道四歳餘皆閉昆明莫能通滇王與漢使言漢孰與我大及夜郎侯亦然各自以一州王不知漢廣大使者還因盛言滇大國足事親附天子注意焉及至南粤反上使馳義侯因揵為發南夷兵且蘭君恐逺行旁國虜其老弱乃與其衆反殺使者及揵為太守漢迺發巴蜀罪人當擊南粤者八校尉擊之㑹越已破漢八校尉不下中郎將郭昌衛廣引兵還行誅隔滇道者且蘭斬首數萬遂平南夷為牂柯郡夜郎侯始倚南粤南粤已滅還誅反者夜郎遂入朝上以為夜郎王南粤破後及漢誅且蘭卬君并殺莋侯冉駹皆震恐請臣置吏以卬都為粤嶲郡莋都為沈黎郡冉駹為文山郡廣漢西白馬為武都郡使王然于以粤破及誅南夷兵威風諭滇王入朝滇王者其衆數萬人其旁東北勞深靡莫皆同姓相杖未肯聽勞莫數侵犯使者吏卒元封二年天子發巴蜀兵擊滅勞深靡莫以兵臨滇滇王始首善以故弗誅滇王離西夷滇舉國降請置吏入朝於是以為益州郡賜滇王王印復長其民西南夷君長以百數獨夜郎滇受王印滇小邑也冣寵焉後二十三歳孝昭始元元年益州廉頭姑繒民反殺長吏牂柯談指同並等二十四邑凡三萬餘人皆反遣水衡都尉發蜀郡犍為犇命萬餘人擊牂牁大破之後三歳姑繒葉榆復反遣水衡都尉吕辟胡將郡兵擊之辟胡不進蠻夷遂殺益州太守乘勝與辟胡戰士戰及溺死者四千餘人明年復遣軍正王平與大鴻臚田廣明等並進大破益州斬首捕虜五萬餘級獲蓄産十餘萬上曰鉤町侯亡波卒其邑君長人民擊反者斬首捕虜有功其立亡波為鉤町王大鴻臚廣明賜爵闗内侯食邑三百户後間歳武都氐人反遣㼬金吾馬適建龍頟侯韓增與大鴻臚廣明將兵擊之至成帝河平中夜郎王興與鉤町王禹漏卧侯俞更舉兵相攻牂柯太守請發兵誅興等議者以為道逺不可擊迺遣大中大夫蜀郡張匡持節和解興等不從命刻木象漢吏立道旁射之杜欽説大將軍王鳯宜因其罪惡未成未疑漢家加誅隂敕旁郡守尉練士馬大司農豫調穀積要害處選任職太守徃以秋凉時入誅其王侯尤不軌者即以為不毛之地亡用之民聖王不以勞中國宜罷郡放棄其民絶其王侯勿復通如以先帝所立累世之功不可墮壊亦宜因其萌牙早斷絶之及已成形然後戰師則萬姓被害大將軍鳯於是薦金城司馬陳立為牂柯太守及至牂柯諭告夜郎王興興不從命立請誅之未報迺從吏數十人出行縣至興國且同亭召興興將數千人徃至亭從邑君數十人入見立立數責因斷頭邑君曰將軍誅亡狀為民除害願出曉士衆以興頭示之皆釋兵降鈎町王禹漏卧侯俞震恐入粟千斛牛羊勞吏士立還歸郡興妻父翁指與興子邪務收餘兵迫脅旁二十二邑反至冬立奏募諸夷與都尉長史分將攻翁指等翁指據阸為壘立使竒兵絶其饟道縱反間以誘其衆都尉萬年曰兵乆不決費不可共引兵獨進敗走趨立營立怒叱戲下令格之都尉復還戰立引兵救之時天大旱立攻絶其水道蠻夷共斬翁指持首出降南粤南粤王趙佗真定人也秦二世時南海尉任囂病且死召龍川令趙佗書行南海尉事囂死佗即擊并桂林象郡自立為南粤武王髙帝已定天下為中國勞苦故釋佗不誅十一年遣陸賈立佗為南粤王髙后時有司請禁粤闗市鐵器佗曰此必長沙王計乃自尊號為南武帝發兵攻長沙邊敗數縣焉髙后遣將軍隆慮侯竈擊之㑹暑濕士卒大疫兵不能踰嶺嵗餘髙后崩即罷兵佗因此以兵威財物賂遣閩粤西甌駱役屬焉東西萬餘里迺乘黄屋左纛稱制與中國侔文帝元年初鎮撫天下使告諸侯四夷從代來即位意諭盛德焉迺為佗親冢在真定置守邑歳時奉祀召其從昆弟尊官厚賜寵之詔丞相平舉可使粤者平言陸賈先帝時使粤上召賈為大中大夫謁者一人為副使賜佗書曰服領以南王自治之雖然王之號為帝兩帝並立亡一乘之使以通其道是爭也爭而不遜仁者不為也願與王分棄前患終今以來通使如故故使賈馳諭告王朕意王亦受之毋為冦災矣上褚五十衣中褚三十衣下褚二十衣遺王願王聽樂娯憂存問鄰國陸賈至南粤王恐乃頓首謝願奉明詔長為藩臣奉貢職於是下令國中曰吾聞兩雄不俱立兩賢不並世漢皇帝賢天子自今以來去帝制黄屋左纛因為書稱蠻夷大長老夫臣佗昧死再拜上書皇帝陛下今陛下幸哀憐復故號通使漢如故老夫死骨不腐改號不敢為帝矣謹北面因使者獻白璧一雙翠鳥千犀角十紫貝五百桂蠧一器生翠四十雙孔雀二雙昧死再拜以聞皇帝陛下陸賈還報文帝大説遂至孝景時稱臣遣使入朝請然其居國竊如故號其使天子稱王朝命如諸侯至武帝建元四年佗孫胡為南粤王立三年閩粤王郢興兵南擊邊邑胡使人上書曰兩粤俱為藩臣毋擅興兵相攻擊今東粤擅興兵侵臣臣不敢興兵唯天子詔之於是天子多南粤義守職約為興兵遣兩將軍徃討閩粤兵未踰嶺閩粤王弟餘善殺郢以降於是罷兵天子使嚴助往諭意南粤王胡頓首曰天子迺興兵誅閩粤死亡以報德遣太子嬰齊入宿衛謂助曰國新被冦使者行矣胡方日夜裝入見天子助去後其大臣諫胡曰漢興兵誅郢亦行以驚動南粤且先王言事天子期毋失禮要之不可以怵好語入見入見則不得復歸亡國之勢也於是胡稱病竟不入見後十餘歳胡實病甚太子嬰齊請歸胡薨諡曰文王嬰齊嗣立即藏其先武帝文帝璽嬰齊在長安時取邯鄲摎氏女生子興及即位上書請立摎氏女為后興為嗣漢數使使者風諭嬰齊猶尚樂擅殺生自恣懼入見要以用漢法比内諸侯固稱病遂不入見遣子次公入宿衛嬰齊薨諡為明王太子興嗣立其母為太后太后自未為嬰齊妻時嘗與霸陵人安國少季通及嬰齊薨後元鼎四年漢使安國少季諭王王太后入朝令辯士諌大夫終軍等宣其辭勇士魏臣等輔其決衛尉路博德將兵屯桂陽待使者王年少太后中國人安國少季徃復與私通國人頗知之多不附太后太后恐亂起亦欲倚漢威勸王及幸臣求内屬即因使者上書請比内諸侯三歳一朝除邊闗於是天子許之賜其丞相吕嘉銀印及内史中尉太傅印餘得自置除其故黥劓刑用漢法諸使者留填撫之王王太后飭治行裝重資為入朝具相吕嘉數諌止王王不聽有畔心迺隂謀作亂天子遣千秋與太后弟摎樂將兵二千人徃入粤境吕嘉迺遂反攻殺太后王盡殺漢使者遣人告蒼梧秦王及其諸郡縣立明王長男粤妻子術陽侯建德為王而韓千秋兵之入也破數小邑其後粤直開道給食未至番禺四十里粤以兵擊千秋等滅之使人函封漢使節置塞上好為謾辭謝罪發兵守要害處於是天子令粤人及江淮以南樓船十萬師徃討之元鼎五年秋衛尉路博德為伏波將軍出桂陽下湟水主爵都尉楊僕為樓船將軍出豫章下横浦故歸義粤侯二人為戈船下瀨將軍出零陵或下離水或抵蒼梧使馳義侯因巴蜀罪人發夜郎兵下牂柯江咸㑹番禺六年冬樓船將軍將精卒先陷尋陿破石門得粤船粟因推而前挫粤鋒以粤數萬人待伏波將軍伏波將軍將罪人道逺後期與樓船㑹迺有千餘人遂俱進樓船居前至番禺建德嘉皆城守樓船自擇便處居東南面伏波居西北面㑹暮樓船攻敗粤人縱火燒城粤素聞伏波莫不知其兵多少伏波乃為營遣使招降者賜印綬復縱令相招樓船力攻燒敵反敺而入伏波營中遲旦城中皆降伏波吕嘉建德以夜與其屬數百人亡入海伏波又問降者知嘉所之遣人追故其校司馬蘇𢎞得建德粤郎都尉稽得嘉南粤已平遂以其地為儋耳珠崖南海蒼梧鬰林合浦交趾九真日南九郡閩粤閩粤王無諸及粤東海王揺其先皆粤王句踐之後也姓騶氏秦并天下廢為君長以其地為閩中郡及諸侯畔秦無諸揺率粤歸番陽令呉芮所為番君者也從諸侯滅秦當是時項王主命不王也以故不佐楚漢擊項籍無諸揺帥粤人佐漢漢五年復位無諸為閩粤王王閩中故地都冶孝惠三年舉髙帝時粤功曰閩君揺功多其民便附迺立揺為東海王都東甌世號曰東甌王后數世孝景三年呉王濞反欲從閩粤閩粤未肯行獨東甌從及呉破東甌受漢募殺呉王丹徒以故得不誅呉王子駒亡走閩粤怨東甌殺其父常勸閩粤擊東甌建元三年閩粤發兵圍東甌東甌使人告急天子天子問太尉田蚡蚡對曰粤人相攻擊固其常不足以煩中國徃救也中大夫嚴助詰蚡言當救天子遣助發㑹稽郡兵浮海救之漢兵未至閩粤引兵去東甌請舉國徙中國迺悉與衆處江淮之間六年閩粤擊南粤南粤守天子約不敢擅發兵而以聞上遣大行王恢出豫章大司農韓安國出㑹稽皆為將軍兵未踰嶺閩粤王郢發兵距險其弟餘善與宗族謀曰王以擅發兵不請故天子兵來誅漢兵衆彊即幸勝之後來益多滅國乃止今殺王以謝天子天子罷兵固國完不聽迺力戰不勝即亡入海皆曰善即鏦殺王使使奉其頭致大行大行曰所為來者誅王王頭至不戰而殞利莫大焉迺以便宜案兵告大司農軍而使使奉王頭馳報天子詔罷兩將軍兵曰郢等首惡獨無諸孫繇君丑不與謀乃使中郎將立丑為粤繇王奉閩粤祭祀餘善以殺郢威行國中民多屬竊自立為王繇王不能制上聞之為餘善不足復興師曰餘善首誅郢師得不勞因立餘善為東粤王與繇王並處至元鼎五年南粤反餘善上書請以卒八千從樓船擊吕嘉等兵至掲陽以海風波為解不行持兩端隂使南粤及漢破番禺樓船將軍僕上書願請引兵擊東粤上以士卒勞倦不許罷兵令諸校留屯豫章梅領待命明年秋餘善聞樓船請誅之漢兵留境且徃迺遂發兵距漢道號將軍騶力等為吞漢將軍入白砂武林梅領殺漢三校尉是時漢使大司農張成故山州侯齒將屯不敢擊卻就便處皆坐畏懦誅餘善刻武帝璽自立詐其民為妄言上遣横海將軍韓説出句章浮海從東方徃樓船將軍僕出武林中尉王温舒出梅領粤侯為戈船下瀨將軍出如邪白沙元封元年冬咸入東粤自兵未徃故粤衍侯呉陽前在漢漢使歸諭餘善不聽及横海軍至陽以其邑七百人反攻粤軍於漢陽及故粤建成侯敖與繇王居股謀俱殺餘善以其衆降横海將軍封居股為東成侯萬户封敖為開陵侯封陽為卯石侯於是天子曰東粤陿多阻閩粤悍數反覆詔軍吏皆將其民徙處江淮之間東粤地遂虚朝鮮朝鮮王滿燕人自始燕時嘗畧屬真番朝鮮為置吏築障秦滅燕屬遼東外徼漢興為逺難守復修遼東故塞至浿水為界屬燕燕王盧綰反入匃奴滿亡命聚黨千餘人椎結蠻夷服而東走出塞度浿水居秦故空地上下障稍役屬真番朝鮮蠻夷及故燕齊亡在者王之都王險㑹孝惠髙后初定天下遼東太守即約滿為外臣保塞外蠻夷傳子至孫右渠所誘漢亡人滋多又未嘗入見真番辰國欲上書見天子又雍閼弗通元封二年漢使涉何譙諭右渠終不肯奉詔何去至界臨浿水使馭刺殺送何者朝鮮裨王長即度水馳入塞遂歸報天子曰殺朝鮮將上為其名美弗詰拜何為遼東東部都尉朝鮮怨何發兵攻襲殺何天子募罪人擊朝鮮其秋遣樓船將軍楊僕從齊浮勃海兵五萬左將軍荀彘出遼東誅右渠右渠發兵距險左將軍卒多率遼東士兵先縱敗散多還走坐法斬樓船將齊兵七千人先至王險右渠城守窺知樓船軍少即出擊樓船樓船軍敗走將軍僕失其衆遁山中十餘日稍求收散卒復聚左將軍擊朝鮮浿水西軍未能破左將軍數與樓船期戰樓船欲就其約不㑹左將軍亦使人求間隙降下朝鮮不肯心附樓船以故兩將不相得左將軍心意樓船前有失軍罪今與朝鮮和善而又不降疑其有反計未敢發天子曰兩將圍城又乖異以故乆不決使故濟南太守公孫遂徃正之有便宜得以從事遂至左將軍曰朝鮮當下乆矣不下者樓船數期不㑹具以素所意告遂曰今如此不取恐為大害非獨樓船又且與朝鮮共滅吾軍遂亦以為然而以節召樓船將軍入左將軍軍計事即令左將軍戲下執縳樓船將軍幷其軍以報天子許遂左將軍并兵兩軍即急擊朝鮮相路人相韓陶尼谿相參將軍王唊相與謀曰始欲降樓船樓船今執獨左將軍并將戰益急恐不能與王又不肯降陶唊路人道死元封三年夏尼谿相參迺使人殺朝鮮王右渠來降王險城未下故右渠之大臣成已又反復攻吏左將軍使右渠子長降相路人子冣告諭其民誅成已故遂定朝鮮為真番臨屯樂浪𤣥菟四郡西漢㑹要卷六十九
