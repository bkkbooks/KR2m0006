body:
  text: 西漢㑹要卷三十四宋徐天麟撰職官四封建封功臣漢興自秦二世元年之秋楚陳之歳初以沛公總帥䧺俊三年然後西滅秦立漢王之號五年東克項羽即皇帝位八載而天下廼平始論功而定封訖十二年侯者百四十有三人時大城名都民人㪚亾户口可得而數裁什二三是以大侯不過萬家小者五六百户封爵之誓曰使黄河如帶泰山若厲國以永存爰及苗裔於是申以丹書之信重以白馬之盟又作十八侯之位次孟康曰惟作元功蕭曺等十八人位次耳髙后乃詔作位次下竟師古曰謂蕭何曺參張敖周勃樊噲酈商奚㳙夏侯嬰灌嬰傅寛靳歙王陵陳武王吸薛歐周昌丁復蟲逹從第一至十八也髙后二年復詔丞相陳平盡差列侯之功錄第下竟藏諸宗廟副在有司始未嘗不欲固根本而枝葉稍落也故逮文景四五世間流民旣歸户口亦息列侯大者至三四萬户小國自倍富厚如之子孫驕逸􅁯其先祖之艱難多䧟法禁隕命亾國或云子孫訖於孝武後元之年靡有孑遺耗矣㒺亦少密焉故孝宣皇帝愍而録之乃開廟臧覽舊籍詔令有司求其子孫咸出庸保之中並受復除或加以金帛用章中興之徳降及孝成復加䘏問稍益衰微不絶如綫善乎杜業之納説也曰昔唐以萬國致時雍之政虞夏以之多羣后饗共己之治湯法三聖殷氏太平周封八百重譯來賀是以内恕之君樂繼絶世隆名之主安立亾國至於不及下車徳念深矣成王察牧野之克顧羣后之勤知其恩結於民心功光於王府也故追述先父之志録遺老之策髙其位大其㝢愛敬飭盡命賜備厚大孝之隆於是為至至其没也世主歎其功無民而不思所息之樹且猶不伐况其廟乎是以燕齊之祀與周並傳子繼弟及歴載不墮豈無刑辟繇祖之竭力故支庶頼焉迹漢功臣亦皆割符世爵受山河之誓存以著其號亾以顯其魂賞亦不細矣百餘年間而襲封者盡或絶失姓或乏無主朽骨孤於墓苖裔流於道生為愍𨽻死為轉屍以往况今甚可悲傷聖朝憐憫詔求其後四方忻忻靡不歸心出入數年而不省察恐議者不思大義設言虛亾則厚徳掩息遴柬布章非所以視化勸後也三人為衆雖難盡繼宜從尤功於是成帝復紹蕭何哀平之世增修曺參周勃之屬得其宜矣以綴續前記究其本末並序位次盡於孝文以昭元功之侯籍功臣表髙帝與功臣剖符作誓丹書鐵契金匱石室臧之宗廟列侯畢已受封奏位次皆曰平陽侯曺參功最多宜第一然上心欲何為第一鄂千秋曰蕭何當第一參次之上廼令何第一蕭何傳十二年詔曰吾立為天子帝有天下十二年於今矣與天下之豪士共定天下同安輯之其有功者上致之王次為列侯下乃食邑而重臣之親或為列侯皆令自置吏得賦歛女子公主為列侯食邑者皆佩之印賜大第室吏二千石徙之長安受小第室入蜀漢定三秦者皆世世復吾於天下功臣可謂亾負矣云云本紀髙后二年詔曰髙皇帝匡飭天下諸有功者皆受分地為列侯朕思念至於久逺而功名不著亾㠯尊大誼施後世今欲差次列侯功㠯定朝位臧於髙廟世世勿絶嗣子各襲其功位其與列侯議定奏之丞相臣平等言謹與絳侯臣勃曲周侯臣商潁陰侯臣嬰安國侯臣陵等議列侯幸得賜餐錢奉邑陛下加惠㠯功次定朝位請臧髙廟奏可本紀封外戚髙后欲立諸吕為王問王陵陵曰髙皇帝刑白馬而盟曰非劉氏而王者天下共擊之今王吕氏非約也太后不說問左丞相平及絳侯周勃等皆曰髙帝定天下王子弟今太后稱制欲王昆弟諸吕無所不可太后喜罷朝陵責平勃曰始與髙帝唼血而盟諸君不在邪今髙帝崩太后女主欲王吕氏諸君縱欲阿意背約何面目見髙帝於地下乎平曰於靣折廷爭臣不如君全社稷安劉氏後君亦不如臣陵無以應之王陵傳周亞夫為丞相竇太后曰皇后兄王信可侯也上曰始南皮及章武先帝不侯師古曰南皮竇彭祖太后弟長君之子章武太后母弟廣國及臣即位廼侯之信未得封也竇大后曰人生各以時行耳竇長君在時不得侯死後廼其子彭祖顧得侯吾甚恨之帝趣侯信也上曰請得與丞相計之亞夫曰髙帝約非劉氏不得王非有功不得侯不如約天下共擊之今信雖皇后兄無功侯之非約也上黙然而阻周亞夫傳漢興外戚與定天下侯者二人故誓曰非劉氏不王若有亾功非上所置而侯者天下共誅之是以髙后欲王諸吕王陵廷爭孝景將侯王氏修侯犯色卒至廢黜是後薄昭竇嬰上官衛霍之侯以功受爵其餘后父㨿春秋褒紀之義帝舅縁大雅申伯之意寖廣博矣十王侯事成帝河平二年六月悉封諸舅王譚為平阿侯商為成都侯立為紅陽侯根為曲陽侯逢時為髙平侯五人同日封故世謂之五侯大后母李氏更嫁為河内茍賔妻生子參欲以田蚡為比而封之上曰封田氏非正也以參為侍中水衡都尉元后傳哀帝欲封祖母傅太后從弟商鄭崇諌曰孝成皇帝封親舅五侯天為赤黄晝昏日中有黒氣今祖母從昆弟二人己侯孔鄉侯皇后父髙武侯以三公封尚有因縁今無故欲復封商壞亂制度逆天人心非傅氏之福也臣聞師曰逆陽者厥極弱逆陰者厥極凶短折犯人者有亂亾之患犯神者有疾夭之禍故周公著戒曰惟王不知艱難惟耽樂是從時亦㒺有克壽故衰世之君夭折蚤沒此皆犯陰之害也臣願以身命當國咎崇因持詔書案起傅大后大怒曰何有為天子乃反為一臣所顓制邪上遂下詔曰朕幼而孤皇太太后躬自養育免於襁褓教道以禮至於成人惠澤茂焉欲報之徳皥天㒺極前追號皇太太后父為崇祖侯惟念徳報未殊朕甚恧焉侍中光禄大夫商皇太太后父同産子小自保太恩義最親其封商為汝昌侯為崇祖侯後更號崇祖侯為汝昌哀侯鄭崇傳封丞相元朔中公孫𢎞代薛澤為丞相先是漢常以列侯為丞相惟𢎞無爵上於是下詔曰朕嘉先聖之道開廣門路宣招四方之士蓋古者任賢而序位量能以授官勞大者厥禄厚徳盛者獲爵尊故武功以顯重而文徳以行褒其以髙成之平津鄉户六百五十封丞相𢎞為平津侯其後以為故事至丞相封自𢎞始也本傳孝武元功宿將略盡㑹上亦興文學進抜幽隠公孫𢎞自海瀕而登宰相於是寵以列侯之爵自是之後宰相畢侯矣恩澤侯表朱博為丞相封陽鄉侯食邑二千户上書曰故事封丞相不滿千户而臣過制願還千户本傳平當為御史大夫至丞相以冬月賜爵闗内侯本傳漢儀注御史大夫為丞相更春廼封李奇曰㠯冬月非封侯時遣列侯就國文帝二年十月詔曰朕聞古者諸侯建國千餘各守其地以時入貢民不勞苦上下驩欣靡有違徳今列侯多居長安邑逺吏卒給輸費苦而列侯亦無繇教訓其民其令列侯之國為吏及詔所止者遣太子本紀下同三年十一月詔曰前日詔遣列侯之國辭未行丞相朕之所重其為朕率列侯之國遂免丞相勃遣就國景帝後二年十月省徹侯之國晉灼曰文帝遣列侯之國今省之繼絶髙帝五年下令曰楚地已定義帝亾後欲存恤楚衆以定其主齊王信習知楚風俗更立為楚王本紀孝文元年更封蕭延為酇侯功臣表孝景二年封故相國蕭何孫係為列侯本紀中元元年封故御史大夫周苛周昌孫子為列侯本紀孝武元光三年封髙祖功臣五人後為列侯本紀元狩三年封故相國蕭何曾孫慶為列侯本紀孝宣地節二年詔大司馬大將軍博陸侯功徳茂盛朕甚嘉之復其後世疇其爵邑世世母有所與功如蕭相國本紀地節四年封故酇侯蕭何曾孫建世為侯本紀元康元年復髙皇帝功臣絳侯周勃等百三十六人家子孫令奉祭祀世世勿絶其母嗣者復其次本紀功臣子孫訖於孝武後元之年靡有孑遺耗矣故孝宣皇帝愍而録之乃開廟藏覽舊籍詔令有司求其子孫咸出庸保之中並受復除或加以金帛用章中興之徳降及孝成復加䘏問稍益衰微不絶如綫杜業納說曰内恕之君樂繼絶世隆名之主安立亾國迹漢功臣亦皆割符世爵受山河之誓存以著其號亾以顯其魂賞亦不細矣百餘年間而襲封者盡或絶失姓或乏無主朽骨孤於墓苗裔流於道生為愍𨽻死為轉屍以往况今甚可悲傷聖朝憐憫詔求其後四方忻忻靡不歸心出入數年而不省察恐議者不思大義設言虛亾則厚徳掩息遴柬布章非所以視化勸後也三人為衆雖難盡繼宜從尤功於是成帝復紹蕭何哀平之世增修曺參周勃之屬得其宜矣功臣表元康四年賜故右扶風尹翁歸子黄金百斤以奉其祭祀又賜功臣適後黄金人二十斤本紀成帝元延元年封蕭相國後喜為酇侯本紀孝平元始二年封故大司馬博陸侯霍光從父昆弟曾孫陽宣平侯張敖𤣥孫慶忌周勃𤣥孫共按本傳乃孫之子恭舞陽侯樊噲𤣥孫之子章皆為列侯復爵賜故曲周侯酈商等後𤣥孫酈明友等百一十三人爵闗内侯食邑各有差本紀元始中太皇太后詔賜公孫𢎞後子孫之次當為後者爵闗内侯召詣公車上名尚書朕親臨拜焉王四夷君長髙帝五年詔曰故粤王亾諸世奉粤祀秦侵奪其地使其社稷不得血食諸侯伐秦亾諸身帥閩中兵以佐滅秦項羽廢而弗立今以為閩粤王王閩中地勿使失職本紀十一年五月詔曰粤人之俗好相攻擊前時秦徙中縣之民南方三郡使與百粤雜處㑹天下誅秦南海尉佗居南方長治之甚有文理中縣人以故不耗减粤人相攻擊之俗益止俱頼其力今立佗為南粤王使陸賈即授璽綬佗稽首稱臣本紀十二年詔曰南武侯織亦粤之世也立以為南海王本紀孝惠三年舉髙帝時粤功曰閩君揺功多其民便附廼立揺為東海王都東甌世號曰東甌王閩粤傳武帝建元四年南粤王胡遣太子嬰齊入宿衛元鼎四年上書請比内諸侯三歲一朝除邊闗於是天子許之賜其丞相吕嘉銀印及中尉大傅印餘得自置本傳建元六年閩粤王郢攻南越越人殺郢降天子曰郢等首惡獨無諸孫繇君丑不與謀廼使郎中將立丑為粤繇王奉閩粤祭祀本傳孝昭始元六年詔曰鉤町王母波率其君長人民擊反者斬首捕虜有功其立母波為鉤町王本紀匈奴故印文曰匈奴單于璽本傳王莾更曰新匈奴單于章西南夷君長以百八越本種百數獨夜郎滇受王印本傳傅介子斬樓蘭王馳傳詣闕廼立王弟尉屠耆為王更名其國為鄯善為刻印章賜以宫女為夫人西域傳闗都尉文忠攻罽賔殺其王立陰末赴為罽賔王同上西域凡國五十自譯長城長君監吏大禄百長千長都尉且渠當户將相至侯王皆佩漢印綬凡三百七十六人本傳侯降虜昔書稱蠻夷帥服詩云徐方旣倈春秋列潞子之爵許其慕諸夏也漢興至於孝文時廼有弓髙襄城之封雖自外倈本功臣後故自孝景始欲侯降者丞相周亞夫守約而爭帝黜其議初開賞之科云云功臣表下匈奴王徐盧等五人降漢師古曰功臣表云睢徐盧上欲侯之以勸後亞夫曰彼背其主降陛下陛下侯之即何以責人臣不守節者乎上曰丞相議不可用廼悉封徐盧等為列侯周亞夫傳封方士欒大見武帝言黄金可成而河决可塞不死之藥可得僊人可致也上廼拜大為五利將軍詔以二千户印得天士將軍地士將軍大通將軍詔以二千户封地士將軍大為樂通侯賜列侯甲第郊祀志婦人爵邑髙帝封兄伯妻為隂安侯髙后二年封蕭何夫人為酇侯蕭何傳樊噲妻吕􅎐為臨光侯列侯太夫人夫人文紀七年如淳曰列侯之妻稱夫人列侯死子復為列侯廼稱太夫人子不為列侯不得稱也孝文十二年賜諸侯王女邑各二千户本紀武帝尊王皇后母臧児為平原君外戚傳王皇后母前夫金氏女封修成君賜湯沐邑同上宣帝地節四年賜外祖母號為博平君以博平蠡吾兩縣户萬一千為湯沭邑王夫人傳金當上南大行為太夫人文潁曰南當母名也上名狀於大行王莽母賜號曰功顯君王莽傳平帝賜三妹謁臣號修義君哉皮為承禮君鬲子為尊徳君食邑各二千户衛姫傳按本紀云賜帝女弟四人號皆為君今傳云三姊與紀不同當考王莽白尊太后姊妹君俠為廣恩君君力為廣惠君君弟為廣施君皆食湯沭邑元后傳封建雜録列侯所食縣曰國百官表髙帝十二年詔列侯皆令自致吏得賦歛女子公主為列侯食邑者佩之印賜大第室本紀列侯賜餐錢奉邑吕后紀應劭云諸侯四時皆得賜餐錢秦漢之制列侯封君食租衣税率户二百千户之君則二十萬朝覲聘享出其中貨殖傳孝武元鼎五年九月列侯坐獻黄金酎祭宗廟不如法奪爵者百六人紀漢儀注云諸侯歲以户口酎黄金於髙廟孝宣地節四年襄陽侯聖坐酎金斤八兩少四兩免表五􅃫四年朝侯固城坐酎金少四兩免楊邱侯坐出國界耐為司㓂列侯坐罪奪爵者多矣畧舉數條以為例終陵侯華禄坐出界耐為司㓂表祚陽侯仁坐擅興繇賦削爵一級此類甚多皆不具載孝景中二年令列侯初封及之國大鴻臚奏策列侯薨大行奏諡誄策遣大中大夫弔祠視䘮事因立嗣其薨葬國得發民輓䘮穿復土治墳亾過三百人畢事本紀平當為御史大夫至丞相以冬月賜爵闗内侯本傳李奇曰以冬月非封侯時且先賜爵闗内侯也西漢㑹要卷三十四
