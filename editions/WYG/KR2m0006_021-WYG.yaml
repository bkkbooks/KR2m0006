body:
  text: 西漢㑹要卷二十一宋徐天麟撰樂上樂舞漢興樂家有制氏以雅樂聲律世世在大樂官但能紀其鏗鎗鼓舞而不能言其義髙祖時叔孫通因秦樂人制宗廟樂太祝迎神于廟門奏嘉至猶古􅑙神之樂也皇帝入廟門奏永至以為行歩之節猶古采薺肆夏也乾豆上奏登歌獨上歌不以筦絃亂人聲欲在位者徧聞之猶古清廟之歌也登歌再終下奏休成之樂羙神明既饗也皇帝就酒東廂坐定奏永安之樂羙禮已成也又有房中祠樂髙祖唐山夫人所作也周有房中樂至秦名曰夀人凡樂樂其所生禮不㤀本髙祖樂楚聲故房中樂楚聲也孝恵二年使樂府令夏矦寛備其簫筦更名曰安世樂髙祖廟奏武徳文始五行之舞孝文廟奏昭徳文始四時五行之舞孝武廟奏盛徳文始四時五行之舞武徳舞者髙祖四年作以象天下樂已行武以除亂也文始舞者本舜韶舞也髙祖六年更名曰文始以示不相襲也五行舞者本周舞也秦始皇二十六年更名曰五行也四時舞者孝文所作以明示天下之安和也盖樂已所自作明有制也樂先王之樂明有法也孝景采武徳舞以為昭徳以尊大宗廟至孝宣采昭徳舞為盛徳以尊世宗廟諸帝廟皆常奏文始四時五行舞云髙祖六年又作昭容樂禮容樂昭容者猶古之昭夏也主出武徳舞禮容者主出文始五行舞舞入無樂者將至至尊之前不敢以樂也出用樂者言舞不失節能以樂終也大氐皆因秦舊事焉初髙祖既定天下過沛與故人父老相樂醉酒歡哀作風起之詩令沛中僮兒百二十人習而歌之至孝恵時以沛宫為原廟皆令歌兒習吹以相和常以百二十人為員文景之間禮官肄業而已至武帝定郊祀之禮祠㤗一於甘泉就乾位也祭后土於汾隂澤中方丘也乃立樂府采詩夜誦有趙代秦楚之謳以李延年為協律都尉多舉司馬相如等數十人造為詩賦略論律吕以合八音之調作十九章之歌以正月上辛用事甘泉圜丘使童男女七十人俱歌昏祠至明夜常有神光如流星止集於祠壇天子自竹宫而望拜百官侍祠者數百人皆肅然動心焉其餘廵狩福應之事不序郊廟故弗論是時河間獻王有雅材亦以為治道非禮樂不成因獻所集雅樂天子下大樂官常存肄之嵗時以備數然不常御常御及郊廟皆非雅聲然詩樂施於後嗣猶得有所祖述昔殷周之雅頌廼上本有娀姜原卨稷始生𤣥王公劉古公太伯王季姜女大任大姒之徳乃及成湯文武受命武丁成康宣王中興下及輔佐阿衡周召太公申伯召虎仲山甫之屬君臣男女有功徳者靡不褒揚功徳既信羙矣褒揚之聲盈乎天地之間是以光明著於當世遺譽垂於無窮也今漢郊廟詩歌未有祖宗之事八音調均又不恊於鐘律而内有掖庭材人外有上林樂府皆以鄭聲施於朝廷至成帝時謁者常山王禹世受河間樂能説其義其弟子宋曅等上書言之下大夫博士平當等考試當以為漢承秦滅道之後賴先帝聖徳博受兼聽修廢官立太學河間獻王聘求幽隱修興雅樂以助化時大儒公孫𢎞董仲舒等以為音中正雅立之大樂春秋鄉射作於學官希濶不講故自公卿大夫觀聽者但聞鏗鎗不曉其意而欲以風諭衆庻其道無由是以行之百有餘年徳化至今未成今曅等守習孤學大指歸於興助教化衰㣲之學興廢在人宜領屬雅樂以繼絶表㣲孔子曰人能𢎞道非道𢎞人河間區區小國藩臣以好學修古能有所存民到于今稱之况于聖主廣被之資修起舊文放鄭近雅述而不作信而好古于以風示海内揚名後世誠非小功小羙也事下公卿以為乆逺難分明當議復寢是時鄭聲尤甚黄門名倡丙彊景武之屬富顯於世貴戚五矦定陵富平外戚之家淫侈過度至與人主爭女樂哀帝自為定陶王時疾之又性不好音及即位下詔曰惟世俗奢㤗文巧而鄭衛之聲興夫奢㤗則下不孫而國貧文巧則趨末背本者衆鄭衛之聲興則淫僻之化流而欲黎庻淳朴家給猶濁其源而求其清流豈不難哉孔子不云乎放鄭聲鄭聲滛其罷樂府官郊祭樂及古兵法武樂在經非鄭衛之樂者條奏别屬他官丞相孔光大司空何武奏郊祭樂人員六十二人給祠南北郊大樂鼓員六人嘉至鼓員十人邯鄲鼓員二人騎吹鼓員三人江南鼓員二人淮南鼓員四人巴俞鼓員三十六人歌鼓員二十四人楚嚴鼓員一人梁皇鼓員四人臨淮鼓貟三十五人茲邡鼓員三人凡鼓十二員百二十八人朝賀置酒陳殿下應古兵法外郊祭員十三人諸族樂人兼雲招給祠南郊用六十七人兼給事雅樂用四人夜誦員五人剛别柎員二人給盛徳主調箎員二人聽工以律知日冬夏至一人鐘工磬工簫工員各一人僕射二人主領諸樂人皆不可罷竽工員三人一人可罷琴工員五人三人可罷柱工員二人一人可罷繩弦工員六人四人可罷鄭四㑹員六十二人一人給事雅樂六十一人可罷張瑟員八人七人可罷安世樂鼓員二十人十九人可罷沛吹鼔員十二人族歌鼓員二十七人陳吹鼓員十三人商樂鼓員十四人東海鼓員十六人長樂鼓員十三人縵樂鼓員十三人凡鼓八員百二十八人朝賀置酒陳前殿房中不應經法治竽員五人楚鼓員六人常從倡三十人常從象人四人詔随常從倡十六人秦倡員二十九人秦倡象人員三人詔随秦倡一人雅大人員九人朝賀置酒為樂楚四㑹員十七人巴四㑹員十二人銚四㑹員十二人齊四㑹員十九人蔡謳員三人齊謳員六人竽瑟鐘磬員五人皆鄭聲可罷師學百四十二人其七十二人給大官挏馬酒其七十人可罷大凡八百二十九人其三百八十八人不可罷可領屬大樂其四百四十一人不應經法或鄭衛之聲皆可罷奏可然百姓漸漬日乆又不制雅樂有以相變豪富吏民湛沔自若大漢繼周乆曠大儀未有立禮成樂此賈誼仲舒王吉劉向之徒所為發憤而増嘆也禮樂志髙祖過沛詩三矦之章令小兒歌之髙祖崩令沛得以四時歌舞宗廟孝恵孝文孝景無所増更於樂府習常𨽻舊而已至今上即位作十九章令侍中李延年次序其聲拜為恊律都尉通一經之士不能獨知其辭皆集㑹五經家相與共講習讀之乃能通知其意多爾雅之文漢家常以正月上辛祠㤗一甘泉以昬時夜祠到明而終常有流星經於祠壇上使僮男女七十人俱歌春歌青陽夏歌朱明秋歌西皥冬歌𤣥𡨕世多有故不論又嘗得神馬渥洼水中復次以為太一之歌歌曲曰太一貢兮天馬下霑赤汗兮沫流赭騁容與兮跇萬里今安匹兮龍為友後伐大宛得千里馬馬名蒲梢次作以為歌歌詩曰天馬來兮從西極經萬里兮歸有德承靈威兮降外國渉流沙兮四夷服中尉汲黯進曰凡王者作樂上以承祖宗下以化兆民今陛下得馬詩以為歌協於宗廟先帝百姓豈能知其音雅上黙然不説丞相公孫𢎞曰黯誹謗聖制當族樂書雜録太常屬官有大樂令丞百官表宫商角徴羽職在大樂律厯志武帝策董仲舒曰五帝三王之道改制作樂而天下洽和百王同之當虞氏之樂莫盛於韶於周莫盛於勺聖王已沒鐘鼓筦絃之聲未衰而大道㣲缺云云仲舒對曰道者所由適於治之路也仁義禮樂皆其具也王者未作樂之時乃用先王之樂宜於世者而以深入教化於民教化之情不得雅頌之樂不成故王者功成作樂樂其徳也樂者所以變民風化民俗也其變民也易其化人也著故聲發於和而本於情接於肌膚藏於骨髓故王道雖㣲缺而鐘鼓筦絃之聲未衰也夫虞氏不為政乆矣然而雅頌遺風猶有存者是以孔子在齊而聞韶也董仲舒傳嬖臣李延年以好音見上善之下公卿議曰民間祠有鼓舞樂今郊祀而無樂豈稱乎公卿曰古者祠天地皆有樂而神祗可得而禮或曰秦帝使素女鼓五十絃瑟悲帝禁不止故破其瑟為二十五絃於是塞南越禱祠㤗一后土始用樂舞益召歌兒作二十五絃及空矦瑟自此起郊祀志宣帝本始四年詔樂府减樂人本紀神爵五鳯之間天下殷富數有嘉應上頗作歌詩欲興協律之事丞相魏相奏言知音善鼓雅瑟者渤海趙定梁國龔徳皆召見待詔王褒傳元帝多材藝善史書鼓琴瑟吹洞簫自度曲被歌聲分刌節度窮極㓜𦕈本紀元帝被疾不親政事留好音樂或置鼙鼓殿下天子自臨軒檻上銅圜以擿鼓擿将益反聲中嚴鼓之節後宫及左右習知音者莫能為而定陶王亦能之上數稱其材史丹進曰凢所謂材者敏而好學温故知新皇太子是也若乃器人於絲竹鼓鼙之間則是陳恵李㣲髙於匡衡可相國也陳恵李㣲皆黄門鼓吹於是上嘿然而笑史丹傳平帝元始元年放鄭聲五年召天下通知鐘律者本紀西漢㑹要卷二十一
