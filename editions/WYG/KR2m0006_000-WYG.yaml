body:
  text: 西漢㑹要政書類一通制之屬提要臣等謹案西漢㑹要七十卷宋徐天麟撰天麟字仲祥臨江人開禧元年進士調撫州教授厯武學博士通判惠潭二州權知英徳府事蹟附見宋史徐夢莘傳傳稱天麟為通直郎得之之子夢莘之從子晁公武讀書志則稱為夢莘之子考樓鑰攻媿集有西漢㑹要序曰徐思叔為左氏國記其兄祕閣商老為北盟錄已而思叔之子孟堅著漢官考次子仲祥又作漢㑹要商老夢莘之字思叔得之之字也然則史不悞而晁氏悞矣其書仿唐㑹要之體取漢書所載制度典章見於紀志表傳者以類相從分門編載其無可𨽻者亦依蘇冕舊例以雜錄附之分十有五門共三百六十七事嘉定四年具表進之於朝有旨付尚書省藏之祕閣班固書最稱博贍於一代禮樂刑政悉綜括其大端而理宻文繁驟難得其體要天麟為之區分别白經緯本末一一犁然其詮次極為精審惟所採祗據本史故于漢制之見於他書者槩不採掇未免失之於隘又如輿服門中于司馬相如揚雄諸賦鋪張揚厲之語一槩摘入殊非事實亦為有乖義例然其貫串詳洽實未有能過之者昔人稱顔師古為漢書功臣若天麟者固亦無媿斯目矣乾隆四十四年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:4d4f9e8b3bd1c85cf2aa01552962958ad84100432fd2e71f32a442d0bb5ebbf0
