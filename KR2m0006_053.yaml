body:
  text: 西漢㑹要卷五十三宋徐天麟撰食貨四錢幣秦兼天下幣為二等黃金以溢名為上幣銅錢質如周錢文曰半兩重如其文而珠玉龜貝銀錫之屬為器飾寶藏不為幣然各隨時而輕重無常漢興以為秦錢重難用更令民鑄莢錢黃金一斤而不軌逐利之民蓄積贏餘以稽市物痛騰躍米石至萬錢匹馬至百金食貨志髙后二年行八銖錢本紀應劭曰本秦錢質如周錢文曰半兩重如其文漢鑄莢錢惠民患其輕重至此復行八銖錢六年行五分錢本紀即謂莢錢文帝五年四月為錢益多而輕更鑄四銖錢其文為半兩本紀食貨志武帝建元元年行三銖錢本紀壞四銖造比也重如其文五年罷二銖錢行半兩錢本紀自孝文更造四銖錢至元狩四年四十餘年從建元以來用少縣官往往即多銅山而鑄錢民益盜鑄不可勝數錢益多而輕物益少而貴有司言曰今半兩錢法重四銖而姦或盜摩錢質而取鋊鋊銅屑也錢益輕薄而物貴則逺方用幣煩費不省乃令縣官銷半兩錢更鑄三銖錢重如其文其明年有司言三銖錢輕輕錢易作姦詐乃更請郡國鑄五銖周郭其質令不得磨錢取鋊食貨志按本紀元狩五年罷半兩錢行五銖錢今以食貨志考之乃罷三銖非罷半兩通鑒考異亦云紀誤元鼎二年郡國鑄錢民多姦鑄錢多輕而公卿請令京師鑄錢赤仄應劭曰所謂子紺錢也如淳曰以赤銅為其郭一當五賦官用非赤仄不得行其後二歲赤仄錢賤民巧法用之不便又廢於是悉禁郡國毋鑄錢專令上林三官鑄錢既多而令天下非三官錢不得行諸郡國前所鑄錢皆廢銷之輸入其銅三官而民之鑄錢益少計其費不能相當唯真工大姦乃盜為之同上自孝武元狩五年三官初鑄五銖錢至平帝元始中成錢二百八十億萬餘云同上宣元成哀平五世亡所變改同上王莽居攝變漢制以周錢有子母相權於是更造大錢徑寸二分重十二銖文曰大錢五十又造契刀錯刀契刀其環如大錢身形如刀長二寸文曰契刀五百錯刀以黃金錯其文曰一刀直五千與五銖錢凡四品並行此以後乃莽即真後事不復録雜録元帝時貢禹言古者不以金錢為幣專意於農故一夫不耕必有受其飢者今漢家鑄錢及諸鐵官皆置吏卒徒攻山取銅錢一歲功十萬人已上中農食七人是七十萬人常受其飢也鑿地數百丈銷隂氣之精地臧空虛不能含氣出雲斬伐林木亡有時禁水旱之災未必不繇此也自五銖錢起已來七十餘年民坐盜鑄錢被刑者衆富人積錢滿室猶亡厭足民心動搖商賈求利東西南北各用智巧好衣美食歲有十二之利而不出租稅農夫父子暴露中野不避寒暑椊屮杷土手足胼胝已奉穀租又出槀稅鄉部私求不可勝供故民弃本逐末耕者不能半貧民雖賜之由猶賤賣以賈窮則起為盜賊何者末利深而惑於錢也是以姦邪不可禁其原皆起於錢也疾其末者絶其本宜罷採珠玉金銀鑄錢之官亡復以為幣市井勿得販賣除其租銖之律租稅祿賜皆以布帛及穀使百姓一歸於農復古道便議者以為交易待錢布帛不可尺寸分裂禹議亦寢貢禹傳及食貨志有上書言古者以龜貝為貨今以錢易之民以故貧宜可改幣上以問師丹丹對言可改章下有司議皆以為行錢以來久難卒變易丹老人忘其前語後從公卿議師丹傳錢禁孝文五年除盜鑄錢令使民放鑄賈誼諫曰法使天下公得顧租鑄銅錫為錢敢雜以鉛鐵為它巧者其罪黥然鑄錢之情非殽雜為巧者不可得贏而殽之甚微為利甚厚夫事有召禍而法有起姦今令細民人操造幣之藝各隱屏而鑄作因欲禁其厚利微姦雖黥罪日報其藝不止乃者民人抵罪多者一縣百數及吏之所疑榜笞奔走者甚衆夫設法以誘民使入陷阱孰積於此曩禁鑄錢死罪積下今公鑄錢黥罪積下為法若此上何賴焉又民用錢郡縣不同或用輕錢百加若干或用重錢平稱不受法錢不立吏急而一之呼則大為煩苛而力不能勝縱而弗呵呼則市肆異用錢文大亂茍非其術何鄉而可哉今農事棄捐而采銅者日蕃釋其耒耨冶鎔炊炭姦錢日多五穀不為多善人怵而為姦邪願民陷而之刑戮刑戮將甚不詳奈何而忽國知患此吏議必曰禁之禁之不得其術其傷必大令禁鑄錢則錢必重重則其利深盜鑄如雲而起棄市之罪又不足以禁矣姦數不勝而法禁數潰銅使之然也故銅布於天下其為禍博矣今博禍可除而七福可致也何謂七福上收銅勿令布則民不鑄錢黥罪不積一矣僞錢不蕃民不相疑二矣采銅鑄作者及於耕田三矣銅畢歸上上挾銅積以御輕重錢輕則以術斂之重則以術散之貨物必平四矣以作兵器以假貴臣多少有制用别貴賤五矣以臨萬貨以調盈虛以收竒羡則官富實而末民困六矣制吾棄財以與胸奴逐爭其民則敵必懷七矣故善為天下者因禍而為福轉敗而為功今久退七福而行博禍臣誠傷之上不聽是時吳以諸侯即山鑄錢富埓天子後卒叛逆鄧通大夫也以鑄錢財過王者故吳鄧錢布天下食貨志下文帝除盜鑄錢令賈山上書諫以為變先帝法非是章下詰責對以為錢者亡無器也而可以易富貴富貴者人主之操柄也令民為之是與人主共操柄不可長也其後復禁鑄錢賈山傳景帝立人有告鄧通盜出徼外鑄錢下吏驗問頗有遂竟案盡沒入之本傳中六年定鑄錢僞黃金棄市律本紀武帝元狩中盜鑄諸金錢罪皆死而民之犯者不可勝數食貨志自造白金五銖錢後五歲而赦吏民坐盜鑄金錢死者數十萬人其不自發覺相殺者不可勝計赦自出者百餘萬人然不能半自出天下大氐無慮皆鑄金錢矣同上其後上林三官鑄錢既多而令天下非三官錢毋得行而民之盜鑄錢者益少其費不能相當惟真工大姦乃盜為之食貨志白金皮幣武帝元狩中縣官大空而富商賈或滯財役貧轉轂百數冶鑄鬻鹽財或纍萬金而不佐公家之急黎民重困於是天子與公卿議更造錢幣以淡用是時禁苑有白鹿而少府多銀錫有司言曰古者皮幣諸侯以聘享金有三等黃金上白金為中赤金為下今半兩錢法重四銖而姦或盜摩錢質而取鋊錢益輕薄而物貴則逺方用幣煩費不省乃以白鹿皮方尺緣以繢為皮幣按本紀元狩四年造白金及皮幣直四十萬王侯宗室朝覲享必以皮幣薦璧然後得行又造銀錫白金以為天用莫如龍地用莫如馬人用莫如龜故曰金三品其一曰重八兩圜之其文龍名白撰直三千二曰以重差小方之其文馬直五百三曰復小橢之其文龜直三百其後官鑄赤仄白金稍賤民弗寶用縣官以令禁之無益歲餘終廢不行食貨志元鼎二年罷白金武紀西漢㑹要卷五十三
