body:
  text: 西漢㑹要卷七十宋徐天麟撰蕃夷下西域西域以孝武時始通本三十六國其後稍分至五十餘皆在匃奴之西烏孫之南南北有大山中央有河東西六千餘里南北千餘里東則接漢阸以玉門陽闗西則限以葱嶺其南山東出金城與漢南山屬焉其河有兩原一出葱嶺山一出于闐于闐在南山下其河北流與葱嶺河合東注蒲昌海蒲昌海一名鹽澤者也去玉門陽闗三百餘里廣袤三百里其水亭居冬夏不増減皆以為潛行地下南出於積石為中國河云漢興至於孝武事征四夷廣威德而張騫始開西域之迹其後驃騎將軍擊破匃奴右地降渾邪休屠王遂空其地始築令居以西初置酒泉郡後稍發徙民充實之分置武威張掖敦煌列四郡據兩闗焉自貳師將軍伐大宛之後西域震懼多遣使來貢獻漢使西域者益得職於是自敦煌西至鹽澤徃徃起亭而輪臺渠犂皆有田卒數百人置使者校尉領䕶以給使外國者至宣帝時遣衛司馬使䕶鄯善以西數國及破姑師未盡殄分以為車師前後王及山北六國時漢獨䕶南道未能盡并北道也然匃奴不自安矣其後日逐王畔單于將衆來降䕶鄯善以西使者鄭吉迎之既至漢封日逐王為歸德侯吉為安逺侯是歳神爵三年也乃因使吉䕶北道故號曰都䕶都䕶之起自吉置矣僮僕都尉由此罷匈奴益弱不得近西域於是徙屯田田於北胥鞬披莎車之地屯田校尉始屬都䕶都䕶督察烏孫康居諸外國動靜有變以聞可安輯安輯之可擊擊之都尉治烏壘城去陽闗二千七百三十八里與渠犂田官相近土地肥饒於西域為中故都䕶治焉至元帝時復置戊己校尉屯田車師前王庭是時匃奴束蒲類王兹力支將人衆千七百餘人降都䕶都䕶分車師後王之西為烏貪訾離地以處之自宣元後單于稱藩臣西域服從其土地山川王侯户數道里逺近翔實矣婼羌國鄯善國且末國小宛國精絶國戎盧國扜彌國渠勒國于闐國皮山國烏秅國西夜國蒲犂國依耐國無雷國難兠國罽賓國烏弋山離國安息國大月氏國康居國奄蔡國大宛國桃槐國休循國捐毒國莎車國疏勒國尉頭國烏孫國姑墨國温宿國龜兹國烏壘國渠犂城尉犂國危須國焉耆國烏貪訾離國卑陸國卑陸後國都立師國單桓國蒲類國蒲類後國西且彌國東且彌國刼國狐胡國山國車師前國車師後國車師都尉國車師後城長國初武帝感張騫之言甘心欲通大宛諸國使者相望於道一歳中多至十餘輩樓蘭姑師當道苦之攻刼漢使王恢等又數為匈奴耳目令其兵遮漢使漢使多言其國有城邑兵弱易擊於是武帝遣從票侯趙破奴將屬國騎及郡兵數萬擊姑師王恢數為樓蘭所苦上令恢佐破奴將兵破奴與輕騎七百人先至虜樓蘭王遂破姑師因暴兵威以動烏孫大宛之屬還封破奴為浞野侯恢為浩侯於是漢列亭障至玉門矣樓蘭既降服貢獻匃奴聞發兵擊之於是樓蘭遣一子質匈奴一子質漢後貳師軍擊大宛匈奴欲遮之貳師兵盛不敢當即遣騎因樓蘭候漢使後過者欲絶勿通時漢軍正任文將兵屯玉門闗為貳師後距捕得生口知狀以聞上詔文便道引兵捕樓蘭王將詣闕簿責王對曰小國在大國間不兩屬無以自安願徙國入居漢地上直其言遣歸國亦因使候伺匃奴匃奴自是不甚親信樓蘭征和元年樓蘭王死國人來請質子在漢者欲立之質子常坐漢法下蠶室宫刑故不遣報曰侍子天子愛之不能遣其更立其次當立者樓蘭更立王漢復責其質子亦遣一子質匃奴後王又死匃奴先聞之遣質子歸得立為王漢遣使詔新王令入朝天子將加厚賞樓蘭王後妻故繼母也謂王曰先王遣兩子質漢皆不還柰何欲徃朝乎王用其計謝使曰新立國未定願待後年入見天子然樓蘭國最在東垂近漢當白龍堆乏水草常主發導負水儋糧送迎漢使又數為吏卒所冦懲艾不便與漢通後復為匃奴反間數遮殺漢使其弟尉屠耆降漢具言狀元鳯四年大將軍霍光白遣平樂監傅介子徃刺其王介子輕將勇敢士齎金幣揚言以賜外國為名既至樓蘭詐其王欲賜之王喜與介子飲醉將其王屏語壯士二人從後刺殺之貴人左右皆散走介子告諭以王負漢罪天子遣我誅王當立王弟尉屠耆在漢者漢兵方至毋敢動自令滅國介子遂斬王嘗歸首馳傳詣闕縣首北闕下封介子為義陽侯乃立尉屠耆為王更名其國為鄯善為刻印章賜以宫女為夫人備車騎輜重丞相將軍百官送至横門外祖而遣之王自請天子曰身在漢乆今歸單弱而前王有子在恐為所殺國中有伊循城其地肥美願漢遣一將屯田積穀令臣得依其威重於是漢遣司馬一人吏士四十人田伊循以鎮撫之其後更置都尉伊循官置始此矣自武帝始通罽賓自以絶逺漢兵不能至其王烏頭勞數剽殺漢使烏頭勞死子代立遣使奉獻漢使闗都尉文忠送其使王復欲害忠忠覺之迺與容屈王子隂末赴共合謀攻罽賓殺其王立隂末赴為罽賓王授印綬後軍侯趙德使罽賓殺與隂末赴相失隂末赴鎖琅當德殺副已下七十餘人遣使者上書謝孝元帝以絶域不録於其使者於縣度絶而不通成帝時復遣使獻謝罪漢欲遣使者報送其使杜欽説大將軍王鳯曰前罽賓王隂末赴本漢所立後卒畔逆夫德莫大於有國子民罪莫大於執殺使者所以不報恩不懼誅者自知絶逺兵不至也有求則卑辭無欲則驕謾終不可懷服其鄉慕不足以安西域雖不附不能危城郭前親逆節惡暴西域故絶而不通今悔過來而無親屬貴人奉獻者皆行賈賤人欲通貨市買以獻為名故煩使者送至縣度恐失實見欺凡遣使送客者欲為防䕶冦害也起皮山南更不屬漢之國四五斥候士百餘人五分夜擊刀斗自守尚時為所侵盜驢畜負糧須諸國稟食得以自贍國貧小不能食或桀黠不肯給擁彊漢之節餒山谷之間乞匄無所得離一二旬則人畜棄捐曠野而不反又歴大頭痛小頭痛之山赤土身熱之阪令人身熱無色頭痛嘔吐驢畜盡然又有三池盤石阪道陿者尺六七寸長者徑三十里臨崢嶸不測之深行者騎步相持繩索相引二千餘里乃到縣度蓄隊未半阬谷盡靡碎人墮埶不得相收視險阻危害不可勝言聖王分九州制五服務盛内不求外今遣使者承至尊之命送蠻夷之賈勞吏士之衆涉危難之路罷弊所恃以事無用非乆長計也使者業已受節可至皮山而還於是鳯白從欽言罽賓實利賞賜賈市其使數年而壹至云武帝始遣使至安息王令將將二萬騎迎於東界東界去王都數千里行比至過數十城人民相屬因發使隨漢使者來觀漢地以大鳥卵及犂靬胘人獻於漢天子大説宣帝時匃奴乖亂五單于並爭漢擁立呼韓邪單于而郅支單于怨望殺漢使者西阻康居其後都䕶甘延夀副校尉陳湯發戊己校尉西域諸國兵至康居誅滅郅支單于是時元帝建昭三年也至成帝時康居遣子侍漢貢獻然自以絶逺獨驕嫚不肯與諸國相望都䕶郭舜數上言本匃奴盛時非以兼有烏孫康居故也及其稱臣妾非以失二國也漢雖皆受其質子然三國内相輸遺交通如故亦相候伺見便則發合不能相親信離不能相臣役以今言之結配烏孫竟未有益反為中國生事然烏孫既結在前今與匃奴俱稱臣義不可距而康居驕黠訖不肯拜使者都䕶吏至其國坐之烏孫諸使下王及貴人先飲食已乃飲㗖都䕶吏故為無所省以夸旁國以此度之何故遣子入侍其欲賈市為好辭之詐也匃奴百蠻大國今事漢甚備聞康居不拜且使單于有自下之意宜歸其侍子絶勿復使以章漢家不通無禮之國敦煌酒泉小郡及南道八國給使者徃來人馬驢橐駝食皆苦之空罷耗所過送迎驕黠絶逺之國非至計也漢為其新通重致逺人終羈縻而未絶大宛國多善馬馬汗血言其先天馬子也張騫始為武帝言之上遣使者持千金及金馬以請宛善馬宛王以漢絶逺大兵不能至愛其寳馬不肯與漢使妄言宛遂攻殺漢使取其財物於是天子遣貳師將軍李廣利將兵前後十餘萬人伐宛連四年宛人斬其王母寡首獻馬三千匹漢軍乃還宣帝時烏孫公主小子萬年莎車王愛之莎車王無子死時萬年在漢莎車國人計欲自託於漢又欲得烏孫心即上書請萬年為莎車王漢許之遣使者奚充國送萬年萬年初立暴惡國人不説莎車王弟呼屠徵殺萬年并殺漢使者自立為王約諸國背漢㑹衛侯馮奉世使送大宛客即以便宜發諸國兵擊殺之更立它昆弟子為莎車王還拜奉世為光禄大夫是歳元康元年也始張騫言烏孫雖彊大可厚賂招令東居故地妻以公主與為昆弟以制匃奴武帝令騫齎金幣徃騫既致賜諭指昆莫發使送騫因獻馬數十匹報謝匃奴聞其與漢通怒欲擊之烏孫恐使使獻馬願得尚漢公主為昆弟漢遣江都王建女細君為公主以妻焉昆莫以為右夫人匃奴亦遣女妻昆莫昆莫以為左夫人昆莫年老欲使其孫岑陬尚公主公主不聽上書言狀天子報曰從其國俗岑陬遂妻公主昆莫死岑陬代立江都公主死漢復以楚王戊之孫解憂為公主妻岑陬岑陬以國與季父大禄子翁歸靡復尚楚主解憂昭帝時公主上書言匃奴發騎田車師車師與匃奴為一共侵烏孫惟天子幸救之漢議欲擊匃奴㑹昭帝崩宣帝即位公主及昆彌皆遣使上書言匃奴復發大兵侵擊烏孫惟天子出兵以救公主昆彌漢兵大發十五萬騎五將軍分道並出獲單于父行及嫂居次名王犂汙都尉千長騎將以下四萬級元康二年烏孫昆彌上書願以漢外孫元貴靡為嗣令得復尚漢公主上乃以烏孫主解憂弟子相夫為公主而遣之未出塞聞烏孫昆彌翁歸靡死烏孫貴人共立岑陬子泥靡代為昆彌號狂王天子召還少主狂王復尚楚主解憂後翁歸靡襲殺狂王自立為昆彌宣帝立元貴靡為大昆彌烏就屠為小昆彌自分立兩昆彌後漢用憂勞且無寧歳自武帝初通西域置校尉屯田渠犂是時軍旅連出師行三十二年海内虚耗征和中貳師將軍李廣利以軍降匃奴上既悔逺征伐而搜粟都尉桑𢎞羊與丞相御史奏言故輪臺以東捷枝渠犂皆故國地廣饒水草有溉田五千頃以上處温和田美可益通溝渠種五穀與中國同時熟其旁國少錐刀貴黄金采繒可以易穀食宜給足不可乏臣愚以為可遣屯田卒詣故輪臺以東置校尉三人分䕶各舉圖地形通利溝渠務使以時益種五穀張掖酒泉遣騎假司馬為斥侯屬校尉事有便宜因騎置以聞田一歳有積穀募民有壯健有累重敢徙者詣田所就蓄積為本業益墾溉田積築列亭連城而西以威西國輔烏孫為便臣謹遣徵事臣昌分部行邊嚴勅太守都尉明烽火選士馬謹斥候蓄茭草願陛下遣使使西國以安其意臣昧死請上迺下詔深陳既徃之悔曰前有司奏欲益民賦三十助邊用是重困老弱孤獨也而今又請遣卒田輪臺輪臺西於車師千餘里迺者以縛馬書徧視丞相御史二千石諸大夫郎為文學者迺至郡屬國都尉成忠趙破奴等皆以虜自縛其馬不祥甚哉或以為欲以見彊夫不足者視人有餘易之卦得大過爻在九五匃奴困敗公車方士太史治星望氣及大卦龜蓍皆以為吉匃奴必破時不可再得也又曰北伐行將於鬴山必克卦諸將貳師冣吉故朕親發貳師下鬴山詔之必無深入今計謀卦兆皆反繆重合侯得虜候者言聞漢軍當來匃奴使巫埋羊牛所出諸道及水上以詛軍單于遺天子馬裘常使巫祝之縛馬者詛軍事也又卜漢軍一將不吉匃奴常言漢極大不能饑渇失一狼走千羊迺者貳師敗軍士死畧離散悲痛常在朕心今請逺田輪臺欲起亭隧是擾勞天下非所以優民也今朕不忍聞大鴻臚等又議欲募囚徒送匃奴使者明封侯之賞以報忿五伯所弗能為也且匃奴得漢降者常提掖搜索問以所聞今邊塞未正闌出不禁障侯長吏使卒獵獸以皮肉為利卒苦而烽火乏失亦上集不得後降者來若捕生口虜迺知之當今務在禁苛暴止擅賦力本農修馬復令以補缺毋乏武備而已郡國二千石各上進蓄馬方畧補邊狀與計對由是不復出軍而封丞相車千秋為富民侯以明休息思富養民也初貳師將軍李廣利擊大宛還過杅彌杅彌遣太子賴丹為質於龜兹廣利責龜兹曰外國皆臣屬於漢龜兹何以得受杅彌質即將賴丹入至京師昭帝乃用桑𢎞羊前議以杅彌太子賴丹為校尉將軍田輪臺輪臺與渠犂地皆相連也龜兹貴人姑翼謂其王曰賴丹本臣屬吾國今佩漢印綬來迫吾國而田必為害王即殺賴丹而上書謝漢漢未能征宣帝時長羅侯常惠使烏孫還便宜發諸國兵合五萬人攻龜兹責以前殺校尉賴丹龜兹王謝曰迺我先王時為貴人姑翼所誤我無罪執姑翼詣惠惠斬之時烏孫公主遣女來至京師學鼓琴漢遣侍郎樂奉送主女過龜兹龜兹前遣人至烏孫求公主女未還㑹女過龜兹龜兹王留不遣復使使報公主主許之後公主上書願令女比宗室入朝而龜兹王絳賓亦愛其夫人上書言得尚漢外孫為昆弟願與公主女俱入朝元康元年遂來朝賀王及夫人皆賜印綬夫人號稱公主賜以車騎旗鼓歌吹數十人綺繡雜繒琦珍凡數千萬留且一年厚贈送之後數來朝賀樂漢衣服制度歸其國治宫室作徼道周衛出入傳呼撞鐘鼓如漢家儀外國胡人皆曰驢非驢馬非馬若龜兹王所謂驘也絳賓死其子丞德自謂漢外孫成哀帝時徃來尤數漢遇之亦甚親宻武帝天漢二年以匃奴降者介和王為開陵侯將樓蘭國兵始擊車師匃奴遣右賢王將數萬騎救之漢兵不利引去征和四年遣重合侯馬通將四萬騎擊匃奴道過車師北復遣開陵侯將樓蘭尉犂危須凡六國兵别擊車師勿令得遮重合侯諸國兵共圍車師車師王降服臣屬漢昭帝時匃奴復使四千騎田車師宣帝即位遣五將將兵擊匃奴車師田者驚去車師復通於漢匃奴怒召其太子軍宿欲以為質車宿焉耆外孫不欲質匃奴亡走焉耆車師王更立子烏貴為太子及烏貴立為王與匃奴結婚姻教匃奴遮漢道通烏孫者地節二年漢遣侍郎鄭吉校尉司馬憙將免刑罪人田渠犂積穀欲以攻車師至秋收穀吉憙發城郭諸國兵萬餘人自與所將田士千五百人共擊車師攻交河城破之王尚在其北石城中未得㑹軍食盡吉等且罷兵歸渠犂田收秋畢復發兵攻車師王於石城王聞漢兵且至北走匃奴求救匃奴未為發兵王來還與貴人蘇猶議欲降漢恐不見信蘇猶教王擊匃奴邊國小蒲類斬首畧其人民以降吉車師旁小金附國隨漢軍後盜車師車師王復自請擊破金附匃奴聞車師降漢發兵攻車師吉憙引兵北逢之匃奴不敢前吉憙即留一侯與卒二十人留守王吉等引兵歸渠犂車師王恐匃奴兵復至而見殺也迺輕騎奔烏孫吉即迎其妻子置渠犂東奏事至酒泉有詔還田渠犂及車師益積穀以安西國侵匃奴吉還傳送車師王妻子詣長安賞賜甚厚每朝㑹四夷常尊顯以示之於是吉始使吏卒三百人别田車師得降者言單于大臣皆曰車師地肥美近匃奴使漢得之多田積穀必害人國不可不爭也果遣騎來擊田者吉迺與校尉盡將渠犂田士千五百人徃田匃奴復益遣騎來漢田卒少不能當保車師城中匃奴將即其城下謂吉曰單于必爭此地不可田也圍城數日迺解後常數千騎徃來守車師吉上書言車師去渠犂千餘里間以河山北近匃奴漢兵在渠犂者勢不能相救願益田卒公卿議以為道逺煩費可且罷車師田者詔遣長羅侯將張掖酒泉騎出車師北千餘里楊威武車師旁胡騎引去吉迺得出歸渠犂凡三校尉屯田車師王之走烏孫也烏孫留不遣遣使上書願留車師王備國有急可從西道以擊匃奴漢許之於是漢召故車師太子軍宿在焉耆者立以為王盡徙車師國民令居渠犂遂以車師故地與匃奴車師王得近漢田官與匃奴絶亦安樂親漢後漢使侍郎殷廣德責烏孫求車師王烏孫遣將詣闕賜第與其妻子居是歳元康四年也其後置戊己校尉屯田居車師故地元始中車師後王國有新道出五船北通玉門闗徃來差近戊己校尉徐普欲開以省道里半避白龍堆之阸車師後王姑句以道當為拄置心不便也地又頗與匃奴南將軍地接普欲分明其界然後奏之召姑句使證之不肯擊之姑句數以牛羊賕吏求出不得姑句家矛端生火其妻服紫陬謂姑句曰矛端生火此兵氣也利以用兵前車師前王為都䕶司馬所殺今乆繫必死不如降匃奴即馳突出髙昌壁入匃奴又去胡來王唐兠國比大種赤水羌數相冦不勝告急都䕶都䕶但欽不以時救助唐兠困急怨欽東守玉門闗玉門闗不内即將妻子人民千餘人亡降匃奴匃奴愛之而遣使上書言狀是時新都侯王莽秉政遣中郎將王昌等使匃奴告單于西域内屬不當得受單于謝罪執二王以付使者莽使中郎王萌待西域惡都奴界上逢受單于遣使送因請其罪使者以聞莽不聽詔下㑹西域諸國王陳軍斬姑句唐兠以示之至莽簒位莽死崇遂没西域因絶冣凡國五十自譯長城長君監吏大禄百長千長都尉且渠當户將相至侯王皆佩漢印綬凡三百七十六人而康居大月氏安息罽賓烏弋之屬皆以絶逺不在數中其來貢獻則相與報不督録總領也西漢㑹要卷七十
