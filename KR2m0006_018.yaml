body:
  text: 西漢㑹要卷十八宋徐天麟撰禮十二賓禮封先代後先賢後附殷後紹嘉矦成帝綏和元年二月甲子封殷後孔子世吉適子孔何齊為殷紹嘉矦千六百七十户表本紀云考求其後莫正孔吉其封吉為紹嘉矦後六月進爵為公地滿百里表本紀作三月哀帝建平二年益户九百三十二表平帝元始四年正月更為宋公本紀周後承休矦武帝元鼎四年詔封周後孽子嘉為周子南君三千户表史記云其以三十里地封周後元帝初元五年正月癸巳更封為周承休矦位次諸矦王表成帝綏和元年進爵為公地滿百里表平帝元始四年正月改為鄭公本紀周公後褒魯矦平帝元始元年六月丙午封周公後公孫相如為褒魯矦本紀表云公子寬以周公世魯頃公元孫之元孫奉周祀矦一千户十一月矦相如嗣孔子後褒成矦平帝元始元年六月丙午封孔子後孔均為褒成矦追諡孔子曰褒成宣尼公本紀表云以孔子世褒成烈君霸曽孫奉孔子祀矦二千户樂毅後華成君髙帝十年詔求樂毅有後乎得其孫叔封之樂鄉號華成君本紀成帝時梅福上書曰武王克殷未及下車存五帝之後封殷於宋紹夏於杞明著三統示不獨有也是以姬姓半天下遷廟之主流出於户所謂存人以自立者也今成湯不祀殷人亡後陛下繼嗣久微殆為此也春秋經曰宋殺其大夫榖梁傳曰其不稱名姓以其在祖位尊之也此言孔子故殷後也雖不正統封其子孫以為殷後禮亦宜之何者諸矦奪宗聖庶奪適傳曰賢者子孫宜有土而况聖人又殷之後哉昔成王以諸矦禮葬周公而皇天動威雷風著灾今仲尼之廟不出闕里孔氏子孫不免編户以聖人而歆匹夫之祀非皇天之意也今陛下誠能據仲尼之素功以封其子孫則國家必獲其福又陛下之名與天亡極何者追聖人素功封其子孫未有法也後聖必以為則不滅之名可不勉哉福孤遠又譏切王氏故終不見納初武帝時始封周後姬嘉為周子南君至元帝時尊周子南君為周承休矦位次諸矦王使諸大夫博士求殷後分散為十餘姓郡國往往得其大家推求子孫絶不能紀時匡衡議以為王者存二王後所以尊其先王而通三統也其犯誅絶之罪者絶而更封他親為始封君上承其王者之始祖春秋之義諸矦不能守其社稷者絶今宋國已不守其統而失國矣則宜更立殷後為始封君而上承湯統非當繼宋之絶矦也宜明得殷後而已今之故宋推求其嫡久逺不可得雖得其嫡嫡之先已絶不當得立禮記孔子曰丘殷人也先師所共傳宜以孔子世為湯後上以其語不經遂見寢至成帝時梅福復言宜封孔子後以奉湯祀綏和元年立二王後推迹古文以左氏榖梁世本禮記相明遂下詔封孔子世為殷紹嘉公梅福傳先代冡墓髙帝十二年十二月詔曰秦皇帝楚隱王魏安釐王齊愍王趙悼襄王皆絶亡後其與秦始皇帝守冢二十家楚魏齊各十家趙及魏公子亡忌各五家令視其冢復亡與它事本紀禮十三軍禮親征漢五年十二月圍羽垓下劉項戰爭本末具髙紀不詳録七月燕王臧荼反上自將征之九月虜荼利幾反上自擊破之七年十月上自將擊韓王信於銅鞮斬其將信亡走胸奴與其將曼邱臣王黃共立故趙後趙利為王收信散兵與胸奴共距漢上從晋陽連戰乘勝逐北至樓煩㑹大寒士卒墮指者什二三遂至平城為胸奴所圍七日用陳平祕計得出使樊噲留定代地八年冬上擊韓信餘寇於東垣十年代相國陳豨反上自東至邯鄲上喜曰豨不南據邯鄲而阻鄣水吾知其亡能為矣問豨將皆故賈人上曰吾知與之矣乃多以金募豨將豨將多降豨將趙利守東垣髙祖攻之不下卒罵上怒城降卒罵者斬之十一年七月淮南王布反召諸矦兵上自將以擊布十二年冬十月上破布軍于㑹缶武帝元封元年冬十月詔曰南越東甌咸伏其辜西蠻北夷頗未輯睦朕將巡邉陲擇兵振旅躬秉武節置十二部將軍親帥師焉行自雲陽北歷上郡西河五原出長城北登單于臺至朔方臨北河勒兵十八萬騎旌旗徑千餘里威震胸奴遣使者告單于曰南越王頭已縣於漢北闕矣單于能戰天子自將待邉不能亟來臣服何但亡匿幕北寒苦之地為胸奴讋焉並本紀勞軍文帝後六年胸奴大入邉以宗正劉禮為將軍軍霸上祝茲侯徐厲為將軍軍棘門以河內守亞夫為將軍軍細桞以備胡上自勞軍至霸上及棘門軍直馳入將以下騎出入送迎已而之細桞軍軍士吏被甲鋭兵刃張弓弩持滿天子先驅至不得入先驅曰天子且至軍門都尉曰軍中聞將軍之令不聞天子之詔有頃上至又不得入於是上使使持節詔將軍曰吾欲勞軍亞夫乃傳言開壁門壁門士請車騎曰將軍約軍中不得驅馳於是天子乃按轡徐行至中營將軍亞夫揖曰介胄之士不拜請以軍禮見天子為動改容式車使人稱謝皇帝敬勞軍成禮而去既出軍門羣臣皆驚文帝曰嗟乎此真將軍矣鄉者霸上棘門如兒戲耳其將固可襲而虜也至於亞夫可得而犯邪稱善者久之周亞夫傳田獵文帝時賈山言治亂之道曰今方正之士皆在朝廷矣又選其賢者使為常侍諸吏與之馳驅射獵一日再三出臣恐朝廷之解弛百官之墮於事也今從豪俊之臣方正之士直與之日日射獵擊兔伐狐臣竊悼之願少衰射獵賈山傳賈誼上疏曰夫射獵之娛與安危之機孰急今不獵猛敵而獵田彘不搏反寇而搏蓄兔玩細娛而不圖大患非所以為安也本傳武帝召見司馬相如請為天子游獵之賦上令尚書給筆扎相如以子虗虗言也為楚稱烏有先生者烏有此事也為齊難亡是公者亡是人也欲明天子之義故藉此三人為辭其卒章歸之於節儉因以風諌司馬相如傳武帝建元三年南獵長楊東方朔傳司馬相如嘗從上至長楊獵是時天子方好自擊熊豕馳逐壄獸相如因上疏諌其辭曰臣聞物有同類而殊能者故力稱烏獲捷言慶忌勇期賁育臣之愚竊以為人誠有之獸亦宜然今陛下好陵險阻射猛獸卒然遇逸材之獸駭不存之地犯屬車之清塵輿不及還轅人不暇施巧雖有烏獲逄䝉之技不得用枯木朽株盡為難矣是胡越起於轂下而羌夷接軫也豈不殆哉雖萬全而無患然本非天子之所宜近也且夫清道而後行中路而馳猶時有銜橛之變况乎涉豐草騁邱虗前有利獸之樂而內無存變之意其為害也不難矣夫輕萬乘之重不以為安樂出萬有一危之塗以為娛臣竊為陛下不取蓋明者逺見於未萌而知者避危於無形禍固多藏於隱微而發於人之所忽者也故鄙諺曰家絫千金坐不垂堂此言雖小可以諭大臣願陛下留意幸察上善之相如傳元鼎中天子行獵新秦中以勒邉兵而歸新秦中或千里無亭徼於是誅北地太守以下食貨志元帝永光元年正月行幸甘泉郊泰畤禮畢因留射獵薛廣德上書曰竊見關東困極人民流離陛下日撞亡秦之鐘聽鄭衛之樂臣誠悼之今士卒暴露從官勞倦願陛下亟反宫思與百姓同憂樂天下幸甚上即日還本傳永光五年冬上幸長楊射熊館布車騎大獵本紀成帝元延二年冬幸長楊宫從胡客大校獵宿萯陽宫賜從官本紀其十二月羽獵揚雄從以為昔在二帝三王宫館臺榭沼池苑囿林麓藪澤財足以奉郊廟御賔客充庖厨而已不奪百姓膏腴榖土桑柘之地女有餘布男有餘粟國家殷富上下交足故甘露零其庭醴泉流其唐鳯凰巢其木黃龍遊其沼麒麟臻其囿神爵棲其林昔者禹任益虞而上下和草木茂成湯好田而天下用足文王囿百里民以為尚小齊宣王囿四十里民以為大裕民之與奪民也武帝廣開上林南至宜春鼎胡御宿昆吾旁南山而西至長楊五柞北繞黃山瀕渭而東周袤數百里穿昆明池象滇河營建章鳯闕神明馺娑漸臺太液象海水周流方丈瀛洲蓬萊游觀侈靡窮妙極麗雖頗割其三垂以贍齊民然至羽獵田車戎馬器械儲偫禁禦所營尚太奢麗誇詡非堯舜成湯文王三驅之意也又恐後世復修前好不折中以泉臺故聊因校獵賦以風揚雄傳上明年上將大誇胡人以多禽獸秋命右扶風發民入南山西自褒斜東至𢎞農南毆漢中張羅罔罝罘捕熊羆豪豬虎豹狖玃狐莵麋鹿載以檻車輸長楊射熊館以罔為周阹縱禽獸其中令胡人手搏之自取其獲上親臨觀焉是時農民不得收斂雄從至射熊館還上長楊賦聊因筆墨之成文章故藉翰林以為主人子墨為客卿以風揚雄傳下兵祭髙祖立為沛公祠黃帝祭蚩尤於沛廷黃帝戰於阪泉定天下蚩尤庶人之貪者好五兵故祠祭之而釁鼓本紀殺牲以血塗鼓釁呼為釁天下已定令祝立蚩尤之祠於長安郊祀志武帝為伐南越告禱於泰一以牡荆畫幡日月北斗登龍以象太一三星為泰一鏠旗李竒曰牡荆作幡柄也如淳曰牡荆荆之無子者皆潔齊之道晋灼日牡節間不相當也月暈刻之為劵以畏病者天文志天極星其一明者太一也旁三星三公也畫一星在後三星在前為泰一鏠旗師古曰李晋二說是也以牡荆為幡竿而畫幡為日月龍及星命曰靈旗為兵禱則太史奉以指所伐國郊祀志西漢㑹要卷十八
