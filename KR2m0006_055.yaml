body:
  text: 西漢會要卷五十五宋徐天麟撰食貨六荒政漢興諸侯並起民失作業而大飢饉凡米石五千人相食死者過半髙祖乃令民得賣子就食蜀漢食貨志漢二年關中大飢米斛萬錢人相食令民就食蜀漢紀文帝後元年詔曰間者數年比不登又有水旱疾疫之災朕甚憂之愚而不明未達其咎意者朕之政有所失而行有過與乃天道有不順地利或不得人事多失和鬼神廢不享與何以致此將百官之奉養或廢無用之事或多與何其民食之寡乏也夫度田非益寡而計民未加益以口量地其於古猶有餘而食之甚不足其咎安在無乃百姓之從事於末以害農者蕃為酒醪以靡穀者多六畜之食焉者衆歟細大之義吾未能得其中其與丞相列侯吏二千石博士議之有可以佐百姓者率意逺思無有所隱本紀六年大旱蝗令諸侯無入貢施山澤減諸服御損郎吏員發倉庾以賑貧民得賣爵紀歲惡不入請賣爵子如淳曰賣爵級又賣子也見食貨志賈誼疏景帝元年正月詔曰間者歲比不登民多乏食夭絶天年朕甚痛之郡國或磽狹無所農桑􅌛蓄或地饒廣薦草莽水泉利而不得徙其議民欲徙寬大地者聽之紀中三年夏旱禁酤酒紀上郡以西旱復修賣爵令而裁其賈以招民及徒復作得輸粟於縣官以除罪食貨志後二年令內郡不得食馬粟沒入縣官食讀曰飼徙𨽻衣七緵布索隱曰蓋合七升布止馬舂正義曰馬碾磑之比也先時用馬今止之為歲不登禁天下食不造歲史記本紀正義曰造至也禁天下費米穀恐食不至歲造七到反三年詔曰間歲不登意為末者衆農民寡也其令郡國務勸農桑益種植可得衣食物吏發民若取庸采黃金珠玉者坐贓為盜二千石聽者與同罪紀武帝即位河內失火上使汲黯往視之還報曰臣過河內河內貧人傷水旱萬餘家或父子相食臣謹以便宜持節發河內倉粟以賑貧民請歸節伏矯制罪上賢而釋之傳元狩三年勸有水災郡種宿麥舉吏民能假貸貧民者以名聞紀四年山東被水災民多飢乏於是天子遣使虛郡國倉廩以振貧民猶不足又募豪富人相假貸尚不能救乃徙貧民於關以西及充朔方以南新秦中七十餘萬口衣食皆仰給於縣官數歲貸與産業使者分部護冠蓋相望費以億計食貨志元鼎二年詔曰水潦移於江南迫隆冬至朕懼其飢寒不活江南之地火耕水耨方下巴蜀粟致之江陵遣博士中等分循行告諭所抵無令重困吏民有振救飢民免其厄者具舉以聞紀山東被河災及歲不登數年人或相食方二三千里天子憐之令飢民得流就食江淮間欲留留處使者冠蓋相屬於道護之下巴蜀粟以振焉食貨志昭帝始元二年八月詔曰往年災害多今年蠶麥傷所振貨種食勿收責毋令民出今年田租紀宣帝本始三年大旱郡國傷旱甚者民毋出租賦三輔民就賤者且毋收事盡四年紀四年正月詔曰今嵗不登已遣使者振貸困乏其令大官損膳省宰樂府減樂人使歸農業丞相以下至都官今丞上書入穀輸長安倉助貸貧民民以車船載穀入關者得毋用傳上元帝初元元年詔曰關東今年穀不登民多困乏其令郡國被災害甚者毋出租賦江海陂湖園池屬少府者以假貧民勿租賦九月關東郡國十一大水飢或人相食轉旁郡錢穀以相救令諸宮館希御幸者勿繕治大僕減穀食馬水衡省肉食獸紀二年六月關東飢齊地人相食秋七月詔曰歲比災害民有菜色慘怛於心已詔吏虛倉廩開府庫振救賜寒者衣公卿其悉意陳朕過靡有所諱上三年夏大旱罷甘泉建章宮衛令就農百官各省費上五年詔曰乃者關東連遭災害其令大官毋日殺所具各減半乘輿秣馬毋乏正事而已罷角抵上林宮館希御幸者齊三服官北假田官鹽鐵官常平倉上永光二年詔曰間者連年不收四方咸困元元之民勞於耕耘又亡成功困於飢饉亡以相救朕為民父母德不能覆而有其刑甚自傷焉其赦天下紀成帝永始二年詔曰歲比不登吏民以義收食貧民入穀物助縣官振贍者已賜直其百萬以上加賜爵右更欲為吏補三百石其吏也遷二等三十萬以上賜爵五大夫吏亦遷二等民補郎十萬以上家無出租賦三歲萬錢以上一年紀哀帝即位詔曰乃者河南潁川郡水出流殺人民敗壞廬舍已遣光祿大夫循行舉籍賜死者棺錢人三千其令水所傷縣邑及他郡國災害什四以上民資不滿十萬皆無出今年租賦紀平帝元始二年郡國大旱蝗青州尤甚民流亡安漢公四輔三公卿大夫吏民為百姓困乏獻其田宅者二百三十人以口賦貧民遣使者捕蝗民捕蝗詣吏以石斗受錢天下民資不滿二萬及被災之郡不滿十萬勿租稅民疾疫者舍空邸第為置醫藥賜死者一家六尸以上葬錢五千四尸以上三千二尸以上二千罷安定呼池苑以為安民縣起官寺市里募徙貧民縣次給食至徙所賜田宅什器假與犁牛種食又起五里於長安城中宅二百區以居貧民本紀振貸振救附文帝元年詔曰方春和時草木羣生之物皆有以自樂而吾百姓鰥寡孤獨窮困之人或阽於死亡而莫之省憂為民父母將何如其議所以振貸之紀文帝出帛十餘萬匹以振貧民賈山傳後六年大旱蝗發倉庾以振貧民食貨志武帝元狩三年有水災郡舉吏民能假貸貧民者以名聞本紀四年山東被水災民多飢乏於是天子遣使虛郡國倉廩以振貧猶不足又募豪富人相假貸尚不能相救乃徙貧民於關以西及充朔方以南新秦中七十餘萬口衣食皆仰給於縣官數歲貸與産業使者分部護冠蓋相望費以億計於是公卿言郡國頗被災害貧民無産業者募徙廣饒之地陛下損膳省用出禁錢以振元元寬貸而民不齊出南畝食貨志元鼎二年詔曰水潦移於江南吏民有振救飢民免其厄者具舉以聞本紀是時山東被河災及歲不登數年人或相食方二三千里天子憐之令飢民得流就食江淮間欲留留處使者冠蓋相屬於道護之下巴蜀粟以振焉食貨志河內傷水旱汲黯矯制發河內倉粟以振貧民汲黯傳昭帝始元元年遣使者振貸貧民無種食者本紀元鳳三年詔曰乃者民被水災朕虛倉廩使使者以振困乏本紀宣帝本始四年詔曰今歲不登已遣使者振貸困乏使農移就業丞相以下至都官令丞上書入穀輸長安倉助貸貧民以車船載穀入關者得毋用傳本紀地節三年詔曰前下詔假公田貸種食本紀元帝初元元年以三輔太常郡國公田及苑可省者振業貧民資不滿千錢者賦貸種食臨遣光祿大夫褒等十二人循行天下存問耆老鰥寡孤獨困乏失職之民又令郡國被災害甚者毋出今年租賦海江陂湖園池屬少府者以假貧民勿租賦六月以民疾疫省苑馬以振困乏九月關東郡國十一大水飢或人相食轉旁郡錢穀以相救本紀又食貨志云天下大水關東十一郡尤甚減關中卒五百人轉穀振貸困乏二年詔以水衡禁囿宜春下苑少府佽飛外池嚴籞池田假與貧民六月關東飢齊地人相食秋七月詔曰歲比災害民有菜色已詔吏虛倉廩開府庫振救賜寒者衣本紀永光元年赦天下令各務農畝無田者皆假之貸種食如貧民本紀成帝河平四年遣光祿大夫博士嘉等十一人行舉瀕河之郡水所損傷困乏不能自存者財振貸其為水所流壓死不能自葬令郡國給槥櫝葬埋已葬者與錢人二千避水它郡國在所冗食之謹遇以文理無令失職鴻嘉四年勃海清河河溢被災者振貸之本紀永始二年詔曰關東比歲不登吏民以議收食貧民入穀物助縣官振贍者已賜直其百萬以上加賜爵右更欲為吏補三百石其吏也遷二等三十萬以上賜爵五大夫吏亦遷二等民補郎十萬以上家無出租賦三歲萬錢以上一年本紀哀帝即位河南潁川郡水災賜死者錢三千本紀釋逋貸文帝二年民貸種食未入入未備者皆赦之武帝元朔元年諸逋貸在孝景後三年以前皆勿聽治昭帝始元二年詔所振貸種食勿收責元鳳三年詔三年以前所振貸非丞相御史所請邊郡受牛者勿收責宣帝元康元年所振貸勿收神爵元年所振貸物勿收元帝永光四年所貸貧民勿收責成帝建始三年諸逋租賦所振貸勿收河平四年諸逋租賦所振貸勿收鴻嘉元年逋貸未入者勿收四年逋貸未入皆勿收永始二年所振貸貧民勿收並本紀西漢會要卷五十五
