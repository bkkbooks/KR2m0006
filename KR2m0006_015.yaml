body:
  text: 西漢㑹要卷十五宋徐天麟撰禮九嘉禮朝㑹漢七年長樂宫成羣臣朝十月儀先平明謁者治禮引以次入殿門廷中陳車騎戍卒衛官設兵張旗志傳曰趨殿下郎中挾陛陛數百人功臣列矦諸将軍軍吏以次陳西方東鄉文官丞相以下陳東方西鄉大行設九賔臚句傳於是皇帝輦出房百官執職傳警職漢書作㦸引諸矦王以下至吏六百石以次奉賀自諸矦王以下莫不震恐肅敬至禮畢盡伏置法酒諸侍坐殿上皆伏抑首以尊卑次起上夀觴九行謁者言罷酒御史執法舉不如儀者輙引去竟朝置酒無敢讙譁失禮者於是髙帝曰吾廼今日知為皇帝之貴也叔孫通傳九年未央宫成髙祖大朝諸矦羣臣置酒未央前殿髙祖奉玉巵應劭曰鄉飲酒禮噐也受四升起為太上皇夀史記本紀中朝劉輔傳孟康曰中朝内朝也大司馬左右前後将軍侍中常待散騎諸吏以下為中朝丞相以下至六百石為外朝法坐梅福傳師古曰法坐正坐也聴朝之處猶言法宮法駕也東朝灌夫傳東朝廷辨之如淳曰東朝太后朝也文帝時申屠嘉入朝鄧通居上旁有怠慢之禮嘉奏事畢因言曰陛下幸愛羣臣則富貴之至於朝廷之禮不可以不肅上曰君勿言吾私之罷朝坐府中嘉為檄召通詣丞相府不來且斬通通恐入言上上曰汝苐徃吾今使人召若通至詣丞相府免冠徒跣頓首謝嘉嘉坐自如弗為禮責曰夫朝廷者髙皇帝之朝廷也通小臣戲殿上大不敬當斬史今行斬之通頓首首盡出血不觧上度丞相已困通使使持節召通而謝丞相此吾㺯臣君釋之鄧通既至為上泣曰丞相㡬殺臣申屠嘉傳武帝元鼎中士卒暴露連嵗為朝㑹不置酒責楊僕書哀帝詔罷樂府官丞相孔光大司空何武奏大樂鼓員六人嘉至鼓員十人邯鄲鼔員二人騎吹鼓員三人江南鼔員二人淮南鼓員四人巴俞鼓員三十六人歌鼓員二十四人楚嚴鼓員一人梁皇鼓員四人臨淮鼓員三十五人茲邡鼓員三人凡鼓十二員百二十八人朝賀置酒陳殿下應古兵法外安世樂鼓員二十人十九人可罷沛吹鼓員十二人族歌鼓員二十七人陳吹鼓員十三人啇樂鼓員十四人東海鼓員十六人長樂鼓員十三人縵樂鼓員十三人凡鼓八員百二十八人朝賀置酒陳前殿房中不應經法皆可罷禮樂志諸侯朝覲髙祖九年冬十月淮南王梁王趙王楚王朝未央宫本紀十年冬十月淮南王燕王荆王梁王楚王齊王長沙王來朝本紀十一年令諸矦王通矦常以十月朝獻及郡各以其口數率人嵗六十三錢以給獻費本紀漢之儀注朝見賀正月者常一王與四矦俱朝見十餘嵗一至史記王世諸侯王朝見天子漢法凢當四見耳始到入小見到正月朔旦奉皮為璧玉賀正月法見後三日為王置酒賜金錢財物後二日復入小見辭去凡留長安不過二十日小見者燕見於門内飲於省中非士人所得入也王侯朝賀以蒼璧食貨志武帝為皮幣王矦宗室朝覲聘享必以皮幣薦璧然後得行食貨志宣帝神爵元年詔軍旅暴露轉輸煩勞其令諸矦王列矦蠻夷王矦君長當朝二年者皆母朝本紀諸矦正月朝覲天子觀以禮樂饗醴乃歸匡衡傳成帝河平三年楚王囂朝正月詔與子男一人俱本傳哀帝對成帝曰令諸侯王朝得從其國二千石哀帝紀呉王使人為秋請本傳孟康曰律春曰朝秋曰諸如古諸矦朝聘也如淳曰不自行使人代已致請禮重矦襜坐不使人為秋請免王子矦表建成侯拾坐使行人奉璧薦皮賀元年十月不㑹免王子矦表上尊號漢五年諸矦上䟽曰楚王韓信韓王信淮南王英布梁王彭越故衡山王吴芮趙王張敖燕王藏荼昧死再拜言大王陛下先時秦為無道天下誅之大王先得秦王定關中於天下功最多存亡定危救敗繼絶以安萬民功盛徳厚又加恵於諸侯王有功者使得立社稷地分已定而位號比儗亡上下之分大王功徳之著於後世不宣昩死再拜上皇帝尊號漢王曰寡人聞帝者賢者有也虛言亡實之名非所取也今諸矦王皆推髙寡人將何以處之哉諸矦王皆曰大王起於細㣲滅亂秦威動海内又以辟陋之地自漢中行威徳誅不義立有功平定海内功臣皆受地食邑非私之也大王徳施四海諸矦王不足以道之居帝位甚實宜願大王以幸天下漢王曰諸矦王幸以為便於天下之民則可矣於是諸矦王及太尉長安矦臣綰等三百人與博士稷嗣君叔孫通謹擇良日二月甲午上尊號漢王即皇帝位于汜水之陽髙紀六年上歸櫟陽五日一朝太公太公家令説太公曰天亡二日土亡二王皇帝雖子人主也太公雖父人臣也奈何令人主拜人臣如此則威重不行後上朝太公擁彗迎門郤行上大驚下扶太公太公曰帝人主奈何以我亂天下法於是上心善家令言賜黄金五百斤夏五月丙午詔曰人之至親莫親於父子故父有天下傳歸於子子有天下尊歸于父此人道之極也前日天下大亂兵革並起萬民苦殃朕親被堅執鋭自帥士卒犯危難平暴亂立諸矦偃兵息民天下大安此皆太公之教訓也諸王通矦將軍羣卿大夫已尊朕為皇帝而太公未有號今上尊太公曰太上皇髙紀羣臣迎代王至邸上議曰丞相臣平大尉臣勃大将軍臣武御史大夫臣蒼宗正臣郢朱虗矦臣章東牟矦臣興居典客臣掲再拜言大王足下子𢎞等皆非孝恵皇帝子不當奉宗廟臣謹請隂安矦頃王后列矦吏二千石議大王髙皇帝子宜為嗣願大王即天子位代王曰奉髙帝宗廟重事也寡人不佞不足以稱願請楚王計宜者寡人弗敢當羣臣皆伏固請代王西鄉遜者三南鄉遜者再丞相平等皆曰臣伏計之大王奉髙祖宗廟最宜稱雖天下諸矦萬民皆以為宜臣等為宗廟社稷計不敢忽願大王幸聼臣等臣謹奉天子璽符再拜上代王曰宗室将相王列矦以為其宜寡人寡人不敢辭遂即天子位文紀上夀髙帝令叔孫通起朝儀㑹長樂宮成羣臣朝十月諸矦王以下至吏六百石以次奉賀禮畢盡伏置法酒以尊卑次起上夀觴九行謁者言罷酒竟朝置酒無敢讙譁失禮者詳見上朝㑹條九年冬十月淮南王梁王趙王楚王朝未央宫置酒前殿上奉玉巵為太上皇夀曰始大人常以臣亡頼不能治産業不如仲力今某之業所就孰與仲多殿上羣臣皆稱萬嵗大笑為樂髙紀汾隂得寳鼎武帝嘉之薦見宗廟藏于甘泉宫羣臣皆上夀吾邱夀王傳武帝登封㤗山從禪還坐明堂羣臣更上夀郊祀志兒寛為御史大夫從東封泰山還登明堂寛上夀曰臣聞三代改制属象相因間者聖統廢絶陛下發憤合指天地祖立明堂辟雍宗祀㤗一六律五聲幽賛聖意神樂四合各有方象以承嘉祀為萬世則天下幸甚将見大元本瑞登告岱宗發祉闓門以候景至癸亥宗祀日宣重光上元甲子肅雍永享光輝充塞天文粲然見象日昭報降符應臣寛奉觴再拜上千萬嵗夀制曰敬舉君之觴兒寛傳昭平君醉殺主傅以公主子廷尉上請請論上可其奏哀不能自止左右盡悲東方朔前上夀曰臣聞聖王為政賞不避仇讎誅不擇骨肉書曰不偏不黨王道蕩蕩此二者五帝所重三王所難也陛下行之是以四海之内元元之民各得其所天下幸甚臣朔奉觴昩死再拜上萬嵗壽上乃起入省中夕時召責朔曰傳曰時然後言人不厭其言今先生上夀時乎朔免冠頓首曰臣聞樂太甚則陽溢哀太甚則隂損隂陽變則心氣動心氣動則精神散精神散而邪氣及消憂者莫若酒臣朔所以上夀者明陛下正而不阿因以止哀也愚不知忌諱當死東方朔傳車千秋為丞相見上連年治太子獄誅罰尤多羣下恐懼思欲寛廣上意慰安衆庻廼與御史中二千石共上夀頌徳羙勸上施恩恵緩刑罰玩聴音樂飬志和神為天下自虞樂上報曰朕之不徳自左丞相與貳師隂謀逆亂巫蠱之禍流及士大夫朕日一食者累月廼何樂之聴痛士大夫常在心既事不咎雖然巫蠱始發詔丞相御史督二千石求捕廷尉治未聞九卿廷尉有所鞫也曩者江充先治甘泉宫人轉至未央椒房以及敬聲之疇李禹之屬謀入匈奴有司無所發今丞相親掘蘭臺蠱驗所明知也至今餘巫頗脱不止隂賊侵身逺近為蠱朕媿之甚何夀之有敬不舉君之觴謹謝丞相二千石各就舘車千秋傳昭帝始元元年二月黄鵠下建章宫太液池中公卿上夀本紀宣帝幸太子宫太子家令䟽受奉觴上夀辭理閑雅本傳元帝建昭四年以誅郅支單于告祠郊廟赦天下羣臣上夀置酒以其圖書示後宫貴人本紀冊立皇子武帝元狩六年四月乙巳廟立皇子閎為齊王旦為燕王胥為廣陵王初作誥本紀初大司馬去病昩死再拜上䟽皇帝陛下陛下過聴使臣去病待罪行間宜專邉塞之思慮暴骸中野無以報乃敢惟他議以干用事者誠見陛下憂勞天下哀憐百姓以自忘虧膳貶樂損郎員皇子頼天能勝衣趨拜至今無號位師傅官陛下恭謙不恤羣臣私望不敢越職而言臣竊不勝犬馬心昩死願陛下詔有司因盛夏吉時定皇子位唯陛下幸察臣去病昩死再拜以聞皇帝陛下三月乙亥御史臣光守尚書令奏未央宫制曰下御史六年三月戊申朔乙亥御史臣光守尚書令丞非下御史書到言丞相臣青翟御史大夫臣湯太常臣充大行令臣息太子少傅臣安行宗正事昩死上言大司馬去病上䟽曰陛下過聴使臣去病待罪行間宜専邉塞之思慮暴骸中野無以報乃敢惟他議以干用事者誠見陛下憂勞天下哀憐百姓以自忘虧膳貶樂損郎員皇子頼天能勝衣趨拜至今無號位師傅官陛下恭謙不恤羣臣私望不敢越職而言臣竊不勝犬馬心昩死願陛下詔有司因盛夏吉時定皇子位唯陛下幸察制曰下御史臣謹與中二千石臣賀等議古者裂地立國並建諸矦以承天子所以尊宗廟重社稷也今臣去病上䟽不忘其職因以宣恩乃道天子卑遜自貶以勞天下慮皇子未有號位臣青翟臣湯等宜奉義遵職愚憧而不逮事方今盛夏吉時臣青翟臣湯等昩死請立皇子臣閎臣旦臣胥為諸矦王昩死請所立國名制曰盖聞周封八百姬姓並列或子男附庸禮支子不祭云並建諸矦所以重社稷朕無聞焉且天非為君生民也朕之不徳海内未洽乃以未教成者彊君連城即股肱何勸其更議以列侯家之三月丙子奏未央宮丞相臣青翟御史大夫臣湯昩死言臣謹與列矦臣嬰齊中二千石二千石臣賀諌大夫博士臣安等議曰伏聞周封八百姬姓並列奉承天子康叔以祖考顯而伯禽以周公立咸為建國諸矦以相傳為輔百官奉憲各遵其職而國統備矣竊以為並建諸矦所以重社稷者四海諸矦各以其職奉貢祭支子不得奉祭宗廟禮也封建使守藩國帝王所以扶德施化陛下奉承天統明開聖緒尊賢顯功興滅繼絶續蕭文終之後于鄼褒厲羣臣平津矦等昭六親之序明天施之屬使諸矦王封君得推私恩分子弟户邑錫號尊建百有餘國而家皇子為列矦則尊卑相踰列位失序不可以垂統於萬世臣請立臣閎臣旦臣胥為諸矦王三月丙子奏未央宫制曰康叔親属有十而獨尊者褒有徳也周公祭天命郊故魯有白牡騂剛之牲羣公不毛賢不肖差也髙山仰之景行嚮之朕甚慕焉所以抑未成家以列矦可四月戊寅奏未央宫丞相臣青翟御史大夫臣湯昩死言臣青翟等與列矦吏二千石諌大夫博士臣慶等議昩死奏請立皇子為諸矦王制曰康叔親屬有十而獨尊者褒有徳也周公祭天命郊故魯有白牡騂剛之牲羣公不毛賢不肖差也髙山仰之景行嚮之朕甚慕所以仰未成家以列矦可臣青翟臣湯博士臣将行等伏聞康叔親屬有十武王繼體周公輔成王其八人皆以祖考之尊建為大國康叔之年㓜周公在三公之位而伯禽據國於魯盖爵命之時未至成人康叔後扞禄父之難伯禽殄淮夷之亂昔五帝異制周爵五等春秋三等皆因時而序尊卑髙皇帝撥亂世反諸正昭至徳定海内封建諸矦爵位二等皇子或在襁褓而立為諸矦王奉承天子為萬世法則不可易陛下躬親仁義體行聖徳表裏文武顯慈孝之行廣賢能之路内褒有徳外討強暴極臨北海西凑月氏匈奴西域舉國奉師輿械之費不賦於民虗御府之藏以賞元戎開禁倉以賑貧窮减戍卒之半百蠻之君靡不鄉風承流稱意遠方殊俗重譯而朝澤及方外故珍獸至嘉榖興天應甚彰今諸矦支子封至諸矦王而家皇子為列矦臣青翟臣湯等竊伏熟計之皆以為尊卑失序使天下失望不可臣請立臣閎臣旦臣胥為諸矦王四月癸未奏未央宫留中不下丞相臣青翟太僕臣賀行御史大夫事太常臣充太子太傅臣安行宗正事昩死言臣青翟等前奏大司馬臣去病上䟽言皇子未有號位臣謹與御史大夫臣湯中二千石二千石諌大夫博士臣慶等昩死請立皇子臣閎等為諸矦王陛下遜文武躬自切及皇子未教羣臣之議儒者稱其術或誖其心陛下固辭弗許家皇子為列矦臣青翟等竊與列侯臣夀成等二十七人議皆曰以為尊卑失序髙皇帝建天下為漢太祖王子孫廣支輔先帝法則弗改所以宣至尊也臣請令史官擇吉日具禮儀上御史奏輿地圖他皆如前故事制曰可四月丙申奏未央宫太僕臣賀行御史大夫事昩死言太常臣充言卜入四月二十八日乙巳可立諸矦王臣昩死奏輿地圖請所立國名禮儀别奏臣昩死請制曰立皇子閎為齊王旦為燕王胥為廣陵王四月丁酉奏未央宫六年四月戊寅朔癸卯御史大夫湯下丞相丞相下中二千石二千石下郡太守諸矦相丞書從事下當用者如律令史記三王世家下同維六年四月乙巳皇帝使御史大夫湯廟立子閎為齊王曰於戯小子閎受茲青社朕承祖考維稽古建爾國家封於東土世為漢藩輔於戯念哉恭朕之詔惟命不于常人之好徳克明顯光義之不圖俾君子怠悉爾心允執其中天禄永終厥有愆不臧乃凶於而國害於爾躬於戯保國艾民可不敬與王其戒之右齊王策維六年四月乙巳皇帝使御史大夫湯廟立子旦為燕王曰於戯小子旦受茲𤣥社朕承祖考維稽古建爾國家封於北土世為漢藩輔於戯葷粥氏虐老獸心侵犯㓂盗加以姦巧邉萌於戯朕命将卒徂征厥罪萬夫長千夫長三十有二君皆來降旗奔師葷粥徙域北州以緩悉爾心毋作怨毋俷徳毋乃廢備非教士不得從召於戯保國艾民可不敬與王其戒之右燕王策維六年四月乙巳皇帝使御史大夫湯廟立子胥為廣陵王曰於戯小子胥受茲赤社朕承祖考維稽古建爾國家封於南土世為漢藩輔古人有言曰大江之南五湖之閒其人輕心揚州保疆三代要服不及以政於戯悉爾心戰戦兢兢乃恵乃順毋侗好佚毋邇宵人維法維則書云臣不作威不作福靡有後羞於戯保國艾民可不敬與王其戒之右廣陵王策西漢㑹要卷十五
