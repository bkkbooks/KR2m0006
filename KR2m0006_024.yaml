body:
  text: 西漢㑹要卷二十四宋徐天麟撰輿服下天子冠服髙祖以竹皮為冠令求盜之薛治時時冠之及貴常冠所謂劉氏冠也八年令爵非公乘以上毋得冠劉氏冠本紀臣天麟按後漢輿服志云劉氏冠楚冠制也祀宗廟諸祀則冠之此冠髙祖所造故以為祭服尊敬之謂也髙皇帝所述書天子所服第八天子衮服之制也於施行詔書第八曰大謁者臣章受詔長樂宫曰令羣臣議天子所服相國臣何等議曰春夏秋冬天子所服當法天地之數中得人和臣請法之中謁者趙堯舉春李舜舉夏兒湯舉秋貢禹舉冬四人各職一時大謁者襄奏制曰可魏相傳服䖍曰主一時衣服禮物朝祭百事文帝身衣弋綈本賛又賈誼云帝之身自衣皂綈孝文身衣弋綈足履革舄以韋帶劍莞蒲為席兵木無刅衣緼無文東方朔傳聖文躬服節儉綈衣不敝革鞜不穿揚雄傳昭帝元鳯四年帝加元服本紀師古曰元尊也冠者首之所着故曰元服皇太后賜御府衣迎宣帝紀按少府屬官有御府令主天子衣服元帝初元五年罷齊三服官紀李斐曰齊國舊有三服官春獻冠幘縱為首服綺素為令服輕綃為夏服臣天麟按貢禹傳禹奏故齊三服官輸物不過十笥方今齊三服官作工各數千人一嵗費數鉅萬天子納其言罷齊三服官百官冠服爵非公乘以上毋得冠劉氏冠見上景帝中六年詔曰吏者民之師也車駕衣服宜稱亡度者或不吏服出入閭里與民無異令長吏車騎從者不稱其官衣服下吏出入閭巷亡吏體者二千石上其官屬三輔舉不如法令者紀皁衣谷永傳曰陛下擢之皂衣之吏蕭望之曰張敞備皁衣二十餘年如淳曰雖有五時服至朝皆着皁衣直指使者衣繡衣持斧武紀柱後恵文張敞傳當以柱後恵文弹治之耳晉灼曰漢時法冠也一號柱後恵文以纚裹鐵柱卷秦制執法服今御史服之獬廌一角今冠兩角以獬廌為名耳師古曰纚即今目方紗也山爾反卷去權反郎侍中皆鵕䴊冠貝帶佞幸傳師古曰以鵕䴊毛羽飾冠司馬相如傳師古曰鵕䴊鷩鳥也似山鷄而小鵕背毛黄腹下赤項緑色其尾毛紅赤光彩鮮明今俗呼為山鷄其實非也貂羽黄金附蝉燕王旦傳注云侍中之飾司𨽻冠進賢冠百官表仄注冠五行志李竒注云仄注冠曰髙山冠齊冠也謁者服皮弁素績孝平王后傳劉歆以下四十九人賜皮弁素績師古曰皮弁以鹿皮為冠形如人手之弁合也素續謂素裳也朱衣而素裳字或作積積謂襞積之若今之撰為也方山冠五行志鄧展曰方山冠以五綵縠為之樂舞人所服雜録武安侯田恬坐衣襜褕入宫不敬免外戚表師古曰襜褕直裾禆衣朱博為刺史敇功曹官屬多襃衣大袑不中節度自今掾吏衣皆令去地三寸傳叔孫通儒服漢王憎之迺變其服服短衣楚製傳婁敬見髙祖虞將軍欲與鮮衣敬曰臣衣帛衣帛見衣褐衣褐見不敢易衣婁敬傳江充召見願以所常被服冠見武帝許之充衣紗縠襌衣曲裾後垂交輸冠襌纚歩揺冠飛翮之纓傳雋不疑見暴勝之冠進賢冠帶櫑具劍佩環玦襃衣博帶盛服至門上謁傳董偃緑幘傳韝東方朔傳應劭曰宰人服也韋昭曰韝形如射韝以縳左右手於事便也師古曰緑幘賤人之服也傅着也即今之臂韝也臣庶衣服漢初定與民無禁叙傳師古曰國家不設車旗衣服之禁髙祖八年賈人毋得衣錦繡綺縠絺紵罽紀文帝時賈誼上疏言今民賣僮者為之繡衣絲履偏諸縁内之閑中是古天子后服所以廟而不宴者也而庶人得以衣婢妾白縠之表薄綺之裏緁以偏諸美者黼繡是古天子之服今富人大賈嘉㑹召客者以被牆庶人屋壁得為帝服倡優下賤得為后飾帝之身自衣皁綈而富民牆屋被文繡天子之后以縁其領庶人孽妾縁其履此臣所謂舛也傳成帝永始四年詔公卿列侯多畜奴婢被服綺縠車服過制申敇有司以漸禁之青緑民所常服且勿止紀成帝㣲行私奴客皆白衣袒幘帶刀持劍百官志白衣龔勝傳師古曰白衣給官府趨走賤人若今諸司亭長掌固之屬璽漢元年十月沛公至霸上秦王子嬰封皇帝璽符節降枳道旁本紀又霍光傳注云漢初有三璽天子之璽自佩行璽信璽在符節臺又漢舊儀云皇帝六璽皆白王螭虎紐文曰皇帝行璽皇帝之璽皇帝信璽天子行璽天子之璽天子信璽代王至周勃跪上天子璽文帝紀符璽御史周昌傳趙堯為符璽御史百官表去其御史尚符璽者有印綬霍光輔少主殿中嘗有怪一夜羣臣相驚光召尚符璽郎恐有變難欲收取璽郎不肯授光光欲奪之郎按劍曰臣頭可得璽不可得也光傳霍光奏昌邑王受皇帝信璽行璽大行前就次發璽不封光傳初髙袓入咸陽至霸上秦王子嬰降於軹道奉上始皇璽及髙祖誅項籍即天子位因御服其璽世世傳受號曰漢傳國璽以孺子未立璽藏長樂宫及莽即位請璽太后不肯授莽莽使安陽侯舜諭㫖舜素謹敇太后雅愛信之舜既見太后知其為莽求璽怒罵之曰而屬父子宗族蒙漢家力富貴累世既無以報受人孤寄乘便利時奪取其國不復顧恩義人如此者狗豬不食其餘天下豈有而兄弟邪且若自以金匱符命為新皇帝變更正朔服制亦當自更作璽傳之萬世何用此亡國不祥璽為而欲求之我漢家老寡婦旦暮且死欲與此璽俱葬終不可得太后因涕泣而言旁側長御以下皆垂涕舜亦悲不能自止良久迺仰謂太后臣等已無可言者莽必欲得傳國璽太后寧能終不與邪太后聞舜語切恐莽欲脅之迺出漢傳國璽投之地以授舜曰我老已死知而兄弟令族滅也舜既得傳璽奏之莽大說迺為太后置酒未央宫漸臺大縱衆樂元后傳羣臣璽綬印諸侯王金璽盭綬盭音戾緑也漢舊儀云諸侯王黄金璽槖佗紐文曰璽相國丞相金印紫綬髙帝十一年更名相國緑綬太師太傳太保太尉左右前後將軍金印紫綬御史大夫銀印青綬凢吏秩比二千石以上皆銀印青綬光禄大夫無秩比六百以上皆銅印黒綬大夫博士御史謁者郎無其僕射御史治書尚符璽者有印綬比二百石以上皆銅印黄綬綏和元年長相皆黒綬建平二年復黄綬百官表武帝太初元年改正朔數用五紀注云謂印文也若丞相曰丞相之印章諸卿及守相印文不足五字者以之足之楊僕懐銀黄垂三組銀銀印也黄金印也僕懐三印故三組也宣帝始賜單于印璽與天子同食貨志上匈奴故印文曰匈奴單于璽本傳王莽更曰新匈奴單于章方寸之印丈二之組鎮撫海内嚴助傳印陳遵傳謂印之組也符節天子璽符節髙紀師古曰符謂諸所合符以為契者也節以毛為之上下相重取象竹節將命者持之以為信髙祖與功臣剖符作誓紀文帝二年初與郡守為銅虎符竹使符紀應劭曰銅虎符第一至第五國家當發兵遣使者至郡合符符合乃聴受之竹使符皆以竹箭五枚長五寸䥴刻篆書第一至第五張晏曰符以代古之珪璋從簡易也師古曰與郡守為符者謂各分其半右留京師左以與之使音所吏反武帝征和二年更節加黄旄初漢節純赤以戾太子持赤節故更為黄旄加上以相别本紀及劉屈氂傳少府屬官有符節令丞百官表襄平侯紀通尚符節吕后紀齊王欲發兵誅諸吕魏勃曰王欲發兵非有漢虎符驗也髙五王傳七國敗弓髙侯誥膠西王卬曰未有詔虎符擅發兵王其自圖之吳王濞傳武帝曰吾新即位不欲出虎符發兵郡國嚴助傳御史中丞劾馮野王持虎符出界歸家遂免傳淮南王盜冩虎符賈捐之傳閩越王弟餘善殺王以降遣使者上符節請所立嚴助傳伍符馮唐傳伍伍相保之符也衛太子擅發兵盧賀坐受太子節掠死功臣表任安坐受太子節懐二心要斬劉屈氂傳霍光奏昌邑王自之符璽取節十六朝暮臨從官持節從傳闗傳文帝十二年除闗無用傳本紀張晏曰傳信也若今過所也師古曰古者或用棨或用繒帛棨者刻木為合符也景帝四年復置諸闗用傳出入紀應劭曰以吳國新反備非常宣帝本始四年詔曰今嵗不登民以車船載榖入闗者得毋用傳紀寗成詐刻傳出闗本傳終軍從濟南當詣傳士歩入闗闗吏予軍繻軍問以此何為吏曰為復傳還當以合符軍曰大丈夫西游終不復傳還棄繻而去軍為謁者使行郡國建節東出闗吏識之曰此使者迺前棄繻生也本傳西漢㑹要卷二十四
