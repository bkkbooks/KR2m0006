body:
  text: 西漢㑹要卷五十九宋徐天麟撰兵四屯田文帝時朝錯言逺方之卒守塞一歲而更不知胡人之能不如選常居者家室田作且以備之以便為之髙城深塹中周虎落虎落者以竹篾相連遮落者也先為室屋具田器乃募罪人及免徒復作令居之不足募民之欲往者賜髙爵復其家豫冬夏衣廪能自給而止上從其言募民實塞下朝錯傳武帝元鼎五年初置張掖酒泉郡而上郡朔方西河河西開田官斥塞卒六十萬人戍田之中國繕道餽糧逺者三千近者千餘里皆仰給大農食貨志孝武征四夷開西域自燉煌西至鹽津往往起亭而輪臺渠犁皆有田卒數百人置使者校尉領護以給使外國者西域傳武帝初通西域置校尉屯田渠犁是時軍旅連出海內虛耗上既悔逺征伐桑𢎞羊與丞相御史奏言輪臺以東捷支渠犁皆故國地廣饒水草有溉田五千頃以上處溫和田美可益通溝渠種五穀與中國同時孰可遣屯田卒詣故輪臺以東置校尉三人分護各舉圖地形通利溝渠務使以時益種五穀張掖酒泉遣騎假司馬為斥侯屬校尉事有便宜因騎置以聞田一歲有積穀募民壯健有纍重敢徙者詣田所就蓄積為本業益墾溉田稍築列亭連城而西以威西國輔烏孫為便上乃下詔深陳既往之悔曰前有司奏欲益民賦以助邊用今又請遣卒田輪臺輪臺西於車師千餘里今諸逺田輪臺欲起亭隧是擾天下非所以優民也朕不忍聞西域傳武帝通西南夷道作者數萬人悉巴蜀租賦不足以更之乃募豪民田南夷入粟縣官而內受錢於都內食貨志昭帝始元二年冬發習戰射士詣朔方調故將吏屯田張掖郡紀昭帝用桑𢎞羊前議以杅彌太子賴丹為校尉將軍田輪臺輪臺與渠犁地皆相連也西域傳元鳳四年鄯善王請曰國中有伊循城其地肥美欲漢遣一將屯田積穀令臣得以依其威重於是漢遣大司馬一人吏士四十人田伊循以鎮撫之後更置都尉伊循官置始此矣西域傳宣帝地節二年遣侍郎鄭吉校尉司馬喜將免刑罪人田渠犁積穀欲以攻車師至秋後收穀吉喜發城郭諸國兵萬餘人自與所將田士千五百人共擊車師食盡吉等且罷兵歸渠犁田收畢復發兵攻車師王於石城王奔烏孫吉至酒泉有詔還田渠犁及車師益積穀以安西國侵胸奴於是吉使吏卒三百人别田車師胸奴遣騎來擊漢田卒少不能當吉上書願益田卒公卿議以為道逺煩費可且罷車師田者西域傳宣帝時胸奴益弱不得近西域於是徙屯田於北胥鞬披莎車之地披分也屯田校尉始屬都護上宣帝神爵元年先零畔逆他種劫略背叛趙充國至金城計欲以威信招降罷騎兵屯田以待其敝上奏曰臣聞兵者所以明德除害也故舉得於外則福生於內不可不謹臣所將吏士馬牛食月用糧穀十九萬九千六百三十斛鹽千六百九十三斛茭藁二十五萬二百八十六石難久不解繇役不息又恐它夷卒有不虞之變相因並起為明主憂誠非素定廟勝之冊且羌虜易以計破難用兵碎故也臣愚以為擊之不便計度臨羌東至浩亹羌虜故田及公田民所未墾可二千頃以上其間郵亭多壞敗者臣前部士入山伐材木大小六萬餘枚皆在水次願罷騎兵留弛刑應募及淮陽汝南步兵與吏士私從者合凡萬二百八十一人用穀月二萬七千三百六十三斛鹽三百八斛分屯要害處冰解漕下繕鄉亭浚溝渠治湟狹以西道橋七十所令可至鮮水左右田事出賦人二十畝至四月草生發郡騎及屬國胡騎伉健各千倅馬什二就草為田者遊兵以充入金城郡益積蓄省大費今大司農所轉穀至者足支萬人一歲食謹上田處及器用簿唯陛下裁許上報曰皇帝問後將軍言欲罷騎兵萬人留田即如將軍之計虜當何時伏誅兵當何時得决孰計其便復奏充國上狀曰臣聞帝王之兵以全取勝是以貴謀而賤戰戰而百勝非善之善者也故先為不可勝以待敵之可勝蠻夷習俗雖殊於禮義之國然其欲避害就利愛親戚畏死亡一也今虜亡其美地薦草愁於寄託逺遁骨肉心離人有畔志而明主般師罷兵萬人留田順天時因地利以待可勝之虜雖未即伏辜兵决可朞月而望羌虜瓦解前後降者萬七百餘人及受言去者凡七十輩此坐支解羌虜之具也臣謹條不出兵留田便宜十二事步兵九校吏士萬人留屯以為武備因田致穀威德並行一也又因排折羌虜令不得歸肥饒之墜貧破其衆以成羌虜相畔之漸二也居民得並田作不失農業三也軍馬一月之食度支田士一歲罷騎兵以省大費四也至春省甲士卒循河湟漕穀至臨羌以視羌虜揚威武傳世折衝之具五也以閒暇時下所伐材繕治郵亭充入金城六也兵出乘危徼幸不出令反畔之虜竄於風寒之地離霜露疾疫瘃墯之患坐得必勝之道七也亡經阻逺追死傷之害八也內不損威武之重外不令虜得乘間之勢九也又亡驚動河南大开小开使生它變之憂十也治湟愜中道橋令可至鮮水以制西域信威千里從材席上過師十一也大費既省繇役豫息以戒不虞十二也留屯田得十二便出兵失十二利臣充國材下犬馬齒衰不識長冊唯明詔博詳公卿議臣採擇上復賜報曰皇帝問後將軍言十二便聞之虜雖未伏誅兵决可期月而望者謂今冬邪謂何時也將軍獨不計虜聞兵頗罷且丁壯相聚攻擾田者及道上屯兵復殺略人民將何以止之又大开小开前言曰我告漢軍先零所在兵不往擊久留得亡效五年時不分别人而并擊我其意常恐今兵不出得亡變生與先零為一將軍孰計復奏充國奏曰臣聞兵以計為本故多算勝少算先零羌精兵今餘不過七八千人失地逺客分散飢凍罕开莫須又頗暴略其羸弱蓄産畔還者不絶皆聞天子明令相捕斬之賞臣愚以為虜破壞可日月冀逺在來春秋曰兵决可期月而望竊見北邊自燉煌至遼東萬一千五百餘里乘塞列隧有吏卒數千人虜數大衆攻之而不能害今留步士萬人屯田地勢平易多髙山逺望之便部曲相保為塹壘木樵校聯不絶便兵弩飭鬭具㷭火幸通勢及并力以逸待勞兵之利者也臣愚以為屯田內有亡費之利外有守禦之備騎兵雖罷虜見萬人留田為必禽之具其土崩歸德宜不久矣從今盡三月虜馬羸瘦必不敢捐其妻子於它種中逺涉河山而來為寇又見屯田之士精兵萬人終不敢復將其纍重還歸故地是臣之愚計所以度虜且必瓦解其處不戰而自破之冊也至於虜小寇盜時殺人民其原未可卒禁臣聞戰不必勝不茍接刃攻不必取不茍勞衆誠令兵出雖不能滅先零亶能令虜絶不為小寇則出兵可也即今同是而釋坐勝之道從乘危之勢往終不見利空內自罷敝貶重而自損非所以視蠻夷也又大兵一出還不可復留湟中亦未可空如是繇役復發也且胸奴不可不備烏桓不可不憂今久轉運煩費傾我不虞之用以贍一隅臣愚以為不便校尉臨衆幸得承威德奉厚幣拊循衆羌輸以明詔宜皆鄉風雖其前辭嘗曰得亡效五年宜亡它心不足以故出兵臣竊自惟念奉詔出塞引軍逺擊窮天子之精兵散車甲於山野雖亡尺寸之功偷得避嫌之便而亡後咎餘責此人臣不忠之利非明主社稷之福也臣幸得奮精兵計不義久留天誅罪當萬死陛下寬仁未忍加誅令臣數得孰計愚臣伏計孰甚不敢避斧鉞之誅昧死陳愚唯陛下省察充國奏每上輒下公卿議臣初是充國計者什三中什五最後什八有詔誥前言不便者皆頓首服丞相魏相曰臣愚不習兵事利害後將軍數畫軍冊其言常是臣任其計可必用也上於是報充國曰皇帝問後將軍上書言羌虜可勝之道今聽將軍計上留屯田及當罷者人馬數將軍强食謹兵事自愛上以破羌强弩將軍數言當擊又用充國屯田處離散恐虜犯之於是兩從其計詔兩將軍與中郎將卬出擊强弩出降四千餘人破羌斬首二千級中郎將卬斬首降者亦二千餘級而充國所降復得五千餘人詔罷兵獨充國留屯田明年五月充國奏言羌本可五萬人軍凡斬首七千六百級降者三萬一千二百人溺河湟饑餓死者五六千人定計遺脫與煎鞏黃羝俱亡者不過四千人羌靡忘等自詭必得請罷屯兵奏可充國振旅而還趙充國傳元帝時馮奉世擊西羌羌破罷吏士頗留屯田備要害處傳元帝時復置戊己校尉屯田車師前王庭西域傳雜録越人欲為變必先田餘于界中積食糧乃入嚴助傳屯田校尉武帝置宣帝時始屬都護西域傳戊己校尉元帝初元元年置百官表武帝時揚可告緡遍天下得民財物以億計田大縣數百頃小縣百餘頃水衡少府大僕大農各置農官往往即郡縣比沒入田田之食貨志下元帝初元三年詔曰珠崖背叛議者之言狐疑辟難則守屯田通于時變則憂萬民夫萬民飢餓之與逺蠻之不討危孰大焉其罷珠崖郡賈捐之傳馬政太僕掌輿馬百官表詳見輿服門廏馬條漢興天子不能具駟而將相或乘牛車食貨志注云無色之駟謂四馬雜色漢初鑄莢錢馬至匹百金食貨志朝錯說文帝曰今令民有車騎馬一匹者復卒三人食貨志文帝十二年詔太僕見馬遺財足餘皆以給傳置本紀景帝中四年御史大夫衛綰奏禁馬髙五尺九寸以上齒未平不得出關本紀服䖍曰馬十歲齒下平景帝始造苑馬以廣用食貨志臣天麟按大僕屬官有邊郡六牧師苑令師古曰漢官儀云牧師諸苑三十六所分置北邊西邊養馬三十萬頭中六年胸奴入鴈門至武泉入上郡取苑馬本紀武帝之初七十年間國家亡事衆庶街巷有馬阡陌之間成羣乘牸牝者擯而不得㑹聚食貨志建元元年罷苑馬以賜貧民本紀師古曰養馬之苑禁百姓芻牧今罷之衛青比歲擊胡漢軍士馬死者十餘萬食貨志天子為伐胡故盛養馬馬之往來食長安者數萬匹卒掌者關中不足乃調旁近郡食貨志元狩四年大將軍驃騎大出擊胡軍馬死者十餘萬匹食貨志兩將軍之出塞塞閲官馬及私馬凡十四萬匹而後入塞者不滿三萬匹霍去病傳自衛青圍單于後以漢馬少故久不伐胡本傳元狩五年天下馬少平牡馬匹二十萬本紀如淳曰貴平牡馬賈欲使人競畜馬兵革數動民多買復於是除千夫五大夫為吏不欲者出馬食貨志元鼎四年令民得蓄邊縣官假馬母三歲而歸及息什一食貨志李竒曰邊有官馬今令民能蓄官母馬者滿三歲歸之十母馬還官一駒此為息什一也五年車騎馬乏縣官錢少買馬難得乃著令令封君以下至三百石吏以上差出牡馬天下亭亭有蓄字馬歲課息食貨志太初二年籍吏民馬補車騎馬本紀上既悔逺征伐乃下詔曰當今務在修馬復令以補缺毋乏武備而已臣天麟按朝錯疏民有車騎馬一匹者復卒三人即馬復令也郡國二千石各上進蓄馬方略補邊狀與計對西域傳昭帝始元四年詔往時令民共出馬其止勿出諸給中都官者且減之本紀五年罷天下亭馬母及馬弩關本紀應劭曰武帝令天下諸亭養馬母令罷之孟康曰舊馬髙五尺六寸齒未平弩十石以上皆不得出關今不禁也元鳳二年詔頗省乘輿馬及逺馬以補邊郡三輔傳馬其令郡國無斂今年馬口錢本紀元帝初元元年省苑馬以振困乏九月詔大僕減穀食馬本紀雜録黃霸守京兆尹發騎士詣北軍馬不適士劾乏興連貶秩本傳馬少事多不相補滿也召延坐不出持馬要斬文帝功臣表任當千以賣馬一匹賈錢十五萬過平臧五百以上免上太原郡家有馬官地理志注云漢有家馬廏一廏萬匹時以邊表有事故分來此大宛國多善馬馬汗血言其先天馬子也張騫始為武帝言之上遣使者持千金及金馬以請宛善馬宛王以漢絶逺大兵不能至愛其寶馬不肯與漢使妄言宛遂攻殺漢使取其財物於是天子遣二師將軍李廣利將兵前後十萬餘人伐宛連四年宛人斬其王母募首獻馬三千匹漢軍乃還西域傳趙充國奏倅馬什二師古曰倅副也千騎則與副馬二百匹金日殫輸黃門養馬牽馬過殿下馬又肥好上異而問之拜為馬監本傳備邊漢二年興關中卒乘邊塞本紀五年齊右丞相傅寬徙為代相國將屯二歲為丞相將屯本傳師古曰時代常有屯兵以備邊寇寬為代相兼將此屯兵也陳豨為代相監邊韓信傳豨以趙相國將監趙代邊兵邊兵皆屬焉盧綰傳上破豨還詔曰代地居常山之北與夷狄邊趙乃從山南有之逺數有胡寇難以為國頗取山南太原之地益屬代代之雲中以西為雲中郡則代受邊寇益少矣本紀文帝後六年以中大夫令免為車騎將軍屯飛狐故楚相蘇意為將軍屯句注將軍張武屯北地河內太守周亞夫為將軍次細栁宗正劉禮為將軍次霸上祝兹侯徐厲為將軍次棘門以備胡本紀武帝元光元年十一月衛尉李廣為驍騎將軍屯雲中中尉程不識為車騎將軍屯鴈門六月罷本紀六月胸奴盜邊遣將軍韓安國屯漁陽紀安國為材官將軍屯漁陽請且罷屯月餘胸奴大入徙益屯罷東屯右北平安國既斥疏將屯又亡失多甚自愧乃益東徙本傳元封四年胸奴寇邊遣拔胡將軍郭昌屯朔方本紀太初三年使光祿徐自為出五原塞數百里逺者千里築城障列亭至盧朐而使游擊將軍韓說長平侯衛伉屯其旁使彊弩都尉路博德築居延澤上其秋胸奴大入雲中定襄五原朔方行壞光祿所築亭障胸奴傳昭帝即位胸奴朔方殺略吏民發軍屯西河左將入軍築行北邊本紀始元二年冬發習射戰士詣朔方調故吏將屯田張掖郡本紀元鳳五年發三輔及郡國惡少年吏有告劾亡者屯遼東本紀宣帝本始中胸奴常數十萬餘騎南並塞欲入為寇遣趙充國將四萬騎屯緣邊九郡充國傳師古曰五原朔方雲中代郡鴈門定襄北平上谷漁陽也四萬騎分屯之充國總統領之北邊自燉煌至遼東萬一千五百餘里乘塞列隧有吏卒數千人趙充國傳地節三年詔曰朕既不德不能附逺是以邊境屯戍未息今復飭兵重屯久勞百姓非所以綏天下也其罷車騎將軍右將軍屯兵本紀五鳳四年以邊塞亡寇減成卒什二本紀平帝元始二年九月使謁者大司馬掾四十四人持節行邊兵本紀雜録朝錯說文帝曰逺方之卒守塞一歲而更不知胡人之能不如選常居者家室田作且以備之先為室屋具田器乃募罪人及免徒復作令居之不足募以丁奴婢贖罪及輸奴婢欲以拜爵者不足乃募民之欲往者皆賜髙爵復其家豫冬夏衣廪能自給而止郡縣之民得買其爵以自增至卿其亡夫若妻者縣官買豫之胡人入驅而能止其所驅者以其半豫之縣官為贖上從其言募民徙塞下錯復言古之徙逺方也相其隂陽之和嘗其水泉之味審其土地之宜先為築室家有一堂二內門户之閉置器物焉為置醫巫以救疾病此所以使民樂其處而有長居之心也又聞古之制邊縣也使五家為伍伍有長十長一里里有假士四里一連連有假五百十連一邑邑有假侯皆擇其邑之賢材有護習地形知民心者居則習民於射法出則教民於應敵勸以厚賞威以重罰則前死不旋踵矣朝錯傳武帝元朔二年募民徙朔方十萬口本紀元狩五年徙天下姦猾吏民於邊本紀元鼎六年置張掖燉煌郡徙民以實之本紀平帝元始二年募民徙雲安縣縣次給食至徙所賜田宅什器假與犁牛種食本紀朝錯說文帝曰欲民務農在於貴粟貴粟之道在於以粟為賞罰今使天下人入粟於邊以受爵免罪不過三歲塞下之粟必多矣於是帝從錯之言募民入粟邊二千石爵上造稍增至四千石為五大夫萬二千石為大庶長各以多少級數為差食貨志武帝通西南夷道逺巴蜀租賦不足以供之乃募豪民田南夷入粟縣官而內受錢於都內食貨志宣帝即位穀至石五錢耿夀昌白令邊郡皆築倉以五穀賤時增其價以糴以利農穀貴時減其價而糶名曰常平倉民便之食貨志趙充國曰金城湟中穀斛八錢吾謂耿中丞糴三百萬斛羌人不敢動矣耿中丞請糴百萬斛乃得四十萬斛耳失此二䇿羌人故敢為逆趙充國傳元帝初元五老罷常平倉本紀西邊北邊之郡雖有長爵不輕得復五尺以上不輕得息斥候望烽燧不得卧將吏被介胄而睡賈誼傳文穎曰邊方備胡寇作髙土櫓上作桔橰桔橰頭兜零以薪草置其中常低之有寇即火燃舉之以相告曰烽又多積薪寇至即然之以望其烟曰燧師古曰畫則燔燧夜則舉烽邊郡之士聞㷭舉燧燔皆攝弓而馳荷兵而走司馬相如傳孟康曰㷭如覆米䉛縣著契臯頭有寇則舉之燧積薪有寇則燔然之也金布令甲曰邊郡數被兵離飢寒夭絶天年父子相失令天下共給其費蕭望之傳邊郡發奔命書持赤白囊丙吉傳邊郡有長史掌兵馬百官表大守卒史邊郡一人儒林傳漢家邊吏職在距寇亦賜武庫兵皆任其事然後䝉之毋將隆傳武帝征伐邊兵不足乃發武庫工官兵器以贍之食貨志西漢㑹要卷五十九
