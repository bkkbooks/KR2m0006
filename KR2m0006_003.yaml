body:
  text: 西漢會要卷三宋徐天麟撰帝系三皇太子漢二年六月立太子赦罪人高紀五年漢王即皇帝位太子曰皇太子高紀惠帝即位太后立帝姊魯元公主女為皇后無子取後宫美人子名之以為太子高后紀孝文元年正月有司請蚤建太子所以尊宗廟也詔曰朕既不德上帝神明未歆饗也天下人民未有愜志今從不能博求天下賢聖有德之人而嬗天下焉而曰豫建太子是重吾不德也謂天下何其安之有司曰豫建太子所以重宗廟社禝不忘天下也上曰楚王季父也春秋高閲天下之義理多矣明於國家之體吳王於朕兄也淮南王弟也皆秉德以陪朕豈為不豫哉諸矦王宗室昆弟有功臣多賢及有德義者若舉有德以陪朕之不能終是社禝之靈天下之福也今不選舉焉而曰必子人其以朕為忘賢有德者而專於子非所以憂天下也朕甚不取有司固請曰古者殷周有國治安皆且千歲有天下者莫長焉用此道也立嗣必子所從來遠矣高帝始平天下建諸矦為帝者太祖諸矦王列矦始受國者亦皆為其國祖子孫繼嗣世世不絶天下之大義也故高帝設之以撫海內今釋宜建而更選於諸矦宗室非高帝之志也更議不宜子啓最長敦厚慈仁請建以為太子上乃許之因賜天下民當為父後者爵一級本紀孝景四年立皇子榮為皇太子本紀七年正月廢皇太子榮為臨江王四月丁巳立皇子徹為皇太子賜民為父後者爵一級本紀孝武元狩元年夏四月丁卯立皇太子賜中二千石爵右庶長民為父後者一級本紀征和二年七月按道矦韓説使者江充等掘蠱太子宫壬午太子與皇后謀斬充以節發兵與丞相劉屈氂大戰長安死者數萬人庚寅太子亡皇后自殺八月辛亥太子自殺于湖本紀武帝末戻太子敗燕王旦廣陵王胥行驕嫚後元三年二月上疾病遂立昭帝為太子年八歲明日武帝崩太子即皇帝位昭紀孝宣地節三年立皇太子大赦天下賜御史大夫爵關內矦二千石爵右庶長天下當為父後者爵一級本紀五鳯元年正月皇太子冠皇太后賜丞相將軍列矦中二千石帛人百匹大夫人八十匹夫人六十匹又賜列矦嗣子爵五大夫男子為父後者爵一級本紀孝成皇帝元帝太子也母曰王皇后元帝在太子宫生甲觀畫堂為世嫡皇孫宣帝愛之字曰太孫常置左右年三歲而宣帝崩元帝即位帝為太子壯好經書寬博謹慎初居桂宫上嘗急召太子出龍樓門不敢絶馳道西至直城門得絶及度還入作室門上遲之問其故以狀對上大説乃著令令太子得絶馳道云其後幸酒樂燕樂上不以為能而定陶恭王有材藝母傅昭儀又愛幸上以故常有意欲以恭王為嗣賴侍中史丹護太子家輔助有力上亦以先帝尤愛太子故得無廢竟寧元年五月元帝崩六月己未太子即皇帝位成紀成帝綏和元年二月癸丑詔曰朕承太祖鴻業奉宗廟二十五年德不能綏理宇內百姓怨望者衆不蒙天祐至今未有繼嗣天下無所係心觀于往古近事之戒禍亂之萌皆由斯焉定陶王欣於朕為子慈仁孝順可以承天序繼祭祀其立欣為皇太子封中山王舅諫大夫馮參為宜鄉矦益中山國三萬户以慰其意賜諸矦王列矦金天下當為父後者爵三老孝弟力田帛各有差紀同上孝哀皇帝元帝庶孫定陶恭王子也母曰丁姬年三歲嗣立為王長好文辭法律元延四年入朝盡從傅相中尉時成帝少弟中山孝王亦來朝獨從傅上怪之以問定陶王對曰令諸矦王朝得從其國二千石傅相中尉皆國二千石故盡從之上令誦詩通習能説他日問中山王獨從傅在何法令不能對令誦尚書又廢及賜食於前後飽起下襪係解成帝由此以為不能而賢定陶王數稱其材時王祖母傅太后隨王來朝私賂遺上所幸趙昭儀及帝舅票騎將軍曲陽矦王根昭儀及根見上亡子亦欲豫自結為長久計皆更稱定陶王勸帝以為嗣成帝亦自美其材為加元服而遣之時年十七矣明年使執金吾任宏守大鴻臚持節召定陶王立為皇太子謝曰臣幸得繼父守藩為諸矦王材質不足以假充太子之宫陛下聖德寬仁敬承祖宗奉順神祗宜蒙福祐子孫千億之報臣願且得留國邸旦夕奉問起居俟有聖嗣歸國守藩書奏天子報聞後月餘立楚孝王孫景為定陶王奉恭王祀所以奬厲太子專為後之誼哀紀雜録上高帝欲廢太子立戚夫人子趙王如意大臣多爭未能得堅決也吕后恐不知所為或謂吕后曰留矦善畫計上信用之吕后乃使建成矦吕澤劫良曰君常為上謀臣今上日欲易太子君安得高枕而卧良曰始上數在急困之中幸用臣策今天下安定以愛欲易太子骨肉之間雖臣等百人何益吕澤強要曰為我畫計良曰此難以口舌爭也顧上有所不能致者四人四人老年矣皆以上嫚娒士故逃匿山中義不為漢臣然上高此四人今公誠能毋愛金玉璧帛令太子為書卑辭安車因使辨士固請宜來來以為客時從入朝令上見之則一助也於是吕后令吕澤使人奉太子書卑辭厚禮迎此四人四人至客建成矦所漢十一年黥布反上疾欲使太子往繫之四人相謂曰凡來者將以存太子太子將兵事危矣乃説建成矦曰太子將兵有功即位不益無功則從此受禍且太子所與俱諸將皆與上定天下梟將也今乃使太子將之此無異使羊將狼皆不肯為用其無功必矣臣聞母愛者子抱今戚夫人日夜侍御趙王常居前上終不使不肖子居愛子上明其代太子位必矣君何不急請吕后承間為上泣言黥布天下猛將善用兵今諸將皆陛下故等夷乃令太子將此屬莫肯為用且布聞之鼓行而西耳上雖疾強載輜車卧而護之諸將不敢不盡力上雖苦強為妻子計於是吕澤夜見吕后吕后承間為上泣而言如四人意上曰吾惟之孺子固不足遣乃公自行耳於是上自將而東羣臣居守皆送至霸上良疾強起至曲郵見上曰臣宜從疾甚楚人剽疾願上謹毋與楚爭鋒因説上令太子為將軍監關中兵上謂子房雖疾強卧傅太子是時叔孫通已為太傅良行少傅事漢十二年上從破布歸疾益甚愈欲易太子良諌不聽因疾不視事叔孫通太傅稱説引古以死爭太子上陽許之猶欲易之及宴置酒太子侍四人者從太子年皆八十有餘鬚眉皓白衣冠甚偉上怪問曰何為者四人前對各言其姓名上乃驚曰吾求公避逃我今公何自從吾兒遊乎四人曰陛下輕士善罵臣等義不辱故恐而亡匿今聞太子仁孝恭敬愛士莫不延頸願為太子死者故臣等來上曰煩公幸卒調護太子四人為夀已畢趨去上目送之召戚夫人指視曰我欲易之彼四人為之輔羽翼已成難動矣吕氏真乃主矣張良傳叔孫通為太子太傅高帝欲以趙王如意易太子通諫曰昔者晉獻公以驪姬故廢太子立奚齊晉國亂者數十年為天下笑秦以不早定扶蘇胡亥詐立自使滅祀此陛下所親見今太子仁孝天下皆聞之吕后與陛下攻苦食啖師古曰當作淡其可背哉陛下必欲廢適而立少臣願先伏誅以頸血汙地高帝曰公罷矣吾特戲耳通曰太子天下本本一搖天下震動奈何以天下戲高帝曰吾聽公及上置酒見留矦所招客從太子入見上遂無易太子志矣叔孫通傳高帝欲廢太子而立戚姬子如意為太子大臣固爭莫能得上以留矦策止而周昌庭爭之強上問其説昌為人吃又盛怒曰臣口不能言然臣期期知其不可陛下欲廢太子臣期期不奉詔上欣然而笑即罷吕后側耳於東廂聽見昌為跪謝曰微君太子幾廢周昌傳孝文時朝錯為太子舍人門大夫遷博士上書言人主所以尊顯功名揚於萬世之後者以知術數也故人主知所以臨制臣下而治其衆則羣臣畏服矣知所以聽言受事則不欺蔽矣知所以安利萬民則海內必從矣知所以忠孝事上則臣子之行備矣此四者臣竊為皇太子急之人臣之議或者皇太子亡以知事為也臣之愚誠以為不然竊觀上世之君不能奉其宗廟而劫殺於其臣者皆不知術數者也皇太子所讀書多矣而未深知術數者不問書説也夫多誦而不知其説所謂勞苦而不為功臣竊觀皇太子材智高竒馭射伎藝過人絶遠然於術數未有所守者以陛下為心也竊願陛下幸擇聖人之術可用今世者以賜皇太子因時使太子陳明於前唯陛下裁察上善之於是拜錯為太子家令以其辨得幸太子太子家號曰智囊朝錯傳文帝時賈誼上書曰古之王者太子乃生因舉以禮使士負之有司齊肅端冕見之南郊見于天也過闕則下過廟則趨孝子之道也故自為赤子而教固已行矣昔者成王幼在襁抱之中召公為太保周公為太傅太公為太師保保其身體傅傅之德義師道之教訓此三公之職也於是為置三少皆上大夫也曰少保少傅少師是與太子宴者也故乃孩提有識三公三少固明孝仁禮義以道習之逐去邪人不使見惡行於是皆選天下之端士孝悌博聞有道術者以衛翼之使與太子居處出入故太子乃生而見正事聞正言行正道左右前後皆正人也夫習與正人居之不能毋正猶生長於齊不能不齊言也習與不正人居之不能毋不正猶生長於楚之地不能不楚言也故擇其所耆必先受業乃得嘗之擇其所樂必先有習乃得為之孔子曰少成若天性習貫如自然及太子少長知妃色則入于學學者所學之官也及太子既冠成人免於保傅之嚴則有記過之史徹膳之宰進善之旌誹謗之木敢諫之鼓瞽史誦詩工誦針諌大夫進謀士傳民語習與智長故切而不愧化與心成故中道若性三代之禮春朝朝日秋暮夕月所以明有敬也春秋入學坐國老執醬而親餽之所以明有孝也行以鸞和步中采齊趣中肆夏所以明有度也其於禽獸見其生不見其死聞其聲不食其肉故遠庖厨所以長恩且明有仁也夫三代之所以長久者以其輔翼太子有此具也天下之命垂於太子太子之善在於早諭教與選左右夫心未濫而先諭教則化易成也開於道術智誼之指則教之力也若其服習積貫則左右而已臣故曰選左右早諭教最急夫教得而左右正則太子正矣太子正而天下定矣賈誼傳太子與梁王共車入朝不下司馬門張釋之追止太子梁王毋入殿門遂劾不下公門不敬奏之薄太后聞之文帝免冠謝曰教兒子不謹薄太后使使承詔赦太子梁王然後得入文帝由是竒釋之張釋之傳西漢會要卷三
