body:
  text: 西漢㑹要卷十二宋徐天麟撰禮六吉禮宗廟太上皇廟三輔黄圖云在長安西北長安故城中香室街南鴻翔府北闗輔記云在酒池北孝元永光五年毁建昭五年復竟寧元年五月毁孝成河平元年復世世奉祠髙廟三輔黄圖髙祖廟在長安西北故城中漢舊儀云髙祖盖地六頃三十畆四歩祠曰立九旗堂下撞千石鐘十枚聲聞百里孝恵尊髙廟為太祖廟韋𤣥成傳孝景元年申屠嘉等奏世功莫大於髙皇帝宜為帝者太祖之廟天子宜世世獻制曰可紀孝恵廟三輔黄圖云恵帝廟在髙廟後元帝永光五年毁竟寧元年三月復五月毁孝文廟三輔黄圖云文帝廟在長安城南四年作顧成廟本紀應劭曰文帝自為廟制度卑狹若顧望而成故曰顧成孝景元年申屠嘉等奏徳莫盛於孝文皇帝宜為帝者太宗之廟制曰可紀孝景廟西京故事景帝廟號徳陽中四年三月起徳陽宫本紀臣瓉曰帝自作之諱不言廟故言宫元帝竟寧元年毁孝武廟文紀注武帝廟號龍淵三輔黄圖龍淵廟在茂陵東元光三年起龍淵宫本紀宣帝本始二年詔尊孝武廟為世宗廟天子世世獻本紀哀帝即位孔光與羣臣雜議孝武皇帝雖有功烈親盡宜毁劉歆議曰孝宣皇帝既以為世宗之廟建立萬世不宜毁上覧其議制曰歆議可韋𤣥成傳孝昭廟文紀注云昭帝廟號徘徊悼皇考廟宣帝元康元年立皇考廟本紀成帝永光五年定迭毁禮韋𤣥成奏皇考廟親未盡不宜毁至平帝元始中王莾奏皇考廟本不當立請毁勿修奏可韋𤣥成傳孝宣廟文紀注云宣帝廟號樂㳺三輔黄圖云在杜陵西北平帝元始四年尊孝宣廟為中宗天子世世獻祭本紀孝元廟文紀注云元帝廟號長夀平帝元始四年尊孝元廟為髙宗天子世世獻祭本紀孝成廟三輔黄圖云成帝廟號陽池哀帝建平二年立共皇廟于京師本紀共皇帝廟平帝即位隳廢共皇帝廟師丹傳孝哀廟孝平廟京師自髙祖至宣帝與太上皇悼皇考各自居陵旁立廟韋𤣥成傳孝景元年十月詔曰盖聞古者祖有功而宗有徳制禮樂各有由歌者所以發徳也舞者所以明功也髙廟酎奏武徳文始五行之舞孝恵廟酎奏文始五行之舞孝文皇帝臨天下通闗梁不異逺方除誹謗去肉刑賞賜長老収恤孤獨以遂羣生减嗜欲不受獻罪人不帑不誅亡罪不私其利也除宫刑出羙人重絶人之世也朕既不敏弗能勝識此皆上世之所不及而孝文皇帝親行之徳厚侔天地利澤施四海靡不獲福明象乎日月而廟樂不稱朕甚懼焉其為孝文皇帝廟為昭徳之舞以明休徳然后祖宗之功徳施於萬世永永無窮朕甚嘉之其與丞相列矦中二千石禮官具禮儀奏丞相臣嘉等奏曰陛下永思孝道立昭徳之舞以明孝文皇帝之盛徳皆臣嘉等愚所不及臣謹議世功莫大於髙皇帝徳莫盛於孝文皇帝髙皇帝廟宜為帝者太祖之廟孝文皇帝廟宜為帝者太宗之廟天子宜世世獻祖宗之廟郡國諸矦宜各為孝文皇帝立太宗之廟諸矦王列矦使者侍祠天子所獻祖宗之廟請宜布天下制曰可本紀宣帝初即位欲褒先帝詔丞相御史曰朕以眇身䝉遺徳承聖業奉宗廟夙夜惟念孝武皇帝躬仁誼厲威武北征匈奴單于逺遁南平氐羌昆明甌駱兩越東定薉貉朝鮮廣地斥境立郡縣百蠻率服欵塞自至珍貢陳於宗廟恊音律造樂歌薦上帝封太山立明堂改正朔易服色明開聖緒尊賢顯功興㓕繼絶褒周之後備天地之禮廣道術之路上天報況符瑞並應寳鼎出白麟獲海效鉅魚神人並見山稱萬嵗功徳茂盛不能盡宣而廟樂未稱朕甚悼焉其與列矦二千石愽士議於是羣臣大議廷中皆曰宜如詔書長信少府夏矦勝獨曰武帝雖有攘四夷廣土斥境之功然多殺士衆竭民財力奢泰亡度天下虛耗百姓流離物故者半蝗蟲大起赤地数千里或人民相食蓄積至今未復亡徳澤於民不宜為立廟樂公卿共難勝曰此詔書也勝曰詔書不可用也人臣之誼宜直言正論非茍阿意順指議已出口雖死不悔於是丞相義御史大夫廣眀劾奏勝非議詔書毁先帝不道及丞相長史黄霸阿縱勝不舉劾俱下獄有司遂請尊孝武帝廟為世宗廟奏盛徳文始五行之舞天子世世獻納以明盛徳武帝廵狩所幸郡國凡四十有九皆立廟如髙祖太宗焉夏矦勝傳哀帝已追尊定陶共王為共皇帝郎中令冷褒黄門郎叚猶等復奏言宜為共皇立廟京師上復下其議有司皆以為宜如褒猶言師丹議獨曰禮父為士子為天子祭以天子其尸服以士服以亡爵父之義尊父母也為人後者為之子故為所後服斬衰三年而降其父母朞明尊本祖而重正統也孝成皇帝聖恩深逺故為共王立後奉承祭祀令共皇長為一國太祖萬世不毁恩義已備陛下既繼體先帝持重太宗承宗廟天地社稷之祀義不得復奉定陶共皇祭入其廟今欲立廟于京師而使臣下祭之是無主也又親盡當毁空去一國太祖不墮之祀而就無主當毁不正之禮非所以尊厚共皇也丹由是浸不合上意建平二年遂立共皇廟于京師平帝即位王莾白太后隳廢共皇廟諸造議冷褒叚猶等皆徙合浦師丹傳雜録奉常掌宗廟禮儀景帝更名太常百官表恵帝即位徙叔孫通為奉常定宗廟儀法叔孫通傳髙后時患臣下妄議先帝宗廟寢園官故定著令敢有擅議者棄市至元帝改制蠲除此令成帝以無繼嗣又復擅議宗廟之令韋𤣥成傳臣天麟按貢禹建迭毁之議乃在元帝刪除此令時人有盜髙廟坐前玉環得文帝怒下廷尉治案盗宗廟服御物者為奏當棄市上大怒曰人亡道廼盗先帝噐吾屬廷尉者欲致之族而君以法奏之非吾所以共承宗廟意也釋之謝曰法如是足矣今盗宗廟噐而族之有如萬分一假令愚民取長陵一抔土陛下且何以加其法乎文帝與太后言之乃許廷尉當是張釋之傳内史府居太上廟堧中門東出不便鼂錯廼穿門南出鑿廟堧垣丞相大怒為奏請誅錯景帝曰此非廟垣廼堧中垣不致于法鼂錯傳臨江王榮坐侵太宗廟地召詣中尉自殺景紀中二年元鼎二年任越人坐為太常廟酒酸不敬國除表太初三年石徳坐為太常廟牲瘦贖論表後元元年御史大夫啇邱成坐為詹事侍祠孝文廟醉歌堂下曰出居安能鬰鬰大不敬自殺二年魏不害坐為太常孝文廟風發瓦免表始元六年江徳坐為太常廟廊夜飲失火免表甘露元年魏𢎞坐酎宗廟騎至司馬門不敬削爵一級恩澤矦表四月丙申太上皇廟火甲辰孝文廟火上素服五日本紀丙顯坐酎宗廟騎至司馬門不敬奪爵一級恩澤矦表韋𢎞為太常丞識奉宗廟典諸陵邑煩劇多罪過父賢以𢎞當為後故勑令自免𢎞懐謙不去官竟坐宗廟事繋獄韋𤣥成傳宣帝時八月飲酎行祠孝昭廟先敺旄頭劒挺墮墬首垂泥中刃鄉乘輿車馬驚於是召梁邱賀筮之有兵謀不吉上還使有司侍祠是時霍氏外孫代郡太守任宣坐謀反誅宣子章為公車丞亡在渭城界中夜𤣥服入廟居郎間執㦸立廟門待上至欲為逆發覺伏誅故事上常夜入廟其後待眀而入自此始也梁邱賀傳霍山曰丞相擅减宗廟羔莵鼃可以此罪也霍光傳師古曰羔莵鼃所以供祭也韋𤣥成以列矦侍祀孝恵廟當晨入廟天雨淖不駕駟馬車而騎至廟下有司劾奏等軰數人皆削爵為闗内矦本傳髙廟僕射王莾傳上哀韋持金匱至髙廟以付僕射原廟恵帝為東朝長樂宫及間徃數蹕煩民作復道方築武庫南叔孫通奏事因請間曰陛下何自築復道髙帝寝衣冠月出游髙廟子孫奈何乘宗廟道以行哉恵帝懼曰急壊之通曰人主無過舉今已作百姓皆知之矣願陛下為原廟渭北衣冠月出游之益廣宗廟大孝之本上乃詔有司立原廟叔孫通傳臣天麟按漢舊儀云原廟一嵗十二祠閏加一祠月㳺衣冠以廟餽食之日元帝罷原廟年月未詳建昭五年復原廟本紀郡國廟髙祖十年令諸矦王皆立太上皇廟于國都本紀孝恵即位令郡諸矦王立髙廟本紀孝景即位詔郡國諸矦宜各為孝文皇帝立太宗之廟本紀孝武建元六年遼東髙廟災董仲舒曰髙廟不當在遼東五行志孝宣本始二年令武帝廵狩所幸之郡國皆立廟本紀四年地震北海瑯邪壊祖宗廟上以宗廟堕素服避正殿五日本紀元帝初元二年地震於隴西郡毁落太上皇廟殿壁木飾本紀凡祖宗廟在郡國者六十八合百六十七所韋𤣥成傳師古曰六十八者郡國之數也百六十七所宗廟之數也永光四年罷祖宗廟在郡國者本紀詳見廟議西漢㑹要卷十二
