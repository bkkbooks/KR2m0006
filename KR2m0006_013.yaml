body:
  text: 西漢㑹要卷十三宋徐天麟撰禮七吉禮廟議初髙祖時令諸矦王都皆立太上皇廟至恵帝尊髙帝廟為太祖廟景帝尊文帝廟為太宗廟行所嘗幸郡國各立太祖太宗廟至宣帝本始三年復尊孝武廟為世宗廟行所廵狩亦立焉凡祖宗廟在郡國六十八合百六十七所而京師自髙祖下至宣帝與太上皇悼皇考各自居陵旁立廟并為百七十六又園中各有寢便殿日祭於寝月祭於廟時祭於便殿寝日四上食廟嵗二十五祠便殿嵗四祠又月一游衣冠而昭靈后武哀王昭哀后孝文太后孝昭太后衞思后戾太子戾后各有寢園與諸帝合凡三十所一嵗祠上食二萬四千四百五十五至元帝時貢禹奏言古者天子七廟今孝恵孝景廟皆親盡宜毁及郡國廟不應古禮宜正定天子是其議未及施行而禹卒永光四年乃下詔先議罷郡國廟曰朕聞明王之御世也遭時為法因事制宜徃者天下初定遠方未賓因嘗所親以立宗廟盖建威銷萌一民之至權也今頼天地之靈宗廟之福四方同軌蠻貊貢職乆遵而不定令䟽遠卑賤共承尊祀殆非皇天祖宗之意朕甚懼焉傳不云乎吾不與祭如不祭其與將軍列侯中二千石二千石諸大夫博士議郎議丞相𤣥成御史大夫鄭𢎞太子太傅嚴彭祖少府歐陽地餘諫大夫尹更始等七十人皆曰臣聞祭非自外至者也繇中出生於心也故唯聖人為能饗帝孝子為能饗親立廟京師之居躬親承事四海之内各以其職來助祭尊親之大義五帝三王所共不易之道也詩云有來雍雍至止肅肅相維辟公天子穆穆春秋之義父不祭於支庶之宅君不祭於臣僕之家王不祭於下土諸矦臣等愚以為宗廟在郡國宜無修臣請勿復修奏可因罷昭靈后武哀王昭哀后衛思后戾太子戾后園皆不奉祠裁置吏卒守焉罷郡國廟後月餘復下詔曰盖聞明王制禮立親廟四祖宗之廟萬世不毁所以明尊祖敬宗著親親也朕獲承祖宗之重惟大禮未備戰栗恐懼不敢自顓其與將軍列矦中二千石二千石諸大夫愽士議𤣥成等四十四人奏議曰禮王者始受命諸矦始封之君皆為太祖以下五廟而迭毁毁廟之主藏乎太祖五年而再殷祭言壹禘壹祫也祫祭者毁廟與未毁廟之主皆合食於太祖父為昭子為穆孫復為昭古之正禮也祭義曰王者禘其祖自出以其祖配之而立四廟言始受命而王祭天以其祖配而不為立廟親盡也立親廟四親親也親盡而迭毁親䟽之殺示有終也周之所以七廟者以后稷始封文王武王受命而王是以三廟不毁與親廟四而七非有后稷始封文武受命之功者皆當親盡而毁成王成二聖之業制禮作樂功徳茂盛廟猶不世以行為諡而已禮廟在大門之内不敢遠親也臣愚以為髙帝受命定天下宜為帝者太祖之廟世世不毁承後屬盡者宜毁今宗廟異處昭穆不序宜入就太祖廟而序昭穆如禮太上皇孝恵孝文孝景廟皆親盡宜毁皇考廟親未盡如故大司馬車騎将軍許嘉等二十九人以為孝文皇帝除誹謗去肉刑躬節儉不受獻罪人不孥不私其利出羙人重絶人類賔賜長老収恤孤獨徳厚侔天地利澤施四海宜為帝者太宗之廟廷尉忠以為孝武皇帝改正朔易服色攘四夷宜為世宗之廟諌大夫尹更始等十八人以為皇考廟上序於昭穆非正禮宜毁於是上重其事依違者一年乃下詔曰盖聞王者祖有功而宗有徳尊尊之大義也存親廟四親親之至恩也髙皇帝為天下誅暴除亂受命而帝功莫大焉孝文皇帝國為代王諸吕作亂海内揺動然羣臣黎庶靡不一意北面而歸心猶謙辭固遜而後即位削亂秦之迹興三代之風是以百姓晏然咸獲嘉福徳莫盛焉髙皇帝為漢太祖孝文皇帝為太宗世世承祀傳之無窮朕甚樂之孝宣皇帝為孝昭皇帝後於義一體孝景皇帝廟及皇考廟皆親盡其正禮義𤣥成等奏曰祖宗之廟世世不毁繼祖以下五廟而迭毁今髙皇帝為太祖孝文皇帝為太宗孝景皇帝為昭孝武皇帝為穆孝昭皇帝與孝宣皇帝俱為昭皇考廟親未盡太上孝恵廟皆親盡宜毁太上廟主宜瘞園孝恵皇帝為穆主遷於太祖廟寢園皆無復修奏可議者又以為清廟之詩言交神之禮無不清静今衣冠出游有車騎之衆風雨之氣非所謂清静也祭不欲數數則瀆瀆則不敬宜復古禮四時祭於廟諸寢園日月閒祀皆可勿復修上亦不改也明年𤣥成復言古者制禮别尊卑貴賤國君之母非適不得配食則薦於寢身沒而已陛下躬至孝承天心建祖宗定迭毁序昭穆大禮既定孝文太后孝昭太后寢祠園宜如禮勿復修奏可後嵗餘𤣥成薨匡衡為丞相上寢疾夢祖宗譴罷郡國廟上少弟楚孝王亦夢焉上詔問衡議欲復之衡深言不可上疾乆不平衡惶恐禱髙祖孝文孝武廟曰嗣曽孫皇帝恭承洪業夙夜不敢康寧思育休烈以章祖宗之盛功故動作接神必因古聖之經徃者有司以為前因所幸而立廟将以繋海内之心非為尊祖嚴親也今賴宗廟之靈六合之内莫不附親廟宜一居京師天子親奉郡國廟可止毋修皇帝祗肅舊禮尊重神明即告于祖宗而不敢失今皇帝有疾不豫廼夢祖宗見戒以廟楚王夢亦有其序皇帝悼懼即詔臣衡復修立謹案上世帝王承祖禰之大義皆不敢不自親郡國吏卑賤不可使獨承又祭祀之義以民為本間者嵗數不登百姓困乏郡國廟無以修立禮凶年則嵗事不舉以祖禰之意為不樂是以不敢復如誠非禮義之中違祖宗之心咎盡在臣衡當受其殃大被其疾隊在溝瀆之中皇帝至孝肅謹宜䝉祐福唯髙皇帝孝文皇帝孝武皇帝省察右饗皇帝之孝開賜皇帝眉夀亡疆令所疾日瘳平復反常永保宗廟天下幸甚又告謝毁廟曰徃者大臣以為在昔帝王承祖宗之休典取象於天地天序五行人親五屬天子奉天故率其意而尊其制是以禘嘗之序靡有過五受命之君躬接于天萬世不堕繼烈以下五廟而遷上陳太祖間嵗而祫其道應天故福禄永終太上皇非受命而屬盡義則當遷又以為孝莫大於嚴父故父之所尊子不敢不承父之所異子不敢同禮公子不得為母信為後則於子祭於孫止尊祖嚴父之義也寢日四上食園廟間祠皆可亡修皇帝思慕悼懼未敢盡從惟念髙皇帝聖徳茂盛受命溥將欽若稽古承順天心子孫本支陳鍚亡疆誠以為遷廟合祭乆長之策髙皇帝之意廼敢不聼即以令日遷太上孝恵廟孝文太后孝昭太后寢將以昭祖宗之徳順天人之序定亡窮之業今皇帝未受茲福乃有不能共職之疾皇帝願復修立承祀臣衡等咸以為禮不得如不合髙皇帝孝恵皇帝孝文皇帝孝武皇帝孝昭皇帝孝宣皇帝太上皇孝文太后孝昭太后之意罪盡在臣衡等當受其咎今皇帝尚未平詔中朝臣具復毁廟之文臣衡中朝臣咸復以為天子之祀義有所斷禮有所承違統背制不可以奉先祖皇天不祐鬼神不饗六藝所載皆言不當無所依縁以作其文事如失指罪廼在臣衡當深受其殃皇帝宜厚䝉祉福嘉氣日興疾病平復永保宗廟與天亡極羣生百神有所歸息諸廟皆同文乆之上疾連年遂盡復諸所罷寝廟園皆修祀如故初上定迭毁禮獨尊孝文廟為太宗而孝武廟親未盡故未毁上於是廼復申明之曰孝宣皇帝尊孝武廟曰世宗損益之禮不敢有與焉他皆如舊制唯郡國廟遂廢云元帝崩衡奏言前以上體不平故復諸所罷祠卒不䝉福案衞思后戾太子戾后園親未盡孝恵孝景廟親盡宜毁及太上皇孝文孝昭太后昭靈后昭哀后武哀王祠請悉罷勿奉奏可初髙后時患臣下妄非議先帝宗廟寝園官故定著令敢有擅議者棄市至元帝改制蠲除此令成帝時以無繼嗣河平元年復復太上皇寢廟園世世奉祠昭靈后武哀王昭哀后并食於太上寢廟如故又復擅議宗廟之命成帝崩哀帝即位丞相孔光大司空何武奏言永光五年制書髙皇帝為漢太祖孝文皇帝為太宗建昭五年制書孝武皇帝為世宗損益之禮不敢有與臣愚以為迭毁之次當以時定非令所為擅議宗廟之意也臣請與羣臣雜議奏可於是光禄勲彭宣詹事滿昌愽士左咸等五十三人皆以為繼祖宗以下五廟而迭毁後雖有賢君猶不得與祖宗並列子孫雖欲褒大顯揚而立之鬼神不饗也孝武皇帝雖有功烈親盡宜毁太僕王舜中壘校尉劉歆議曰臣聞周室既衰四夷並侵獫狁最強於今匈奴是也至宣王而伐之詩人羙而頌之曰薄伐獫狁至于太原又曰嘽嘽推推如霆如雷顯允方叔征伐獫狁荆蠻來威故稱中興及至幽王犬戎來伐殺幽王取宗噐自是之後南夷與北夷交侵中國不絶如綫春秋紀齊威南伐楚北伐山戎孔子曰㣲管仲吾其被髪左衽矣是故棄桓之過而録其功以為伯首及漢興冐頓始彊破東胡禽月氏并其土地地廣兵彊為中國害南越尉佗總百粤自稱帝故中國雖平猶有四夷之患且無寧嵗一方有急三面救之是天下皆動而被其害也孝文皇帝厚以貨賂與結和親猶侵暴無已甚者興師十餘萬衆近屯京師及四邉嵗發屯備虜其為患乆矣非一世之漸也諸矦郡守連匈奴及百粤以為逆者非一人也匈奴所殺郡守都尉略取人民不可勝数孝武皇帝愍中國罷勞無安寕之時乃遣大将軍驃騎伏波樓船之屬南㓕百粤起七郡北攘匈奴降昆邪十萬之衆置五屬國起朔方以奪其肥饒之地東伐朝鮮起𤣥莵樂浪以斷匈奴之左臂西伐大宛并三十六國結烏孫起燉煌酒泉張掖以鬲婼羗裂匈奴之右臂單于孤特遠遁于幕北四垂無事斥地逺境起十餘郡功業既定廼封丞相為富民侯以大安天下富實百姓其規撫可見又招集天下賢俊與恊心同謀興制度改正朔易服色立天地之祠建封禪殊官號存周後定諸矦之制永無逆争之心至今累世賴之單于守藩百蠻服從萬世之基也中興之功未有髙焉者也髙帝建大業為太祖孝文皇帝徳至厚也為文太宗孝武皇帝功至著也為武世宗此孝宣帝所以發徳音也禮記王制及春秋榖梁傳天子七廟諸矦五大夫三士二天子七日而殯七月而葬諸矦五日而殯五月而葬此喪事尊卑之序也與廟數相應其文曰天子三昭三穆與太祖之廟而七諸矦二昭二穆與太祖之廟而五故徳厚者流光徳薄者流卑春秋左氏傳曰名位不同禮亦異數自上以下降殺以兩禮也七者其正法數可常數者也宗不在此數中宗變也苟有功徳則宗之不可預為設數故於殷太甲為太宗太戊曰中宗武丁曰髙宗周公為無逸之戒舉殷三宗以勸成王繇是言之宗無數也然則所以勸帝者之功徳博矣以七廟言之孝武皇帝未宜毁以所宗言之則不可謂無功徳禮記祀典曰夫聖王之制祀也功施於民則祀之以勞定國則祀之能救大災則祀之竊觀孝武皇帝功徳皆兼而有焉凢在於異姓猶將特祀之况於先祖或説天子五廟無見文又説中宗髙宗者宗其道而毁其廟名與實異非尊德貴功之意也詩云蔽芾甘棠勿翦勿伐召伯所茇思其人猶愛其木况宗其道而毁其廟乎迭毁之禮自有常法無殊功異徳固以親䟽相推及至祖宗之序多少之數經傳無明文至尊至重難以疑文虛説定也孝宣皇帝舉公卿之議用衆儒之謀既以為世宗之廟建之萬世宣布天下臣愚以為孝武皇帝功烈如彼孝宣皇帝崇立之如此不宜毁上覧其議而從之制曰太僕舜中壘校尉歆議可歆又以為禮去事有殺故春秋外傳曰日祭月祀時享嵗貢終王祖禰則日祭曽髙祖月祀二祧則時享壇墠則嵗貢大禘則終王徳盛而游廣親親之殺也彌逺則彌尊故禘為重矣孫居王父之處正昭穆則孫常與祖相代此遷廟之殺也聖人於其祖出於情矣禮無所不順故無毁廟自貢禹建迭毁之議恵景及太上寢園廢而為虗失禮意矣至平帝元始中大司馬王莾奏本始元年丞相義等議謚孝宣皇帝親曰悼園置邑三百家至元康元年丞相相等奏父為士子為天子祭以天子悼園宜稱尊號曰皇考立廟益故奉園民滿千六百家以為縣臣愚以為皇考廟本不當立累世奉之非是又孝文太后南陵孝昭太后雲陵園雖前以禮不復修陵名未正謹與大司徒晏等百四十七人議皆曰孝宣皇帝以兄孫繼統為孝昭皇帝後以數故孝元世以孝景皇帝及皇考廟親未盡不毁此兩統貳父違於禮制案義奏親謚曰悼裁置奉邑皆應經義相奏悼園稱皇考立廟益民為縣違離祖統乖謬本義父為士子為天子祭以天子者乃謂若虞舜夏禹殷湯周文漢之髙祖受命而王者也非謂繼祖統為後者也臣請皇髙祖考廟奉明園毁勿修罷南陵雲陵為縣奏可韋𤣥成傳元帝時韋𤣥成為丞相奏罷太上皇寢廟園平當上書言臣聞孔子曰如有王者必世而後仁三十年之間道徳和洽制禮興樂災害不生禍亂不作今聖漢受命而王繼體承業二百餘年孜孜不怠政令清矣然風俗未和隂陽未調災害數見意者大本有不立與何徳化休證不應之乆也旤福不虗必有因而至者焉宜深迹其道而務修其本昔者帝堯南面而治先克明俊徳以親九族而化及萬國孝經曰天地之性人為貴人之行莫大於孝孝莫大於嚴父嚴父莫大于配天則周公其人也夫孝子善述人之志周公既成文武之業而制作禮樂修嚴父配天之事知文王不欲以子臨父故推而序之上極於后稷而配以天此聖人之徳亡以加於孝也髙皇帝聖徳受命有天下尊太上皇猶周文武之追王太王王季也此漢之始祖後嗣所宜尊奉以廣盛徳孝之至也書云正稽古建功立事可以永年傳於亡窮上納其言下詔復太上皇寢廟園平當傳西漢㑹要卷十三
