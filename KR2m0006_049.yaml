  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0006_WYG_049-1a, image: WYG0609/WYG0609-0309a.png}
body:
  text: 西漢㑹要卷四十九宋徐天麟撰民收四徙豪族髙帝罷平城使婁敬往結和親敬從匈奴來因言匈奴河南白羊樓煩王去長安迎者七百里輕騎一日一夕可至秦中新破少民地肥饒可益實夫諸侯初起時非齊諸田楚招屈景莫與今陛下雖都闗中實少人北近外寇東有六國彊族一日有變陛下亦未得安枕而臥也臣願陛下徙齊諸田楚昭屈景燕趙韓魏後及豪傑名家且實闗中無事可以備胡諸侯有變亦足率以東伐此彊本弱末之術也上曰善乃使劉敬徙所言闗中十餘萬口本傳髙祖九年十一月徙齊楚大族昭氏屈氏景氏懷氏田氏五姓闗中與利田宅本紀十一年令豐人徙闗中者皆復終身紀時太上皇思欲歸豐髙祖乃更築城寺市里如豐縣號曰新豐徙民以充實之漢興立都長安徙齊諸田楚昭屈景及諸功臣家於長陵後世世徙吏二千石髙訾富人家豪傑并兼之家於諸陵蓋以彊幹弱支非獨為奉山園也是故五方雜厝風俗不純其世家則好禮文富人商賈則為利豪傑則游俠通姦地理志孝武建元三年賜徙茂陵者戸錢二十萬田二頃紀主父偃說上曰天下豪傑兼并之家亂衆民皆可徙茂陵内實京師外銷姦猾上從之本傳元朔二年徙郡國豪傑及訾三百萬以上于茂陵太始元年徙郡國吏民豪傑于茂陵雲陵師古曰時未有雲陵當言雲陽孝昭始元三年募民徙雲陵賜錢田宅紀下同孝宣本始元年募郡國吏民訾百萬以上徙平陵紀二年以水衡錢為平陵民起田宅元康元年徙丞相列侯吏二千石訾百萬以上者杜陵孝元永光四年上為初陵詔勿置縣邑使天下安土樂業亡有動搖之心孝成鴻嘉二年徙郡國豪傑訾百萬以上五千户于昌陵永始元年罷昌陵及故陵勿徙民哀帝建平元年為初陵勿徙郡國民長陵車千秋施讐安陵袁盎籍孺馮唐閔孺陽陵周仁年田延茂陵張敞祖父董仲舒杜鄴祖父郭解杜周祖父原涉雲陵黄霸平陵鄭崇祖父朱雲平當祖父魏相何並祖父韋賢杜陵杜延年馮奉世尹翁歸王商張敞史丹韓延夀田何蕭望之黄霸韋𤣥成張安世昌陵辛慶忌班况奴婢髙祖令民得賣子食貨志五年詔曰民以飢餓自賣為人奴婢者皆免為庶人也本紀文帝務勸農桑帥以儉節未有并兼之害故不為民田及奴婢為限食貨志師丹疏賈誼曰今歲惡不入請賣爵子食貨志注云賣爵級又賣子也晁錯勸文帝募民徙塞下募民以丁奴婢贖罪及輸奴婢欲以拜爵者晁錯傳文帝時女子緹縈願沒入為官婢以贖父罪刑法志後四年免官奴婢為庶人本紀武帝建元元年赦吳楚七國帑輸在官者紀應劭曰吳楚七國反時其首事者妻子沒入為官奴婢武帝哀焉皆赦遣之也董仲舒說武帝曰宜去奴婢除專殺之威食貨志服䖍曰不得専殺奴婢也其後府庫並虚迺募民能入奴婢得㠯終身復為郎增秩同上及楊可告緡徧天下迺分遣御史廷尉正監分曹往往即治郡國緡錢得民財物以億計奴婢以千萬數其沒入奴婢分諸苑養狗馬禽獸及與諸官官益雜置多徙奴婢衆而下河漕度四百萬石及官自糴乃足同上杜延年坐官奴婢乏衣食免官元帝時貢禹言官奴婢十餘萬游戲亡事稅良民以給之宜免為庶人貢禹傳成帝永始四年詔曰公卿列侯親屬近臣多蓄奴婢被服綺縠其伸飭有司以漸禁之本紀哀帝即位詔曰諸侯王列侯公主吏二千石及豪富民多蓄奴婢田宅亡限其議限列有司條奏諸侯王奴婢二百人列侯公主百人闗内侯吏民三十人年六十以上十歲以下不在數中諸名田蓄奴婢過品者皆沒入縣官官奴婢年五十以上免為庶人本紀平帝元始三年王莽奏吏民奴婢田宅之品本紀雜錄文帝時賈誼上疏曰今民賣僮者為之繡衣絲履偏諸縁納之閑中是古天子后服所以廟而不宴者也而庶人得以衣婢妾天子之后以縁其領庶人㜸妾以縁其履此臣所謂舛也賈誼傳卓王孫僮客八百人程鄭亦數百人司馬相如傳蒼頭廬兒皆用致富非天意也鮑宣傳孟康曰黎民黔首黎黔皆黒也下民隂類故以黑為號漢名奴為蒼頭非純黒以别於良人也諸給殿中者所居為廬蒼頭侍從因呼為廬兒臣瓚曰漢儀注官奴給書計從侍中已下為蒼頭青幘家僮衛青傳臧獲婢妾司馬遷傳僮使王莽傳奴客尹翁歸傳僮騎張敞傳又何並傳作童騎傅婢王吉傳私奴以千數王商傳僮手指千指千則人百巴寡婦清傳白衣兩龔傳注白衣給官府趨走賤人父御婢夏侯嬰傳庸保雜作司馬相如傳騎奴何並傳治豪猾濟南瞷氏瞷音閑宗人三百餘家豪猾二千石莫能制於是景帝拜郅都為濟南守至則誅瞷氏首惡餘皆股栗居歲餘郡中不拾遺旁十餘郡守畏都如大府郅都傳義縱為河内都尉至則族滅其豪穰氏之屬河内道不拾遺義縱傳王温舒由廣平都尉遷河内太守素居廣平時皆知河内豪姦之家及往以九月至令郡具私馬五十匹為驛自河内至長安部吏如居廣平時方略捕郡中豪猾相連坐千餘家上書請大者至族小者乃死家盡沒入臧奏請不過二日得可事論報至流血十餘里河内皆怪其奏以為神速盡十二月郡中無犬吠之盗其頗不得失之旁郡追求㑹春温舒頓足嘆曰嗟乎令冬月益展一月足吾事矣王温舒傳趙廣漢守京兆尹新豐杜建為京兆掾建素豪俠賓客為姦利廣漢聞之先風告建不改於是收案致法中貴人豪長者為請無不至終無所聽宗族賓客謀欲簒取廣漢盡知其計議主名起居使使告曰若計如此且并滅家令數吏將建棄市莫敢近者京師稱之本傳廣漢遷潁川太守郡太守原褚宗族横恣賓客犯為盗賊前二千石莫能禽制廣漢既至數月誅原褚首惡郡中震栗先是潁川豪傑大姓相與為婚姻吏俗朋黨廣漢患之厲使其中可用者受記出有案問既得罪名行法罰之廣漢故漏泄其語令相怨咎又教吏為缿筩及得投書削其主名而託以為豪傑大姓子弟所言其後彊宗大族家家結為仇讎姦黨散落風俗大改吏民相告計廣漢得以為耳目盗賊以故不發發又輒得一切治理威名流聞本傳尹翁歸拜東海太守東海大豪郯許仲孫為姦猾亂吏治郡中苦之二千石欲捕者輒以力埶變詐自解終莫能制翁歸至論棄仲孫市一郡怖栗莫犯禁東海大治本傳王尊為安定太守出教告屬縣曰太守視事一月矣五官掾張輔懷虎狼之心貪汙不軌一郡之錢盡入輔家然適足以葬矣今將輔送獄直符史詣閤下從太守受其事丞戒之戒之相隨入獄及輔繫獄數日死盡得其狡猾不道百萬姦臧威震郡中盗賊分散入傍郡界本傳嚴延年為涿郡太守時郡比得不能太守涿人畢野白等由是廢亂大姓西髙氏東髙氏自郡吏以下皆畏避之莫敢與啎咸曰寧負二千石無負豪大家賓客放為盗賊發輒入髙氏吏不敢追浸浸日多道路張弓抜刃然後敢行其亂如此延年至遣掾蠡吾趙繡按髙氏得其死罪繡見延年新將心内懼即為兩劾欲先白其輕者觀延年意怒迺出其重劾延年已知其如此矣趙掾至果白其輕者延年索懐中得重劾即收送獄夜入晨將至市論殺之先所按者死吏皆股弁更遣吏分考兩髙窮竟其姦誅殺各數十人郡中震恐道不拾遺本傳永始元延間上怠於政貴戚驕恣紅陽長仲兄弟交通輕俠臧匿亡命而北地大豪浩商等報怨殺義渠長妻子六人往來長安中丞相御史遣掾求逐黨與詔書召捕久之迺得長安中姦猾浸多閭里少年羣輩殺吏受報仇相與探賕為彈得赤丸者斫武吏得黒者斫文吏白者主治喪城中薄暮塵起剽刼行者死傷横道枹鼓不絶尹賞以三輔髙第選守長安令得壹切便宜從事賞至修治長安獄穿地方深各數丈致令辟為郭以大石覆其口名為虎穴乃部户曹掾史與鄉吏亭長里正父老伍人雜舉長安中輕薄少年惡子無市籍商販作務而鮮衣凶服被鎧扞持刀兵者悉籍記之得記數百人賞一朝㑹長安吏車數百兩分行收捕皆劾以為通行飲食羣盗賞親閱見十置一其餘盡以次内虎穴中百人為輩覆以大石數日一發視皆相枕藉死使輿出瘞寺門桓東揭著其姓名百日後迺令死者家各自發取其尸親屬號哭道路皆歔欷長安中歌之曰安所求子死桓東少年場生時諒不謹枯骨後何葬賞所置皆其魁宿或故吏善家子失計隨輕黠願自改者財數十百人皆貰其罪詭令立功以自贖盡力有効者因親用之為爪牙追捕甚精甘耆姦惡甚於凡吏賞視事數月盗賊止郡國亡命散走各歸其處不敢闚長安江湖中多盗賊以賞為江夏太守捕格江賊及所誅吏民甚多坐殘賊免南山羣盗起以賞為右輔都尉遷執金吾督大姦猾三輔吏民甚畏之尹賞傳西漢㑹要卷四十九
