body:
  text: 西漢㑹要卷六十七宋徐天麟撰方域四黄河漢興三十有九年孝文時河決酸棗東潰金隄於是東郡大興卒塞之其後三十六歳孝武元光中河決於瓠子東南注鉅野通於淮泗上使汲黯鄭當時興人徒塞之輒復壊是時武安侯田蚡為丞相其奉邑食鄃鄃居河北河決而南則鄃無水災邑收入多蚡言於上曰江河之決皆天事未易以人力彊塞彊塞之未必應天而望氣用數者亦以為然是以乆不復塞也自河決瓠子後二十餘歳歳因以數不登而梁楚之地尤甚上既封禪巡祭山川其明年乾封少雨上乃使汲仁郭昌發卒數萬人塞瓠子決河於是上以用事萬里沙則還自臨決河湛白馬玉璧令羣臣從官自將軍以下皆負薪寘決河是時東郡燒草以故薪柴少而下淇園之竹以為犍上既臨河決悼功之不成迺作歌曰瓠子決兮將柰何浩浩洋洋慮殫為河殫為河兮地不得寧功無已時兮吾山平於是卒塞瓠子築宫其上名曰宣防而道河北行二渠復禹舊迹而梁楚之地復寧無水災是時方事匃奴興功利言便宜者甚衆齊人延年上書言河出昆侖經中國注勃海是其地埶西北髙而東南下也可案圖書觀地形令水工凖髙下開大河上領出之胡中東注之海如此闗東長無水災北邊不憂匃奴可以省隄防備塞士卒轉輸胡冦侵盜覆軍殺將暴骨原野之患天下常備匃奴而不憂百越者以其水絶壤斷也此功一成萬世大利書奏上壯之報曰延年計議甚深然河迺大禹之所道也聖人作事為萬世功通於神明恐難改更自塞宣房後河復北決於館陶分為屯氏河東北經魏郡清河信都勃海入海廣深與大河等故因其自然不隄塞也此開通後館陶東北四五郡雖時小被水害而兖州以南六郡無水憂宣帝地節中光禄大夫郭昌使行河北曲三所水流之埶皆邪直貝丘縣恐水盛隄防不能禁迺各更穿渠直東經東郡界中不令北曲渠通利百姓安之元帝永光五年河決清河靈鳴犢口而屯氏河絶成帝初清河都尉馮逡奏言郡承河下流與兖州東郡分水為界城郭所居尤卑下土壤輕脆易傷頃所以濶無大害者以屯氏河通兩川分流也今屯氏河塞靈鳴犢口又益不利獨一川兼受數河之任雖髙増堤防終不能泄如有霖雨旬日不霽必盈溢靈鳴犢口在清河東界所在處下雖令通利猶不能為魏郡清河減損水害禹非不愛民力以地形有埶故穿九河今既滅難明屯氏河不流行七十餘年新絶未乆其處易浚又其口所居髙於以分流殺水力道里便宜可復浚以助大河泄暴水備非常又地節時郭昌穿直渠後三歳河水更從故第二曲間北可六里復南合今其曲埶復邪直貝丘百姓寒心宜復穿渠東行不豫修治北決病四五郡南決病十餘郡然後憂之晚矣事下丞相御史白博士許商治尙書善為算能度功用遣行視以為屯氏河盈溢所為方用度不足可且勿浚三歳河果決於館陶及東郡金隄泛濫兖豫入平原千乘濟南凡灌四郡三十二縣水居地十五萬餘頃深者三丈壤敗官亭室廬且四萬所御史大夫尹忠對方畧疏濶上切責之忠自殺遣大司農非調大司農名非調也調均錢穀河決所灌之郡謁者二人發河南以東漕船五百㮴徙民避水居丘陵九萬七千餘口河隄使者王延世使塞以竹落長四丈大九圍盛以小石兩船夾載而下之三十六日河隄成上曰東郡河決流漂二州校尉延世隄防三旬立塞其以五年為河平元年卒治河者為著外繇六月惟延世長於計䇿功費約省用力日寡朕甚嘉之其以延世為光禄大夫秩中二千石賜爵闗内侯黄金百斤後二歳河復決平原流入濟南千乘所壤敗者半建始時復遣王延世治之杜欽説大將軍王鳯以為前河決丞相史楊焉言延世受焉術以塞之蔽不肯見今獨任延世延世見前塞之易恐其慮害不深又審如焉言延世之巧反不如焉且水埶各異不博議利害而任一人如使不及今冬成來春桃花水盛必羨溢有塡淤反壌之害如此數郡種不得下民人流散盜賊將生雖重誅延世無益於事宜遣焉及將作大匠許商諫大夫乘馬延年雜作延世與焉必相破壊深論便以相難極商延年皆明計算能商功利足以分别是非擇其善者而從之必有成功鳯如欽言白遣焉等作治六月迺成復賜延世黄金百斤治河卒非受平賈者為著外繇六月後九歳鴻嘉四年楊焉言從河上下患底柱隘可鐫廣之上從其言使焉鐫之鐫之裁没水中不能去而令水益湍怒為害甚於故是歳渤海清河信都河水湓溢灌縣邑三十一敗官亭民舎四萬餘所河隄都尉許商與丞相史孫禁共行視圖方畧禁以為今河溢之害數倍於前決平原時今可決平原金隄間開通大河令入故篤馬河至海五百餘里水道浚利又乾三郡水地得美田且二十餘萬頃足以償所開傷民田廬處又省吏卒治隄救水歳三萬人以上許商以為古説九河之名有徒駭胡蘇鬲津今見在成平東光鬲界中自鬲以北至徒駭間相去三百餘里今河雖數移徙不離此域孫禁所欲開者在九河南篤馬河失水之迹處埶平夷旱則淤絶水則為敗不可許公卿皆從商言先是谷永以為河中國之經瀆聖王興則出圖書王道廢則竭絶今潰溢横流漂没陵阜異之大者也修政以應之災變自除是時李尋解光亦言隂氣盛則水為之長故一日之間晝減夜増江河滿溢所謂水不潤下雖常於卑下之地猶日月變見於朔望明天道有因而作也衆庶見王延世䝉重賞競言便巧不可用議者常欲求索九河故迹而穿之今因其自決可且勿塞以觀水埶河欲居之當稍自成川跳出沙土然後順天心而圖之必有成功而用財力寡於是遂止不塞滿昌師丹等數言百姓可哀上數遣使者處業振贍之哀帝初平當使領河隄奏言九河今皆窴滅按經義治水有決河深川而無隄防雍塞之文河從魏郡以東北多溢決水迹難以分明四海之衆不可誣宜博求能浚川疏河者下丞相孔光大司空何武奏請部刺史三輔三河𢎞農太守舉吏民能者莫有應書待詔賈讓奏言治河有上中下策古者立國居民疆理土地必遺川澤之分度水埶所不及大川無防小水得入陂障卑下為汗澤使秋水多得以有所休息左右游波寛緩而不迫夫土之有川猶人之有口也治土而防其川猶止兒啼而塞其口豈不遽止然其死可立而待也故曰善為川者決之使道善為民者宣之使言蓋隄防之作近起戰國雍防百川各以自利齊與趙魏以河為竟趙魏瀕山齊地卑下作隄去河二十五里河水東抵齊隄則西泛趙魏趙魏亦為隄去河二十五里雖非其正水尚有所遊盪時至而去則塡淤肥美民耕田之或乆無害稍築室宅遂成聚落大水時至漂没則更起隄防以自救稍去其城郭排水澤而居之湛溺自其宜也今隄防陿者去水數百步逺者數里近黎陽南故大金隄從河西西北行至西山南頭迺折東與東山相屬民居金隄東為廬舎住十餘歳更起隄從東山南頭直南與故大隄㑹又内黄界中有澤方數十里環之有隄住十餘歳太守以賦民民今起廬舎其中此臣親所見者也東郡白馬故大隄亦復數重民皆居其間從黎陽北盡魏界故大隄去河逺者數十里内亦數重此皆前世所排也河從河内北至黎陽觀石隄激使東抵東郡平剛又為石隄使西北抵黎陽觀下又為石隄使東北抵東郡津北又為石隄使西北抵魏郡昭陽又為石隄激使東北百餘里間河再西三東迫阸如此不得安息今行上策徙冀州之民當水衝者決黎陽遮害亭放河使北入海河西薄大山東薄金隄埶不能逺泛濫朞月自定難者將曰若如此敗壞城郭田廬冢墓以萬數百姓怨恨昔大禹治水山陵當路者毁之故鑿龍門辟伊闕折底柱破碣石墮斷天地之性此迺人功所造何足言也今瀕河十郡治隄歳費且萬萬及其大決所殘無數如出數年治河之費以業所徙之民遵古聖之法定山川之位使神人各處其所而不相奸且以大漢方制萬里豈其與水爭咫尺之地哉此功一立河定民安千載無患故謂之上策若乃多穿漕渠於冀州地使民得以溉田分殺水怒雖非聖人法然亦救敗術也難者將曰河水髙於平田歳増隄防猶尚決溢不可以開渠臣竊按視遮害亭西十八里至淇水口迺有金隄髙一丈自是東地稍下隄稍髙至遮害亭髙四五丈往五六歳河水大盛増丈七尺壞黎陽南郭門入至隄下水未踰隄二尺所從隄上北望河髙出民屋百姓皆走山水留十三日隄潰二所吏民塞之臣循隄上行視水埶南七十餘里至淇口水適至隄半計出地上五尺所今可從淇口以東為石隄多張水門初元中遮害亭下河去隄足數十步至今四十餘歳適至隄足由是言之其地堅矣恐議者疑河大川難禁制滎陽漕渠足以卜之其水門但用木與土耳今據堅地作石隄埶必全安冀州渠首盡當卭此水門治渠非穿地也但為東方一隄北行三百餘里入漳水中其西因山足髙地諸渠皆徃徃股引取之旱則開東方下水門溉冀州水則開西方髙門分河流通渠有三利不通有三害民常罷於救水半失作業水行地上湊潤上徹民則病溼氣木皆立枯鹵不生穀決溢有敗為魚鼈食此三害也若有渠溉則鹽鹵下隰填淤加肥故種禾麥更為秔稻髙田五倍下田十倍轉漕舟船之便此三利也今瀕河隄吏卒郡數千人伐買薪石之費歳數千萬足以通渠成水門又民利其溉灌相率治渠雖勞不罷民田適治河隄亦成此誠富國安民興利除害支數百歳故謂之中策若迺繕全故隄増卑倍薄勞費無已數逢其害此最下策也王莽時召能治河者以百數但崇空語無施行者溝洫志西漢㑹要卷六十七
