body:
  text: 西漢會要卷十一宋徐天麟撰禮五吉禮祖宗配侑孝文十六年起渭陽五帝廟祭泰一地祗以太祖髙皇帝配郊祀志王莾疏孝武元鼎五年立泰一祠於甘泉亦以髙祖配同上元封四年祠泰一五帝於明堂上坐合髙皇帝祠坐對之服虔曰時未以髙祖配天故言對劉攽曰按王莾疏文帝已用髙祖配矣何謂未乎孝平元始四年郊祀髙祖以配天宗祀孝文以配上帝本紀元始五年安漢公莽奏以正月上辛若丁天子親合祀天墬于南郊以髙帝髙后配以日冬至使有司奉祀南郊髙帝配日夏至使有司奉祭北郊髙后配郊祀志總天神髙帝初或言周興而邑立后稷之祠至今血食天下於是髙祖制詔御史其令天下立靈星祠張晏曰龍星左角曰天田則農祥也晨見而祭之常以嵗時祠以牛郊祀志徐天麟按後漢志云言祠后稷而謂之靈星者以后稷又配食星也孝武作泰一祠壇祭日以牛祭月以羊彘特朝朝日夕夕月則揖而見泰一郊祀志元封三年夏旱其令天下尊祠靈星焉郊祀志孝宣又立嵗星辰星太白熒惑南斗祠於長安城旁成山祠日萊山祠月又祠四時於琅邪蚩尤於夀良郊祀志平帝元始五年王莾已奏復長安南北郊又言書曰類於上帝禋於六宗歐陽大小夏矦三家説六宗皆曰上不及天下不及墬旁不及四方在六者之間助隂陽變化實一而名六名實不相應禮記祀典功施於民則祀之天文日月星辰所昭仰也地理山川海澤所生殖也易有八卦乾坤六子水火不相逮雷風不相悖山澤通氣然後能變化既成萬物也臣前奏徙甘泉泰畤汾隂后土皆復于南北郊謹按周官兆五帝于四郊山川各因其方今五帝兆居在雍五畤不合於古又日月雷風山澤易卦六子之尊氣所謂六宗也星辰水火溝瀆皆六宗之屬也今或未特祀或無兆居謹與太師光大司徒宫羲和歆等八十九人議皆曰天子父事天母事地今稱天神曰皇天上帝泰一兆曰泰畤而稱墬祇曰后土與中央黃靈同又兆北郊未有尊稱宜令墬祗稱皇墬后祗兆曰廣畤易曰方以類聚物以羣分分羣神以類相從為五部兆天墬之别神中央帝黃靈后土畤及日廟北辰北斗填星中宿中宫于長安城之未墬兆東方帝太昊青靈勾芒畤及雷公風伯廟嵗星東宿東宫于東郊兆南方炎帝赤靈祝融畤及熒惑星南宿南宫于南郊兆西方帝少皥白靈蓐收畤及太白星西宿西宫于西郊兆北方帝顓頊黑靈玄冥畤及月廟雨師廟辰星北宿北宫于北郊兆奏可於是長安旁諸廟兆畤甚盛矣郊祀志山川始名山大川在諸矦諸矦祝各自奉祠天子官不領及齊淮南國廢令太祝盡以嵗時致禮如故郊祀志孝文十二年詔河湫漢水玉各加二同上十五年修名山大川嘗祀而絶者有司以嵗時致禮本紀孝武建元元年詔曰河海潤千里其令祠官修山川之祠為嵗事曲加禮本紀元封元年上登封泰山用事八神八神者一曰天主祠天齊天齊淵水居臨災南郊山下下者二曰地主祠泰山梁父蓋天好隂祠之必于髙山之下畤命曰畤地貴陽祭之必於澤中圜丘云三曰兵主祠蚩尤蚩尤在東平陸監鄉齊之西竟也四曰隂主祠三山五曰陽主祠之罘山六曰月主祠之萊山皆在齊北並勃海七曰日主祠盛山盛山斗入海最居齊東北陽以迎日出云八曰四時主祠琅邪琅邪在齊東北蓋嵗之所始郊祀志孝宣神爵元年制詔大常夫江海百川之大者也今闕焉無祠其令祠官以禮為嵗事以四時祠江海額水祈為天下豐年焉自是五嶽四瀆皆有常禮東嶽太山於博中嶽泰室於嵩髙南嶽灊山於灊西嶽華山於華陰北嶽常山於上曲陽河於臨晉江於江都淮於平氏濟於臨邑界中皆使者持節侍祠唯泰山與河嵗五祠江水四餘皆一禱而三祠云又祠太室山於即墨三户山於下密祠天封苑火井於鴻門又立嵗星辰星太白熒惑南斗祠於長安城旁又祠叄山八神於曲城蓬山石社石鼓於臨胊之罘山於腄成山於不夜萊山於黃成山祠日萊山祠月郊祀志髙禖武帝年二十九乃得太子甚喜為立禖使東方朔枚臯為禖祝武五子傳臘蠟髙祖十年有司請令縣官常以春二月及臘祠稷以羊彘志漢舊儀云十二月嵗事臘以亥日祠皆太牢孝武太初二年祠門户比臘本紀師古曰冬至後臘祭百神嚴延年毋欲從延年臘本傳注云建丑之月為臘祭因會飲若今之蠟節也藉田親蠶文帝二年正月丁亥詔曰夫農天下之本也其開藉田朕親率耕以給宗廟粢盛本紀應邵曰古者天子耕藉田千畝藉者帝王典藉之常也臣瓉曰藉謂蹈藉也文帝即位賈誼説上曰漢之為漢幾四十年矣公私之積猶可哀痛今驅民而歸之農皆著於本使天下各食其力末技遊食之民轉而緣南畝則災積足而民樂其所矣於是上感誼言始開藉田躬耕以勸百姓食貨志十三年春二月甲寅詔曰朕親率天下農耕以供粢盛皇后親桑以奉祭服其具禮儀本紀景帝後二年夏四月詔曰雕文刻鏤傷農事者也錦繡纂組害女紅者也農事傷則飢之本也女紅害則寒之原也夫飢寒並至而能亡為非者寡矣朕親耕后親桑以奉宗廟粢盛祭服為天下先欲天下務農蠶素有蓄積以偹災害本紀武帝制曰朕親耕藉田以為農先董仲舒傳征和四年三月上耕于巨定本紀應邵曰應國縣也昭帝始元元年二月己亥上耕于鈎盾弄田應邵曰時帝年九嵗未能親耕帝藉鈎盾官者近著故往試耕為戲弄也臣瓉曰西京故事弄田在未央宫中師古曰弄田謂遊宴之田天子所戲弄耳非為昭帝年幼創有此名六年春正月上耕于上林並本紀雜録大司農屬官有藉田令丞百官表繭館元后傳漢宫闕疏云上林苑有繭館蓋蠶繭之所也成帝建始四年谷永對曰皇后桑蠶以治祭服共事天地宗廟正以是日疾風自西北大寒雨雪壞敗其功以章不鄉讀曰嚮宜齊戒避寢以深自責五行志社稷髙祖初起禱豐枌榆社天下已定詔御史令豐治枌榆社常以時春以羊彘祠之郊祀志漢二年令民除秦社稷立漢社稷紀又郊祀志云令縣為公社十年春有司請令縣常以春二月及臘祠稷以羊彘民里社各自裁以祠制曰可郊祀志武帝立子閎為齊王策曰受茲青社立子且為燕王策曰受茲元社立子胥為廣陵王策曰受茲赤社禇先生曰諸矦王始封者必受土於天子之社歸立之以為國社以嵗時祠之春秋大傳曰天子之國有泰社東方青南方赤西方白北方黑上方黃故將封於東方者取青土封於南方者取赤土封於西方者取白土封於北方者取黑土封於上方者取黃土各取其色物裹以白茅封以為社此始受封於天子者也此之為主土主土者立社而奉之也史記三王世家平帝元始三年王莾言帝王建立社稷社者土也宗廟王者所居稷者百榖之主所以奉宗廟共粢盛人所食以生活也王者莫不尊重親郊自為之主禮如宗廟詩曰乃立冢土又曰以御田祖以祈甘雨禮記曰維祭宗廟社稷為越紼而行事聖漢興禮儀稍定已有官社未立官稷臣瓉曰髙帝除秦社稷立漢社稷禮所謂大社也時立官又社以夏禹所謂王社也見漢祀令而未立官稷至此始立之世也祖中興不立官稷相承至今遂於官社後立官稷以夏禹配食官社后稷配食官稷稷種榖樹徐州牧嵗貢五色土各一斗郊祀志又按平紀師古曰初立官稷於官社之後是為一處今更創置建於别所不相從也雜録欒布為燕相燕齊之齊皆為立社號曰欒公社本傳昌邑有枯社木卧復生眭𢎞傳師古曰社木社主之木也建昭五年兖州刺史浩賞禁民私所自立社山陽槖茅鄉社有大槐吏伐斷之其夜槐復立其故處五行志明堂文帝時賈山言願以夏嵗二月定明堂本傳武帝建元元年議立明堂遣使者安車蒲輪束帛加璧迎魯申公上鄉儒術招賢良趙綰王臧等以文學為公卿欲議古立明堂城南以朝諸侯事未就竇太后不好儒術使人微伺趙綰等姦利按綰臧綰臧自殺諸所興為皆廢以本紀及郊祀志修趙綰王臧請立明堂以朝諸侯不能就其事乃言師申公於是上使使束帛加璧安車以蒲裏輪駕駟迎申公弟子二人乘軺傳從至舍魯邸議明堂事大喜竇太后喜老子言不説儒術得綰臧之過以責上上因廢明堂事申公傳元封元年登封泰山降坐明堂本紀臣瓉曰泰山東北址古時有明堂處則此所坐者也明年乃作明堂耳元封二年作明堂于泰山下初太子封泰山泰山東北址古時有明堂處處險不敞上欲治明堂奉髙旁未曉其制度濟南人公玉帶上黃帝時明堂圖明堂中有一殿四面無壁以茅蓋通水水圜宫垣為復道上有樓從西南入名曰昆侖天子從之入以拜祀上帝焉於是上令奉髙作明堂汶上如帶圖及是嵗修封則祠泰一五帝於明堂上坐合髙皇帝祠坐對之祠后土於下房以二十太牢天子從昆侖道入始拜明堂如郊禮畢尞堂下而上以本紀及郊祀志修太初元年行幸泰山以十一月甲子朔旦冬至日祀上帝於明堂後每修封其贊饗曰天增授皇帝泰元神策周而復始皇帝敬拜泰一郊祀志天漢三年三月行幸泰山祀明堂因受計還本紀太始四年三月行幸泰山壬午祀髙帝于明堂以配上帝因受計癸未祀孝景皇帝于明堂本紀平帝元始四年正月宗祀孝文以配上帝二月王莾奏立明堂本紀應劭曰明堂所以正四時出教化明堂上圜下方八窗四達布政之宫在國之陽上八窗法八風四達法四時九室法九州十二重法十二月三十六户法三十六風七十二牖法七十二雨孝經曰宗祀文王於明堂以配上帝上帝謂五時帝太昊之屬黃帝曰合宫有虞曰總章商曰陽館周曰明堂五年正月祫祭明堂諸矦王二十八人列矦百二十人宗室子九百餘人召助祭禮畢皆益户賜爵及金帛增秩補吏各有差羲和劉歆等四人使治明堂辟雍令漢與文王靈臺周公作洛同符皆封為列矦本紀按功臣表平晏劉歆孔永孫遷使治明堂辟雍得萬國歡心矦各千户西漢會要卷十一
