body:
  text: 西漢會要卷六十三宋徐天麟撰刑法三大赦髙帝二年正月赦罪人本紀下同六月立太子赦罪人五年正月兵事畢赦天下殊死以下六月都長安大赦天下六年以豪傑未習法令故犯法其赦天下九年正月丙寅前有罪殊死以下皆赦之十一年正月立代王大赦天下七月征英布赦天下死罪以下令從軍十二年帝崩發喪大赦天下右高帝在位十二年凡九赦惠帝四年皇帝冠赦天下右惠帝在位七年惟此一赦呂太后臨朝稱制大赦天下六年赦天下八年遺詔大赦天下右呂后臨朝八年凡三赦文帝初即位赦天下七年赦天下十五年郊見五帝赦天下後四年日食赦天下右文帝在位二十三年凡四赦景帝元年赦天下四年赦天下中元年赦天下五年赦天下後元年赦天下右景帝在位十六年凡五赦武帝建元元年赦天下元光元年赦天下四年地震赦天下元朔元年赦天下與民更始三年赦天下六年赦天下元狩元年赦天下三年赦天下元鼎元年赦天下五年赦天下元封二年甘泉産芝赦天下五年修封禪赦天下天漢元年赦天下三年修封禪赦天下太始元年赦天下四年修封還赦天下征和三年赦天下後元元年郊泰畤赦天下右武帝在位五十五年凡十八赦昭帝始即位赦天下始元元年赦天下四年立皇后赦天下元鳯元年赦天下二年赦天下四年赦天下六年赦天下右昭帝在位十三年凡七赦宣帝即位大赦天下本始元年鳯凰集赦天下四年立皇后赦天下地節二年鳯凰集赦天下三年立皇太子赦天下元康二年赦天下與士大夫厲精更始神爵二年鳯凰甘露降集赦天下四年嘉瑞並見赦天下五鳯三年屢蒙嘉瑞赦殊死以下甘露二年赦天下右宣帝在位二十五年凡十赦元帝初元元年大赦天下二年地動赦天下三年白鶴館災赦天下永光元年赦天下二年二月大赦天下六月赦天下四年赦天下建昭二年赦天下四年斬郅支赦天下五年赦天下右元帝在位十五年凡十赦成帝即位大赦天下建始元年火災大赦天下河平元年赦天下陽朔二年大赦天下四年赦天下鴻嘉三年赦天下永始四年郊泰畤大赦天下元延元年赦天下綏和元年大赦天下右成帝在位二十六年凡九赦哀帝即位大赦天下建平元年赦天下二年六月改元大赦天下元壽元年大赦天下右哀帝在位六年凡四赦平帝即位大赦天下元始元年日食大赦天下三年立皇后大赦天下五年帝崩大赦天下右平帝在位五年凡四赦赦徒文帝二年民謫作縣官及貸種食未入入未備者皆赦之景帝中四年赦徒作陽陵者死罪欲腐者許之武帝元封元年封泰山赦所過徒宣帝元康元年鳯凰集赦天下徒五鳯元年赦徒作杜陵者元帝初元四年祠后土赦汾陽徒永光元年幸甘泉赦雲陽徒成帝建始二年祀南郊赦奉郡縣及中都官耐罪徒三年赦天下徒四年單于朝赦天下徒陽朔元年赦天下徒鴻嘉元年幸初陵赦作徒哀帝建平二年赦天下徒平帝元始元年赦天下徒二年赦天下徒别赦漢五年遣使者赦田橫八年吏有罪未發覺者赦之十年太上皇崩葬萬年赦櫟陽囚死罪以下瓉曰萬年陵有櫟陽縣界十二年繫盧綰與綰居來歸者赦之惠帝六年八月赦降司馬氏大事記文帝三年七月詔濟北吏民兵未至先自定及以軍城邑降者皆赦之復官爵與王興居去來者亦赦之八月赦諸與興居反者景帝三年赦襄平侯及妻子當坐者六月詔吳王濞已滅吏民當坐濞等及逋逃亡軍者皆赦之武帝建元元年赦吳楚七國帑輸在官者六年赦鴈門代郡軍吏不循法者元封四年祭后土赦汾隂夏陽中都死以下益州昆明反赦京師亡命令從軍太初二年用事介山祭后土赦汾隂安邑殊死以下昭帝元鳯元年赦燕王太子建公主子文信及宗室子與燕王上官桀等謀反父母同産當坐者皆免為庶人其吏為桀等所詿誤未發覺在吏者除其罪宣帝地節四年諸為霍氏所詿誤未發覺者皆赦之元康二年諸觸諱在令前者赦之並本紀赦宥雜録元帝時匡衡上疏曰陛下躬聖德開太平之路閔愚吏民觸法抵禁比年大赦使百姓得改行自新天下幸甚臣竊見大赦之後姦邪不為衰止今日大赦明日犯法相隨入獄此殆導之未得其務也蓋保民者陳之以德義示之以好惡觀其失而制其宜故動之而和綏之而安今天下俗貪財賤義好聲色上侈靡亷恥之節薄淫僻之意縱綱紀失序疏者踰內親戚之恩薄婚姻之黨隆茍合僥幸以身設利不改其原雖嵗赦之刑猶難使錯而不用也本傳成帝初即位王尊劾奏丞相衡御史大夫談知中書謁者令顯等專權擅藝皆不道在赦令前赦後衡談舉奏顯云云天子下御史問狀劾奏尊妄詆欺非謗赦前事有詔左遷王尊傳哀帝即位令有司無得舉赦前往事紀平帝即位詔曰夫赦令者將與天下更始誠欲令百姓改行潔己全其性命也往者有司多舉奏赦前事纍增罪過誅陷亡辜殆非重信慎刑灑心自新之意也自今以來有司無得陳赦前事置奏上有不如詔書為虧恩以不道論定著令布告天下使明知之紀獄中都官獄宣紀臣天麟按後漢百官志云孝武以下置中都官獄二十六所各令長名廷尉詔獄周勃詣廷尉詔獄上林詔獄成紀罷上林詔獄師古曰漢舊儀云上林詔獄主治苑中禽獸宫館事郡邸獄宣紀曾孫坐收郡邸獄注云漢舊儀郡邸獄治天下郡國上計者掖庭祕獄劉輔繫掖庭祕獄三輔黃圖云武帝改永巷為掖庭置獄焉共工獄劉輔傳徒繫共工獄注考工也若盧詔獄王商詣若盧詔獄都船獄王嘉致都船獄都司空獄竇嬰劾繫都司空獄又伍被傳為左右都司空詔獄書居室灌夫傳劾夫繫居室注云後改為保宮保宮李陵母繫保宮內官東方朔傳昭平君獄繫內官請室爰盎傳絳候反繫請室注獄也導官張湯傳廷尉謁君弟繫導官暴室宣紀注云暴室宫人獄水司空伍被傳注云上林有水司空主囚徒官斷獄數文帝即位刑罰大省斷獄數百有刑錯之風志武帝時天下斷獄萬數賈捐之傳又食貨志云斷獄嵗以萬千數元康中魏相上書案今年計子弟殺父兄妻殺夫者凡二百二十二人傳自昭宣元成哀平六世之間斷獄殊死率嵗千餘口而一人耐罪上至右止三倍有餘志西漢會要卷六十三
