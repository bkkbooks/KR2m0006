body:
  text: 西漢㑹要卷二十三宋徐天麟撰輿服上天子車旗皇后子附王車黃屋左纛髙紀李斐曰天子車以黃繒為蓋裏纛毛羽幢也在乘與車衡左方上注之蔡雍曰以犛牛尾為之如斗或在騑頭或在衡文帝初立奉天子法駕迎代邸本紀案三輔黃圖云天子出車駕次第謂之鹵簿有大駕有法駕有小駕大駕則公卿奉引大將軍參乘太僕御屬車八十一乘作三行尚書御史乘之最後一乘垂豹尾豹尾以前皆為省中備千乘萬騎出長安出祠天於甘泉備之百官有其儀注名曰甘泉鹵簿法駕京兆尹奉引侍中參乘奉車郎御屬車三十六乘宣帝初立太僕以軨獵車奉迎曽孫宣紀文穎曰軨獵小車前有曲輿不衣也李竒曰蘭輿輕車也師古曰耳時未備天子車駕故且取其輕便乘輿副車霍光傳輜車張良傳上雖疾彊載輜車卧而護之鸞旗在前屬車在後賈捐之傳師古曰鸞旗編以羽毛列繫幢旁載於車上大駕出則陳於道而先行屬車間豹尾中楊雄傳服䖍曰大駕屬車八十一乘作三行尚書御史乘之最後一乘垂豹尾豹尾以前皆為省中屬車之清塵應劭曰古者諸矦二車九乘秦滅九國兼其車服漢依秦制故大駕屬車八十一乘師古曰屬者言相連續而不絶也塵謂行而起塵也言清者尊貴之意也見司馬相如傳甘泉法從楊雄傳注云從法駕也翠鳯之駕揚雄傳師古曰天子乘車為鳯形而飾以翠羽也千乘霆亂萬騎屈橋揚雄傳乘鏤象六玉蚪張揖曰鏤象象路也以象牙疏鏤其車駱六玉蚪謂駕六馬以玉飾其鑣勒有似玉蚪龍子有角曰蚪拖霓旌析羽毛染以五采綴以縷為旌有似虹霓之氣也靡雲旌畫熊虎為旒於旗似雲氣前皮軒後道游皮軒之上以赤皮為重蓋天子將出道車五乘游車九乘言皮軒最居前而道游次皮軒之後司馬相如傳乘輿乃登夫鳯凰兮翳華芝師古曰鳯凰者車以鳯凰為飾也翳蔽者以華芝為蔽也駟蒼螭兮六素蚪四六駕數也螭似龍一名螻流星旄以電燭兮咸翠蓋而鸞旗屯萬騎於中營兮方玉車之千乘揚雄傳方並也張耀日之𤣥旄揚左纛被雲梢梢與旓同奮電鞭驂雷輜鳴洪鐘建五旗揚雄傳漢舊儀云皇帝車駕建五旗蓋謂五色之旗也以木牛承旗下取其負重致逺建九旒六白虎載靈輿立厯天之旗曵捎星之旃同上舉洪頥植靈旗同上洪頥旗名也建翠華之旗司馬相如傳師古曰以翠羽為旗上葆也羽葆韓延夀傳皇太后御小馬車霍光傳張晏曰皇太后所駕逰宮中輦車也漢廄有果下馬髙三尺以駕輦師古曰小馬可於果林下乘之故號果下馬緑車金日磾傳晋灼曰漢注緑車名皇孫車太子有子乘以從太僕掌輿馬屬官有車府路軨騎馬駿馬四令丞伏􅌂曰主乘輿路車又主凡小車軨今之小馬曲輿也中太僕掌皇太后輿馬不常置並百官表髙宛制矦丙猜曽孫信坐出入屬車間免功臣表天子出入行陳列屬車而輒至其間先驅旄頭旌旗鼓車旄頭先驅燕王旦傳師古曰凡此皆天子之制又東方朔傳應劭云旄頭以羽林為之髮正向上而長衣繡衣在乘輿前先驅旄頭劍挺墮墜梁邱賀傳師古曰先驅導駕者若今之武矦隊矣先驅光祿大夫張猛薛廣德傳胡公漢官云車駕出有請室令在前先驅奉車奉車都尉掌御乘輿車駙馬都尉掌駙馬百官表夏矦嬰為太僕轉為滕令常奉車本傳霍光為奉車都尉出則奉車本傳杜延年久典朝政出即奉駕本傳散騎騎並乘輿車百官表師古曰騎而散從亡常職也應劭漢官曰前漢置散騎及中常侍各一人散騎並乘輿車獻可替否輦郎劉向傳十二為輦郎參乘陳平亡楚來降漢王使參乘紀師古曰乘車之法尊者居左御者居中又有一人處車之右以備傾側是以戎事則稱車右其餘則曰驂乘驂者三也蓋取三人為名義耳周緤以舍人從髙祖常為參乘傳文帝自代來令宋昌驂乘紀文帝朝東宫趙談驂乘爰盎伏車前曰臣聞天子所與共六尺輿者皆天下豪英今漢雖乏人獨奈何與刀鋸餘人共載於是上笑下趙談談泣下車盎傳張釋之為謁者僕射文帝召驂乘徐行問秦之敝具以質言傳衛綰為中郎將景帝幸上林詔中郎將驂乘還而問曰君知所以得驂乘乎綰曰不知也上問曰吾為太子時召君君不肯來何也綰傳師古曰言以此時識之宣帝始立謁見髙廟大將軍光驂乘上內嚴憚若有芒刺在背後車騎將軍張安世代光驂乘天子從容肆體甚安近焉及光身死而宗族竟誅故俗傳之曰霍氏之禍萌於驂乘傳金日磾遷侍中駙馬都尉光祿大夫出則驂乘傳警䟆出稱警入言䟆文三王傳師古曰警者戒肅也䟆止行人也言出入者互文耳出亦有䟆漢儀注皇帝輦動左右侍帷幄者稱警出殿則傳䟆止人清道也出稱䟆入言警韓安國傳師古曰䟆止行人也警令戒肅也天子出入皆備此儀而今云出稱䟆入言警者互舉之耳文帝拜張釋之為廷尉上行出中渭橋有一人從橋下走乘輿馬驚於是使騎捕之屬廷尉釋之治問曰縣人來聞蹕匿橋下久以為行過既出見車騎即走耳釋之奏當此人犯蹕當罰金上怒曰此人親驚吾馬馬賴和柔令它馬固不敗傷我乎而廷尉乃當之罰金釋之曰法者天子所與天下公共也今法如是更重之是法不信於民也且方其時上使使誅之則已今已下廷尉廷尉天下之平也一傾天下用法皆為之輕重民安所錯其手足唯陛下察之上良久曰廷尉當是也本傳廄馬太僕掌輿馬屬官有大廄未央家馬三令又車府路軨騎馬駿馬四令丞又龍馬間駒槖泉騊駼承華五監長丞百官表臣天麟按漢舊儀云天子六廄未央承華騊駼騎馬路軨大廄馬皆萬匹三輔黃圖都廄天子車馬所在中廄皇后車馬所在漢初天子不能具駟食貨志文帝二年詔太僕見馬遺財足餘皆以給傳置元帝初元元年詔太僕减榖食馬二年罷黃門乘輿狗馬五年詔乘輿秣馬毋乏正事而已成帝建始二年减乘輿廄馬傳本紀雜録文帝時有獻千里馬者詔曰鸞旗在前屬車在後吉行日五十里師行三十里朕乘千里之馬獨先安之於是還馬與道里費而下詔曰朕不受獻也其令四方毋求獻賈捐之傳武帝元鼎四年馬生渥窪水中本紀李斐曰南陽新野有暴利長遭刑屯田敦煌界數於此水旁見羣野馬中有竒者與凡馬異來飲此水利長先作土人持勒靽於水旁後馬玩習久之代土人持勒靽收得其馬獻之欲神異此馬云從水中出作天馬之歌本紀後伐大宛得千里馬馬名蒲梢次作以為歌樂書金日磾輸黃門飬馬牽馬過殿下馬又肥好拜為馬監本傳上官桀遷未央廏令武帝嘗體不安及愈見馬馬多瘦上大怒令以我不復見馬邪欲下吏桀頓首曰臣聞聖體不安日夜憂懼誠不在馬言未卒泣數行下上以為忠外戚傳元帝時貢禹奏言髙祖孝文孝景皇帝循古節儉廄馬百餘匹方今廄馬食粟將萬匹今民大飢而廄馬食粟苦其大肥氣盛怒至乃日步作之願减損乘輿服御廄馬可亡過數十匹天子納善其忠乃下詔令太僕减食榖馬貢禹傳百官車漢初將相或乘牛車食貨志景帝中六年詔曰吏者民之師也車駕衣服宜稱令長吏二千石車朱兩轓千石至六百石朱左轓本紀臣天麟按後漢志云景帝詔六百石以上施車轓得銅五朱軛有吉陽筒中二千石以右騑二千石以上皂布蓋千石以上乘馬車赤畫杠其餘皆青云朱買臣為㑹稽太守長安廄吏乘駟馬車來迎本傳張晏曰故事大夫乘官車駕駟吳楚誅後諸矦貧者或乘牛車髙五王贊黃霸為頴川太守賜車蓋持髙一丈别駕主簿車緹油屏泥於軾前以章有德傳杜延年為御史大夫以老病乞骸骨天子優之賜安車駟馬罷就第本傳師古曰坐乘之車也臣天麟按後漢輿服志云公列矦安車朱班輪倚鹿較伏熊軾皂蓋倚鹿較者畫立鹿於車之前兩藩外也伏熊軾者車前橫軾為伏熊之形也薛廣德為御史大夫與丞相定國大司馬車騎將軍史髙俱乞骸骨皆賜安車駟馬廣德東歸沛以為榮垂其安車傳子孫本傳武帝使使安車以蒲裹輪駕駟迎申公申公傳師古曰以蒲裹輪取其安也田千秋為相年老上優之朝見得乘小車出入宫殿中故因號曰車丞相本傳武帝聞枚年老乃以安車蒲輪召乘傳平帝元始二年王莾奏車服制度紀雜録輜車張良傳師古曰衣車廣桞車季布傳置廣桞車中服䖍曰東郡謂廣轍車為廣桞車鄭氏曰作大桞衣車若周禮喪車也李竒曰廣桞大隆穹也晋灼曰周禮說衣翣桞桞聚也衆飾之所聚也此為載以喪車欲人不知也師古曰晋鄭二說是也隆穹所謂車軬者耳非此之謂也軺車百乘牛車千兩貨殖傳始元五年有一男子乘黃犢車建黃旐衣黃襜褕著黃冒詣北闕自謂衛太子雋不疑傳蔡義給事大將軍莫府家貧常步行資禮不逮衆門下好事者相合為義買犢車令乘之本傳東平王數私出入驅馳國中王尊為相召敕廄長大王當從官屬鳴和鸞乃出自今有令駕小車叩頭爭之王尊傳楊惲家方隆盛時乘朱輪者十人本傳韓延夀在東郡時試騎士治飾兵車畫龍虎朱爵延夀衣黃紈方領駕四馬傳總建幢棨植羽葆鼓車歌車功曹引車皆駕四馬載棨㦸五騎為伍分左右部軍假司馬千人持幢旁轂治飾車甲三百萬以上蕭望之劾延夀上僣不道本傳哀帝召龔勝為諌大夫勝薦龔舍寧夀矦嘉有詔皆召勝曰竊見國家聘醫巫常為駕騁賢者宜駕上曰大夫乘私車來邪勝曰唯唯有詔為駕韋元成以列矦侍祀孝惠廟當晨入天雨淖不駕駟馬車而騎至廟下有司劾奏等輩數人皆削爵為關內矦元成自傷貶黜父爵作詩自劾責曰惟我小子不肅㑹同媠彼車服黜此附庸四方羣后我監我視威儀車服惟肅是履本傳鮑宣為豫州牧行部乘傳去法駕駕一馬舍宿鄉亭為衆所非宣坐免鮑宣傳王氏一姓乘朱輪華轂者二十三人劉向傳王莾謁九廟大駕乘六馬以五采毛為龍文衣著角長三尺華蓋車元戎十乘在前王莽傳西漢㑹要卷二十三
