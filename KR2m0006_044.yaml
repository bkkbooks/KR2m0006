body:
  text: 西漢會要卷四十四宋徐天麟撰選舉上賢良方正孝文二年詔曰乃十一月晦日有食之二三執政舉賢良方正能直言極諌者以正朕之不逮本紀下同十五年詔諸侯王公卿郡守舉賢良能直言極諌者上親策之傳納以言孝武建元元年詔丞相御史列侯中二千石二千石諸侯相舉賢良方正直言極諌之士元光元年五月詔賢良曰賢良明於古今帝王之體受策察問咸以書對朕親覽焉於是董仲舒公孫𢎞等出焉五年復召賢良文學公孫𢎞傳孝昭始元元年閏月遣故廷尉持節行郡國舉賢良五年六月詔令三輔太常舉賢良各二人孝宣本始四年四月郡國地震詔令三輔太常內郡國舉賢良方正各一人地節三年詔令內郡國舉賢良方正可親民者十月詔曰乃者九月地震朕甚懼焉有能針朕過失及賢良方正直言極諫之士以正朕之不逮毋諱有司神爵四年四月令內郡國舉賢良可親民者各一人孝元初元二年三月詔曰乃二月戊午地震於隴西郡丞相御史中二千石舉茂材異等直言極諌之士永光二年三月日有食之詔令內郡國舉賢良方正各一人孝成建始二年二月詔三輔內郡舉賢良方正各一人建始三年十二月日蝕地震詔丞相御史與將軍列侯中二千石及內郡國舉賢良方正能直言極諫之士詣公車朕將覽焉上盡召直言之士詣白虎殿對策元延元年七月詔曰乃者日蝕星隕今孛星見東井公卿大夫博士議郎以經對與內郡國舉方正能直言極諫者各一人師古曰令公卿與內郡國共舉孝哀元夀元年正月日有蝕之詔公卿大夫其與將軍列侯中二千石舉賢良方正能直言者各一人雜録武帝初即位轅固復以賢良召固老罷歸之武帝即位招賢良文學之士是時公孫𢎞年六十以賢良召為博士使胸奴還報不合意上怒以為不能𢎞乃移病免歸元光五年復召賢良菑川國復推上𢎞𢎞謝曰前已嘗西用不能罷願更選國人固推𢎞𢎞至太常對策時對者百餘人太常奏𢎞第居下策奏天子擢𢎞對為第一本傳武帝舉方正賢良文學材力之士待以不次之位東方朔傳建元元年丞相綰奏所舉賢良或治申商韓非蘇秦張儀之言亂國政請皆罷奏可武帝紀孝元舉茂材富平侯張勃舉陳湯湯待遷父死不奔喪司𨽻奏湯亡循行勃選舉故不以實坐削户二百會薨因賜諡曰繆侯湯下獄論陳湯傳何武為京兆尹坐舉方正所舉者召見槃辟雅拜武坐左遷楚內史本傳博士弟子武帝元朔五年為博士官置弟子五十人復其身太常擇民年十八以上儀狀端正者補博士弟子郡國縣道邑有好文學敬長上肅政教順鄉里出入不悖所聞令相長丞上屬所二千石二千石謹察可者常與計偕詣太常得受業如弟子一歲皆輒課能通一蓻以上補文學掌故缺其髙弟可以為郎中太常籍奏即有秀才異等輒以名聞其不事學若下材及不能通一蓻輒罷之而請諸能稱者以治禮掌故以文學禮義為官遷留滯請選擇其秩比二百石以上及吏百石通一藝以上補左右內史大行卒史比百石已下補郡太守卒史皆各二人邊郡一人先用誦多者不足乃擇掌故補中二千石屬文學掌故補郡屬備員請著功令它如律令制曰可儒林傳張湯請博士弟子理尚書春秋補廷尉史平帝時王莽增元士之子得受業如弟子勿以為員歲課甲科四十人為郎中乙科二十人為太子舍人兩科四十人為文學掌故兒寬以郡國選詣博士受業孔安國文翁選郡縣小吏十餘人遣詣京師受業博士終軍選為博士弟子至府受遣蕭望之以令詣太常業唐生褚生應博士弟子選詣博士武帝時伏湛以父任為博士弟子山陽侯張當居坐為太常擇博士弟子故不以實為城旦試學童漢興蕭何草律曰大史試學童能諷書九千字以上乃得為史又以六體試之課最者以為尚書御史史書令史吏民上書字或不正輒舉劾蓻文志射策武帝立五經博士開弟子員設科射策勸以官祿儒林傳贊師古曰射䇿者謂為問難疑義書之於䇿量其大小置為甲乙之科列而置之不使彰顯有故射者隨其所取而釋之以知優劣射之言投射也何武王嘉馬宫翟方進皆以射策甲科為郎房鳯以射䇿乙科為太史掌故匡衡射策甲科以不應令除為太常掌故調補平原文學本傳兒寬詣博士受業以射策為掌故以功次補廷尉文學卒史各本傳明經龔遂以明經為官袁良舉明經為太子舍人孔安國貢禹夏侯勝張禹並以明經為博士眭𢎞翟方進以明經為議郎召信臣以明經甲科為郎明法鄭崇父賔以明律令為御史薛宣以明習文法詔補御史中丞治劇何並陳遵皆舉能治劇為令尹賞舉能治劇徙頻陽令原涉舉能治劇為谷口令異科元封五年名臣文武欲盡詔令州郡察吏民有茂材異等可為將相及使絶國者孝昭始元五年詔舉國文學髙第各一人元鳯元年賜郡國所選有行義者涿郡韓福等五人帛人五十匹遣歸孝宣本始元年地震詔內郡國舉文學髙第各一人地節三年詔令郡國舉孝弟有行義聞於鄉里者各一人元康元年詔博舉吏民厥身修正通文學明於先王之術宣究其意者各二人中二千石各一人元康四年詔遣大中大夫循行天下舉茂材異倫之士孝元初元三年詔丞相御史舉天下明陰陽灾異者各三人永光元年詔丞相御史舉質朴淳厚謙遜有行者建昭四年臨遣諌大夫博士循行天下舉茂材特立之士孝成河平四年三月日有蝕之遣光祿大夫博士行舉瀕河之郡舉淳厚有行能直言之士陽朔二年奉使者不稱詔丞相御史其與中二千石二千石雜舉可充博士位者使卓然可觀鴻嘉二年詔舉淳厚有行義能直言者冀聞切言嘉謀正朕之不逮永始二年正月日有蝕之臨遣大中大夫循行天下與部刺史舉淳朴辭遜有行義者各一人元延元年詔曰乃者日蝕星隕北邊二十二郡舉勇猛知兵法者各一人哀帝初平當奏宜博求能浚川疏河者下丞相孔光大司空何武奏請部刺史三輔三河𢎞農太守舉吏民能者莫有應書溝洫志建平元年詔曰其與大司馬列侯將軍中二千石州牧守相舉孝弟淳厚能直言通政事延于側陋可親民者各一人建平四年詔將軍中二千石舉明兵法有大慮者元夀元年下詔曰天下雖安忘戰必危將軍與中二千石舉明習兵法有大慮者各一人將軍二人詣公車息夫躬傳哀帝時有詔舉太常何武傳哀帝崩太后詔有司舉可為大司馬者何武傳孝平元始元年五月日有蝕之詔公卿將軍中二千石舉淳厚能直言者各一人元始二年秋舉勇武有節明兵法郡一人詣公車冬中二千石舉治獄平嵗一人元始五年召天下通知逸經古記天文厯算鐘律小學史篇方術本草及以五經論語孝經爾雅教授者在所為駕一封軺傳遣京師至者數千人並本紀聘召名士髙帝十一年二月詔曰賢士大夫有肯從我遊者吾能尊顯之其有意稱明德者必身勸為之駕遣詣相國府書行義年有而弗言覺免年老癃病勿遣本紀武帝即位枚乘年老乃以安車蒲輪召乘本傳建元元年遣使者束帛加璧安車以蒲裹輪駕駟召魯申公弟子二人乘軺傳從以紀傳修孝武元封五年召吏民有明當世之務習先聖之術者縣次續食令與計偕師古曰令所召之人與上計者偕來而縣次給之食元狩六年詔遣博士分循行天下舉獨行之君子召詣行在所士有特招使者之任也詳問隱處亡位者舉奏本紀夏侯勝善說禮服召為博士疏廣明春秋家居教授召為博士昭帝時涿郡韓福以德行召至京師賜策書束帛遣歸詔曰朕閔勞以官職之事其務修孝弟以教鄉里行道舍傳舍縣次具酒肉食從者及馬長吏以時存問常以嵗八月賜羊一頭酒二斛不幸死賜覆衾一祠以中牢兩龔傳翼奉元帝初即位諸儒薦之召待詔官者廬貢禹以明經潔行著聞召為博士曰陛下過意召臣臣賣田百畝以供車馬孝哀召龔勝為諌大夫勝薦龔舍寧夀侯嘉有詔皆召勝曰竊見國家聘醫巫常為駕聘賢者宜駕上曰大夫乘私車來耶勝曰唯唯有詔為駕孝平元始五年詔見上異科條西漢會要卷四十四
