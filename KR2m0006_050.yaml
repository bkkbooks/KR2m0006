body:
  text: 西漢會要卷五十宋徐天麟撰食貨一墾田數漢提封田一萬萬四千五百一十三萬六千四百五頃其一萬萬二百五十二萬八千八百八十九頃邑居道路山川林澤羣不可墾其三千二百二十九萬九百四十七頃可墾不墾定墾田八百二十七萬五百三十六頃漢極盛矣地理限民名田董仲舒説武帝曰秦用商鞅之法改帝王之制除井田民得賣買富者田連阡陌貧者亡立錐之地小民安得不困漢興循而未改古井田法雖難卒行宜少近古限民名田以淡不足師古曰名田占田也各為立限不使富者過制則貧弱之家可足也塞兼并之路然後可善治也食貨志元光中令賈人有市籍及家屬皆無得名田以便農敢犯令沒入田貨食貨志哀帝即位師丹建言古之聖王莫不設井田然後治乃可平文帝務勸農桑帥以節儉未有并兼之害故不為民田及奴婢為限今豪富吏民訾數巨萬而貧者俞困宜略為限天子下其議丞相孔光大司空何武奏請諸侯王列侯皆得名田國中列侯在長安公主名田縣道及關內侯吏民名田皆毋過三十頃賈人皆不得名田為吏犯者以律論名田過品皆沒入官時田宅奴婢賈為減賤丁傳用事董賢隆貴皆不便也詔書且須後遂寢不行食貨志代田武帝末年以趙過為搜粟都尉過能為代田一畝三甽嵗代處故曰代田古法也后稷始甽田以二耜為耦師古曰併兩耜而耕廣尺深尺曰甽長終畝一畝三甽一夫三百甽而播種於甽中苗生葉以上稍耨隴草因隤其土以附苗根故其詩曰或藝或芓黍稷擬擬藝除草也芓附根也言苗稍壯每耨輒附根比盛暑隴盡而根深能風與旱能讀曰耐故擬擬而盛也其耕耘下種田器皆有便巧率十二夫為田一井一屋故畝五頃鄧展曰九夫為井三夫為屋夫百畝於古為十二頃古者百步為畝漢二百四十步為畝古千二百畝則得今五頃用耦犁二牛三人一歲之收常過縵田畝一斛以上縵田謂不為甽者也善者倍之過使教田太常三輔太常主諸陵有民故亦有田種大農置工巧奴與從事為作田器二千石遣令長三老力田及里父老善田者受田器學耕種養苗狀民或苦少牛亡以趨澤故平都令光教過以人挽犁過奏光以為丞教民相與庸挽犁言換功共作也率多人者田日三十畝少者十三畝以故田多墾闢過試以離宮卒田其宮壖地課得穀皆多其旁田畝一斛以上令命家田三輔公田韋昭曰命家謂受爵命一爵為公士以上令得田公田優之也又教邊郡及居延城是後邊城河東𢎞農三輔太常民皆便代田用力少而得穀多食貨志假民公田省苑囿漢二年故秦苑囿園池令民得田之紀下同武帝建元元年罷苑馬以賜貧民師古曰養馬之苑禁百姓芻牧今罷之昭帝元鳳三年罷中牟苑賦貧民宣帝地節元年假郡國貧民田三年詔池籞未御幸者假與貧民又令流民還歸者假公田貸種食元帝初元元年以三輔太常郡國公田及苑可省者振業貧民江海陂湖園池屬少府者以假貧民勿租賦六月省苑馬以振困乏二年詔罷水衡禁囿宜春下苑少府佽飛外池嚴籞池田假與貧民永光元年令民各務農畝無田者假之哀帝建平元年太皇太后詔外家王氏田非冢塋皆以賦貧民勸農桑漢興諸侯並起民失作業而大飢饉凡米石五千人相食死者過半髙祖乃令民得賣子就食蜀漢天下既定輕田租什五而稅一量吏祿度官用以賦於民食貨志惠帝即位減田租復十五稅一鄧展曰漢初十五稅一中間廢今復之也見本紀四年舉民孝弟力田者復其身本紀髙后元年置孝弟力田二千石者一人本紀文帝時民近戰國背本趨末賈誼説上曰一夫不耕或受之飢今背本而趨末生之者甚少而靡之者甚多天下財産何得不蹶今驅民而歸之農皆著於本使天下各食其力末伎遊食之民轉而緣南畝則蓄積足而人樂其所矣上感誼言躬耕以勸百姓全文見食貨志二年正月詔曰夫農天下之本也其開籍田朕親率耕以給宗廟粢盛本紀九月詔曰農天下之本也民所恃以生也而民或不務本而事末故生不遂朕憂其然故今兹親率羣臣農以勸之其賜天下民今年田租之半本紀朝錯説上曰今海內為一而蓄積未及者何也地有遺利民有餘力生穀之土未盡墾遊食之民未盡歸農也今農夫五口之家其服役者不下二人其能耕者不過百畝百畝之收不過百石春耕夏耘秋穫冬藏伐新樵治官府給繇役春不得避風塵夏不得避暑熱秋不得避隂雨冬不得避寒凍四時之間亡日休息又私自送往迎來弔死問疾養孤長幼在其中勤苦如此尚復被水旱之災急政暴虐賦斂不時朝令而暮改當具有者半賈而賣亡者取倍稱之息於是有賣田宅鬻子孫以償責者矣而商賈大者積貯倍息小者坐列販賣操其竒贏日遊都市乘上之急所賣必倍故其男不耕耘女不蠶織衣必文采食必梁肉亡農夫之若有阡佰之得因其富厚交通王侯力過吏藝以利相傾千里遊敖冠蓋相望乘堅䇿肥履絲曵縞此商人所以兼并農人農人所以流亡者也今法律賤商人商人已冨貴矣尊農夫農夫已貧賤矣故俗之所貴主之所賤也吏之所卑法之所尊也上下相反好惡乖忤而欲國富法立不可得也方今之務莫若使民務農而已矣欲民務農在於貴粟貴粟之道在於使民以粟為賞罰今募天下入粟縣官得以拜爵得以除罪如此富人有爵農民有錢粟有所泄夫能入粟以受爵皆有餘者也取於有餘以供上用則貧民之賦可損所謂所有餘補不足令出而民利者也食貨志十二年詔曰道民之路在於務本朕親率天下農十年于今而野不加辟歲一不登民有飢色吾詔書數下歲勸民種植而功未興是吏奉吾詔不勤而勸民不明也其賜農民今年租稅之半又曰力田為生之本也其以户口率置孝弟力田常員令各率其意以道民焉本紀十三年二月詔曰朕親率天下農耕以供粢盛皇后親桑以奉祭服其具禮儀本紀六月詔曰農天下之本務莫大焉今厪身從事而有租稅之賦其於勸農之道未備其除田之租稅本紀景帝後二年四月詔曰雕文刻鏤傷農事者也錦繡纂組害女紅者也農事傷則飢之本也女紅害則寒之原也夫飢寒並至而能亡為非者寡矣朕親耕后親桑以奉宗廟粢盛祭服為天下先不受獻減大官省繇賦欲天下務農蠶素有蓄積以備災害本紀三年春詔曰農天下之本也黃金珠玉飢不可食寒不可衣以為幣用不識其終始間嵗或不登意為末者衆農民寡也其令郡國務勸農桑益種植可得衣食物本紀孝景婁敕有司以農為務食貨志武帝之初國家亡事非遇水旱則民人給家足都鄙廩庾盡滿太倉之粟陳陳相因充溢露積於外腐敗而不可食是後外事四夷內興功利役費並興而民去本董仲舒説上曰春秋他穀不書至於麥禾不成則書之令關中之俗不好種麥願詔大司農使關中民益種宿麥毋令後時食貨志親耕籍田以為農先董仲舒傳元狩三年遣謁者勸有水災郡種宿麥本紀征和四年上耕于巨定本紀仲舒又言古井田法雖難卒行宜少近古限民名田以淡不足塞并兼之路薄賦斂省繇便以寬民力然後可善治也帝末年悔征伐之事乃封丞相為富民侯下詔曰方今之務在於力農以趙過為搜粟都尉過能為代田用力少而得穀多食貨志昭帝始元年二月上耕于鈎盾弄田本紀六年正月耕于上林本紀元平元年詔曰天下以農桑為本日者省用罷不急官省外繇耕桑者益衆而百姓未能家給其減口賦錢本紀昭帝時流民稍還田野益闢頗有蓄積食貨志宣帝即位用吏多選賢良百姓安土歲數豐穰穀石至五錢農人少利大司農耿夀昌請置常平倉以穀賤時增其價而糴以利農穀貴時減賈而糴民便之食貨志蔡癸以好農使勸郡國至大官同上元帝建詔五年三月詔曰方春農桑與百姓戮力自盡之時也故是月勞農勸民無使後時今不良之吏覆按小罪逮召證案與不急之事以妨百姓使失一時之作忘歲終之功公卿其明察申敕之本紀成帝陽朔四年詔曰夫洪範八政以食為首斯誠家給刑錯之本也先帝劭農簿其租稅寵其強力令與孝弟同科間者民彌惰怠鄉本者少將何以矯之方東作時令其二千石勉勸農桑出入阡陌致勞來之本紀平帝元始元年置大司農部丞十三人部一州勸農桑本紀龔遂為渤海太守見齊俗奢侈好末伎不田作乃勸民務農桑令口種一本榆百本薤五十本蔥一畦韭家二母彘五雞使民賣劒買牛賣刀買犢郡中皆有蓄積吏民富實本傳召信臣等南陽躬勸耕農出入阡陌時行視郡中水泉開通溝瀆起水門提閼凡數十處灌溉至三萬頃為民作均水約束刻石立田畔郡中莫不耕稼力田户口增倍本傳西漢會要卷五十
