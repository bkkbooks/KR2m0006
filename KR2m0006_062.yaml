body:
  text: 西漢會要卷六十二宋徐天麟撰刑法二疑讞髙皇帝七年制詔御史獄之疑者吏或不能決有罪者久而不論無罪者久繫不決自今以來縣道官獄疑者各讞所屬二千石官二千石官以其罪名當報之所不能決者皆移廷尉廷尉亦當報之廷尉所不能具謹具為奏傳所當比律令以聞上恩如此吏猶不能奉宣故孝景中五年復下詔曰諸獄疑雖文致於法而於人心不厭者輒讞之其後獄吏復避微文遂其愚心至後元年又下詔曰獄重事也人有愚智官有上下獄疑者讞有令讞者已報讞而後不當讞者不為失自此之後獄刑益詳近於五聽三宥之意刑法志議貴髙帝七年令郎中有􅖄耐以上請之本紀孝惠初即位爵五大夫吏六百石以上及宦皇帝而知名者有􅖄當盜械者皆頌繫上造以上及內外公孫耳孫有􅖄當刑及當為城旦舂者皆耐為鬼薪白粲本紀孝文時賈誼上疏曰古者亷恥節禮以治君子故有賜死而無戮辱是以黥劓之罪不及大夫今自王侯三公之貴皆天子所改容而禮之也而今與衆庶同黥劓髠刖笞罵棄市之法被戮辱者不太迫乎夫嘗已在貴寵之位今而有過廢之可也退之可也賜之死可也滅之可也若夫束縳之係緤之輸之司寇編之徒官司寇小吏詈罵而榜笞之殆非所以令衆庶見也是時丞相周勃免就國人有告勃謀反逮繫長安獄治卒無事故誼以此譏上上深納其言養臣下有節是後大臣有罪皆自殺不受刑至武帝時稍復入獄自寧成始賈誼傳昭平君獄繫內官以公主子廷尉上請東方朔傳吏二千石有􅖄先請劉屈氂傳宣帝黃龍元年詔曰吏六百石位大夫有􅖄先請本紀成帝怒丞相王嘉孔光等請謁者召嘉詣廷尉詔獄永信少府猛等十人以為聖王斷獄必先原心定罪探意立情故死者不抱恨而入地生者不銜怨而受罪明主躬聖德重大臣刑辟廣延有司議欲使海內咸服嘉罪名雖應法聖王之於大臣在輿為下御坐則起疾病視之無數死則臨弔之廢宗廟之祭進之以禮退之以義誄之以行案嘉本以相等為罪罪惡雖著大臣括髮關械裸躬就笞非所以重國褒宗廟也今春月寒氣錯繆霜露數降宜示天下以寬和臣等不知大義惟陛下察焉有詔假謁者節召丞相詣廷尉詔獄王嘉傳平帝元始元年令公列侯嗣子有􅖄耐以上先請本紀元始四年敕百僚婦女非身犯法詔所名捕它皆亡得繫本紀矜老弱孝惠即位詔民年七十以上若不滿十嵗有罪當刑者皆完之本紀孝景後三年下詔曰髙年老長人所尊敬也鰥寡不屬逮者人所哀憐也其著令年八十以上八嵗以下及孕者未乳師朱儒當鞠繫者頌繫之至孝宣元康四年又下詔曰朕念夫耆老之人髮齒墮落血氣既衰亦無暴逆之心今或罹於文法執於囹圄不得終其年命朕甚憐之自今以來諸年八十非誣告殺傷人它皆勿坐至成帝鴻嘉元年定令年未滿七嵗賊鬬殺人及犯殊死者上請廷尉以聞得減死合於三赦幼弱老耄之人此皆法令稍定近古而便民者也刑法志贖罪惠帝元年民有罪得買爵三十級以免死罪本紀應劭曰級直錢二千凡為六萬朝錯説文帝曰欲民務農在於貴粟貴粟之道在於以粟為賞罰今募天下入粟縣官得以拜爵除罪不過三嵗塞下之粟必多食貨志孝景時上郡以西旱復修賣爵令而裁其賈以招民及徒復作得輸粟於縣官以除罪食貨志武帝天漢四年令死罪入贖錢五十萬減死一等本紀太始二年募死罪入贖錢五十萬減死一等本紀宣帝時西羌反漢遣後將軍征之京兆尹張敞上書言國兵在外軍以夏發隴西以北安定以西吏民並給轉輸田事頗廢素無餘積雖羌虜以破來春民食必乏窮僻之處買亡所得縣官穀度不足以賑之願令諸有􅖄非盜受財殺人及犯法不得赦者皆得以差入穀此八郡贖罪務益致穀以預備百姓之急事下有司左馮翊蕭望之與少府李強議以為民函隂陽之氣有好義欲利之心在教化之所助堯在上不能去民欲利之心而能令其欲利不勝其好義也雖桀在上不能去民好義之心而能令其好義不勝其欲利也故堯桀之分在於義利而已道民不可不謹也今欲令民量粟以贖罪如此則富者得生貧者獨死是貧富異刑而法不一也人情貧窮父兄囚執聞出財得以生活為人子弟者將不顧死亡之患敗亂之行以赴財利求救親戚一人得生十人以喪如此伯夷之行壞公綽之名滅政教一傾雖有周召之佐恐不能復古者臧於民不足則取有餘則豫詩曰爰及矜人哀此鰥寡上惠下也又曰雨我公田遂及我私下急上也今有西邊之役民失作業雖户賦口斂以贍其困乏古之通義百姓莫以為非以死救生恐未可也陛下布德施教教化既成堯舜亡以加也今議開利路以傷既成之化臣竊痛之於是天子復下其議兩府丞相御史以難問張敞敞曰少府左馮翊所言常人之所守耳昔先帝征四夷兵行三十餘年百姓猶不加賦而軍用給今羌虜一隅小夷跳梁於山谷間漢但令􅖄人出財減􅖄以誅之其名賢於煩擾良民橫興賦斂也又諸盜及殺人犯不道者百姓所疾苦也皆不得贖首匿見知縱所不當得為之屬議者或頗言其法可蠲除今因此令贖其便甚明何化之所亂甫刑之法小過赦薄罪贖有金選之品所從來久矣何賊之所生敞備布衣二十餘年嘗聞罪人贖矣未聞盜賊起也竊憐涼州被寇方秋饒時民尚有飢乏病死於道路况至來春將大困乎不早慮所以振救之䇿而引常經以難恐後為重責常人可與守經未可與權也敞幸得備列卿以輔兩府為職不敢不盡愚望之強復對曰先帝聖德賢良在位作憲垂法為無窮之規永惟邊竟之不贍故金布令甲曰邊郡數被兵離飢寒天絶天年父子相失令天下共給其費固為軍旅卒暴之事也聞天漢四年常使罪人入五十萬錢減死罪一等豪強吏民請奪假貣至為盜賊以贖其罪其後姦邪橫暴羣盜並起至攻城邑殺郡守充滿山谷吏不能禁明詔遣繡衣使者以興兵擊之誅者過半然後衰止愚以為此使死罪贖之敗也故曰不便時丞相魏相御史大夫丙吉亦以為羌虜且破轉輸略足相給遂不施敞議蕭望之傳元帝時貢禹上疏言孝文皇帝時貴亷潔賤貪汚賈人贅壻及吏坐臧者皆禁錮不得為吏賞善罰惡不阿親戚罪白者伏其誅疑者以與民亡贖罪之法故令行禁止海內大化天下斷獄四百與刑錯亡異武帝始臨天下尊賢用士闢地廣境數十里自見功大威行遂從耆欲用度不足乃行一切之變使犯法者贖罪入穀者補吏是以天下奢侈官亂民貧盜賊並起亡命者衆郡國恐伏其誅則擇便巧史書習於計簿能欺上府者以為右職姦軌不勝則取勇猛能操切百姓者以苛暴威服下者使居大位故亡義而有財者顯於世欺謾而善書者尊於朝悖逆而勇猛者貴於官故俗皆曰何以孝弟為財多而光榮何以禮義為史書而仕宦何以謹慎為勇猛而臨官故黥劓而髠鉗者猶復攘臂為政於世行雖犬彘家富藝足目指氣使是為賢耳故謂居官而置富者為雄桀處姦而得利者為壯士兄勸其弟父勉其子俗之壞敗乃至於是察其所以然者皆以犯法得贖罪求士不得真賢相守崇財利誅不行之所致也今欲興至治致太平宜除贖罪之法貢禹傳恤刑文帝赦罪人憐其亡髮賜之巾憐其衣赭書其背父子兄弟相見也而賜之衣平獄緩刑天下莫不説喜賈山傳武帝元朔六年遣博士循行天下治苛者舉奏本紀宣帝即位廷尉史路溫舒上疏言臣聞秦有十失其一尚存治獄之吏是也方今天下賴陛下恩厚亡金革之危飢寒之患父子夫妻勠力安家然太平未洽者獄亂之也夫獄者天下之大命也死者不可復生􅓟者不可復屬書曰與其殺不辜寧失不經今治獄吏則不然上下相驅以刻為明深者獲公明平者多後患故治獄之吏皆欲人死非憎人也自安之道在人之死是以死人之血流離於市被刑之徒比肩而立大辟之計嵗以萬計此仁聖之所以傷也太平之未洽凡以此也夫人情安則樂生痛則思死捶楚之下何求而不得故囚人不勝痛則飾辭以視之吏治者利其然則指道以明之上奏畏郤則煆鍊而周內之蓋奏當之成雖咎繇聽之猶以為死有餘辜何則成鍊者衆文致之罪明也是以獄吏專為深刻殘賊而亡極偷為一切不顧國患此世之大賊也故俗語曰畫地為獄議不入刻木為吏期不對此為疾吏之風悲痛之辭也故天下之患莫深於獄敗法亂正離親塞道莫甚乎治獄之吏此所謂一尚存者也上深愍焉乃下詔曰間者吏用法巧文寖深是勝之不德也夫決獄不當使有罪興邪不辜蒙戮父子悲恨朕甚傷之今遣廷史與郡鞠獄任輕祿薄其為置廷平秩六百石貟四人其務平之以稱朕意於是選于定國為廷尉求明察寬恕黃霸等以為廷平季秋後請讞時上常幸宣室齋居而決事獄刑號為平矣路溫舒傳及刑法志地節四年詔曰令甲死者不可生刑者不可息今繫者或以掠辜若飢寒瘐死獄中朕甚痛之其令郡國嵗上繫囚以掠笞若瘐死者所坐名縣爵里丞相御史課殿最以聞本紀元康二年詔曰獄者萬民之命所以禁暴止邪養育羣生也能使生者不怨死者不恨可謂文吏矣今則不然用法或持巧心析律二端深淺不平增辭飾非以成其罪奏不如實上亦亡繇知此朕之不明吏之不稱四方黎民將何仰哉二千石各察官屬勿用此人吏務平法本紀五鳯四年詔曰以前使使者問民所疾苦復遣丞相御史掾二十四人循行天下舉寃獄察擅為苛禁深刻不改者本紀黃龍元年詔曰朕數申詔公卿大夫務行寬大今吏或以不禁姦邪為寬大縱釋有罪為不苛或以酷惡為賢皆失其中御史察計簿疑非實者按之本紀成帝鴻嘉元年二月詔曰方春生長時臨遣諫大夫理等舉三輔三河𢎞農寃獄本紀四年詔曰數敕有司務行寬大而禁苛暴訖今不改一人有辜舉宗拘繫朕甚痛焉已遣使者循行郡國務有以全活之本紀哀帝元壽元年詔曰今有司執法未得其中或上暴虐假藝獲名其勉率百僚專任仁人黜遠殘賊期於安民本紀女刑城旦舂惠帝紀應劭曰婦人不與外徭但舂作米皆四嵗刑女徒復作宣紀李奇曰罪輕男子守邉女子軟弱不任守復令作於官亦一嵗故謂之復作徒也孟康曰復謂弛刑徒也有赦令詔書去其鉗􅎂赭衣更犯事不從徒加與民為例故當復為官作滿其本罪年月日律名為復作也平帝元始元年天下女徒已論歸家顧山錢月三百本紀師古曰謂女徒論罪已定並放歸家不親役之但令一月出錢三百以顧人也為此恩者以行太皇太后之德施惠政於婦人如淳曰令甲女犯罪當於山伐木聽使入錢顧功直故謂之顧山西漢會要卷六十二
