body:
  text: 西漢㑹要卷六十一宋徐天麟撰刑法一刑制夷三族高紀如淳曰父族母族妻族也要斬張延年自稱衛太子誣罔要斬磔景純謂張其尸棄市師古曰取刑人於市與衆棄之腐刑如淳曰宮刑也丈夫割勢不能生子如腐木不生實又云諸服宮刑者下蠶室髠鉗高紀鉗以鐡束頸也完孟康曰不加肉刑髠􅚎也城旦舂惠紀應劭曰城旦者旦起行治城舂者婦人不與外繇但舂作米皆四嵗刑也鬼薪白粲惠紀應劭曰取薪給宗廟為鬼薪坐擇米使正白為白粲皆三嵗刑也耐字通作耐高紀注云罪不至于髠全其耐鬢惠紀注云一嵗為罰作二嵗以上者為耐罰作一嵗刑見上盜械惠紀凡以罪著械者皆稱焉頌繫惠紀頌容也言見寬容但處曹吏舍不入狴牢笞景帝定令當笞者笞臀如淳曰先時笞背也箠長五尺其本大一寸其竹也末薄半寸皆平其節漢興之初雖有約法三章網漏吞舟之魚其大辟尚有夷三族之令令曰當三族者皆先黥劓斬左右止笞殺之梟其首葅其骨肉於市其誹謗詈詛者又先斷舌故謂之具五刑彭越韓信之屬皆受此誅至高后元年乃除三族罪妖言令刑法志文帝除宮刑景帝元年詔臣天麟按文帝既除宮刑矣景帝中四年赦徒作陽陵者死罪欲腐者許之至武帝時李延年司馬遷張安世兄賀皆坐腐刑則是宮刑雖除不久即復用也文帝十三年齊大倉令淳于公有罪當刑詔獄逮繫長安淳于公無男有五女當行㑹逮罵其女曰生子不生男緩急非有益也其少女緹縈自傷悲泣乃隨其父至長安上書曰妾父為吏齊中皆稱其亷平今坐法當刑妾傷夫死者不可復生刑者不可復屬雖後欲改過自新其道亡繇也妾願沒入為官婢以贖父刑罪使得自新書奏天子天子憐悲其意遂下令曰制詔御史蓋聞有虞氏之時畫衣冠異章服以為戮而民弗犯何治之至也今法有肉刑三而姦不止其咎安在非乃朕德之薄而教不明與吾甚自愧故夫訓道不純而愚民陷焉詩曰愷弟君子民之父母今人有過教未施而刑已加焉或欲刑為善而道亡繇至朕甚憐之夫刑至斷支體刻肌膚終身不息何其刑之痛而不德也豈稱為民父母之意哉其除肉刑有以易之及令罪人各以輕重不亡逃有年而免具為令丞相張蒼御史大夫馮敬奏言肉刑所以禁姦所由來者久矣陛下下明詔憐萬民之一有過被刑者終身不息及罪人欲改行為善而道亡繇至於盛德臣等所不及也臣謹議請定律曰諸當完者完為城旦舂當黥者髠鉗為城旦舂當劓者笞三百當斬左止者五百當斬右止及殺人先自告及吏坐受賕枉法守縣官財物而即盜之已論命復有笞罪者皆棄市罪人獄已決完為城旦舂滿三嵗為鬼薪白粲鬼薪白粲一嵗為隸臣妾𨽻臣妾一嵗免為庶人𨽻臣妾滿二歲為司寇司冦一嵗及作如司冦二歲皆免為庶人其亡逃及有罪耐以上不用此令前令之刑城旦舂歲而非禁錮者如完為城旦舂嵗數以免臣昧死請制曰可是後外有輕刑之名內實殺人斬右止者又當死斬左止者笞五百當劓者笞三百率多死景帝元年下詔曰加笞與重罪無異幸而不死不可為人其定律笞五百曰三百笞三百曰二百猶尚不全至中六年又下詔曰加笞者或至死而笞未畢朕甚憐之其减笞三百曰二百笞二百曰一百又曰笞者所以教之也其定箠令丞相劉舍御史大夫衛綰請笞者箠長五尺其本大一寸其竹也末薄半寸皆平其節當笞者笞臀毋得更人畢一罪乃更人自是笞者得全然酷吏猶以為威死刑既重而生刑又經民易犯之刑法志孝景中元年改磔曰棄市勿復磔紀律令髙祖初入關召諸縣豪傑謂曰父老苦秦苛法久矣誹謗者族偶語者棄市吾當王關中與父老約法三章耳餘悉除去秦法紀髙祖約法三章曰殺人者死傷人及盜抵罪蠲削煩苛兆民大悅其後四夷未附兵革未息三章之法不足以禦姦於是相國蕭何攟托秦法取其宜於時者作律九章刑法志按晉書刑法志云蕭何定律益事律興廄户三篇合為九篇孝惠四年省法令妨吏民者除挾書律紀髙后元詔孝惠欲除三族妖言令今除之紀孝文二年紀作元年又詔丞相太尉御史法者治之正所以禁暴而衛善人也今犯法者已論而使無罪之父母妻子同産坐之及收朕甚弗取其議左右丞相周勃陳平奏言父母妻子同産相坐及收所以纍其心使重犯法也收之之道所由來久矣臣之愚計以為如其故便文帝復曰朕聞之法正則民慤罪當則民從且夫牧民而道之以善者吏也既不能道又以不正之法罪之是法反害於民為暴者也朕未見其便宜熟計之平勃乃曰陛下幸加大惠於天下使有罪不收無罪不相坐甚盛德臣等所不及也臣等謹奉詔盡除收律相坐法其後新垣平謀為逆復行三族之誅刑法志朝錯為內史法令多所更定錯所更定三十章朝錯傳孝景中六年定鑄錢僞黃金棄市律本紀孝武即位外事四夷之功內盛耳目之好徵發煩數百姓貧耗窮民犯法酷吏擊斷姦軌不勝於是招進張湯趙禹之屬條定法令作見知故縱監臨部主之法緩深故之罪急縱出之誅其後姦骩巧法轉相比况禁網寖密律令凡三百五十九章大辟四百九條千八百八十二事死罪决事比萬三千四百七十二事文書盈於几閣典者不能遍睹是以郡國承用者駮或罪同而論異姦吏因緣為市所欲活則傳生議所欲陷則豫死比議者咸寃傷之刑法志自公孫𢎞以春秋之義繩臣下張湯以峻文決理於是見知之法生而廢格沮誹窮治之獄用矣湯奏當異九卿見令不便不入言而腹誹論死自是後有腹非之法比食貨志武帝作沈命法沈匿也敢蔽匿盜賊者沒其命也曰羣盜起不發覺發覺而弗捕滿品者二千石以下至小吏主者皆死咸宣傳孝宣本始四年詔郡國律令有可蠲除以安百姓條奏本紀地節四年詔曰父子之親夫婦之道天性也雖有禍患猶䝉死而存之誠愛結於心仁厚之至也自今子首匿父母妻匿夫孫匿大父母皆勿坐其父母匿子夫匿妻大父母匿孫罪殊死皆上請廷尉以聞本紀時涿郡太守鄭昌上疏言聖王置諫爭之臣者非以崇德防逸豫之生也立法明刑者非以為治救衰亂之起也今明主躬垂明聽雖不置廷平獄將自正若開後嗣不若刪定律令律令一定愚民知所避姦吏無所弄矣今不正其本而置廷平以理其末也政衰聽怠則廷平將招權而為亂首矣宣帝未及修正至元帝初立乃下詔曰夫法令者所以抑暴扶弱欲其難犯而易避也今律令煩多而不約自典令文者不能分明而欲羅元元之不逮斯豈刑中之意哉其議律令可蠲除輕減者條奏刑法志元帝初元五年省刑罰七十餘事除光祿大夫以下至郎中保父母同産之令本紀成帝河平中復下詔曰甫刑云五刑之屬三千大辟之罰屬二百今大辟之刑千有餘條律令煩多百有餘萬言奇請它比日以益滋自明習者不知所由欲以曉諭衆庶不亦難乎於以羅元元之民天絶亡辜豈不哀哉其與中二千石二千石博士及明習律令者議減死刑及可蠲除省約者令較然易知條奏書不云乎惟刑之恤哉其審核之務凖古法朕將盡心覽焉有司無仲山父將明之材不能因時廣宣主恩建立明制為一代之法而徒鉤托微細毛舉數事以塞詔而已刑法志西漢㑹要卷六十一
