  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0006_WYG_041-1a, image: WYG0609/WYG0609-0261c.png}
body:
  text: 西漢會要卷四十一宋徐天麟撰職官十一集議下議民政文帝元年三月詔曰方春和時吾百姓鰥寡孤獨窮困之人或阽於死亡其議所以振貸之本紀後元年詔曰間者數年歲比不登其與列侯吏二千石博士議之有可以佐百姓者無有所隱同上武帝時公孫𢎞奏言禁民亡得挾弓弩便上下其議吾邱夀王對曰大不便書奏上以難丞相𢎞𢎞詘服焉吾邱夀王傳元鼎六年上曰今內史稻田租挈重不與郡同其議減令吏民勉農盡地利平繇行水勿使失時溝洫志昭帝始元六年二月詔有司問郡國所舉賢良文學民所疾苦議罷鹽鐡𣙜酤紀詳見鹽鐡條元帝時貢禹言宜罷采珠玉金銀鑄錢之官毋復以為幣除其販賣租銖之律租稅皆以布帛及穀議者以為交易待錢布帛不可尺寸分裂禹議亦寢食貨志下禹以為宜令民七歲去齒乃出口錢年二十乃算天子下其議令民産子七歲乃出口錢自此始傳成帝建始三年京師民言大水至召公卿議大將軍鳳以為云云羣臣皆從鳯議左將軍王商獨曰必訛言也上乃止王商傳有上書言古者以龜貝為貨今以錢易之民以故貧宜可改幣上以問師丹丹對言可改章下有司議皆以為行錢以來久難卒變易師丹傳議法制孝文二年詔丞相太尉御史令犯法者已論而使無罪之父母妻子同産坐之朕甚弗取其議丞相周勃陳平奏臣之愚計以為如其故便文帝復曰云云朕未見其便宜熟計之平勃乃曰臣等謹奉詔刑法志十三年制詔御史其除肉刑丞相張蒼御史大夫馮敬言臣謹議云云臣昧死請制曰可刑法志景帝元年詔吏所受監臨以飲食免重受財物賤買貴賣論輕廷尉與丞相更議著令廷尉信謹與丞相議曰云云本紀宣帝時京兆尹張敞上書願令諸有罪皆得以資入穀八郡贖罪事下有司蕭望之與少府李疆議云云於是天子復下其議兩府丞相御史以難問敞敞曰云云疆復對曰不便遂不施敞議望之傳哀帝即位詔曰諸侯王列侯公主吏二千石及豪富民多蓄奴婢田宅亡限其議限制本紀議同姓淮南王長謀反召至長安丞相臣蒼典客臣敬行御史大夫事宗正臣逸廷尉臣賀備盜賊中尉臣福昧死言長當棄市制曰朕不忍加法於王其與列侯二千石議臣蒼臣敬臣逸臣福臣賀昧死言臣謹與列侯吏二千石臣嬰等四十三人議宜論如法元朔中肥如令郢人昆弟上書具言燕王定國事下公卿議皆曰當誅上許之燕王澤傳淮南王安反衡山王賜淮南王弟當坐收有司請逮捕衡山王上曰諸侯各以其國為本不當相坐與諸侯王列侯議趙王彭祖列侯讓等四十三人皆曰云云膠西王端議曰云云丞相𢎞廷尉湯以聞本傳議大臣始元四年桑𢎞羊子廷亡過父故吏侯史吳會赦吳得自出繫獄廷尉少府雜治及事丞相車千秋召中二千石博士會公車門議問吳法明日千秋封上衆議大將軍光以千秋擅召中二千石以下遂下少府廷尉獄蕭望之劾奏韓延夀上僭不道又自陳前為延夀所奏今復舉延夀罪衆庶皆以臣懷不正之心侵寃延夀願下丞相中二千石博士議其罪事下公卿皆以延夀前既無狀後復誣訴典法大臣欲以解罪狡猾無道竟坐棄市延夀傳定陵侯淳于長坐大逆誅長小妻乃始等六人皆以長事未發覺時棄去或更嫁及長事發丞相方進大司空武議乃始等於法無以解請論孔光議以為不當坐有詔光議是孔光傳哀帝初薛宣子况賕客楊明殺申咸事下有司御史中丞衆等奏况明皆棄市廷尉以為皆全為城旦上以問公卿議臣丞相光大司空丹以中丞議是自將軍以下至博士議郎皆是廷尉薛宣傳哀帝時丞相王嘉上書薦故廷尉梁相等尚書劾奏嘉言事恣意迷國罔上不道下將軍中朝者議左將軍公孫祿司𨽻鮑宣光祿大夫孔光等十四人皆以為嘉應迷國不道法光祿大夫諸吏給事中龔勝獨書議曰嘉迷國不疑今舉相等過微薄日暮議者罷明旦復會左將軍祿問勝君議亡所據今奏當上宜何從勝曰將軍以勝議不可者通劾之遂可光奏光等請詔嘉詣獄制曰驃騎將軍御史大夫中二千石二千石博士議郎衛尉雲等五十人以為如光等言可許議郎龔等以為宜奪爵土免為庶人永信少有猛等十人以為大臣括髮關械裸躬就笞非所以重國褒宗廟也有詔假謁者節召丞相詣廷尉詔獄龔勝王嘉傳傅太后怨傅喜使孔鄉侯晏風丞相令奏免喜侯朱博受詔與御史大夫趙玄議元博奏請免為庶人上疑博玄承指詔左將軍彭宣與中朝者雜問宣等劾奏博宰相玄上卿晏以外親不忠不道臣請詔謁者召博玄晏詣廷尉詔獄制曰將軍中二千石二千石諸大夫博士議郎議右將軍蟜望等四十四人以為如宣等言可許諫大夫龔勝等十四人以為晏宜與博元同罪罪皆不道上減玄死罪三等削晏户四分之一假謁者節召丞相詣廷尉詔獄博傳議邊事孝文即位將軍陳武議曰南粵朝鮮宜用征伐孝文曰朕能任衣冠念不到此且無議軍律書四年單于遺漢書書至漢議擊與和親孰便公卿皆曰和親甚便漢許之胸奴傳景帝時胸奴徐奴等五人降漢上欲侯之周亞夫曰云云上曰丞相議不可用本傳詳見處降條武帝時胸奴求和親羣臣議上前博士狄山曰和親便上問御史大夫張湯湯曰此愚儒亡知張湯傳元光二年初胸奴來請和親上下其議大行王恢議曰不如勿許御史大夫韓安國曰不如和親羣臣議多附安國於是上許和親明年馬邑豪聶一言胸奴可誘以利致之上召問公卿大行王恢對曰擊之便御史大夫安國曰勿擊便恢曰不然擊之便安國曰不然勿擊便恢曰不然擊之便安國曰不然勿擊便恢曰不然云云上曰善乃從恢議韓安國傳中大夫主父偃盛言朔方地肥饒外阻河內省轉輸減漕廣中國滅胡之本也上覽其説下公卿議皆言不便公孫𢎞曰云云朱買臣難詘𢎞遂置朔方本偃計也主父偃傳烏孫使使獻馬願得尚漢公主為昆弟天子問羣臣議計西域傳太初元年李廣利詣宛取馬二歲人少不足以拔宛其夏漢亡浞野之兵於胸奴公卿議者皆願罷宛李廣利傳帝末年悔征伐之事乃下詔曰乃者以縛馬書遍視丞相御史二千石諸大夫郎為文學者乃至郡屬國都尉成忠趙破奴等皆以虜自縛其馬不祥甚哉或以為欲以見強西域傳神爵元年趙充國擊羌虜欲以威信招降罕开及劫掠者解散虜謀徼極乃擊之辛武賢奏言云云天子下其書充國令與校尉以下吏士知羌事者博議充國及長史董通年以為此殆空言非至計也天子下其書公卿議者咸以為不先破罕开則先零未可圖也上乃拜武賢為破羌將軍賜璽書嘉納其册以書敇責充國趙充國傳充國上屯田奏奏每上輒下公卿議臣初是充國計者什三中什五最後什八有詔詰前言不便者皆頓首服丞相魏相曰後將軍數畫軍册其言常是臣任其計必可用也趙充國傳甘露二年胸奴欵塞詔有司議咸曰禮儀宜如諸侯王稱臣昧死再拜位次諸侯王詔曰其以客禮待之位在諸侯王上宣紀胸奴來朝詔公卿議其儀丞相霸御史大夫定國議曰其禮儀宜如諸侯王位次其下蕭望之以為位在諸侯王上天子采之蕭望之傳初元元年珠崖反本紀作三年上與有司議大發軍待詔賈捐之建議以為不當擊上使侍中王商詰問捐之捐之對奏上以問丞相御史御史大夫陳萬年以為當擊丞相于定國以為捐之議是上乃從之賈捐之傳甘延夀陳湯上疏斬郅支首及名王以下宜梟頭藁街事下有司丞相匡衡御史大夫繁延夀以為宜勿梟車騎將軍許嘉右將軍王商以為宜梟有詔將軍議是陳湯傳永光二年隴西羌反詔召丞相韋玄成御史大夫鄭𢎞大司馬車騎將軍王接左將軍許嘉右將軍馮奉世入議馮奉世傳呼韓邪單于上書願保塞請罷邊備塞吏卒天子令下有司議議者皆以為便郎中侯應習邊事以為不可許上問狀應對奏天子有詔勿議罷邊事胸奴傳河平元年胸奴使者伊邪莫衍言欲降下公卿議議者或言宜如故事受其降光祿大夫谷永議郎杜欽以為不如勿受對奏天子從之同上成帝時單于當來朝遣使言病願朝明年息夫躬上奏以為疑有他變書奏上引見躬召公卿將軍大夫議左將軍公孫祿以為躬欲逆詐不可許躬掎祿曰云云臣與祿異議未可同日語也上曰善乃罷羣臣獨與躬議息夫躬傳建平四年單于上書願朝五年上以問公卿公卿以為可且勿許單于使辭去未發黃門郎楊雄上書諌天子寤焉召還使者更報單于書而許之胸奴傳雜録元封四年關東流民二百萬口無名數者四十萬公卿欲議請徙流民於邊以適之上以為石慶老謹不能與其議乃賜丞相告歸而案御史大夫以下議為請者萬石君傳成帝封淳于長平當坐前議不正左遷巨鹿太守見上議功賞條孔光為御史大夫以議不中意左遷廷尉本傳哀帝時馬宫與丞相御史雜議帝祖母傅太后諡及元始中王莽發傅太后陵從歸定陶以民禮葬之追誅前議者馬宫傳董仲舒在家朝廷如有大議使使及廷尉張湯就其家而問之董仲舒傳趙充國罷就第朝廷每有四夷大議常與參兵謀問籌策焉本傳張禹家居以特進為天子師國家有大政必與定議本傳西漢會要卷四十一
