body:
  text: 西漢㑹要卷二十二宋徐天麟撰樂下樂章安世房中歌十七章其詩曰大孝備矣休德昭清髙張四縣樂充宫廷芬樹羽林雲景杳冥金支秀華庶旄翠旌七始華始肅倡和聲神來宴娭庶幾是聽粥粥音送細齊人情忽乘青𤣥熙事備成清思聈聈經緯冥冥我定厯數人告其心敕身齊戒施教申申乃立祖廟敬明尊親大矣孝熙四極爰轃王矦秉德其鄰翼翼顯明昭式清明鬯矣皇帝孝德竟全大功撫安四極海內有姦紛亂東北詔撫成師武臣承德行樂交逆簫勺羣慝肅為濟哉蓋定燕國大海蕩蕩水所歸髙賢愈愈民所懷大山崔百卉殖民何貴貴有德安其所樂終産樂終産世繼緒飛龍秋游上天髙賢愈樂民人豐草葽女羅施善何如誰能回大莫大成教德長莫長被無極靁震震電耀耀明德鄉治本約治本約澤𢎞大加被寵咸相保德施大世曼夀都荔遂芳窅窊桂華孝奏天儀若日月光乘𤣥四龍回馳北行羽旄殷盛芬哉芒芒孝道隨世我署文章桂華馮馮翼翼承天之則吾易久逺燭明四極慈惠所愛美若休德杳杳冥冥克綽永福美芳磑磑即即師象山則嗚呼孝哉案撫戎國蠻夷竭歡象來致福兼臨是愛終無兵革嘉薦芳矣告靈饗矣告靈既饗德音孔臧惟德之臧建矦之常承保天休令問不忘皇皇鴻明蕩矦休德嘉承天和伊樂厥福在樂不荒惟民之則浚則師德下民咸殖令問在舊孔容翼翼孔容之常承帝之明下民之樂子孫保光承順溫良受帝之光嘉薦令芳夀考不忘承帝明德師象山則雲施稱名永受厥福承容之常承帝之明下民安樂受福無疆郊祀歌十九章其詩曰練時日侯有望焫膋蕭延四方九重開靈之斿垂惠恩鴻祐休靈之車結𤣥雲駕飛龍羽旄紛靈之下若風馬左蒼龍右白虎靈之來神哉沛先以雨般裔裔靈之至慶隂隂相放􅜜震淡心靈既坐五音飭虞至旦承靈億牲繭栗粢盛香尊桂酒賓八鄉靈安留吟青黃遍觀此眺瑶堂衆嫭並綽竒麗顔如荼兆逐靡被華文厠霧縠曵阿錫佩珠玉俠嘉夜茞蘭芳淡容與獻嘉觴練時日一帝臨中壇四方承宇繩繩意變備得其所清和六合制數以五海內安寧興文匽武后土富媪昭明三光穆穆優游嘉服上黃帝臨二青陽開動根荄以遂膏潤并愛跋行畢逮霆聲發榮壧處頃聽枯槀復産乃成厥命衆庶熙熙施及夭胎羣生啿啿惟春之祺青陽三朱明盛長敷與萬物桐生茂豫靡有所詘敷華就實既阜既昌登成甫田百鬼迪嘗廣大建祀肅雍不忘神若宥之傳世無疆朱明四西皓沆碭秋氣肅殺含秀垂穎續舊不廢姦僞不萌祅孽伏息隅辟越逺四貉咸服既畏茲威惟慕純德附而不驕正心翊翊西皓五𤣥冥陵隂蟄蟲蓋藏􅋄木零落抵冬降霜易亂除邪革正異俗兆民反本抱素懷朴條理信義望禮五嶽籍斂之時掩收嘉榖𤣥𡨕六惟泰元尊媪神蕃釐經緯天地作成四時精建日月星辰度理隂陽五行周而復始雲風雷電降甘露雨百姓蕃滋咸循厥緒繼統共勤順皇之德鸞路龍鱗罔不肸飾嘉籩列陳庶幾宴享滅除凶灾烈騰八荒鐘鼓竽笙雲舞翔翔招搖靈旗九夷賔將惟泰元七建始元年丞相匡衡奏罷鸞路龍鱗更定詩曰涓選休成天地並況惟豫有慕爰熙紫壇思求厥路恭承禋祀緼豫為紛黼繡周張承神至尊千童羅舞成八溢合好效歡虞泰一九歌畢奏斐然殊鳴琴竽瑟㑹軒朱璆磬金鼓靈其有喜百官濟濟各敬厥事盛牲實爼進聞膏神奄留臨須搖長麗前掞光耀明寒暑不忒况皇章展詩應律鋗玉鳴函宫吐角激徴清發梁揚羽申以商造茲新音永久長聲氣逺倐鳯鳥鴹神夕奄虞蓋孔享天地八丞相匡衡奏罷黼繡周張更定詩曰肅若舊典日出入安窮時世不與人同故春非我春夏非我夏秋非我秋冬非我冬泊如四海之池遍觀是邪謂何吾知所樂獨樂六龍六龍之調使我心若訾黃其何不徠下日出入九太一况天馬下霑赤汗沫流赭志俶儻精權竒籋浮雲暗上馳體容與迣萬里今安匹龍為友元狩三年馬生渥窪水中作天馬徠從西極涉流沙九夷服天馬徠出泉水虎脊兩化若鬼天馬徠厯無草徑千里循東道天馬徠執徐時將搖舉誰與期天馬徠開逺門竦豫身逰昆侖天馬徠龍之媒游閶闔觀玉臺天馬十太初四年誅宛王獲宛馬作天門開詄蕩蕩穆並騁以臨饗光夜燭德信著靈􅎊平而鴻長生豫大朱涂廣夷石為堂飾玉梢以舞歌體招搖若永望星留俞塞隕光照紫幄珠熉黃幡比翅回集二雙飛常羊月穆穆以金波日華耀以宣明假清風軋忽激長至重觴神裴回若留放殣冀親以肆章函䝉祉福常若期寂漻上天知厥時泛泛滇滇從髙斿殷勤此路臚所求佻正嘉吉𢎞以昌休嘉砰隱溢四方専精厲意逝九閡紛紜六幕浮大海天門十一景星顯見信星彪列象載昭庭日親以察參侔開闔爰推本紀汾脽出鼎皇祜元始五音六律依韋饗昭雜變並㑹雅聲逺姚空桑琴瑟結信成四興遞代八風生殷殷鐘石羽籥鳴河龍供鯉醇犧牲百末㫖酒布蘭生泰尊柘漿析朝酲微感心攸通修名周流常羊思所并穰穰復正直往寧馮蠵切和疏寫平上天布施后土成穰穰豐年四時榮景星十二元鼎五年得鼎汾隂作齊房産草九莖連葉宫童效異披圖案諜𤣥氣之精回復此都蔓蔓日茂芝成靈華齊房十三元封二年芝生甘泉齊房作后皇嘉壇立𤣥黃服物發冀州兆䝉祉福沇沇四塞假狄合處經營萬億咸遂厥宇皇后十四華燁燁固靈根神之斿過天門車千乘敦昆侖神之出排玉房周流雜拔蘭堂神之行旌容容騎沓沓般傱傱神之徠泛翊翊甘露降慶雲集神之揄臨壇宇九疑賓䕫龍舞神安坐鴹吉時共翊翊合所思神嘉虞申二觴福滂洋邁延長沛施祐汾之阿揚金光橫泰河莾若雲增陽波遍臚歡騰天歌華燁燁十五五神相包四鄰土地廣揚浮雲扢嘉壇椒蘭芳璧玉精垂華光益億年美始興交於神若有承廣宣延咸畢觴靈輿位偃蹇驤卉汨臚析奚遺淫渌澤􅓭然歸五神十六朝隴首覽西垠雷電尞獲白麟爰五止顯黃德圖胸虐熏鬻殛闢流離抑不詳賔百僚山河饗掩回轅鬗長馳騰雨師灑路陂流星隕感惟風籋歸雲撫懷心朝隴首十七元狩元年行幸雍獲白麟作象載瑜白集西食甘露飲榮泉赤鴈集六紛員殊翁雜五采文神所見施祉福登蓬萊結無極象載瑜十八太始三年行幸東海獲赤鴈作赤蛟綏黃華蓋露夜零晝暗濭百君禮六龍位勺椒漿靈已醉靈已享錫吉祥芒芒極降嘉觴靈殷殷爛揚光延夀命永未央杳冥冥塞六合澤汪濊輯萬國靈禗禗象輿轙票然逝旗逶蛇禮樂成靈將歸託𤣥德長無衰赤蛟十九角抵武帝元封三年作角抵戲本紀文穎曰名此樂為角抵者兩兩相當角力角技藝射御故名角抵蓋雜伎樂也師古曰抵當也六年京師民觀角抵于上林平樂館本紀孝武之世開玉門通西域設酒池肉林以饗四夷之賓客作巴俞都盧海中碭徒浪反極漫衍魚龍角抵之戲以觀視之西域傳贊晋灼曰都盧國名也李竒曰都盧輕體善緣者也碭極樂名也師古曰巴人巴州人也巴俞之人所謂賓人也徑鋭善舞本從髙祖定三秦有功髙祖喜觀其舞因令樂人習之故有巴俞之樂漫衍者即張衡西京賦所云巨獸百尋是為漫延者也魚龍者為舍利之獸先戲於庭極畢乃入殿前激水化成比目魚跳躍潄水作霧障日畢化成黃龍八丈出水敖也戲於庭炫耀日光西京賦云海鱗變而成龍即為此色元帝初元四年罷角抵戲本紀刑法志云用貢禹議西漢㑹要卷二十二
