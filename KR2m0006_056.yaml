body:
  text: 西漢㑹要卷五十六宋徐天麟撰兵一南北軍京師有南北軍之屯刑法志髙祖崩呂太后發喪哭而泣不下張辟疆謂丞相陳平曰太后畏君等今請拜呂台呂産為將將兵居南北軍如此則太后心安丞相如辟疆計請之太后說太后病困以趙王祿為上將軍居北軍梁王産為相國居南軍戒産祿曰我即崩必據兵衞宮慎毋送喪為人所制太后崩祿産顓兵秉政因謀作亂太尉勃令酈寄紿祿曰何不速歸將軍印以兵屬太尉祿然其計諸呂老人或以為不便計猶豫太尉勃欲入北軍不得入襄平侯紀通尚符節迺令持節矯内勃北軍勃復令說祿祿遂㠯兵授太尉勃勃遂將北軍然尚有南軍勃令平陽侯告衞尉毋内相國産殿門産不知祿已去北軍入未央宮欲為亂殿門弗内朱虚侯章擊産殺之還入北軍復報大尉勃云云見呂后紀及外戚傳臣天麟按唐李揆云漢以南北軍相制故周勃以北軍安劉氏文帝入未央宮夜拜宋昌為衞將軍領南北軍紀中壘校尉掌北軍壘門内百官表章交公車人滿北軍劉向傳如淳曰漢儀注中壘校尉主北軍壘門内尉一人主上書者獄上章於公車有不如法者以付北軍尉北軍尉以法治之軍正丞胡建傳師古曰南北軍各有軍正正又置丞武帝使任安䕶北軍史記戾太子召監北軍使者任安發北軍兵安受節已閉軍門不肯應太子劉屈氂傳北軍錢官史記任安答辱北軍錢官小吏江充為直指繡衣使者督三輔盗賊禁察踰侈貴戚近臣多奢僣充皆舉劾奏請沒入車馬令身待北軍擊匈奴奏可充即移書光祿勲中黄門逮名近臣侍中諸當詣北車者移易門衞禁止無令得出入宮殿於是貴戚子弟惶恐皆見上叩頭求哀願得入錢贖罪上許之令各以秩次輸錢北軍凡數千萬江充傳公孫敬聲坐擅用北軍錢千五百萬下獄表大司馬霍光薨發材官輕車北軍五校士軍陳至茂陵以送其葬本傳張安世為衞將軍兩宫衛尉城門北軍兵屬焉本傳黄霸為京兆尹發騎士詣北軍本傳胡建守軍正丞監軍御史穿北軍壘垣以為賈區建斬之上奏以聞衞將軍軍髙帝五年王恬啟以衞將軍擊陳狶功臣表按蔡質漢儀云漢興置衞將軍典京師兵衞邊方屯警文帝拜宋昌為衞將軍領南北軍見南北軍條二年罷衞將軍軍本紀三年發中尉材官屬衞將軍軍長安本紀車騎將軍屯兵孝宣地節三年罷車騎將軍屯兵本紀臣天麟按蔡質漢儀云漢興置車騎將軍衞將軍左右前後將軍典京師兵衞邊方屯警右將軍屯兵孝宣地節三年罷右將軍屯兵本紀期門羽林光祿勲屬官期門羽林皆屬焉期門羽林皆宿衞官故屬南軍期門掌執兵送從服䖍曰與期門下以微行後遂以名官東方朔傳云微行常用飲酎已八九月中與侍中常侍武騎及待詔隴西北地良家子能騎射者期諸殿門故有期門之號自此始武帝建元三年初置北郎無員多至千人有僕射秩比千石平帝元始元年更名虎賁郎置中郎將秩比二千石羽林掌送從師古曰羽林亦宿衛之官言其如羽之疾如林之多次期門蔡質漢儀曰羽林府次虎賁府武帝太初元年初置名曰建章營騎後更名羽林騎又取從軍死事之子孫養羽林號曰羽林孤兒宣紀注云少壯令從軍羽林有令丞宣帝令中郎將騎都尉監羽林秩比二千石百官表漢興六郡良家子選給期門羽林㠯材力為官名將多出焉地理志師古曰六郡謂隴西天水安定北地上郡西河如淳曰醫巫商賈不得與也羽林黄頭郎枚乗傳蘇林曰羽林黄頭郎習水戰者也甘延夀以良家子善騎射為羽林投石拔距絶於等倫嘗超踰羽林亭樓由是遷為郎試弁為期門本傳霍光都肄郎羽林霍光傳都郎羽林燕剌王傳衞士衞尉掌宮門屯衞兵屬官有衞士旅賁令丞又諸屯衞侯司馬二十二官皆屬焉百官表武帝建元元年詔衞士轉置送迎常二萬人其省萬人本紀宣帝即位長樂宮初置屯衞本紀元康元年各置建章宮衞本紀元帝初元三年罷甘泉建章宮衞本紀執楯執㦸武士騶惠帝紀諸廟寢園祭祀用衞士四萬五千一百二十九人韋𤣥成傳正月行幸曲臺臨饗衞士王尊傳蓋寛饒為衞司馬及歲盡交代上臨饗罷衞卒衞卒數千人願復留共更一年蓋寛饒傳中尉兵中尉掌徼循京師武帝更名執金吾左右京輔都尉尉丞卒皆屬焉百官表文帝拜馮唐為車騎都尉主中尉及郡國車士本傳武帝元鼎六年發中尉卒擊呂嘉本紀城門兵城門校尉掌京師城門屯兵有司馬百官表師古曰八屯各有司馬十二城門侯百官表師古曰門各有侯蕭望之為小苑東門侯是也武帝征和二年以太子在外置屯兵長安諸城門劉屈氂傳張安世為衞將軍城門北軍兵屬焉本傳孔光為太師領城門兵孔光傳成都侯王商以特進領城門兵置幕府得舉吏如將軍元后傳紅陽侯王立位特進領城門兵元后傳平阿侯王譚位特進領城門兵杜鄴傳又元后傳司𨽻校尉司𨽻校尉武帝征和四年初置持節從中都官徒千二百人捕巫蠱督大姦猾後罷其兵百官表七校武帝平百粤内增七校刑法志晉灼曰百官表中壘屯騎步兵越騎長水胡騎射聲虎賁几八校尉胡騎不常置故此言七也佽飛射士少府屬官有左戈令掌戈射武帝更名為佽飛百官表服䖍曰周時渡江越人在船下負船將覆之佽飛入水殺之漢因以材力名官宣帝神爵元年發佽飛射士詣金城紀元帝永光二年發迹射佽飛射者擊羌馮奉世傳輯濯士水衡屬官有輯濯令丞百官表如淳曰船官也戾太子矯制發輯濯士以予大鴻臚商丘成劉屈氂傳胡越騎越騎校尉掌越騎越人内附以為騎也胡騎校尉掌池陽胡騎不常置百官表按胡越騎皆已在八校之數自昭宣以後或以他官兼領故别見此一條自昭帝時霍山以奉車都尉領胡越兵霍光傳元帝永光二年發三輔河東𢎞農越騎擊羌馮奉世傳成帝時金涉為侍中騎都尉領三輔胡輔騎本傳師古曰胡越騎之在三輔者若長水長揚宣曲之屬是也羌騎宣帝神爵元年發羌騎詣金城本紀元帝永光二年發呼速索嗕種擊羌馮奉世傳材官以下係郡國兵漢興踵秦而置材官於郡國刑法志按漢官儀云髙祖命天下選能引闕躡張材力武猛者以為輕車騎士材官樓船常以秋後講肄各有員數平地用輕車山阻用材官水泉用樓船髙帝十一年發巴蜀材官衞軍霸上本紀惠帝七年發車騎材官詣滎陽本紀文帝三年發中尉材官屬衞將軍軍長安本紀晁錯上言兵事曰平地通道則以輕車材官制之本傳爰盎以材官蹶張遷為隊帥本傳景帝後二年發車騎材官屯鴈門紀武帝元光二年大中大夫李息為材官將軍擊匈奴本紀王恢擊匈奴伏兵車騎材官三十餘萬匿馬邑旁谷中韓安國傳宣帝神爵元年發三河潁川沛郡淮陽汝南材官詣金城本紀大司馬霍光薨發材官輕車北軍五校士軍陳至茂陵以送其葬本傳輕車惠帝七年發車騎詣滎陽紀馮唐拜車騎都尉主中尉及郡國車士本傳晁錯上言兵事曰平地通道則以輕車材官制之本傳宣帝本始二年調闗東輕車銳卒救烏孫紀發材官輕車送霍光葬見上材官條騎士髙后五年發河車上黨騎屯北地紀武帝征和元年發三輔騎士大搜上林本紀宣帝神爵元年發金城隴西天水安定北地上郡騎士擊羌趙充國傳黄霸守京兆尹發騎士詣北軍樓船外有樓船刑法志又漢官儀見上林官條法枚乘說吳王曰漢知吳有吞天下之心也遣羽林黄頭循江而下襲大王之都枚乘傳蘇林曰羽林黄頭郎習水戰者也鄧通以濯船為黄頭郎本傳師古曰濯船能持濯行船也土勝水其色黄故刺船之郎皆著黄帽因號曰黄頭郎也濯讀曰擢音直孝反吳王伐江陵之木以為船伍被傳伍被為淮南王畫計曰有尋陽之船伍被傳閩越王入燔尋陽樓船嚴助傳師古曰漢有樓船貯在尋陽也武帝建元三年嚴助浮海救東甌助傳粤欲與漢用船戰逐迺大修昆明池列館環之治樓船髙十餘丈旗幟加其上甚壯元鼎五年南越反因南方樓船士二十餘萬人擊之食貨志元鼎五年南越王相呂嘉反遣伏波將軍路博德出桂陽下湟水樓船將軍楊僕出豫章下真水歸義越侯嚴為戈船將軍出零陵下離水甲為下瀨將軍下蒼梧皆將軍人江淮㠯南樓船十萬人越馳義侯遺别將邑罪罪人發夜郎兵下牂柯江咸㑹畨禺本紀卜式願與博昌習船者擊呂嘉本傳武帝欲伐南越淮南王安諫曰越處溪谷之間篁竹之中習於水鬬便於用舟地深昧而多水險今發兵拕舟而入水水道上下擊石死傷者必衆矣前時南海王反陛下先臣使將軍間忌擊之㑹天暑多雨樓船卒水居擊擢未戰而疾死者過半云云嚴助傳元鼎六年東越王反攻殺漢將吏遣横海將軍韓說中尉王温舒出㑹稽樓船將軍楊僕出豫章擊之又遣浮沮將軍公孫賀出九原匈河將軍趙破奴出令居本紀東粤數反拜買臣為㑹稽太守詔到郡治樓船備糧食水戰具朱買臣傳元封二年遣樓船將軍楊僕從齊浮渤海擊朝鮮朝鮮傳屬國騎武帝遣趙破奴將屬國騎及郡兵數萬以擊胡張騫傳太初元年以李廣利為貳師將軍發屬國六千騎期至貳師取善馬屯田卒武帝元鼎五年初置張掖酒泉郡而上郡朔方西河河西開田官斥塞卒六十萬人戍田之食貨志孝武征殊方開西域自燉煌西至鹽津往往起亭而輪臺渠犁皆有田卒數百人置使者校尉領䕶以給使外國者西域傳宣帝地節二年遣侍郎鄭吉校尉司馬喜將免刑罪人田渠犁積穀欲以攻車師至秋後收吉喜發城郭諸國兵萬餘人自與所將田士千五百人共擊車師西域傳趙充國至金城願罷騎兵留㢮刑應募及淮陽汝南步兵與吏士私從者合凡萬二百八十一人分屯要害處至春月草生發郡騎及屬國胡騎伉健各千倅馬十二就草為田者遊兵以充入金城郡本傳詳見屯田條元帝建昭三年甘延夀陳湯矯制發城郭諸國兵車師戊己校尉屯田吏士誅斬郅支單于西漢㑹要卷五十六
