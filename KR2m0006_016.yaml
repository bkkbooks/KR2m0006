body:
  text: 西漢會要卷十六宋徐天麟撰禮十嘉禮行幸髙帝六年冬人告楚王信謀反上問左右左右爭欲繫之用陳平計乃偽遊雲夢十二月會諸矦于陳信迎謁因執之本紀下同七年冬上自將擊韓王信於銅鞮上從晉陽連戰乘勝逐北至樓煩會大寒士卒墮指者什二三遂至平城為胸奴所圍七日用陳平祕計得出十二月上還過趙不禮趙王二月自櫟陽徙都長安七年夏四月行如雒陽八年冬上擊韓信餘寇於東垣還過趙趙相貫髙等恥上不禮其王隂謀欲弒上上欲宿心動問縣名何曰柏人上曰柏人者迫於人也去弗宿十二月行自東垣至八年春三月行如雒陽九月行自雒陽至九年十二月行如雒陽二月行自雒陽至十一年淮南王布反上自將擊布十二年上還過沛留置酒沛宫悉召故人父老子弟佐酒發沛中兒得百二十人教之歌酒酣上擊築自歌曰大風起兮雲飛揚威加海內兮歸故鄉安得猛士兮守四方令兒皆和習之上乃起舞慷慨傷懷泣數行下謂沛父兄曰遊子悲故鄉吾雖都關中萬嵗之後吾魂魄猶思家沛且朕自沛公以誅暴逆遂有天下其以沛為朕湯沐邑復其民世世無有所與沛父老諸母故人日樂飲極歡道舊故為笑樂十餘日上欲去沛父兄因請上曰吾人衆多父兄不能給乃去沛中空縣皆之邑西獻上留止張飲三日沛父兄皆頓首曰沛幸得復豐未得唯陛下哀矜上曰豐者吾所生長極不忘耳吾特以其為雍齒故反我為魏沛父兄固請之乃并復豐比沛文帝三年上幸甘泉如淳曰蔡雍云天子車駕所至民臣以為幸故曰幸見令長三老官屬親臨軒益樂賜以酒食帛葛越巾佩蒂之屬民爵有級數或賜田租之半故因謂之幸也師古曰甘泉在雲陽本泰林光宮自甘泉之髙奴因幸太原留遊太原十餘日七月上自太原至十年冬行幸甘泉後二年夏行幸雍棫陽宫四年五月行幸雍五年正月行幸隴西三月行幸雍秋七月行幸代並本紀後六年胸奴大入邉以宗正劉禮為將軍軍霸上祝茲矦徐厲為將軍軍棘門以河內守亞夫為將軍軍細桞以備故上自勞軍至霸上及棘門軍直馳入將以下騎出入送迎已而之細桞軍軍士吏被甲鋭兵刃張弓弩持滿天子先驅至不得入先驅曰天子且至軍門都尉曰軍中聞將軍之令不聞天子之詔有頃上至又不得入於是上使使持節詔將軍曰吾欲勞軍亞夫乃傳言開壁門壁門士請車騎曰將軍約軍中不得驅馳於是天子乃按轡徐行至中營將軍亞夫揖曰介胄之士不拜請以軍禮見天子為動改容式車使人稱謝皇帝敬勞將軍成禮而去周亞夫傳景帝中六年行幸雍郊五畤武帝元光二年十月行幸雍祠五畤六年六月行幸雍元狩元年十月行幸雍祠五畤獲白麟二年冬十月行幸雍祠五畤元鼎四年行幸雍祠五畤自夏陽東幸汾隂立后土祠禮畢行幸榮陽還至洛陽五年冬十月行幸雍祠五畤遂踰隴登空同西臨祖厲河而還並本紀六年天子親幸緱氏觀大人迹於是郡國各除道繕治宫館名山神祠所至望幸矣郊祀志元封元年行自雲陽北歷上郡西河五原出長城北登單于臺至朔方臨北河勒兵十八萬騎旌旗徑千餘里威震胸奴還祠黃帝於橋山乃歸甘泉春正月行幸緱氏遂幸東海登封泰山降坐明堂行自泰山復東巡海上北至碣石巡自遼西歷北邉九原五月乃至甘泉周萬八千里云本紀及郊祀志二年十月行幸雍祠五畤春幸緱氏遂至東萊夏四月還祠泰山至瓠子臨決河四年十月行幸雍祠五畤通回中道遂北出蕭關歷獨鹿鳴澤自代而還幸河東祠后土幸中都赦汾隂夏陽中都死罪以下賜三縣及楊氏皆無出今年租賦五年冬行南巡狩至于盛唐望祀虞舜于九嶷登灊天柱山自尋陽浮江親射蛟江中獲之舳艫千里薄樅陽而出遂北至琅邪並海所過禮祠其名山大川三月還至泰山增封赦所幸縣毋出今年租賦賜鰥寡孤獨帛貧窮者粟還幸甘泉郊泰畤六年冬行幸回中三月行幸河東祠后土太初元年冬十月行幸泰山十一月祀上帝于明堂十二月禪髙里祠后土東臨勃海望祠蓬萊二年行幸河東祠后土三年正月行東巡海上夏四月還修封泰山禮石閭四年行幸回中天漢元年正月行幸甘泉郊泰畤三月行幸河東祠后土二年春行幸東海還幸回中三年三月行幸泰山修封祀明堂因受計還幸北地祠常山瘞玄玉夏四月赦天下行所過毋出田租太始二年行幸回中三年春行幸甘泉宫饗外國客二月行幸東海獲赤鴈幸琅邪禮日成山登之罘浮大海山稱萬嵗冬賜行所過户五千錢鰥寡孤獨帛人一匹四年春行幸泰山祀髙祖于明堂因受計四月幸不其祠神人于交門宫夏五月還幸建章宫大置酒赦天下十二月行幸雍祠五畤西至安定北地征和元年正月還幸建章宫二年夏行幸甘泉三年正月行幸雍至安定北地四年正月行幸東萊臨大海三月上耕于巨定還幸泰山修封庚寅祀于明堂癸巳禪石閭夏六月還幸甘泉後元元年正月行幸甘泉郊泰畤遂幸安定二年二月行幸盩厔五柞宫宣帝神爵元年正月行幸甘泉郊泰畤三月行幸河東祠后土五鳯元年正月行幸甘泉郊泰畤二年行幸雍祠五畤三年三月行幸河東祠后土甘露元年正月行幸甘泉郊泰畤二年十二月行幸萯陽宫屬玉觀三年正月行幸甘泉郊泰畤上自甘泉宿池陽宫上登長平阪詔單于毋謁其左右當户之羣皆列觀蠻夷君長王矦迎者數萬人夾道陳上登渭橋咸稱萬嵗單于就邸置酒建章宫饗賜單于觀以珍寶黃龍元年正月行幸甘泉郊泰畤元帝初元二年正月行幸甘泉郊泰畤四年正月行幸甘泉郊泰畤三月行幸河東祠后土赦汾隂徒賜民爵一級女子百户牛酒鰥寡髙年帛行所過無出租賦五年三月行幸雍祠五畤永光元年正月行幸甘泉郊泰畤赦雲陽徒賜民爵一級女子百户牛酒髙年帛行所過毋出租賦四年三月行幸雍祠五畤五年春正月行幸甘泉郊泰畤三月上幸河東祠后土冬上幸長楊射熊館布車騎大獵建昭元年三月上幸雍祠五畤二年正月行幸甘泉郊泰畤三月行幸河東祠后土成帝永始二年冬十一月行幸雍祠五畤四年春正月行幸甘泉郊泰畤神光降集紫殿大赦天下賜雲陽吏民爵女子百户牛酒鰥寡孤獨髙年帛三月行幸河東祠后土賜吏民如雲陽行所過毋出田租元延元年三月行幸雍祠五畤二年正月行幸甘泉郊泰畤三月行幸河東祠后土三年三月行幸雍祠五畤四年春正月行幸甘泉郊泰畤三月行幸河東祠后土綏和元年三月行幸雍祠五畤二年正月行幸甘泉郊泰畤三月行幸河東祠后土並本紀西漢會要卷十六
