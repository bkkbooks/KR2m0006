body:
  text: 西漢㑹要卷三十五宋徐天麟撰職官五加官侍中左右曺諸吏散騎中常侍皆加官所加或列侯將軍卿大夫將都尉尚書大醫大官令至郎中亡員多至數十人侍中中常侍得入禁中諸曺受尚書事諸吏得舉法散騎騎並乘輿車給事中亦加官所加或大夫博士議郎掌顧問應對位次中常侍中黃門有給事黃門位從將大夫皆秦制百官表西域都護加官見上卷本條爵爵一級曰公士二上造三簮裊四不更五大夫六官大夫七公大夫八公乘九五大夫十左庶長十一右庶長十二左更十三中更十四右更十五少上造十六大上造十七駟車庶長十八大庶長十九關內侯二十徹侯皆秦制以賞功勞徹侯金印紫綬避武帝諱曰通侯或曰列侯改所食國令長名相又有家丞門大夫庶子百官表髙帝五年詔曰軍吏卒㑹赦其七大夫以上師古曰七大夫公大夫也皆令食邑非七大夫已下皆復其身及户勿事本紀又曰七大夫公乘以上皆髙爵也爵或人君上所尊禮異日秦民爵公大夫以上令丞與亢禮今吾於爵非輕也且法以有功勞行田宅其令諸吏善遇髙爵稱吾意且亷問有不如吾詔者以重論之八年令爵非公乘以上毋得冠劉氏冠孝惠即位爵五大夫以上有罪當監械者皆頌繫上造以上當刑及當為城旦㫪者皆耐為鬼薪白粲並本紀武帝時民多買復及五大夫千夫於是除五大夫千夫為吏食貨志舊爵上聞古爵吕氏春秋曰天子賞魏文侯以上聞晉灼曰名通於天子也樊噲自公大夫賜上聞爵執帛鄭氏曰楚爵也張晏曰孤卿也夏侯嬰賜爵七大夫賜爵五大夫賜爵執帛曺參自五大夫封執帛號建成君執圭如淳曰吕氏春秋得五員者位執圭古爵名也張晏曰侯伯執圭以侯位比之夏侯嬰賜爵執帛賜爵執圭賜爵封曺參封執帛遷為執圭封建成侯卿樊噲賜爵五大夫賜爵卿博寬賜爵卿封君賜重封叔孫通號稷嗣君婁敬號曰奉春君侯公平國君曺參自五大夫封執帛號建成君樊噲賜爵封號賢成君破南陽賜重封博寬賜爵卿封號共德君孔霸以帝師賜爵號褒成君武功爵武帝元朔六年詔曰日者大將軍巡朔方征胸奴斬首虜萬八千級諸禁錮及有過者咸䝉厚賞得免减罪今大將軍仍復克獲斬首虜萬九千級受爵賞而欲移賣者無所流貤其議為令有司奏請置武功賞官以寵戰士紀武功爵臣瓚曰茂陵中書有武功爵一級曰造士二級曰間輿衛三級曰良士四級曰元戎士五級曰官首六級曰秉鐸七級曰千夫八級曰樂卿九級曰執戎十級曰政戻庶長十一級曰軍衛此武帝所制以寵軍功師古曰此下云級十七萬凡直三十餘萬金今瓚所引茂陵中書止於十一級則計數不足與本文乖矣或者茂陵書說之不盡也級十七萬凡直三十餘萬金諸買武功爵官首者試補吏先除千夫如五大夫其有罪又减二等爵得至樂卿以顯軍功軍功多用超等大者封侯卿大夫小者郎食貨志賜爵立漢社稷髙帝二年令民立漢社稷施恩德賜民爵本紀即位孝惠即位賜民爵一級中郎郎中滿六歲爵三級四歲二級外即滿六歲二級中郎不滿一歲一級官官尚食比郎中太子御驂乘賜爵五大夫舍人滿五歲二級本紀立皇太子孝文元年建大子因賜天下民當為父後者爵一級本紀王皇子孝景三年立皇子為王賜民爵一級本紀皇太子冠孝景後三年皇太子冠賜民為父後者爵一級本紀改元孝景中元年赦天下賜民爵一級本紀後元年赦天下賜民爵一級中二千石諸侯相爵右庶長本紀征伐髙帝五年詔曰軍吏卒㑹赦其亡罪而亡爵及不滿大夫者皆賜爵為大夫故大夫以上賜爵各一級其七大夫以上皆令食邑本紀力役孝惠五年長安城成賜民爵户一級本紀募民徙塞朝錯言守邊備塞事曰募輸奴婢欲以拜爵者不足乃募民之欲往者皆賜髙爵復其家郡縣之民得買其爵以增至卿上從其言募民徙塞下食貨志郊祀孝武元鼎四年行幸雍祠五畤賜民爵一級女子百户牛酒本紀祥瑞孝宣本始元年鳳皇集膠東千乘賜吏二千石諸侯相下至中都官官吏六百石爵各有差自左更至五大夫賜天下人爵一級孝者二級本紀帝加元服孝昭元鳳四年帝加元服賜中二千石以下及天下民爵本紀尊廟號孝宣本始二年尊孝武廟為世宗廟巡狩所幸之郡國皆立廟賜民爵一級本紀褒吏治孝宣神爵四年潁川太守黃霸以治行賜爵及潁川吏民有行義者爵人二級力田一級正婦順女帛本紀災異孝元永光二年詔陰陽不調三光暗昧其大赦天下賜民爵一級吏六百石以上爵五大夫勤事吏各三級本紀胸奴朝孝成河平四年胸奴來朝赦天下徒賜孝弟力田爵二級本紀賜民爵瓚曰民賜爵有罪得以减也賜民爵户一級師古曰家長受也賜天下民當為父後者爵一級師古曰雖非己生正嫡但為後者即得賜爵賜民長子爵一級元光元年孝惠六年令民得賣爵本紀孝文後六年夏旱令民得賣爵本紀鬻爵孝惠元年民有罪得買爵三十級以免死罪應劭曰一級直錢二千凡為六萬見本紀朝錯說上曰今募天下入粟縣官得以拜爵得以除罪入粟受爵至五大夫以上乃復一人耳於是文帝從錯之言令民入粟邊六百石爵上造稍增至四千石為五大夫萬二千石為大庶長各以多少級數為差食貨志又言募民徙塞事募不足募輸奴婢欲以拜爵者上從其言本傳景帝上郡以西旱復修賣爵令而裁其賈以招民食貨志武帝時兵革數動民多買復及五大夫千夫調發之士益鮮於是除五大夫千夫為吏同上孝成鴻嘉三年令民得買爵賈級千錢本紀永始二年詔曰關東比歲不登吏民以義收食貧民入穀物助縣官賑贍者已賜直其百萬以上加賜爵右更欲為吏補三百石其吏也遷二等三十萬以上賜爵五大夫吏亦遷二等民補郎本紀西漢㑹要卷三十五
