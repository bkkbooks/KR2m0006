body:
  text: 西漢會要卷六十六宋徐天麟撰方域三宫苑雜録髙帝七年蕭何治未央宫立東闕北闕前殿武庫大倉上見其壯麗甚怒謂曰天下胸胸勞苦數歲成敗未可知是何治宫室過度也何曰天下方未定故可因以就宫室且夫天子以四海為家非令壯麗亡以重威且毋令後世有以加也上説武帝建元三年微行始出北至池陽西至黃山宫名在槐里南獵長楊東遊宜春丞相御史知指乃使右輔都尉徼循長楊以東後乃私置更衣從宣曲以南十二所中休更衣投宿諸宫長楊五柞倍陽宣曲尤幸於是上以為道遠勞苦又為百姓所患乃使大中大夫吾丘壽王與待詔能用算者二人舉籍阿城以南盩厔以東宜春以西提封頃畞及其賈直欲除以為上林苑屬之南山又詔中尉左右內史表屬縣草田欲以償鄠杜之民吾丘壽王奏事上大説稱善時東方朔在傍進諫曰臣聞謙遜靜慤天表之應應之以福驕溢靡麗天表之應應之以異今陛下纍郎臺恐其麗不髙也弋獵之處恐其不廣也如天不為變則三輔之地盡可以為苑何必盩厔鄠杜乎奢侈越制天為之變上林雖小臣尚以為大也夫南山天下之阻也南有江淮北有河渭其地從隴以東商雒以西厥壤肥饒漢興去三河之地至霸産以西都涇渭之南此所謂天下陸海之地秦之所以虜西戎兼山東者也其山出玉石金銀銅鐵豫章檀柘異類之物不可勝原此百工所取給萬民所仰足也又有粳稻梨栗桑麻竹箭之饒土宜薑芋水多蛙魚貧者得以人給家足無飢寒之憂故酆鎬之間號為土膏其賈畞一金今規以為苑絶陂池水澤之利而取民膏腴之地上乏國家之用下奪農桑之業棄成功就敗事損耗五穀是其不可一也且盛荆棘之林而長養麋鹿廣狐之苑大虎狼之虛又壞人冢墓發人室廬令幼弱懷土而思耆老泣涕而悲是其不可二也經而營之垣而圃之騎馳東西車騖南北又有深溝大渠夫一日之樂不足以危無隄之輿是其不可三也故務苑囿之大不恤農時非所以強國富人也夫殷作九市之宫而諸侯畔靈王起章華之臺而楚民散秦興阿房之殿而天下亂糞土愚臣忘生觸死逆盛意犯隆指罪當萬死不勝大願願陳泰階六符以觀天變不可不省是日因奏泰階之事上乃拜朔為大中大夫給事中賜黃金百斤然遂起上林苑如壽王所奏云東方朔傳元鼎二年春起柏梁臺作承露盤髙二十丈大七圍以銅為之上有仙人掌以承露和玉屑飲之可以長生宫室之修自此日盛郊祀志元封二年公孫卿曰仙人可見上往常遽以故不見今陛下可為館如緱氏城置脯棗神人宜可致且仙人好樓居於是上令長安則作飛亷桂館甘泉則作益壽延壽館使卿持節設具而候神人乃作通天臺置祠具其下將招來神仙之屬於是甘泉更置前殿始廣諸宫室郊祀志下太初元年柏梁臺災越人勇之言於武帝曰粵俗有火災復起屋必以大用勝服之於是作建章宫度為千門萬户前殿度髙未央其東則鳯闕髙二十餘丈其西則商中樓十里虎圈其北治大池漸臺髙二十餘丈名曰太液池中有蓬萊方文瀛洲壺梁象海中神仙龜魚之屬其南有玉堂璧門大鳥之屬立神明井幹樓髙五十丈輦道相屬焉郊祀志元帝延翼奉問以得失奉以為宫室苑囿奢泰難供以故民困國虛不改其本難以末正乃上疏曰孝文皇帝躬行節儉外省繇役其時未有甘泉建章及上林中諸離宫館也未央宫又無髙門武臺麒麟鳯凰白虎玉堂金華之殿獨有前殿曲臺漸臺宣室溫室承明耳孝文欲作一臺度用百金重民之財廢而不為其積土基至今猶存又下遺詔不起山墳故其時天下太和百姓洽足德流後嗣願陛下遷都正本衆制皆定亡復繕治宫館不急之費嵗可餘一年之蓄翼奉傳初元元年令諸宫館希御幸者勿繕治紀五年罷上林宫館希御幸者成帝建始元年罷上林宫館希幸御者二十五所元延二年十二月羽獵揚雄從以為昔在二帝三王宫館臺榭沼池苑囿林麓藪澤財足以奉郊廟御賔客充庖廚而已不奪百姓膏腴穀土桑柘之地女有餘布男有餘粟國家殷富上下交足故甘露零其庭醴泉流其唐鳯凰巢其木黃龍遊其沼麒麟臻其囿神雀棲其林昔者禹任益虞而上下和草木茂成湯好田而天下用足文王囿百里民以為尚小齊宣王囿四十里民以為大裕民之與奪民也武帝廣開上林南至宜春鼎湖御宿昆吾旁南山而西至長楊五柞北繞黃山瀕渭而東周袤數百里穿昆明池象滇河營建章鳳闕神明馺娑漸臺泰液象海水周流方丈瀛洲蓬萊遊觀侈靡窮妙極麗雖頗割其三垂以贍齊民然至羽獵田車戎馬器械儲偫營禦所崇尚泰奢麗誇詡非堯舜成湯文王三驅之意也又恐後世復修前好不折中以泉臺故聊因校獵賦以風揚雄傳上省中昭紀長公主共養省中伏儼曰蔡雍云本為禁中門閣有禁非侍御之臣不得妄入行道豹尾中亦為禁中孝元皇后父名禁避之故曰省中師古曰省察也言入此中皆當察視不可妄也掖庭武帝改永巷為掖庭文石之陛赤墀之塗梅福傳願一登文石之陛涉赤墀之塗應劭曰以丹淹塗泥殿上法坐梅福傳師古曰法座正坐也猶言法宫法駕也內中武紀甘泉宫內中師古曰謂後庭之室也行內孔光傳供養行內師古曰行內行在所之內猶言禁中也行在所武紀天子或在京師或出巡狩故言行在所耳公車東方朔傳公車上書者所詣赤墀青瑣元后傳孟康曰青瑣以也青畫户邊鏤中天子制青蒲以青規地曰青蒲非皇后不得至此見史册傳罘罳文紀未央宫東闕罘罳災師古曰罘罳連闕曲閣也以覆重刻垣墉之處其形罘罳然一曰屏也罘音浮珍臺間館旋題玉英甘泉賦應劭曰題頭也榱椽之頭皆以玉節闌入成紀闌入尚方掖門應劭曰無浮籍妄入宫曰闌街市長安四市百官表馮翊屬官有長安四市長丞長安西市惠帝六年起長安西市見本紀黃圖云長安九市六市在道西三市在道東東市朝錯傳朝服斬東市桞市萭章居城西桞市本傳章臺街張敞為京兆尹走馬章臺街三輔舊事云長安城中八街九陌張衡西京賦云參塗夷庭野塗相經㕓里端直甍宇齊平稿街陳湯傳蠻夷邸在稿街華陽街劉屈氂妻梟首華陽街鄉里大率十里一亭一鄉縣大縣方百里其民稠則減稀則曠鄉亭亦如之凡縣道邑千五百八十七鄉六千六百二十二百官表中陽里髙祖居豐中陽里漢舊儀云中陽里名尚冠里宣帝在民間時居尚冠里本紀長安戚里萬石君石奮家長安戚里陵里萬石君傳關關中關中謂咸陽秦所都也東函谷關南嶢關武關西散關北蕭關故咸陽曰關中沛公初入關武説曰秦富十倍天下地形強可急使守函谷關紀文頴曰是時關在𢎞農縣武帝元鼎三年徙函谷關於新安以故關為𢎞農縣本紀應劭曰時樓船將軍楊僕數有大功恥為關外民上書乞徙東關以家財給其用度武帝意亦好廣闊於是徙關於新安志𢎞農三百里武關髙紀應劭曰秦南關也通南陽文頴曰武關在析西百七十里嶢關應劭曰嶢山之關李竒曰在上洛北藍田南武關之西散關蕭關李廣傳胸奴大入蕭關如淳曰孔安定朝那縣玉關西域傳云在燉煌西界陽關同上天井關成紀應劭曰天井關在上黨髙都五阮關應劭曰在代郡壺口關成紀應劭曰壺口在關壺關壺關見三老上文帝十一年除關無用傳紀景帝四年復置諸關用傳出入紀武帝大初四年徙𢎞農都尉治武關稅出入者以給關吏卒食紀霍光曰函谷京師之固故以丞相弟為關都尉魏相傳城塞漢二年繕治河上塞髙紀又鄧通傳注云東北謂之塞西南謂之徼也六年令天下縣邑城紀惠帝元年正月城長安紀三年發長安六百里內男女十四萬六千人城長安三十日罷紀五月復發長安六百里內男女十四萬五千人城長安三十日罷九月長安城成賜民户爵一級文帝時朝錯請募民徙塞曰以為便之髙城深塹具藺石布渠答復為一城其內城間百五十步要害之處通川之道調立城邑無下千家為中周虎落本傳師古曰虎落者以竹篾相連遮蔽之也武帝元朔三年城朔方城大初元年築塞外受降城紀三年遣光祿徐勳自為築五原塞外列城西北至盧朐疆弩都尉路博德築居延昭帝元鳯六年募郡國徙築遼東玄菟城紀傳置乘傳髙紀五年田橫乘傳詣洛陽如淳曰律四馬髙足為置傳四馬中足為馳傳四馬下足為乘傳一馬二馬為軺傳急者乘傳師一乘師古曰傳者若今之驛古者以車謂之傳車以後又單置馬謂之驛騎傳音張戀反傳置文紀二年太僕見馬遺財足餘皆以給傳置吏記正義曰樂産云傳置一也謂乘傳者以傳受君命乘置者以置馬取用也續漢書云驛馬三十里一置廣雅云置驛也傳馬昭紀元鳯二年省乘輿馬及苑馬以補邊郡三輔傳馬傳車郊祀志與方士傳車一封軺傳平紀如淳曰律諸當乘傳及發駕置傳者皆持尺五寸木傳信封以御史大夫印章其乘傳參封之參三也有期會纍封兩端端各兩封凡四封也乘置馳傳五封之兩端各二中央一也軺傳兩馬再封之一馬一封也師古曰以一馬駕軺車而乘傳一乘傳郊祀志陳寶祀每見雍太祀以大牢遣候者乘一乘傳馳詣行在所四乘傳司馬相如諭蜀使者馳四乘之傳見本傳四馬傳韓延壽傳六乘傳文紀張武等六人乘六乘傳詣長安師古曰傳車六乘出七乘傳昌邑王傳賀乘七乘傳詣長安邸馳傳陳平傳平乘馳傳載周勃代樊噲將軺傳申公傳弟子一人乘軺傳從疾置劉屈氂傳騎置李陵傳因騎置以聞驛騎趙充國傳廄置田詹傳尸鄉廄置置亭馮奉世傳傳舍酈食其傳師古曰傳舍者人所止息前人已去後人復來轉也傳一音張戀反謂傳置之舍也其義兩通縣次傳汲黯傳胸奴叛其主降徐以縣次傳之假軺傳梅福求假軺傳詣行在所亭障髙祖為泗上亭長師古曰秦制十里一亭亭長者主亭之吏也亭謂亭留宿食之所髙紀大率十里一亭亭有長十亭一鄉縣大率方百里其民稠則減稀則曠鄉亭亦如之皆秦制也凡縣道國邑千五百八十七鄉六千六百二十二亭二萬九千六百三十五百官表武帝元光六年南夷始置郵亭史記大事記按是時唐蒙通西夷南治夜郎道始成故置郵亭比內郡焉元鼎中天子行獵新秦中或千里無亭徼於是誅北地太守以下食貨志武帝征四夷開西域自燉煌西至鹽津往往起亭西域傳武帝通大宛諸國使者相望於道於是漢列亭障至玉門矣西域傳元封六年事武帝軍旅數起女子乘亭障賈捐之傳大初三年胸奴入定襄雲中壞光祿諸亭障紀狄山乘一障張湯傳居一障間師古曰鄣為要險之處别築為城因置吏士而為障蔽以扞寇也宣帝神爵元年趙充國奏計度臨羌東至浩亹羌虜故田及公田可二千頃以上其間郵亭多敗壞者以前部士入山伐木六萬餘枝在水次臣願罷兵屯田以間暇時下所伐材繕治郵亭充入金城傳郵亭鄉官黃霸傳師古曰郵行書舍謂傳送文書所止處亦如今之驛館矣鄉官者鄉所治處也都亭司馬相如傳往舍都亭師古曰臨卭所治都之亭元帝時羌虜燔燒置亭平帝置宗師得因郵亭書言宗伯請以聞紀斥候西邊北邊之郡斥候望烽燧不得卧賈誼傳趙充國常以遠斥候為務傳東南一尉西北一候揚雄解嘲邸大鴻臚屬官有郡邸長丞師古曰主諸郡之邸在京師者也按郡國皆有邸所以通奏報待朝宿也初置郡國邸屬少府中屬中尉後屬大鴻臚表武帝封禪詔諸侯治邸泰山下郊祀志蠻夷邸元紀師古曰若今鴻臚客館黃圖云蠻夷邸在城外稿街西漢會要卷六十六
